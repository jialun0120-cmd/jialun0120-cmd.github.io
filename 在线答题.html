<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>中国心理卫生协会 · 水平评价测试 · 基础知识（助理级）</title><meta name="theme-color" content="#0b0e17"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,PingFang SC,Noto Sans SC,sans-serif;background:#0b0e17;color:#e8e6e3;min-height:100vh}.h{position:fixed;top:0;left:0;right:0;z-index:100;padding:.65rem 1rem;background:rgba(11,14,23,.95);backdrop-filter:blur(12px);display:flex;align-items:center;gap:.6rem;border-bottom:1px solid rgba(255,255,255,.06)}.h .b{background:rgba(80,160,255,.15);color:#50a0ff;font-size:.7rem;padding:.15rem .55rem;border-radius:4px;font-weight:500}.h h1{font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.w{padding:4rem 0 6rem}.cc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.85rem 1rem;margin-bottom:.65rem;cursor:pointer;display:flex;align-items:center;gap:.75rem}.cc:active{background:rgba(255,255,255,.08);border-color:rgba(80,160,255,.3)}.cc .n{width:34px;height:34px;border-radius:8px;background:rgba(80,160,255,.1);color:#50a0ff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}.cc .i{flex:1;min-width:0}.cc .t{font-size:.9rem;font-weight:600;margin-bottom:.12rem}.cc .m{font-size:.75rem;color:rgba(255,255,255,.45)}.cc .a{color:rgba(255,255,255,.25);font-size:1.2rem;flex-shrink:0}.q{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1.15rem;margin-bottom:.85rem}.qn{font-size:.76rem;color:rgba(80,160,255,.55);margin-bottom:.5rem;font-weight:500}.qt{font-size:.95rem;line-height:1.7;margin-bottom:1rem;font-weight:500}.qh{font-size:.75rem;color:rgba(255,255,255,.35);margin-bottom:.8rem;font-style:italic}.op{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.8rem .9rem;cursor:pointer;font-size:.88rem;line-height:1.5;display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.55rem}.op .l{width:21px;height:21px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:600;flex-shrink:0;margin-top:.12rem}.cr{border-color:rgba(80,200,120,.5)!important;background:rgba(80,200,120,.07)!important}.cr .l{background:rgba(80,200,120,.2)!important;border-color:rgba(80,200,120,.5)!important;color:#50c878!important}.wr{border-color:rgba(255,90,90,.5)!important;background:rgba(255,90,90,.07)!important}.wr .l{background:rgba(255,90,90,.2)!important;border-color:rgba(255,90,90,.5)!important;color:#ff5a5a!important}.sl{border-color:rgba(80,160,255,.4)!important;background:rgba(80,160,255,.06)!important}.sl .l{background:rgba(80,160,255,.2)!important;border-color:rgba(80,160,255,.4)!important;color:#50a0ff!important}.di{pointer-events:none;opacity:.7}.ex{display:none;margin-top:.85rem;padding:.85rem .95rem;background:rgba(80,160,255,.06);border:1px solid rgba(80,160,255,.1);border-radius:10px;font-size:.82rem;line-height:1.65;color:rgba(255,255,255,.75)}.bn{width:100%;padding:.85rem;border:none;border-radius:10px;background:linear-gradient(135deg,#3a7bd5,#5fa8ff);color:#fff;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:.4rem}.bn:disabled{opacity:.35;cursor:not-allowed}@media(max-width:600px){.ls{padding:0 .6rem}}</style></head><body><div class="h"><span class="b">助理级</span><h1>中国心理卫生协会 · 水平评价测试</h1></div><div class="w"><h2 id="pt" style="padding:1rem 1rem 0;font-size:1.15rem;font-weight:600">基础知识 · 题库练习（助理级）</h2><div id="ls" class="ls" style="padding:0 .75rem"></div><div id="qz" style="display:none;padding:.75rem"></div><div id="rs" style="display:none;padding:.75rem;text-align:center"></div></div><script>var D=[{"chapter": "A1 · 单选题（基础）", "questions": [{"q": "以下哪个选项是人体神经系统的基本结构和功能单位?", "o": ["神经胶质细胞", "神经元", "突触", "反射弧"], "a": 1, "e": "神经元是构成神经系统的基本结构和功能单位;神经胶质细胞主要对神经元起支持、营养、保护等辅助作用,并非基本结构功能单位;突触是神经元之间传递信息的连接结构;反射弧是完成反射活动的结构基础,因此正确答案为B。", "num": 1}, {"q": "人脑对直接作用于感觉器官的客观事物的个别属性的反映被称为?", "o": ["知觉", "感觉", "记忆", "思维"], "a": 1, "e": "感觉的定义就是人脑对直接作用于感官的客观事物个别属性的反映;知觉是对事物整体属性的反映;记忆是对过往经验的存储与提取;思维是对客观事物间接、概括的反映,因此正确答案为B。", "num": 2}, {"q": "我们识别熟悉的品牌标志时,即使标志有部分色块脱落缺失,依然能够准确认出这个标志,这体现了知觉的什么特性?", "o": ["整体性", "选择性", "恒常性", "理解性"], "a": 0, "e": "知觉整体性是指人们会将事物的不同属性整合为统一整体来知觉,即使部分信息缺失,也可以根据已有经验补全整体认出物体;知觉选择性是指人会优先选择部分刺激作为知觉对象;知觉恒常性是指当知觉条件改变时,知觉映像依然保持稳定不变;知觉理解性是指人们会用已有经验来解释知觉对象,因此正确答案为A。", "num": 3}, {"q": "根据记忆内容保持时间的长短进行分类,除了瞬时记忆、短时记忆,还有以下哪一类?", "o": ["长时记忆", "情景记忆", "语义记忆", "动作记忆"], "a": 0, "e": "按照保持时间长短划分,记忆可以分为瞬时记忆(保持1秒以内)、短时记忆(保持1分钟以内)、长时记忆(保持1分钟以上);情景记忆、语义记忆、动作记忆是按照记忆的内容和经验对象划分的类型,因此正确答案为A。", "num": 4}, {"q": "当遇到突发危险时,人们会产生恐惧情绪,促使个体快速做出躲避行为保障自身安全,这体现了情绪情感的哪项功能?", "o": ["适应功能", "动机功能", "组织功能", "信号功能"], "a": 0, "e": "情绪情感的适应功能是指它能够帮助有机体调整行为,适应生存与环境变化;动机功能是指情绪能够激发个体行为,作为活动的动力源泉;组织功能是指情绪对个体其他心理活动起到组织调节的作用;信号功能是指情绪可以通过表情传递信息,因此正确答案为A。", "num": 5}, {"q": "马斯洛的需要层次理论中,位于最高层级的需要是以下哪一项?", "o": ["安全需要", "尊重需要", "归属与爱的需要", "自我实现的需要"], "a": 3, "e": "马斯洛需要层次理论从低到高依次为:生理需要、安全需要、归属与爱的需要、尊重需要、自我实现的需要,最高层次的需要是自我实现的需要,因此正确答案为D。", "num": 6}, {"q": "心理学中,顺利完成某一项活动所必须具备的心理特征被称为?", "o": ["气质", "性格", "能力", "意志"], "a": 2, "e": "能力是顺利完成某种活动所必备的心理特征;气质是心理活动的动力特征的总和,和活动完成的必备条件无关;性格是个体对现实稳定的态度和习惯化的行为方式;意志是个体有意识确立目标、调节行为克服困难的心理过程,因此正确答案为C。", "num": 7}, {"q": "人格中,代表个体对现实稳定态度和习惯化行为方式的成分是?", "o": ["气质", "性格", "能力", "动机"], "a": 1, "e": "性格的定义就是个人对现实的稳定态度和习惯化了的行为方式;气质是心理活动的动力特征;能力是顺利完成活动必备的心理特征;动机是引发维持个体活动的内部动力,因此正确答案为B。", "num": 8}, {"q": "心理学中,个体对自身整体的认知与评价被称为?", "o": ["自我概念", "自尊", "自信", "自我效能感"], "a": 0, "e": "自我概念是个体对自己的综合认知和评价;自尊是个体对自身价值的整体评价;自信是个体对自身能力的信任;自我效能感是个体对自己能否成功完成某一特定任务的判断,因此正确答案为A。", "num": 9}, {"q": "个体对自己、他人以及群体的知觉被称为?", "o": ["社会知觉", "印象形成", "归因", "自我概念"], "a": 0, "e": "社会知觉的定义就是个体对他人、群体以及自身的知觉;印象形成是个体对他人整合形成整体印象的过程;归因是对个体行为背后原因的推论过程;自我概念仅指个体对自己的认知评价,因此正确答案为A。", "num": 10}, {"q": "个体在群体意见的压力下,放弃自己原本的观点,做出和多数人一致的行为,这个过程被称为?", "o": ["从众", "服从", "顺从", "模仿"], "a": 0, "e": "从众是在群体压力下改变自身行为与多数人保持一致;服从是按照他人的命令或要求做出行为;顺从是接受他人请求做出对应行为;模仿是仿照他人的行为做出行动,因此正确答案为A。", "num": 11}, {"q": "个体按照他人的明确命令或要求做出行动的过程被称为?", "o": ["从众", "服从", "顺从", "暗示"], "a": 1, "e": "服从是个体按照他人的命令或要求产生行为;从众是群体压力下主动和多数人一致;顺从是接受他人请求做出行为;暗示是通过含蓄间接的方式影响他人行为,因此正确答案为B。", "num": 12}, {"q": "发展心理学的核心研究内容是以下哪一项?", "o": ["心理的种系发展", "心理的种族发展", "个体心理发展", "社会心理发展"], "a": 2, "e": "发展心理学的核心内容是个体从出生到衰老整个生命周期的心理发展过程;种系发展、种族发展是比较心理学的研究内容;社会心理发展是社会心理学的研究范畴,因此正确答案为C。", "num": 13}, {"q": "发展心理学中,新生儿期的年龄范围是?", "o": ["0-1岁", "0-3岁", "1-3岁", "3-6岁"], "a": 0, "e": "发展心理学中,0-1岁为新生儿期;0-3岁整体为婴儿期;1-3岁为幼儿早期;3-6岁为幼儿期,因此正确答案为A。", "num": 14}, {"q": "婴儿期的主要思维特点是?", "o": ["直观动作思维", "具体形象思维", "抽象逻辑思维", "形式运算思维"], "a": 0, "e": "婴儿期的思维主要依靠实际动作完成,核心特点是直观动作思维;具体形象思维是幼儿期的主要思维特点;抽象逻辑思维在童年期后期开始逐步发展;形式运算思维是青春期阶段的主要思维特点,因此正确答案为A。", "num": 15}, {"q": "埃里克森的发展理论中,青春期阶段的核心发展任务是?", "o": ["建立自我同一性", "获得勤奋感", "获得主动感", "获得亲密感"], "a": 0, "e": "青春期的核心发展任务是建立自我同一性,避免角色混乱;获得勤奋感是童年期的发展任务;获得主动感是幼儿期的发展任务;获得亲密感是成年早期的发展任务,因此正确答案为A。", "num": 16}, {"q": "变态心理学的核心研究对象是?", "o": ["正常心理活动的运行规律", "异常心理活动的表现、成因与发生机制", "各类心理障碍的治疗方法", "心理测量工具的开发与编制"], "a": 1, "e": "变态心理学以异常心理活动为研究对象,主要研究异常心理的表现形式、发生原因和作用机制;正常心理规律是基础心理学的研究内容;心理治疗方法是咨询心理学的研究内容;心理测量工具是心理测量学的研究内容,因此正确答案为B。", "num": 17}, {"q": "下列选项中,属于一般心理问题典型特点的是?", "o": ["情绪反应出现明显泛化", "不良情绪持续超过两个月", "由现实生活因素引发", "社会功能受到严重损害"], "a": 2, "e": "一般心理问题由现实因素引发,持续时间多为1-2个月,情绪反应未泛化,社会功能未出现严重受损;情绪泛化、病程超过2个月、社会功能严重受损是严重心理问题的特征,因此正确答案为C。出处---一般心理问题的特点,变态心理学与健康心理学→常见异常心理的症状,(掌握)", "num": 18}, {"q": "心理测量的核心构成要素是以下哪一项?", "o": ["参照点", "单位", "量表", "常模"], "a": 2, "e": "量表是心理测量的核心要素,是按照一定规则给测量对象指派数值的连续体;参照点和单位是量表本身的两个基本要素,并非心理测量的核心要素;常模是解释心理测量结果的参照标准,因此正确答案为C。", "num": 19}, {"q": "标准化心理测验的开发编制工作,首要完成的核心环节是下列哪一项?", "o": ["确定测验的目的与用途", "编写具体测验项目", "对初编项目开展预测验", "调整整合合成最终测验"], "a": 0, "e": "心理测验编制的固定流程中,第一步为确定测验目的,之后依次开展编写测验项目、预测验、调整合成测验等工作,因此正确答案为A。", "num": 20}, {"q": "根据咨询心理学对完整心理咨询过程的划分,下列属于心理咨询基本阶段的是哪项?", "o": ["初始评估与诊断阶段", "咨询方案实施阶段", "咨询效果巩固阶段", "以上都是"], "a": 3, "e": "完整的心理咨询基本阶段包含三个核心部分,分别是初始的评估诊断阶段、中期的咨询方案实施阶段、结束后的效果巩固阶段,因此正确答案为D。出处---心理咨询的基本阶段,咨询心理学→心理咨询的一般过程,(熟悉)", "num": 21}, {"q": "下列选项中,符合基础心理学核心研究对象定位的是哪项?", "o": ["社会情境中的群体心理与互动行为", "正常个体心理活动的最普遍、最一般规律", "儿童群体的心理发展变化规律", "各类异常心理活动的表现与机制"], "a": 1, "e": "基础心理学以正常成人心理活动为研究对象,总结心理活动最普遍、最基本的规律;社会心理与互动行为是社会心理学的研究对象,儿童心理发展是发展心理学的研究对象,异常心理活动是变态心理学的研究对象,因此正确答案为B。", "num": 22}, {"q": "发展心理学的研究方法中,可以在短时间内同时考察不同年龄组被试心理发展特点的研究设计是?", "o": ["横断研究", "纵向研究", "聚合交叉研究", "观察研究"], "a": 0, "e": "横断研究的定义就是在同一时间点、短时间内考察不同年龄组被试的心理发展特点;纵向研究是长时间追踪同一组被试,聚合交叉研究结合了横断与纵向研究的特点,观察研究是通过观察法收集研究数据,因此正确答案为A。", "num": 23}, {"q": "基础心理学是心理学的基础分支,它以正常成人的()为研究对象,总结心理活动发生发展的一般规律。", "o": ["心理现象", "行为表现", "精神疾病", "社会互动"], "a": 0, "e": "基础心理学的核心研究对象是正常成人的心理现象,总结心理活动最普遍的规律。行为表现是行为心理学的重点研究内容,精神疾病是变态心理学的研究对象,社会互动是社会心理学的研究对象,因此正确答案为A。", "num": 24}, {"q": "下列哪种心理过程,是人脑对客观事物与主体需要之间关系的反映?", "o": ["意志", "动机", "行为", "情绪和情感"], "a": 3, "e": "情绪和情感的定义就是以主体需要为中介,是人脑对客观事物与主体需要之间关系的反映;动机是引发并维持个体活动的内部动力,行为是个体的外在表现,因此正确答案为D。", "num": 25}, {"q": "弗洛伊德经典人格结构理论中,遵循现实原则活动的人格结构是哪一项?", "o": ["本我", "自我", "超我", "镜我"], "a": 1, "e": "弗洛伊德将人格结构划分为本我、自我、超我三个部分,其中本我遵循快乐原则,自我遵循现实原则,超我遵循道德原则;镜我是社会心理学家库利提出的自我相关概念,因此正确答案为B。", "num": 26}, {"q": "社会心理学的核心研究对象是下列哪一项?", "o": ["社会影响", "社会思维", "社会关系", "社会行为"], "a": 3, "e": "社会心理学研究社会情境中人的心理过程及其行为规律,核心研究对象是社会行为,包含外显行为与内隐心理活动;社会影响、社会思维、社会关系均属于社会心理学的细分研究内容,因此正确答案为D。", "num": 27}, {"q": "下列选项中,哪一项不属于从众行为的主要引发原因?", "o": ["寻求行为参照", "对偏离群体的恐惧", "群体凝聚力", "个体的攻击性特质"], "a": 3, "e": "从众行为的主要原因包括三点:不确定情境下寻求合适的行为参照、对偏离群体规范的恐惧、群体自身的凝聚力;个体的攻击性特质和从众行为没有直接关联,因此正确答案为D。", "num": 28}, {"q": "皮亚杰的认知发展阶段理论中,前运算阶段对应的年龄范围是?", "o": ["0-2 岁", "2-7 岁", "7-11 岁", "11 岁以后"], "a": 1, "e": "皮亚杰将认知发展划分为四个阶段,其中感知运动阶段为0-2 岁,前运算阶段为 2-7 岁,具体运算阶段为 7-11 岁,形式运算阶段为 11 岁以后,因此正确答案为 B。", "num": 29}, {"q": "个体发展阶段中,幼儿期儿童的主导活动是下列哪一项?", "o": ["系统知识学习", "游戏", "生产劳动", "人际交往"], "a": 1, "e": "幼儿期儿童的主导活动是游戏,进入童年期后,学习才成为个体的主导活动,因此正确答案为B。", "num": 30}, {"q": "异常心理症状中,幻觉属于下列哪一类障碍?", "o": ["感知障碍", "思维障碍", "情感障碍", "意志行为障碍"], "a": 0, "e": "幻觉是没有客观刺激作用于感觉器官时出现的知觉体验,属于感知障碍中的知觉障碍,因此正确答案为A。", "num": 31}, {"q": "病理性妄想属于下列哪一类心理异常障碍?", "o": ["思维内容障碍", "思维形式障碍", "感知障碍", "注意障碍"], "a": 0, "e": "妄想是一种脱离现实的病理性思维,属于思维内容障碍;思维形式障碍主要指思维联想过程和思维逻辑的异常,因此正确答案为A。", "num": 32}, {"q": "心理测量中,反映测验结果稳定性和一致性的指标是下列哪一项?", "o": ["效度", "信度", "难度", "区分度"], "a": 1, "e": "信度的定义就是反映测验结果的稳定性和一致性;效度反映测验的准确性和有效性,难度指测验项目的难易程度,区分度指测验项目对被试水平的区分能力,因此正确答案为B。", "num": 33}, {"q": "心理测量中,哪一个指标反映了测验结果能够测出所要测量的心理特质的程度?", "o": ["信度", "效度", "难度", "区分度"], "a": 1, "e": "效度的定义就是测验能够测出所要测量的心理特质的准确程度;信度反映结果的稳定性,难度指项目的难易程度,区分度指对被试的区分能力,因此正确答案为B。", "num": 34}, {"q": "心理咨询过程中,咨询师对求助者的内心世界进行体验和理解的过程被称为?", "o": ["尊重", "真诚", "共情", "积极关注"], "a": 2, "e": "共情的定义就是咨询师深入体验求助者的内心世界,理解其感受;尊重是指接纳求助者的一切,真诚是咨询师真实展现自己,积极关注是关注求助者身上的积极方面,因此正确答案为C。", "num": 35}, {"q": "下列选项中,符合积极心理学核心观点的是哪一项?", "o": ["关注心理疾病的诊断与治疗", "强调人类的积极品质和发展潜能", "聚焦于不良行为的矫正", "强调潜意识对人格的影响作用"], "a": 1, "e": "积极心理学的核心观点是研究人类的积极品质、自身潜能与幸福感;关注心理疾病治疗是传统临床心理学的重点,行为矫正是行为主义流派的核心观点,潜意识是精神分析学派的研究重点,因此正确答案为B。", "num": 36}, {"q": "人格心理学中,人格特质理论的创始人是下列哪一位心理学家?", "o": ["奥尔波特", "卡特尔", "艾森克", "弗洛伊德"], "a": 0, "e": "奥尔波特是人格特质理论的创始人;卡特尔提出了表面特质和根源特质的分类,艾森克提出了人格三维度模型,弗洛伊德是精神分析学派的创始人,因此正确答案为A。", "num": 37}, {"q": "健康心理学的核心研究内容是下列哪一项?", "o": ["心理疾病的诊断分类", "促进和维护健康的相关心理因素", "各类心理障碍的治疗方法", "躯体疾病的临床治疗"], "a": 1, "e": "健康心理学的核心研究内容是研究影响、促进和维护健康的心理相关因素;心理疾病的诊断是变态心理学的内容,心理治疗方法是咨询心理学的内容,躯体疾病治疗是临床医学的内容,因此正确答案为B。", "num": 38}, {"q": "下列哪一项是抑郁状态最典型的情绪表现?", "o": ["情绪高涨", "情绪低落", "焦虑不安", "恐惧害怕"], "a": 1, "e": "抑郁状态的典型情绪表现是情绪低落、兴趣减退;情绪高涨是躁狂状态的典型表现,焦虑不安是焦虑状态的核心表现,恐惧害怕是恐惧状态的主要表现,因此正确答案为B。", "num": 39}, {"q": "下列选项中,不属于抑郁发作核心症状的是哪一项?", "o": ["持续的情绪低落", "对以往爱好的兴趣明显减退", "无法从日常活动中获得愉快感", "出现幻听、被害妄想等精神病性症状"], "a": 3, "e": "抑郁发作的核心症状包含三类:情绪低落、兴趣减退、快感缺失。幻觉妄想属于精神病性附加症状,不属于抑郁发作的核心症状范畴。", "num": 40}, {"q": "心理测量中,信度描述的是测量结果的哪项特性?", "o": ["一致性", "有效性", "准确性", "针对性"], "a": 0, "e": "信度的定义为:同一测量工具反复测量同一对象时,所得结果的一致性程度;测量的有效性与准确性是效度的核心特征。", "num": 41}, {"q": "心理测量中,效度所指的是测量结果的哪项特性?", "o": ["一致性", "有效性", "稳定性", "可靠性"], "a": 1, "e": "效度指测量工具能够准确测出目标心理特质的程度,核心属性是测量的有效性;一致性、稳定性、可靠性都是信度的描述内容。", "num": 42}, {"q": "下列人格测验中,属于投射测验的是哪一项?", "o": ["爱德华个人偏好量表", "罗夏墨迹测验", "卡特尔16种人格因素问卷", "艾森克人格问卷"], "a": 1, "e": "投射测验通过给被试呈现模糊无结构的刺激,让被试自由反应从而投射出其人格特征,罗夏墨迹测验是经典投射测验;其余选项均为自陈式人格测验。", "num": 43}, {"q": "下列哪类人群不属于心理咨询的主要服务对象?", "o": ["因职场适应问题困扰的健康人群", "存在轻度社交焦虑的正常人群", "已经临床治愈的重度抑郁症患者", "处于急性发作期的精神分裂症患者"], "a": 3, "e": "心理咨询的主要对象包括:存在心理问题的精神正常人群、心理健康水平较低的人群、临床治愈的精神病患者;发作期重症精神病患者需要优先接受精神科治疗,不属于心理咨询的主要对象。", "num": 44}, {"q": "下列选项中,属于心理测验标准化核心指标的是?", "o": ["信度", "效度", "常模", "以上都是"], "a": 3, "e": "心理测验的标准化涵盖内容、施测、评分、分数解释的全流程标准化,信度、效度、常模都是衡量测验标准化程度的核心指标。", "num": 45}, {"q": "下列选项中,不属于社会认知偏差的是哪一项?", "o": ["首因效应", "近因效应", "从众效应", "晕轮效应"], "a": 2, "e": "常见的社会认知偏差包括首因效应、近因效应、晕轮效应、刻板效应等;从众效应是个体在群体压力下改变行为态度的社会影响现象,不属于认知偏差范畴。", "num": 46}, {"q": "下列情绪体验中,属于积极心理学研究的积极体验的是?", "o": ["幸福", "悲伤", "愤怒", "焦虑"], "a": 0, "e": "积极心理学研究的积极体验包括快乐、幸福、满足、成就感等,悲伤、愤怒、焦虑都属于消极情绪体验。", "num": 47}, {"q": "下列选项中,不属于人格基本特征的是哪一项?", "o": ["独特性", "稳定性", "情绪性", "功能性"], "a": 2, "e": "人格的基本特征包括独特性、稳定性、整体性、功能性,情绪性不属于人格的基本特征。", "num": 48}, {"q": "下列维度中,不属于大五人格理论核心维度的是哪一项?", "o": ["外向性", "宜人性", "神经质", "攻击性"], "a": 3, "e": "大五人格理论的五个核心维度是开放性、责任心、外向性、宜人性、神经质,攻击性不属于大五人格的核心维度。", "num": 50}, {"q": "社会交换理论认为,人际互动的本质是?", "o": ["情感交流", "利益交换", "权力博弈", "信息传递"], "a": 1, "e": "社会交换理论认为,人际互动是个体为获得奖励、避免惩罚而开展的利益交换过程,因此本质是利益交换。", "num": 51}, {"q": "下列选项中,属于认知过程的是哪一项?", "o": ["记忆", "能力", "气质", "性格"], "a": 0, "e": "心理过程分为认知过程、情绪情感过程、意志过程,记忆属于认知过程;能力、气质、性格都属于人格心理特征,不属于认知过程。", "num": 52}, {"q": "下列选项中,属于社会性需要的是哪一项?", "o": ["交往需要", "进食需要", "睡眠需要", "空气需要"], "a": 0, "e": "社会性需要是后天学习获得的需要,包括交往、成就等需要;进食、睡眠、空气需要都属于先天生理性需要。", "num": 53}, {"q": "心境的核心特点是下列哪一项?", "o": ["微弱、持久、弥散性", "强烈、短暂、爆发性", "紧张、激动、指向性", "突然发生、不可控"], "a": 0, "e": "心境是微弱、持久且具有弥散性的情绪体验,也就是日常所说的心情;强烈、短暂、爆发性是激情的特点。", "num": 54}, {"q": "下列选项中,不属于自我概念结构成分的是哪一项?", "o": ["认知能力", "自我认知", "自我体验", "自我调控"], "a": 3, "e": "自我概念的结构包含三个成分:自我认知、自我体验、自我调控,认知能力是个体一般能力,不属于自我概念的结构成分。", "num": 55}, {"q": "下列选项中,属于基本情绪的是哪一项?", "o": ["快乐", "羞耻", "内疚", "自卑"], "a": 0, "e": "基本情绪是先天的、人和动物共有的情绪,包括快乐、愤怒、悲哀、恐惧;羞耻、内疚、自卑属于后天产生的复合情绪。", "num": 56}, {"q": "心理咨询流程中,最初的阶段是哪一项?", "o": ["评估诊断阶段", "咨询干预阶段", "巩固结束阶段", "转介评估阶段"], "a": 0, "e": "心理咨询分为评估诊断、咨询干预、巩固结束三个阶段,第一阶段为评估诊断阶段,核心工作是建立咨询关系、收集资料、完成心理评估。", "num": 57}, {"q": "下列选项中,属于思维形式障碍的是哪一项?", "o": ["思维散漫", "被害妄想", "强迫思维", "超价观念"], "a": 0, "e": "思维障碍分为思维形式障碍和思维内容障碍,思维散漫、思维破裂、思维奔逸都属于思维形式障碍;妄想、超价观念属于思维内容障碍,强迫思维属于强迫障碍的典型症状。", "num": 58}, {"q": "社会心理学中,群体极化的含义是?", "o": ["群体讨论后成员原有态度向极端方向偏移", "群体决策一定比个体决策更冒险", "群体决策一定比个体决策更保守", "群体讨论后成员意见完全一致"], "a": 0, "e": "群体极化指群体经过讨论后,成员原有的态度被强化,向更极端的方向转变,包含冒险偏移和谨慎偏移两种情况,不是只偏向某一端,也不要求意见完全一致。", "num": 59}, {"q": "下列注意类型中,符合\"有预定目的、需要意志努力\"特征的是?", "o": ["随意注意", "不随意注意", "无意注意", "被动注意"], "a": 0, "e": "根据有无预定目的和是否需要意志努力,注意分为三类:无意注意(又称不随意注意、被动注意,无目的、不需要意志努力)、随意注意(又称有意注意,有目的、需要意志努力)、有意后注意(有目的、不需要意志努力),符合题干描述的是随意注意。", "num": 60}, {"q": "下列注意类型中,符合\"有预定目的、需要意志努力\"特征的是?", "o": ["随意注意", "不随意注意", "无意注意", "被动注意"], "a": 0, "e": "根据有无预定目的和是否需要意志努力,注意分为三类:无意注意(又称不随意注意、被动注意,无目的、不需要意志努力)、随意注意(又称有意注意,有目的、需要意志努力)、有意后注意(有目的、不需要意志努力),符合题干描述的是随意注意。", "num": 60}, {"q": "根据弗洛伊德的精神分析人格发展阶段理论,儿童结束1-3岁的肛门期后,进入的下一阶段是哪一个?", "o": ["口唇期", "潜伏期", "性器期(俄狄浦斯期)", "生殖期"], "a": 2, "e": "弗洛伊德将人格发展划分为五个阶段,年龄对应关系为:0-1岁对应口唇期,1-3岁对应肛门期,3-6岁对应性器期(俄狄浦斯期),6-12岁对应潜伏期,12岁以后对应生殖期。题干中肛门期之后是3岁开始的性器期,因此C正确,A、B、D不符合年龄对应关系。", "num": 61}, {"q": "咨询师接到有自杀意向的求助后,开展自杀危机干预的首要核心步骤是?", "o": ["立刻联系求助者家属告知情况", "对求助者的自杀风险等级进行准确评估", "对求助者开展情绪疏导稳定情绪", "立即将求助者转介至精神科医疗机构"], "a": 1, "e": "自杀危机干预中,所有后续干预措施都需要基于准确的自杀风险评估制定,只有先明确风险等级,才能采取对应的干预措施,因此评估自杀风险是首要核心步骤,B正确;A、C、D都需要在评估风险之后根据评估结果实施,因此排除。", "num": 63}, {"q": "以下哪一项符合心流体验的核心特征?", "o": ["做活动时时刻保持对自我表现的高度关注", "完全沉浸在当前活动中,感知不到时间的快速流逝", "需要通过外界的肯定获得满足感", "活动过程中情绪体验大起大落难以平复"], "a": 1, "e": "心流体验是个体完全沉浸于当前活动中的最优心理体验,核心特征是注意力高度集中于活动,忽略周围环境,出现时间感扭曲(忘记时间流逝),因此B正确;A是高度自我觉知的状态,不符合心流忘我的特点,C是外部动机驱动的体验,不符合心流的内在体验特征,D是情绪失调的表现,因此排除A、C、D。", "num": 64}, {"q": "发展心理学家安斯沃斯通过陌生情境实验研究婴儿依恋,将婴儿依恋划分为安全型、矛盾型(反抗型)和哪一种类型?", "o": ["开放型", "冲动型", "回避型", "迟缓型"], "a": 2, "e": "安斯沃斯通过陌生情境实验将婴儿依恋划分为三种经典类型:安全型依恋、回避型依恋、矛盾型(反抗型)依恋,因此C正确,A、B、D不属于该分类体系,排除。", "num": 65}, {"q": "以下选项中,哪一项不属于意志品质的范畴?", "o": ["坚韧性", "情绪性", "自制性", "果断性"], "a": 1, "e": "心理学中,意志品质包括四个核心维度:自觉性、果断性、坚韧性、自制性,情绪性是个体情绪反应的特征,不属于意志品质,因此B正确,A、C、D均属于意志品质,不符合题干要求,排除。", "num": 66}, {"q": "强迫障碍的核心临床症状是以下哪一项?", "o": ["持续莫名的紧张焦虑", "反复出现的强迫思维和/或强迫行为", "出现幻觉妄想等精神病性症状", "持续情绪低落、兴趣减退"], "a": 1, "e": "强迫障碍的核心症状就是反复出现的不受控的强迫思维(如强迫怀疑、强迫联想)和/或强迫行为(如强迫清洗、强迫检查),因此B正确;A是广泛性焦虑障碍的常见症状,C是重性精神疾病(如精神分裂症)的症状,D是抑郁发作的核心症状,因此排除A、C、D。", "num": 67}, {"q": "个体全身心投入感兴趣的活动时,会出现注意力高度集中、忘记周围环境和时间流逝的状态,这种状态被称为?", "o": ["心流体验", "自我实现", "高峰体验", "积极情绪"], "a": 0, "e": "心流体验的定义就是个体完全投入当前活动,注意力高度集中,忘记时间和周围环境的最优体验,因此A正确;B是马斯洛需求层次理论中最高层次需求的满足状态,C是马斯洛提出的短暂的巅峰体验,概念与题干描述不符,D是泛指正向的情绪体验,不符合题干对特定状态的描述,因此排除B、C、D。", "num": 68}, {"q": "以下哪种情境会降低个体做出利他行为的可能性?", "o": ["现场旁观者的数量较多", "求助者是和自己关系亲近的人", "求助者处境十分危急需要帮助", "救助者当前有充足的时间提供帮助"], "a": 0, "e": "社会心理学中的旁观者效应指出,当旁观者数量越多时,每个个体的责任扩散越明显,做出利他行为的概率越低,因此A正确;B、C、D三种情况都会提高利他行为的发生概率,不符合题干要求,因此排除。", "num": 69}, {"q": "心理测验的项目分析中,项目区分度指的是?", "o": ["测验项目的难易程度", "测验项目对不同被试心理特质水平的区分能力", "测验项目内部的一致性程度", "测验项目能够测出目标特质的有效性"], "a": 1, "e": "项目区分度的定义就是测验项目对被试不同心理特质水平的区分能力,能够区分出不同水平被试的项目区分度高,因此B正确;A是项目难度的定义,C是信度的相关指标,D是项目效度的定义,因此排除A、C、D。", "num": 70}, {"q": "以下选项中,哪一项不属于心理健康的评价标准?", "o": ["身体没有器质性病变", "情绪状态稳定积极", "能够保持和谐的人际关系", "可以良好适应社会环境的变化"], "a": 0, "e": "心理健康的标准包括情绪健康、人际关系和谐、社会适应良好、自我认知完整等多个方面,身体无器质性病变属于生理健康的范畴,不属于心理健康标准,因此A正确,B、C、D均属于心理健康标准,不符合题干要求,排除。", "num": 71}, {"q": "广泛性焦虑障碍的核心症状是以下哪一项?", "o": ["持续的、无明确对象的紧张不安和过度担忧", "突发的、不可预测的惊恐发作", "反复出现的强迫思维和强迫行为", "存在幻觉妄想等精神病性症状"], "a": 0, "e": "广泛性焦虑障碍的核心症状就是持续存在的、没有明确固定对象的紧张不安与过度担忧,因此A正确;B是惊恐障碍的核心症状,C是强迫障碍的核心症状,D是重性精神病(如精神分裂症)的症状,因此排除B、C、D。", "num": 72}, {"q": "心理测验中,常模的定义是以下哪一项?", "o": ["被试在测验上获得的原始分数", "标准化样本的测验分数分布情况", "衡量测验一致性程度的信度指标", "衡量测验有效性的效度指标"], "a": 1, "e": "常模是指通过标准化样本测试得到的测验分数分布,是将个体原始分数转化为标准分数进行比较的参照,因此B正确;A是原始分数的定义,C是信度的概念,D是效度的概念,因此排除A、C、D。", "num": 73}, {"q": "以下关于心理咨询中共情的表述,正确的是哪一项?", "o": ["共情就是咨询师同情求助者的遭遇", "共情需要咨询师站在自己的角度理解求助者的感受", "共情是咨询师如同体验自身内心一样体验求助者的内心,同时保持客观性", "共情不需要考虑求助者的文化背景差异"], "a": 2, "e": "共情是建立咨询关系的核心技术,正确的共情是咨询师设身处地体验求助者的内心世界,始终保持“如同”自身感受的客观性,不会完全代入失去判断,因此C正确;共情不等于同情,共情需要站在求助者的角度而非咨询师自身角度,同时需要结合求助者的文化背景调整表达,因此A、B、D表述错误,排除。", "num": 74}, {"q": "积极心理学的PERMA幸福模型不包含以下哪一项内容?", "o": ["积极情绪", "投入", "人际关系", "财富积累"], "a": 3, "e": "积极心理学的PERMA模型由塞利格曼提出,包含五个核心成分:P(积极情绪)、E(投入)、R(人际关系)、M(意义)、A(成就),财富积累不属于该模型的内容,因此D正确,排除A、B、C。", "num": 75}, {"q": "根据巴甫洛夫的高级神经活动类型学说,气质类型中的胆汁质对应的神经活动类型是?", "o": ["强、不平衡", "强、平衡、灵活", "强、平衡、不灵活", "弱"], "a": 0, "e": "巴甫洛夫的高级神经活动类型与气质类型的对应关系为:胆汁质对应强、不平衡;多血质对应强、平衡、灵活;黏液质对应强、平衡、不灵活;抑郁质对应弱,因此A正确,排除B、C、D。", "num": 76}, {"q": "世界卫生组织提出的现代健康定义是?", "o": ["身体没有疾病和虚弱状态", "心理状态保持正常无异常", "身体、心理和社会适应的完好状态", "身体没有器质性病变的状态"], "a": 2, "e": "世界卫生组织对健康的定义为:健康不仅是没有疾病,而是身体、心理和社会适应的完好状态,因此C正确,A、B、D都只涵盖了部分健康内容,表述不完整,因此排除。", "num": 77}, {"q": "社会知觉中,人们对某一个社会群体成员形成的固定化、概括化的看法,被称为?", "o": ["首因效应", "刻板印象", "晕轮效应", "近因效应"], "a": 1, "e": "社会心理学中,刻板印象的定义就是对某一群体的固定化、概括化的认知看法;首因效应是指最初获得的信息对后续认知的影响更大,晕轮效应是指以偏概全的认知偏差,近因效应是指最新获得的信息对认知的影响更大,因此B正确,排除A、C、D。", "num": 78}, {"q": "团体心理咨询过程中,初始阶段的核心任务是以下哪一项?", "o": ["解决成员的核心心理问题", "建立团体信任氛围、明确团体规则", "巩固成员取得的咨询成果", "处理成员的离别情绪"], "a": 1, "e": "团体心理咨询分为不同阶段,初始阶段成员还不熟悉,核心任务是建立安全信任的团体氛围,明确保密、自愿参与等团体规则,让成员逐步适应团体,因此B正确;A是工作阶段的核心任务,C、D是结束阶段的任务,因此排除A、C、D。", "num": 79}, {"q": "成人依恋理论中,焦虑-矛盾型依恋个体在亲密关系中的核心表现是?", "o": ["回避亲密接触,不信任伴侣", "过度依赖伴侣,极度害怕被伴侣抛弃", "能够独立处理亲密关系中的矛盾", "对建立亲密关系完全没有兴趣"], "a": 1, "e": "成人依恋理论中,焦虑-矛盾型依恋的核心特征是个体渴望亲密关系,但由于早年依恋创伤,极度恐惧被伴侣抛弃,因此会表现出过度依赖、情绪敏感的特点,因此B正确;A是回避型依恋的核心表现,C是安全型依恋的表现,D不属于典型依恋类型的核心表现,因此排除A、C、D。", "num": 80}, {"q": "社会心理学领域中,群体极化的核心定义是指下列哪种现象?", "o": ["群体决策一定会比个体决策更加保守", "群体讨论后个体原本的态度向极端方向偏移", "群体情境中个体的责任感知会明显下降", "个体在群体压力下主动改变自身原有行为"], "a": 1, "e": "群体极化的核心定义为:经过群体讨论后,群体成员原本所持的态度会向更极端的方向偏移,具体包含冒险偏移与谨慎偏移两种类型。选项A错误,群体极化不只会偏向保守,也可偏向冒险;选项C是去个体化的核心特征;选项D是从众行为的典型表现,因此排除A、C、D。", "num": 81}, {"q": "下列影响亲社会行为产生的因素中,描述正确的是?", "o": ["群体规模越大,在场个体的助人意愿越高", "情境越模糊不清,个体伸出援手的意愿越高", "提前呈现助人的榜样行为能够提升个体的助人意愿", "责任扩散效应会提升个体主动助人的可能性"], "a": 2, "e": "已有研究证实,榜样示范能够有效提升个体做出亲社会行为的概率。群体规模越大、情境模糊性越高、责任扩散效应越强,都会降低个体的助人意愿,因此A、B、D描述错误,正确答案为C。", "num": 82}, {"q": "封闭式团体心理咨询的最合适的理想参与规模通常是?", "o": ["2-4人", "6-12人", "15-20人", "20人及以上"], "a": 1, "e": "对于封闭式团体而言,6-12人的规模既可以保证团体内部有充分的互动,也能够让每位成员获得足够的参与和表达机会,维持团体咨询的效率,因此是理想规模。", "num": 83}, {"q": "艾森克人格特质理论提出的三维度模型中,不包含下列哪一维度?", "o": ["外向性", "神经质", "精神质", "开放性"], "a": 3, "e": "艾森克的三因素人格模型包含的三个维度是外向性、神经质、精神质;开放性是大五人格理论的维度之一,不属于艾森克的模型,因此正确答案为D。", "num": 84}, {"q": "社会心理学中,刻板印象的本质是?", "o": ["对特定个体的稳定准确评价", "对某一类群体的固定概括化认知", "针对特定群体的负面歧视行为", "针对特定群体的排斥性负面情绪"], "a": 1, "e": "刻板印象的本质是人们对某一类群体形成的固定、概括性的认知,刻板印象可正可负,本质是认知而非行为或情绪,也不是针对个体的评价,因此正确答案为B。", "num": 85}, {"q": "老年群体出现退休适应障碍的核心诱发因素是?", "o": ["身体生理机能的自然下降", "丧失职业角色后引发的社会认同缺失", "子女离家后产生的空巢孤独感", "退休后经济收入的明显减少"], "a": 1, "e": "退休适应障碍的核心原因是个体脱离职业岗位后,原有的职业身份丧失,原本通过职业获得的社会认同缺失,进而引发情绪与适应问题。其他选项均为次要影响因素,不是核心诱因,因此正确答案为B。", "num": 86}, {"q": "社会心理学中旁观者效应产生的核心原因是?", "o": ["旁观者个体的道德水平普遍低下", "情境中的责任扩散效应", "参与围观的群体规模太小", "求助者自身存在一定过错"], "a": 1, "e": "旁观者效应指紧急情境下在场的旁观者越多,个体越不容易出手帮助的现象,其核心原因是责任扩散,即个体会认为其他在场的人会承担帮助的责任,因此降低自身的责任感知,不愿主动行动,正确答案为B。", "num": 87}, {"q": "积极心理学的核心研究内容是下列哪一项?", "o": ["各类心理疾病的诊断与临床治疗", "人类的积极心理品质与积极幸福体验", "异常心理与问题行为的成因分析", "心理障碍的药物干预方案研究"], "a": 1, "e": "积极心理学区别于传统聚焦心理疾病的心理学取向,核心研究内容是人类的积极心理品质、积极幸福体验以及个体的成长与发展,因此正确答案为B。", "num": 88}, {"q": "行为疗法中暴露疗法的核心操作要点是?", "o": ["逐步降低刺激强度帮助来访者缓解焦虑", "直接将来访者暴露于其最恐惧的刺激情境中", "仅通过想象让来访者接触恐惧刺激", "配合药物治疗缓解焦虑情绪"], "a": 1, "e": "暴露疗法(满灌疗法)的核心操作是直接让求助者暴露在其最高等级的恐惧刺激中,持续暴露直至焦虑情绪自行消退。选项A是系统脱敏的操作要点,因此正确答案为B。", "num": 89}, {"q": "社交焦虑障碍的核心症状是下列哪一项?", "o": ["对特定尖锐物体产生强烈非理性恐惧", "对社交场景产生过度恐惧并主动回避", "无明显诱因反复出现惊恐发作", "持续的情绪低落与兴趣活动减退"], "a": 1, "e": "社交焦虑障碍的核心症状是个体害怕被他人负面评价,因此对社交场合产生过度的恐惧,并主动回避社交场景。A是特定恐惧症的表现,C是惊恐障碍的表现,D是抑郁症的核心症状,因此正确答案为B。", "num": 90}, {"q": "儿童注意缺陷多动障碍(ADHD)的核心症状不包含下列哪一项?", "o": ["注意力难以集中", "活动过多冲动任性", "持续的情绪低落", "不同程度的学习困难"], "a": 2, "e": "儿童注意缺陷多动障碍的核心症状为注意力不集中、多动冲动,多数患儿会伴随出现学习困难,情绪低落不属于该病的核心症状,因此正确答案为C。", "num": 91}, {"q": "根据埃里克森的人格发展阶段理论,12-18岁青少年期的核心发展冲突是?", "o": ["亲密对孤独", "同一性对角色混乱", "繁殖对停滞", "勤奋对自卑"], "a": 1, "e": "埃里克森人格发展八阶段理论中,12-18岁青少年期的核心发展任务是建立自我同一性,避免角色混乱,探索“我是谁”的问题。亲密对孤独是18-40岁青年期的冲突,繁殖对停滞是40-65岁中年期的冲突,勤奋对自卑是6-12岁学龄期的冲突,因此正确答案为B。", "num": 92}, {"q": "VIA性格优势分类体系中,“正义”美德板块不包含下列哪项特质?", "o": ["团队合作", "公平性", "善良", "领导力"], "a": 2, "e": "VIA性格优势分类中,善良属于“仁爱”美德板块,不属于正义板块;正义美德板块包含团队合作、公平性、领导力三项特质,因此正确答案为C。", "num": 93}, {"q": "团体心理咨询结束阶段的核心任务是?", "o": ["建立成员间信任关系并明确团体规则", "处理成员的离别情绪并巩固已取得的咨询成果", "解决成员提出的核心心理困扰问题", "招募新成员扩大团体的整体规模"], "a": 1, "e": "团体心理咨询不同阶段核心任务不同:初始阶段核心是建立信任、明确规则;工作阶段核心是解决成员的核心心理问题;结束阶段的核心任务是处理成员的离别情绪,巩固咨询成果,因此正确答案为B。", "num": 94}, {"q": "社会心理学中旁观者效应的核心影响因素是?", "o": ["旁观者个体道德素质低下", "情境中的责任扩散效应", "围观的群体整体规模过小", "求助者自身存在过错"], "a": 1, "e": "旁观者效应的核心影响因素是责任扩散,当多个旁观者在场时,个体认为其他人会承担帮助求助者的责任,因此自身助人责任感知降低,降低助人意愿,其他选项均为次要因素,并非核心,因此正确答案为B。", "num": 95}, {"q": "健康信念模型的核心要素不包含下列哪一项?", "o": ["个体对疾病易感性的感知", "个体对疾病严重性的感知", "个体的外貌焦虑程度", "个体对健康行为障碍的感知"], "a": 2, "e": "健康信念模型的核心要素包括:对疾病易感性的感知、对疾病严重性的感知、做出健康行为的收益感知、对健康行为障碍的感知、自我效能感;个体的外貌焦虑不属于健康信念模型的核心要素,因此正确答案为C。", "num": 96}, {"q": "积极心理学中,心流体验形成的核心条件是?", "o": ["任务难度远高于个体的能力水平", "任务难度远低于个体的能力水平", "任务难度与个体能力水平相匹配", "没有明确目标的自由休闲活动"], "a": 2, "e": "心流体验指个体全神贯注投入活动中获得的愉悦沉浸体验,其核心形成条件是任务难度与个体能力相匹配:难度过高会引发焦虑,难度过低会引发无聊,都无法产生心流,因此正确答案为C。", "num": 97}, {"q": "自杀危机干预中,下列哪种情况属于法定保密例外?", "o": ["求助者透露过去未被发现的违法犯罪行为", "求助者已经制定了明确的自杀或伤人计划", "求助者要求咨询师对其所有内容绝对保密", "求助者的家属要求咨询师告知咨询内容"], "a": 1, "e": "心理咨询伦理中,当求助者存在明确的自伤、伤人计划时,属于法定保密例外,咨询师需要打破保密原则,优先保障来访者与他人的生命安全,因此正确答案为B。", "num": 98}, {"q": "弗洛伊德精神分析人格发展理论中,6-12岁儿童所处的性心理发展阶段是?", "o": ["口唇期", "肛门期", "性器期", "潜伏期"], "a": 3, "e": "弗洛伊德的性心理发展五阶段分别为:0-1岁口唇期、1-3岁肛门期、3-6岁性器期、6-12岁潜伏期、12岁以后生殖期,因此正确答案为D。", "num": 99}, {"q": "根据安斯沃斯的陌生情境实验,回避型依恋婴儿在母亲返回后的典型表现是?", "o": ["主动寻求与母亲的身体接触", "主动回避和母亲的接触或眼神交流", "既渴望接触母亲又表现出抗拒行为", "没有任何明显的情绪反应"], "a": 1, "e": "回避型依恋婴儿在母亲离开时不会太焦虑,母亲返回后会主动回避与母亲的接触和互动,不愿和母亲建立亲密连接,因此正确答案为B。", "num": 100}, {"q": "针对某位患有高度演讲焦虑的来访者,咨询师计划使用系统脱敏疗法帮助其改善症状,该疗法正确的操作顺序是?", "o": ["直接将来访者暴露于最高等级的演讲场景→渐进肌肉放松训练→梳理焦虑等级", "渐进肌肉放松训练→建立焦虑刺激等级表→从低等级到高等级逐步暴露刺激", "建立焦虑等级表→直接暴露最高刺激→渐进肌肉放松训练", "渐进肌肉放松训练→直接暴露最高刺激→建立焦虑等级表"], "a": 1, "e": "系统脱敏疗法的标准操作步骤为:首先对来访者进行渐进式肌肉放松训练,让来访者掌握放松技巧;其次帮助来访者梳理建立恐惧/焦虑刺激的等级表;最后按照从低等级到高等级的顺序,将来访者逐步暴露于刺激场景,结合放松训练对抗焦虑,最终实现脱敏。选项A、C、D的顺序均不符合标准操作要求。", "num": 101}, {"q": "根据皮亚杰的认知发展阶段理论,2-7岁处于前运算阶段的儿童,最核心的特征是?", "o": ["已经能够理解物体容积不会随容器形状改变,获得守恒概念", "只能通过感知和动作认识探索外部世界", "思考问题时站在自身角度出发,具有明显的自我中心思维", "能够脱离具体事物进行抽象逻辑推理"], "a": 2, "e": "皮亚杰将认知发展分为四个阶段:0-2岁感知运动阶段,儿童通过感知动作认识世界;2-7岁前运算阶段,儿童获得了语言符号能力,但思维具有自我中心性,尚未获得守恒概念;7-11岁具体运算阶段,获得守恒概念,能进行逻辑推理但需要具体事物支持;11岁以上形式运算阶段,能够进行抽象逻辑推理。因此选项A对应具体运算阶段,B对应感知运动阶段,D对应形式运算阶段,只有C符合前运算阶段核心特征。", "num": 102}, {"q": "费斯廷格的认知失调理论认为,当个体认知之间出现不一致时会产生认知失调,以下哪种方式不能帮助个体缓解认知失调?", "o": ["调整自己原有的对事件的认知信念", "添加新的认知元素来缓和原有认知的冲突", "改变自己和认知不一致的行为", "拒绝承认存在认知冲突,回避问题"], "a": 3, "e": "费斯廷格提出,个体缓解认知失调的常用方式包括:改变原有认知信念、增加新的认知元素、改变和认知冲突的行为、降低冲突认知的重要性等。拒绝承认失调的存在并没有解决认知冲突,无法达到缓解失调的目的。", "num": 103}, {"q": "某测验编制者想要检验自编人格测验的内部一致性,以下哪种信度类型可以满足该需求?", "o": ["重测信度", "分半信度", "复本信度", "评分者信度"], "a": 1, "e": "分半信度是将测验题目分成对等的两半,计算两半得分的相关系数,属于内部一致性信度,用于检验测验内部所有题目的一致性。重测信度用于检验测验跨时间的稳定性,复本信度用于检验两个平行复本测验的一致性,评分者信度用于检验不同评分者之间的一致性。因此正确答案为B。", "num": 104}, {"q": "某位来访者在咨询中明确告知咨询师,自己已经做好了自杀的准备,但计划一周后实施,目前没有即时实施的风险,此时咨询师正确的伦理做法是?", "o": ["严格遵守保密原则,不将这件事告知任何第三方", "打破保密原则,联系来访者的监护人,协同进行干预", "不联系监护人,直接拨打110报警将来访者带走", "安抚来访者情绪,忽略这件事继续原定的咨询计划"], "a": 1, "e": "根据心理咨询伦理规范,当来访者存在明确的自伤自杀计划时,咨询师需要打破保密原则,及时联系来访者的监护人等相关人员协同干预;只有当存在即时的自伤伤人风险时,才需要直接联系公安机关等部门处理,因此本题正确答案为B。", "num": 105}, {"q": "针对10岁儿童的心理咨询,咨询师最适合采用哪种沟通方式?", "o": ["全程使用专业心理学词汇和儿童交流,保证专业准确性", "使用符合儿童年龄的通俗语言,结合游戏方式开展咨询", "要求儿童必须严格按照咨询流程配合,不需要照顾其情绪", "直接指出并批评儿童的问题行为,快速纠正其错误"], "a": 1, "e": "儿童的认知发展水平有限,难以理解抽象的专业术语,强制配合或直接批评会破坏咨访关系,因此针对儿童青少年的咨询,最合适的方式是使用符合其年龄的语言,结合游戏等儿童容易接受的形式建立信任关系,开展咨询。", "num": 106}, {"q": "某班级原本多数同学就“是否禁止带手机进校园”这件事持支持态度,经过全班集体讨论后,绝大多数同学都变得非常坚决支持该禁令,这种现象属于?", "o": ["从众", "群体极化", "去个性化", "社会懈怠"], "a": 1, "e": "群体极化的定义是:群体经过讨论之后,群体成员原本持有的态度会向更极端的方向偏移,分为冒险偏移和谨慎偏移两种,符合题干描述的现象。从众是个体在群体压力下改变行为态度符合群体规范,去个性化是个体在群体中丧失自我认同,社会懈怠是群体中个体努力程度下降,因此ACD不符合。", "num": 107}, {"q": "社会心理学中,刻板印象和偏见的核心区别是?", "o": ["刻板印象属于行为层面,偏见属于认知层面", "刻板印象属于认知层面,偏见属于情感层面", "刻板印象属于情感层面,偏见属于行为层面", "刻板印象属于行为层面,偏见属于情感层面"], "a": 1, "e": "刻板印象是对某一特定群体的固定、概括化的认知,属于认知层面;偏见是对该群体的带有负面偏向的情感态度,属于情感层面;歧视才是二者对应的行为层面表现,因此正确答案为B。", "num": 108}, {"q": "积极心理学的PERMA幸福感干预模型中,字母“M”对应的核心要素是?", "o": ["积极情绪", "人际关系", "意义感", "成就"], "a": 2, "e": "PERMA幸福感模型包含五个核心要素:P对应积极情绪(Positive Emotion),E对应投入(Engagement),R对应人际关系(Relationships),M对应意义感(Meaning),A对应成就(Accomplishment),因此M对应的是意义感。", "num": 109}, {"q": ".团体心理咨询进入工作阶段之后,领导者的核心任务是?", "o": ["帮助成员建立信任关系,共同制定团体规则", "带领成员探索自身问题,解决成员的核心心理困扰", "处理成员的离别情绪,巩固咨询取得的成果", "招募新成员,扩大团体的规模"], "a": 1, "e": "团体心理咨询分为不同阶段:初始阶段(起始阶段)核心任务是建立信任、明确规则;工作阶段核心任务是带领成员探索自我,处理和解决成员的核心心理问题;结束阶段核心任务是处理离别情绪,巩固咨询成果。因此正确答案为B。", "num": 110}, {"q": "家庭治疗理论中,“边界清晰”的家庭互动模式指的是?", "o": ["家庭成员之间完全不沟通,保持距离", "家庭成员保持适当的心理距离,各自承担符合自身角色的责任", "所有家庭成员结成联盟对抗其他家庭成员", "所有成员的想法和行为必须完全保持一致"], "a": 1, "e": "家庭系统理论中,边界清晰是健康的家庭互动模式,指家庭成员之间保持恰当的心理距离,既不过度纠缠也不过度疏离,每个家庭成员都能承担符合自身角色的责任。选项A是过度疏离,C是边界不清的三角关系,D是过度纠缠,均不符合边界清晰的定义。", "num": 111}, {"q": "某智力测验编制者想要计算该测验和高考数学成绩的相关程度,以此检验测验的有效性,这种效度类型属于?", "o": ["内容效度", "结构效度", "效标关联效度", "表面效度"], "a": 2, "e": "效标关联效度指的是测验得分和外部独立效标(本题中高考数学成绩就是外部效标)之间的相关程度,用于反映测验预测外部效标的有效性。内容效度检验测验内容是否覆盖想要测量的内容范围,结构效度检验测验是否测量到了想要的理论结构,表面效度是表面看起来测验是否测量了想要的内容,因此正确答案为C。", "num": 112}, {"q": "以下关于心理咨询中共情技术的描述,正确的是?", "o": ["共情就是咨询师对来访者遭遇表示同情和怜悯", "共情是咨询师体验来访者的内心世界,如同体验自己的内心一样", "共情要求咨询师直接给来访者提供解决问题的具体方案", "共情要求咨询师忽略来访者的情绪,聚焦解决问题"], "a": 1, "e": "共情是建立良好咨询关系的核心技术之一,指咨询师能够准确感受来访者的内心世界,如同感受自己的内心一样,而非同情怜悯,共情也不是直接给出解决方案,更不会忽略来访者的情绪感受,因此选项B是正确描述。", "num": 113}, {"q": "社会心理学中,影响人际吸引的“邻近性”因素指的是?", "o": ["人们的外貌吸引力水平相近", "人们之间的空间距离接近", "人们的兴趣爱好相近相似", "人们的人格品质相近相似"], "a": 1, "e": "邻近性是影响人际吸引的重要因素之一,指的是个体之间的空间距离越接近,越容易频繁互动,进而越容易建立和维持人际关系,因此正确答案为B,选项ACD描述的是相似性因素,不是邻近性。", "num": 114}, {"q": "大五人格理论中,“尽责性”维度得分高的人,最核心的特征是?", "o": ["乐于尝试新鲜事物,喜欢探索新体验", "做事严谨有条理,自律且有责任感", "情绪稳定,很少出现焦虑烦躁的情绪", "善于社交,精力充沛,喜欢和人互动"], "a": 1, "e": "大五人格的五个维度中,尽责性维度的核心特征是严谨、自律、有责任感、做事有条理;选项A描述的是开放性维度得分高的特征,选项C是神经质维度得分低(情绪稳定)的特征,选项D是外向性维度得分高的特征,因此正确答案为B。", "num": 115}, {"q": "家庭治疗理论中,“代际传递”指的是以下哪种现象?", "o": ["夫妻之间长期的矛盾冲突相互影响", "上一代的行为模式、认知信念通过互动传递给下一代", "孩子的行为反应反过来影响父母的决策", "家庭中保持清晰边界的互动模式"], "a": 1, "e": "代际传递是家庭治疗中的核心概念,指家庭中上一代(父母辈)的行为模式、认知信念、情绪反应方式等会通过日常的互动传递给下一代(子女辈),影响子女的心理发展和行为模式,因此正确答案为B。", "num": 116}]}, {"chapter": "A2 · 单选题（案例）", "questions": [{"q": "求助者,女,48岁,父亲去世1个月,时常流泪,不愿走亲访友,觉得生活暂时失去意义,未产生自杀念头,躯体检查未见异常。该求助者的反应属于?", "o": ["正常哀伤反应", "抑郁发作", "适应障碍", "创伤后应激障碍"], "a": 0, "e": "该求助者在丧亲后出现符合常理的悲伤反应,持续时间不足3个月,无严重社会功能受损,也无自杀意念,属于正常哀伤反应。抑郁发作存在持续情绪低落、兴趣减退超过2周且伴随严重功能受损;适应障碍多为应激事件后的轻度短期情绪失调;创伤后应激障碍核心表现为闯入性回忆、回避创伤相关刺激、警觉性增高。因此选A。", "num": 1}, {"q": "求助者,男,26岁,每次需要在部门会议发言都会心跳加速、面部发烫,手心出汗,总是尽量找借口推脱发言,明知自己这种紧张没必要但无法控制。该求助者最可能的评估是?", "o": ["社交焦虑障碍", "特定恐惧障碍", "广泛性焦虑障碍", "惊恐障碍"], "a": 0, "e": "该求助者对社交公开场景(会议发言)产生强烈焦虑恐惧,出现回避行为,明知不合理却无法控制,符合社交焦虑障碍的临床表现。特定恐惧障碍是对单一具体特定事物/场景的恐惧,不涉及社交评价场景;广泛性焦虑障碍核心是无明确对象的持续性紧张不安;惊恐障碍表现为突发的、不可预测的惊恐发作,伴随濒死感等表现。因此选A。", "num": 2}, {"q": "求助者,男,8岁,小学二年级学生,上课无法安静坐稳,经常主动打断老师讲课、打扰同桌听课,写作业拖拉无法按时完成,做事冲动不计后果。该求助者最可能的评估是?", "o": ["注意缺陷多动障碍", "儿童孤独症", "品行障碍", "特定学习障碍"], "a": 0, "e": "该求助者为学龄期儿童,表现出持续的注意力不集中、多动冲动,已经影响正常学习活动,符合注意缺陷多动障碍的核心表现。儿童孤独症核心为持续的社交交往障碍、兴趣狭窄、刻板行为;品行障碍以持续的攻击他人、破坏规则、违反社会规范的行为为核心;特定学习障碍仅表现为特定学科的学习能力受损,无多动冲动表现。因此选A。", "num": 3}, {"q": "求助者,女,26岁,文案策划,近2个月赶项目连续加班,出现头晕、入睡困难、胸闷心慌,多次全身体检未发现器质性病变,项目越忙症状越重,休假休息后症状明显减轻。该求助者的问题属于?", "o": ["躯体化障碍", "应激相关障碍", "广泛性焦虑障碍", "抑郁障碍"], "a": 1, "e": "该求助者的症状由持续的工作压力应激引发,体检无器质性异常,症状严重程度随应激强度波动,符合应激相关障碍的表现。躯体化障碍是持久的、多种反复出现的躯体症状,与应激波动无明确关联;广泛性焦虑障碍核心是无明确对象的持续紧张不安;抑郁障碍核心表现为持续情绪低落、兴趣减退。因此选B。", "num": 4}, {"q": "求助者,女,24岁,研究生,近8个月每天反复擦拭桌面超过30次,明知已经干净不需要反复擦拭,但就是控制不住,为此十分痛苦,已经影响到日常的学习和生活。该求助者最可能的问题是?", "o": ["强迫障碍", "焦虑障碍", "抑郁障碍", "疑病障碍"], "a": 0, "e": "该求助者出现反复的强迫行为,明知不合理但无法克制,伴随痛苦体验和社会功能受损,符合强迫障碍的典型表现。广泛性焦虑障碍核心是无明确对象的持续紧张不安;抑郁障碍核心为持续情绪低落、兴趣减退;疑病障碍核心为患者坚定不移地坚信自己患有严重的躯体疾病。因此选A。", "num": 5}, {"q": "求助者,女,19岁,大学生,总是觉得自己“处处不如别人”,经常否定自己的能力,觉得身边同学都比自己优秀,从不主动报名参加学校的集体活动。该求助者的自我概念状态属于?", "o": ["高自尊", "低自尊", "自我同一性混乱", "生理自我失调"], "a": 1, "e": "该求助者持续对自身进行负面评价,贬低自我价值,符合低自尊的核心表现。高自尊是个体对自身价值持积极认可的态度;自我同一性混乱多见于青少年,核心是对自身身份定位模糊,找不到人生方向;生理自我失调是个体对自身身体/外貌产生过度负面认知。因此选B。", "num": 6}, {"q": "求助者,男,3岁半,幼儿园小班新生,近半个月每天和妈妈分离入园时都大哭大闹,紧紧抱住家长不肯放手,拒绝和老师、其他小朋友接触,回家后情绪很快恢复正常,在家互动正常。该求助者最可能的问题是?", "o": ["分离焦虑障碍", "儿童孤独症", "特定恐惧障碍", "品行障碍"], "a": 0, "e": "该求助者为幼儿,在与主要照料者分离时出现过度焦虑反应,符合分离焦虑障碍的典型表现。儿童孤独症核心表现为持续的社交交往障碍、兴趣狭窄、刻板行为,在家也会存在社交异常;特定恐惧障碍是对单一具体事物/场景的恐惧,不针对照料者分离;品行障碍核心为持续的攻击他人、破坏规则的行为,与该表现不符。因此选A。", "num": 7}, {"q": "求助者,女,22岁,刚入职的护士,因一次和带教老师在护理操作流程上发生意见分歧后,就不敢主动和带教老师以及其他同事沟通,害怕自己再出错被大家排斥,工作效率明显下降。该求助者的问题主要属于?", "o": ["社会知觉偏差", "人际适应障碍", "抑郁状态", "角色冲突"], "a": 1, "e": "该求助者因职场人际冲突后出现人际回避、工作效率下降,属于新入职场后的人际适应不良,即人际适应障碍。社会知觉偏差是个体在对他人进行认知判断时出现的偏差,不是该问题核心;抑郁状态核心为持续情绪低落、兴趣减退;角色冲突是指个体同时承担的多个角色要求之间出现矛盾,与该案例不符。因此选B。", "num": 8}, {"q": "求助者,男,42岁,部门主管,总是疑心同事私下议论自己的工作失误,不信任身边的人,总觉得其他人接近自己都是为了利用自己获取利益,因此经常和同事发生矛盾冲突。该求助者最可能的人格特质是?", "o": ["偏执型人格", "强迫型人格", "自恋型人格", "回避型人格"], "a": 0, "e": "该求助者表现为持续多疑、不信任他人,习惯性认为他人对自己怀有恶意,符合偏执型人格的核心特征。强迫型人格核心为过度追求完美、行为刻板固执;自恋型人格核心为自大自傲、过度需要他人的赞美;回避型人格核心为害怕被批评拒绝,习惯性回避社交。因此选A。", "num": 9}, {"q": "求助者,男,38岁,销售经理,近2个月存在入睡困难,每天躺在床上需要一个半小时才能睡着,白天总是昏昏沉沉,工作时注意力无法集中,已经影响正常的业务开展。该求助者最可能的评估是?", "o": ["失眠障碍", "睡眠呼吸暂停综合征", "发作性睡病", "正常睡眠波动"], "a": 0, "e": "该求助者存在持续入睡困难,且已经出现日间社会功能受损,持续时间超过1个月,符合失眠障碍的诊断标准。睡眠呼吸暂停综合征核心表现为睡眠中打鼾、反复呼吸暂停;发作性睡病核心为不可控制的睡眠发作,会突然倒地入睡;正常睡眠波动不会持续存在且不会造成严重日间功能受损。因此选A。", "num": 10}, {"q": "求助者,女,17岁,高二女生,近一年刻意控制饮食,体重较之前下降了12公斤,仍然认为自己体型偏胖,拒绝正常进食,已经停经3个月。该求助者最可能的评估是?", "o": ["神经性厌食", "神经性贪食", "抑郁障碍", "躯体化障碍"], "a": 0, "e": "该求助者存在刻意节食减重、体重显著下降、体像障碍(对自身体型的错误认知)、继发性闭经,符合神经性厌食的典型表现。神经性贪食核心为反复暴食、随后出现催吐、导泻等代偿行为;抑郁障碍核心为持续情绪低落、兴趣减退;躯体化障碍核心为反复出现多种无器质性依据的躯体症状。因此选A。", "num": 11}, {"q": "求助者,男,38岁,中学班主任,从事教学工作15年,近一年总觉得工作身心疲惫,对学生的事情提不起兴趣,一直有辞职换工作的强烈想法,对自己的职业成就评价很低。该求助者的问题属于?", "o": ["职业倦怠", "抑郁发作", "适应障碍", "焦虑障碍"], "a": 0, "e": "该求助者因长期职业压力,出现了情绪耗竭、工作疏离感、个人成就感降低,完全符合职业倦怠的核心表现。抑郁发作核心为持续情绪低落、兴趣减退超过2周,影响生活各方面;适应障碍没有长期职业压力下的这类典型表现;焦虑障碍核心为无明确对象的持续紧张不安。因此选A。", "num": 12}, {"q": "求助者,女,28岁,设计师,最近总是觉得生活不顺心,情绪低落,咨询师建议她每天睡前写下当天发生的3件让自己觉得开心值得感恩的小事,坚持两个月后,求助者说自己的积极情绪明显变多了。该干预方法属于?", "o": ["感恩练习", "认知重构", "系统脱敏", "暴露疗法"], "a": 0, "e": "感恩练习是积极心理学中,通过引导个体主动记录生活中的正向事件,提升个体积极情绪体验的干预方法,完全符合题干描述。认知重构是引导来访者识别并改变不合理信念的认知干预技术;系统脱敏和暴露疗法主要用于治疗恐惧、焦虑相关的障碍。因此选A。", "num": 13}, {"q": "求助者,女,18岁,高三学生,因模拟考试成绩排名下降10名,半个月来情绪低落,入睡困难,担心自己高考发挥失常,主动来咨询,症状没有泛化,日常学习生活没有受到严重影响。该求助者最可能的评估是?", "o": ["严重心理问题", "一般心理问题", "精神病性障碍", "焦虑神经症"], "a": 1, "e": "该求助者的症状由现实因素(考试成绩下滑)引发,持续时间仅半个月,情绪未出现泛化,社会功能未受到严重损害,符合一般心理问题的诊断特点。严重心理问题持续时间通常超过2个月,且症状会出现广泛泛化;精神病性障碍存在幻觉、妄想等精神病性症状;焦虑神经症没有明确的现实诱因,且症状广泛泛化。因此选B。", "num": 14}, {"q": "求助者,男,35岁,公司职员,因半年前投资失败负债,近3个月持续情绪低落,对任何事情都提不起兴趣,闭门不出,产生了自杀的念头,社会功能严重受损,症状泛化到生活各个方面。该求助者最可能的评估是?", "o": ["一般心理问题", "严重心理问题", "抑郁发作", "适应障碍"], "a": 2, "e": "该求助者存在情绪低落、兴趣减退、自杀意念等抑郁发作的核心症状,持续时间超过1个月,社会功能严重受损,符合抑郁发作的诊断标准。一般心理问题不会出现严重社会功能受损和自杀意念;严重心理问题不会出现自杀意念这类严重症状;适应障碍多为短期轻度的情绪反应,不会出现严重自杀风险。因此选C。", "num": 15}, {"q": "来访者,女,30岁,爱好户外活动,擅长社交,做事有条理有担当,很少出现大的情绪波动,喜欢接触新鲜事物。根据大五人格理论,该来访者得分最低的维度是?", "o": ["神经质", "外倾性", "尽责性", "开放性"], "a": 0, "e": "大五人格理论中,神经质维度反映情绪的稳定性,得分越高情绪越不稳定,该来访者情绪稳定,因此神经质得分最低。外倾性对应社交活跃、爱好交际,尽责性对应做事负责任有条理,开放性对应乐于接触新鲜事物,这三个维度来访者得分都较高,因此选A。", "num": 16}, {"q": "来访者,男,20岁,大学生,发现在图书馆和同学一起自习时,自己的背书效率比独自在宿舍自习更高,完成作业的速度也更快。该现象符合哪一社会心理学概念?", "o": ["社会助长", "社会惰化", "从众", "服从"], "a": 0, "e": "社会助长指的是当有他人在场时,个体的行为效率会出现提升的现象,符合题干描述。社会惰化指群体共同完成任务时个体努力程度下降,从众指个体在群体压力下做出和多数人一致的行为,服从指个体按照权威的命令或要求行动,因此BCD不符合,选A。", "num": 17}, {"q": "来访者,女,21岁,大学生,参加班级集体合唱比赛时,发现自己比独自练习时付出的努力更少,没有尽全力演唱。该现象符合哪一社会心理学概念?", "o": ["社会惰化", "社会助长", "从众", "服从"], "a": 0, "e": "社会惰化指的是群体共同完成任务时,群体规模越大,个体的努力程度越低的现象,符合题干描述。社会助长指他人在场提升行为效率,从众指群体压力下行为趋同,服从指按照权威要求行动,因此BCD不符合,选A。", "num": 18}, {"q": "来访者,女,32岁,婚后和伴侣因家务分工、消费观念频繁发生争吵,认为伴侣不关心自己的感受,长期情绪低落、委屈。该来访者的核心问题是?", "o": ["亲密关系冲突", "亲子关系问题", "职业压力", "更年期情绪问题"], "a": 0, "e": "该来访者因和配偶的日常互动产生矛盾与情绪困扰,核心问题为亲密关系冲突。亲子关系问题涉及和子女的关系,职业压力源于工作相关问题,更年期情绪问题是激素水平变化引发的广泛情绪改变,因此BCD不符合,选A。", "num": 19}, {"q": "来访者,男,23岁,刚毕业进入新公司,无法适应新的工作节奏和同事相处模式,近一个月持续出现入睡困难、胃口差,工作效率明显下降。该来访者的问题最可能是?", "o": ["职场适应障碍", "抑郁发作", "广泛性焦虑障碍", "正常应激反应"], "a": 0, "e": "适应障碍是指在明显的生活改变或环境变化时产生的、短期的和轻度的烦恼状态和情绪失调,常有一定程度的社会功能受损,该来访者因新职场环境变化引发情绪、躯体症状和社会功能受损,符合职场适应障碍的表现。正常应激反应通常不会出现持续的社会功能受损,抑郁发作有持续两周以上的核心抑郁症状(情绪低落、兴趣减退等),广泛性焦虑障碍无明确的环境诱发因素,因此BCD不符合,选A。", "num": 20}, {"q": "来访者,女,52岁,刚从教师岗位退休,近半年持续情绪低落,对之前喜欢的书法绘画都失去兴趣,经常觉得自己“没用了,拖累家人”,睡眠质量差。该来访者最可能的评估是?", "o": ["老年抑郁发作", "正常退休适应反应", "强迫障碍", "躯体化障碍"], "a": 0, "e": "该来访者存在抑郁发作的核心症状:持续情绪低落、兴趣减退、无用感,病程超过3个月,符合抑郁发作的诊断标准。正常退休适应反应通常不会出现持续超过3个月的严重抑郁症状,强迫障碍以反复强迫思维或行为为核心,躯体化障碍主要表现为反复的躯体不适,因此BCD不符合,选A。", "num": 21}, {"q": "某学生背诵文言文时,将文中的内容改编成生动的故事场景帮助记忆,记忆效果比死记硬背好很多。该记忆策略属于?", "o": ["精细加工策略", "复述策略", "组织策略", "元认知策略"], "a": 0, "e": "精细加工策略是指通过将新学习的信息和学习者已有的知识经验建立联系,从而提升记忆效果的策略,题干中将新学习的文言文改编为熟悉的故事场景帮助记忆,符合精细加工策略的定义。复述策略指通过重复练习强化记忆,组织策略指整理信息的结构框架来帮助记忆,元认知策略指个体对自身认知过程的监控和调整,因此BCD不符合,选A。", "num": 22}, {"q": "来访者,女,32岁,每次乘坐公共电梯都会感到心跳加速、胸闷气短,明知这种反应没必要但无法控制,因此刻意回避乘坐高层电梯,只能爬楼梯。该来访者最可能的诊断是?", "o": ["特定恐惧障碍", "广泛性焦虑障碍", "创伤后应激障碍", "惊恐障碍"], "a": 0, "e": "特定恐惧障碍指对特定的场景或物体产生明确的恐惧焦虑反应,明知道不合理仍无法控制,且会主动回避相关场景,符合题干描述。广泛性焦虑障碍没有明确的特定恐惧对象,创伤后应激障碍是在重大创伤事件后出现的一系列症状,惊恐障碍表现为无明显诱因突发的强烈濒死感、失控感,因此BCD不符合,选A。", "num": 23}, {"q": "来访者,男,38岁,近一年来每次写完重要工作邮件,都要反复检查十几次错别字和格式,否则就坐立不安,焦虑得无法进行下一项工作,明知没必要但控制不住。该来访者的问题属于?", "o": ["强迫障碍", "广泛性焦虑障碍", "强迫型人格障碍", "疑病障碍"], "a": 0, "e": "强迫障碍以反复出现的强迫思维或强迫行为为主要特征,来访者反复检查的行为属于强迫行为,明知不合理仍无法克制,伴随焦虑情绪和社会功能受损,符合强迫障碍的诊断。强迫型人格障碍是一种持久的人格特质,表现为普遍的刻板、追求完美,并非单一反复发作的强迫行为,广泛性焦虑障碍没有明确的强迫行为,疑病障碍表现为坚信自己患有某种严重疾病,因此BCD不符合,选A。", "num": 24}, {"q": "来访者,女,17岁,高中生,看到周围很多同学都穿某品牌的运动鞋,自己也攒钱买了一双,其实自己本来并不需要新鞋子。该行为属于?", "o": ["从众", "服从", "社会助长", "社会惰化"], "a": 0, "e": "从众是指个体在群体压力或群体行为的影响下,做出和多数人一致的行为选择,符合题干描述。服从是指按照权威的命令或要求行动,社会助长指他人在场提升个体行为效率,社会惰化指群体任务中个体努力程度下降,因此BCD不符合,选A。", "num": 25}, {"q": "来访者,男,28岁,公司职员,按照部门主管的要求,帮同事完成了自己本来不愿意接手的额外工作。该行为属于?", "o": ["服从", "从众", "社会助长", "社会惰化"], "a": 0, "e": "服从是指个体按照权威人物的命令或要求做出行为的现象,符合题干描述。从众是指个体在群体压力下做出和多数人一致的行为,社会助长指他人在场提升行为效率,社会惰化指群体任务中个体努力下降,因此BCD不符合,选A。", "num": 26}, {"q": "来访者,女,25岁,在恋爱关系中总是反复确 场景下出现的焦虑反应,和特定事件明确相关,符合题干描述。广泛性焦虑障碍是无明确对象的持续紧张,强迫障碍以反复的思维或行为为核心,抑郁发作以情绪低落兴趣减退为核心,均不符合。", "num": 56}, {"q": "求助者,男,35岁,坚信邻居在自己的水电里下毒,偷偷监视自己的一举一动,因此不敢在家吃饭,不敢出门上班,该症状属于:", "o": ["被害妄想", "关系妄想", "夸大妄想", "嫉妒妄想"], "a": 0, "e": "被害妄想的核心是患者坚信自己或亲人受到迫害、伤害、监视等,符合题干描述。关系妄想是患者认为周围人的言行都和自己有关、针对自己,夸大妄想是患者夸大自身的能力、价值、地位,嫉妒妄想是患者坚信配偶对自己不忠,均不符合。", "num": 57}, {"q": "求助者,女,28岁,曾被两个北方伴侣分手,因此认为“所有北方男人都大男子主义,不懂得温柔体贴”,再也不愿意和北方男性交往,该认知偏差属于:", "o": ["刻板印象", "首因效应", "晕轮效应", "近因效应"], "a": 0, "e": "刻板印象是指对某一类群体产生的固定、概括、笼统的看法,符合题干描述。首因效应是指最初获得的信息对后续认知的影响更大,晕轮效应是指个体某一个突出特点掩盖了其他特点的认知偏差,近因效应是指最新获得的信息对认知的影响更大,均不符合。", "num": 58}, {"q": "求助者,男,62岁,近半年经常忘记刚放好的眼镜在哪里,出门经常忘记带钥匙,但是可以准确认出家人朋友,能料理自己的日常起居,该症状属于:", "o": ["老年期记忆衰退", "阿尔茨海默病", "血管性痴呆", "假性痴呆"], "a": 0, "e": "老年期记忆衰退以近期记忆下降为主要表现,不影响基本生活能力和再认能力,符合题干描述。阿尔茨海默病会逐渐进展为全面的认知功能下降,影响基本生活,血管性痴呆多有脑血管病史,假性痴呆是应激因素导致的暂时性记忆障碍,均不符合。", "num": 59}, {"q": "求助者,女,38岁,在朋友聚会中总是刻意表现自己,情绪夸张,喜欢成为所有人关注的中心,稍有不顺心就大发脾气,该人格特征符合哪类人格障碍?", "o": ["表演型人格障碍", "自恋型人格障碍", "边缘型人格障碍", "依赖型人格障碍"], "a": 0, "e": "表演型人格障碍的核心特征是过度情绪化、寻求他人关注、行为夸张,符合题干描述。自恋型人格障碍以自我中心、夸大自身价值、需要他人崇拜为核心,边缘型人格障碍以情绪极度不稳定、身份认同紊乱为核心,依赖型人格障碍以过度依赖他人、害怕被抛弃为核心,均不符合。", "num": 60}, {"q": "求助者,男,28岁,近2周总是凌晨2点就醒来,醒后再也无法入睡,白天上班总是头昏疲惫,该症状属于:", "o": ["入睡困难型失眠", "睡眠维持型失眠", "早醒型失眠", "睡眠呼吸暂停综合征"], "a": 2, "e": "早醒型失眠的核心特征是比正常起床时间早2小时以上醒来,醒后无法再次入睡,符合题干描述。入睡困难型失眠是躺卧后30分钟以上无法入睡,睡眠维持型失眠是夜间多次醒来,睡眠呼吸暂停综合征以打鼾伴呼吸暂停为核心表现,均不符合。", "num": 61}, {"q": "求助者,女,25岁,每次看到猫都会出现强烈的恐惧,会立刻绕道走开,明知这种恐惧没有必要但无法控制,该症状属于:", "o": ["特定恐怖症", "社交焦虑障碍", "广泛性焦虑障碍", "惊恐障碍"], "a": 0, "e": "特定恐怖症的核心是对特定的物体或场景产生过度的、无法控制的恐惧,符合题干描述。社交焦虑障碍是害怕社交场景被他人评价,广泛性焦虑障碍是无明确对象的持续紧张,惊恐障碍是突发不可预测的惊恐发作,均不符合。", "num": 62}, {"q": "求助者,女,48岁,近半年总是不受控制地反复回想之前和同事发生的争执,每次回想都情绪低落,该症状属于:", "o": ["强迫思维", "反刍思维", "闯入性思维", "思维奔逸"], "a": 1, "e": "反刍思维的核心是个体反复不由自主地回忆过去的负性、不愉快经历,伴随负性情绪,符合题干描述。强迫思维是违背个体意愿反复出现在脑海中的思维,闯入性思维是突然出现的无意义的思维,思维奔逸是思维联想速度加快,均不符合。", "num": 63}, {"q": "求助者,男,42岁,近1个月经常出现头痛、胃胀,多次去医院做全身体检,均未发现器质性异常,该症状属于:", "o": ["躯体化障碍", "疑病障碍", "转换障碍", "躯体形式障碍"], "a": 0, "e": "躯体化障碍的核心是反复出现多种躯体症状,经检查无器质性病变可以解释,符合题干描述。疑病障碍是患者坚信自己患有严重疾病,转换障碍是出现躯体功能的丧失或异常,躯体形式障碍多表现为单一躯体症状,均不符合。", "num": 64}, {"q": "求助者,男,18岁,高三学生,认为“我必须每次考试都考进班级前五名才是优秀的人”,一次考砸就情绪崩溃,该不合理信念属于:", "o": ["绝对化要求", "过分概括化", "糟糕至极", "个性化"], "a": 0, "e": "绝对化要求的核心是个体从自身意愿出发,认为事物必须按照自己的预期发生,常带有“必须”“应该”等特征,符合题干描述。过分概括化是以偏概全,用局部特征概括整体,糟糕至极是认为一件不好的事发生就是全盘毁灭,个性化是将无关事件都归咎于自己,均不符合。", "num": 65}, {"q": "求助者,男,22岁,初次咨询中,总是低头看地板,回避和咨询师的眼神接触,说话声音很小,该非言语行为最可能体现的情绪是:", "o": ["紧张不安", "愤怒", "自信", "冷漠"], "a": 0, "e": "求助者在咨询初期出现回避眼神接触、说话音量小,通常是因为对环境和咨询师不熟悉,体现了紧张不安的情绪。愤怒通常会伴随皱眉、提高音量、肢体僵硬等表现,自信的来访者会有自然的眼神交流,冷漠通常伴随面无表情、语气平淡,均不符合。", "num": 66}, {"q": "求助者,男,50岁,妻子车祸去世5个月,近期经常梦见妻子还在身边,醒来后长时间痛哭,无法释怀,该反应属于:", "o": ["正常居丧反应", "创伤后应激障碍", "抑郁发作", "适应障碍"], "a": 0, "e": "居丧后6个月内出现思念逝者、悲伤情绪、梦境中见到逝者都属于正常的居丧反应,多数会随时间逐渐缓解,符合题干描述。创伤后应激障碍以创伤后持续的警觉性增高、闯入性回忆、回避为核心,抑郁发作以持续情绪低落兴趣减退为核心,适应障碍是应激事件后出现的情绪障碍,症状持续时间更长,均不符合。", "num": 67}, {"q": "求助者,女,28岁,和室友因为打扫卫生发生矛盾后,认为室友故意针对自己,从此再也不主动和室友说话,还故意避开室友,该反应属于:", "o": ["愤怒的外化", "愤怒的内化", "情绪的压抑", "情绪的宣泄"], "a": 0, "e": "愤怒的外化是指将愤怒情绪指向外部他人,通过疏远、攻击他人表达愤怒,符合题干描述。愤怒的内化是将愤怒指向自身,出现自责等表现,情绪压抑是隐藏自身的愤怒情绪不表达,情绪宣泄是直接向对方表达出自己的愤怒,均不符合。", "num": 68}, {"q": "求助者,女,58岁,退休一年,每天只是在家做家务看电视,很少和朋友外出,总觉得生活没有意思,开心不起来,该求助者的问题属于:", "o": ["老年期抑郁情绪", "正常退休适应", "阿尔茨海默病", "人格障碍"], "a": 0, "e": "退休后适应不良出现持续的情绪低落、生活无意义感,属于老年期抑郁情绪,符合题干描述。正常退休适应不会出现持续的情绪低落和无意义感,阿尔茨海默病会有明显的认知功能下降,人格障碍是长期稳定的异常行为模式,均不符合。", "num": 69}, {"q": "求助者,女,23岁,考公连续三次进面都没上岸,认为“我什么能力都没有,这辈子都没法成功了”,该认知偏差属于:", "o": ["过分概括化", "绝对化要求", "糟糕至极", "个性化"], "a": 0, "e": "过分概括化是一种以偏概全的不合理思维,用局部的失败概括整体的能力和价值,符合题干描述。绝对化要求是认为事物必须按照自己的意愿发生,糟糕至极是认为一件坏事发生就是全盘毁灭,个性化是将无关事件都归咎于自己,均不符合。", "num": 70}]}, {"chapter": "A3 · 案例分析", "questions": [{"q": "该来访者首次咨询时,咨询师首先应完成的伦理操作是?", "o": ["立即开展心理测验评估当前症状严重程度", "告知来访者咨询的保密原则及例外情况", "直接为来访者制定咨询目标与方案", "完成登记后收取咨询费用", "立刻开始放松训练缓解焦虑"], "a": [1], "e": "该题考查首次访谈的核心伦理要求,首次咨询的首要伦理工作是建立专业咨访关系,明确告知保密原则及例外情况是核心要求。A选项测验评估需要在收集基本资料后开展;C选项制定咨询目标需要完成初始评估后双方共同商定;D选项收取费用并非首要伦理操作;E选项放松训练属于干预措施,需在评估后开展;F选项本案例未超出咨询范围,不需要转介。因此正确答案为B。", "num": 1}, {"q": "该来访者首次咨询时,以下属于保密例外的情况是?", "o": ["来访者透露年轻时曾无故旷工被扣工资", "来访者明确表示已经准备好药物结束自己生命", "来访者透露曾私下抱怨单位领导的管理方式", "来访者拒绝让公婆知道自己前来咨询的事情", "来访者表达对丈夫忽视家庭的不满"], "a": [1], "e": "心理咨询保密例外包括:来访者存在明确的伤害自身或他人的计划、涉及法定强制披露的情况、危及公共安全等。B选项来访者明确计划伤害自身,属于保密例外范畴,其余选项均不符合保密例外的要求,因此正确答案为B。", "num": 2}, {"q": "针对该未成年来访者,咨询师首次咨询时首要的伦理操作是:", "o": ["直接与来访者单独开展咨询", "告知监护人(父亲)咨询的保密原则及例外情况", "直接为来访者制定咨询目标", "立即收取本次咨询费用", "转介至精神科医疗机构"], "a": [1], "e": "未成年人心理咨询需监护人知情同意,首次咨询需明确告知监护人保密原则及法定例外情况,这是核心伦理要求。A选项未成年人咨询需监护人知情,不能直接单独咨询;C选项制定目标需在评估后完成;D选项收费可提前告知,但非首要伦理操作;E选项转介仅适用于超出咨询范围的严重情况,本案例未涉及;F选项放松训练属于干预措施,需在评估后开展。因此正确答案为B。", "num": 3}, {"q": "该来访者最核心的症状类型为:", "o": ["广泛性焦虑障碍", "抑郁发作", "职业倦怠", "适应障碍", "躯体形式障碍"], "a": [2], "e": "职业倦怠的核心表现为情绪耗竭、去人格化、个人成就感降低,符合本案例中来访者持续疲惫、兴趣减退、人际冲突的表现。A选项焦虑障碍以过度担忧为核心;B选项抑郁发作以持续情绪低落、兴趣减退为核心,但未提及职业相关的耗竭表现;D选项适应障碍为短期应激反应,本案例病程超过3个月;E、F选项与本案例症状不符。因此正确答案为C。", "num": 4}, {"q": "如果该来访者在咨询中出现如下表述,哪个属于心理咨询保密例外的情况:", "o": ["来访者透露曾在工作中拖延进度", "来访者明确表示要故意驾车冲下高架自杀", "来访者抱怨公司的加班制度", "来访者拒绝告知父母自己不敢开车的情况", "来访者透露大学时期曾经逃课"], "a": [1], "e": "心理咨询保密例外包括来访者存在伤害自身或他人的明确计划、涉及司法调查、危及公共安全等情况。B选项来访者明确表示要实施自杀,属于伤害自身的明确计划,符合保密例外。其余选项均未涉及危及生命、公共安全或法定要求披露的情况。因此正确答案为B。", "num": 5}, {"q": "该求助者最可能的初步评估是:", "o": ["严重心理问题", "适应障碍", "社交焦虑障碍", "抑郁发作", "强迫障碍"], "a": [1], "e": "适应障碍是指在明显的生活改变或环境变化等应激事件发生后1个月内出现的适应性情绪行为障碍,病程一般不超过6个月。该求助者因首次离家住校的应激事件急性起病,病程符合要求,符合适应障碍诊断标准。A选项严重心理问题要求内心冲突为常形且情绪出现泛化,本案例核心为环境改变后的适应问题,不符合;C选项社交焦虑障碍是无明确诱因的广泛性社交恐惧,本案例仅在冲突后针对集体宿舍/班级场景出现回避,不符合;D选项无持续心境低落、兴趣减退等抑郁核心症状,不符合;E选项无强迫思维或强迫行为,不符合;F选项人格障碍是长期持久的行为模式异常,本案例为急性起病,不符合。", "num": 6}, {"q": "该求助者当前缺失的核心社会支持是:", "o": ["家人情感支持", "同伴群体的社交支持", "学校管理层面的支持", "专业心理咨询支持", "经济物质支持"], "a": [1], "e": "该求助者和舍友发生冲突后,回避所有班级同伴交往,仅和辅导员偶尔沟通,因此核心缺失的是同伴社交支持。A选项,案例未提及家人不提供情感支持,家庭支持仍存在;C选项,辅导员已经提供了沟通协调的支持,不符合;D选项,求助者已经主动寻求专业咨询支持,不符合;E选项,案例未提及存在经济困难,不符合;F选项,兴趣圈层支持和案例核心问题无关,不符合。", "num": 7}, {"q": "该求助者最可能的初步评估是:", "o": ["严重心理问题", "职业倦怠", "适应障碍", "抑郁发作", "广泛性焦虑障碍"], "a": [2], "e": "适应障碍指在明显生活或工作改变等应激事件发生后,6个月内出现的适应性情绪行为障碍。该求助者因同时新增班主任工作、照顾入学孩子两个应激事件急性起病,病程2个月,符合适应障碍的诊断标准。A选项严重心理问题要求内心冲突为常形且情绪广泛泛化,不符合本案例特点;B选项职业倦怠是长期职业压力导致的职业状态,不属于正式精神障碍诊断范畴,不符合;D选项没有持续心境低落、兴趣丧失等抑郁核心症状,不符合;E选项没有无明确对象的持续性焦虑,不符合;F选项没有强迫思维或强迫行为,不符合。", "num": 8}, {"q": "该求助者的社会功能受损程度属于:", "o": ["轻度受损", "中度受损", "重度受损", "极重度受损", "无受损"], "a": [1], "e": "社会功能受损程度分级中,轻度受损指能基本完成正常工作学习,仅完成难度增加;中度受损指正常工作学习部分受影响,无法完整顺利完成,需要减少或调整任务;重度受损指完全无法进行正常工作学习;极重度受损指生活完全无法自理。该求助者已经无法按时完成教学任务,只能部分完成日常工作,符合中度受损的标准。因此答案为B。", "num": 9}, {"q": "该求助者最可能的初步评估是:", "o": ["特定恐怖症", "社交焦虑障碍", "适应障碍", "广泛性焦虑障碍", "考试焦虑障碍"], "a": [0], "e": "特定恐怖症是指对特定场景或对象产生的明确的恐惧回避反应,该求助者仅对考试场景出现明确的恐惧焦虑反应,符合特定恐怖症的诊断标准。B选项社交焦虑障碍针对所有社交场景,本案例仅针对考试,不符合;C选项适应障碍要求应激事件后1个月内起病,本案例核心为对考试的特定恐惧,不符合;D选项广泛性焦虑障碍是无明确对象的持续性焦虑,不符合;E选项“考试焦虑障碍”不属于规范的精神障碍诊断术语,错误;F选项没有强迫思维或行为,不符合。", "num": 10}, {"q": "适合该求助者的初步干预措施是:", "o": ["系统脱敏疗法,逐步让求助者暴露在考试相关场景中", "直接建议求助者申请延迟高考回避压力", "开具抗焦虑药物缓解紧张情绪", "因为诊断超出范围拒绝提供帮助", "替求助者向学校申请免予考试"], "a": [0], "e": "系统脱敏疗法是治疗特定恐怖症的经典有效方法,通过逐步暴露结合放松训练,可以帮助求助者降低对考试场景的焦虑反应,适合该求助者。B、E选项,咨询师不得替求助者做出重大人生决策,不符合伦理;C选项,心理咨询师没有处方权,不得开具药物,药物需要精神科医生处方;D、F选项不符合咨询伦理要求,错误。", "num": 11}, {"q": "该求助者最可能的初步评估是:", "o": ["适应障碍", "急性应激障碍", "严重心理问题", "创伤后应激障碍", "心境障碍"], "a": [0], "e": "适应障碍因丧亲的应激事件起病,病程10个月,符合适应障碍的诊断标准。B急性应激障碍起病在应激事件数小时内,病程短于1个月,不符合;C严重心理问题要求内心冲突为常形且对社会功能造成严重影响,该求助者是应激事件后的适应不良,不符合;D创伤后应激障碍以闯入性创伤回忆、回避、高警觉为核心典型症状,本案例无相关表现;E老年抑郁障碍需要符合抑郁发作的诊断标准,该求助者无持续的核心抑郁症状群;F人格障碍是长期持久的行为模式异常,该求助者是急性起病,不符合。", "num": 12}, {"q": "该求助者所说的“我没用,还拖累孩子”属于哪种心理症状:", "o": ["自责观念", "自罪妄想", "疑病观念", "强迫思维", "被害妄想"], "a": [0], "e": "自责观念是个体对自身产生的负面评价,认为自己无用、给他人带来麻烦,符合该求助者的表现。B自罪妄想是毫无根据的认为自己犯了严重错误,属于妄想,不符合;C疑病观念核心是过分担心自己身患重病,不符合;D该案例没有反复出现的强迫思维或强迫行为表现,不符合;E被害妄想是无依据坚信自己被迫害,不符合;F抑郁情绪是整体的心境低落,不是具体的负性观念,不符合。", "num": 13}, {"q": "该求助者最可能的初步评估是:", "o": ["适应障碍", "广泛性焦虑障碍", "严重心理问题", "抑郁发作", "强迫障碍"], "a": [0], "e": "适应障碍是因入职新环境的应激事件起病,病程1个半月,符合适应障碍的诊断标准。B广泛性焦虑障碍是无明确对象的广泛持续焦虑,该求助者焦虑明确指向工作应激,不符合;C严重心理问题要求内心冲突为常形且严重影响社会功能,该求助者是应激后的适应不良,不符合;D该案例没有持续的抑郁核心症状,不符合;E没有反复出现的强迫思维或强迫行为,只是反复检查,不符合强迫障碍诊断;F没有明显的社交回避,只是避开工作话题,不符合社交焦虑障碍。", "num": 14}, {"q": "针对该求助者,合理的短期咨询目标是:", "o": ["完 hapter": "多选题", "questions": [{"q": "下列选项属于知觉基本特性的有哪些？", "o": ["整体性", "选择性", "恒常性", "理解性", "适应性"], "a": [0, 1, 2, 3], "e": "知觉的四个基本特性为整体性、选择性、恒常性、理解性，适应性属于感觉现象，不属于知觉的基本特性，因此正确选项为ABCD。", "num": 1}, {"q": "根据记忆保持时长的不同，可将记忆划分为以下哪些类型？", "o": ["瞬时记忆", "短时记忆", "长时记忆", "内隐记忆", "外显记忆"], "a": [0, 1, 2], "e": "按照记忆保持时间的长短，记忆可分为保持时长在1秒以内的瞬时记忆、1分钟以内的短时记忆、1分钟以上的长时记忆；内隐记忆和外显记忆是按照记忆的意识参与程度划分的类型，不符合题干分类标准，因此正确选项为ABC。", "num": 2}, {"q": "情绪情感对人的心理活动具有多种核心功能，以下属于情绪情感核心功能的有哪些？", "o": ["适应功能", "动机功能", "组织功能", "信号功能", "概括功能"], "a": [0, 1, 2, 3], "e": "情绪情感的核心功能包括适应环境功能、行为动机功能、对认知活动的组织功能、信息传递的信号功能，概括功能属于思维的基本特征，不属于情绪情感的功能，因此正确选项为ABCD。", "num": 3}, {"q": "马斯洛需要层次理论将需要分为缺失性需要和成长性需要，下列属于缺失性需要的有哪些？", "o": ["生理需要", "安全需要", "归属与爱的需要", "尊重需要", "审美需要"], "a": [0, 1, 2, 3], "e": "马斯洛的需要层次理论中，缺失性需要是个体生存所必需的基本需要，包括生理需要、安全需要、归属与爱的需要、尊重需要；审美需要和自我实现需要都属于成长性需要，因此正确选项为ABCD。", "num": 4}, {"q": "人格是一个人相对稳定的心理特征的总和，其核心组成部分包括以下哪些？", "o": ["气质", "性格", "观察力", "思维", "意志"], "a": [0, 1], "e": "人格的核心组成部分是气质和性格，观察力属于能力范畴，思维和意志属于心理过程，不属于人格的核心组成部分，因此正确选项为AB。", "num": 5}, {"q": "社会心理学的研究范围涵盖多个层面，下列属于社会心理学研究范畴的有哪些？", "o": ["个体层面的社会心理与行为", "群体层面的社会心理与行为", "人际互动过程", "各类社会影响现象", "纯生理层面的神经心理现象"], "a": [0, 1, 2, 3], "e": "社会心理学主要研究个体、群体层面的社会心理与行为，以及人际互动、社会影响相关内容，纯生理层面的神经心理现象属于生理心理学研究范畴，不属于社会心理学的研究范围，因此正确选项为ABCD。", "num": 6}, {"q": "社会化是个体掌握社会规范、成为社会成员的过程，常见的社会化类型包括以下哪些？", "o": ["政治社会化", "道德社会化", "性别角色社会化", "语言社会化", "独立社会化"], "a": [0, 1, 2, 3], "e": "心理学中公认的常见社会化类型包括政治社会化、道德社会化、性别角色社会化、语言社会化，不存在\"独立社会化\"这一规范分类，因此正确选项为ABCD。", "num": 7}, {"q": "从结构分类来看，自我概念的核心成分包括以下哪些？", "o": ["生理自我", "社会自我", "心理自我", "应该自我", "理想自我"], "a": [0, 1, 2], "e": "自我概念按照结构可划分为生理自我、社会自我和心理自我三个核心成分，应该自我和理想自我属于自我差异理论中的分类，不属于自我概念的核心结构成分，因此正确选项为ABC。", "num": 8}, {"q": "社会心理学中态度的ABC模型包含以下哪些核心成分？", "o": ["认知成分", "情感成分", "行为倾向成分", "意志成分", "需要成分"], "a": [0, 1, 2], "e": "态度的ABC模型中，A对应情感成分、B对应行为倾向成分、C对应认知成分，意志成分和需要成分不属于态度ABC模型的核心成分，因此正确选项为ABC。", "num": 9}, {"q": "下列选项中，属于影响个体从众行为的核心因素有哪些？", "o": ["群体的规模大小", "群体的凝聚力水平", "判断任务的难度", "个体的自我评价程度", "群体的血型比例分布"], "a": [0, 1, 2, 3], "e": "影响从众行为的核心因素包括群体规模、群体凝聚力、任务难度、个体人格特质（如自我评价）等，群体的血型比例分布与个体从众行为没有关联，不属于影响从众的核心因素，因此正确选项为ABCD。", "num": 10}, {"q": "积极心理学的PERMA模型包含下列哪些核心要素？", "o": ["积极情绪", "对生活的投入", "积极的人际关系", "生命的意义与价值", "良好的睡眠质量"], "a": [0, 1, 2, 3], "e": "PERMA模型的五个核心要素分别是P（积极情绪）、E（投入）、R（人际关系）、M（意义）、A（成就），睡眠质量不属于PERMA模型的核心要素，因此正确选项为ABCD。", "num": 11}, {"q": "大五人格理论中的核心人格维度包括以下哪些？", "o": ["神经质", "外倾性", "开放性", "尽责性", "攻击性"], "a": [0, 1, 2, 3], "e": "大五人格的五个核心维度为神经质、外倾性、开放性、尽责性、宜人性，攻击性是神经质的相关子特质，不属于大五人格的核心维度，因此正确选项为ABCD。", "num": 12}, {"q": "发展心理学家托马斯和切斯对婴儿气质进行分类，其提出的经典气质类型包括以下哪些？", "o": ["容易型", "困难型", "迟缓型", "稳定型", "不稳定型"], "a": [0, 1, 2], "e": "托马斯和切斯将婴儿气质划分为容易型、困难型、迟缓型三种经典类型，稳定型和不稳定型是其他气质分类体系的划分，不属于托马斯和切斯的分类，因此正确选项为ABC。", "num": 13}, {"q": "一般心理问题是心理咨询中常见的心理不适类型，其诊断要点包括以下哪些？", "o": ["由现实生活刺激因素引发", "持续时间通常在1-2个月", "不良情绪未出现泛化", "社会功能保持相对完整，未严重受损", "存在明显的精神病性症状"], "a": [0, 1, 2, 3], "e": "一般心理问题的诊断要点为：由现实因素激发，持续时间1-2个月，情绪反应未泛化，社会功能未受到严重损害，一般不出现精神病性症状，因此正确选项为ABCD。", "num": 14}, {"q": "下列学者中，属于心理测量学发展早期代表人物的有哪些？", "o": ["高尔顿", "卡特尔", "比内", "罗杰斯", "荣格"], "a": [0, 1, 2], "e": "高尔顿是心理测量运动的创始人，卡特尔最早提出\"心理测验\"的概念，比内编制了世界上第一个正式的智力测验，三者都是心理测量学早期代表人物；罗杰斯是人本主义心理学代表，荣格是分析心理学代表，均不属于心理测量学早期代表人物，因此正确选项为ABC。", "num": 15}, {"q": "下列选项中，属于应激反应的中介变量的有哪些？", "o": ["个体对事件的认知评价", "个体可获得的社会支持", "个体的人格特征", "原发性高血压", "重大亲人离世事件"], "a": [0, 1, 2], "e": "应激的中介变量是调节应激源和应激反应关系的因素，主要包括认知评价、社会支持、人格特征等；原发性高血压属于应激可能导致的躯体结果，重大亲人离世属于应激源，二者都不属于中介变量，因此正确选项为ABC。", "num": 16}, {"q": "心理咨询工作中需要遵守保密原则，下列属于保密例外情况的有哪些？", "o": ["求助者明确表示将要实施伤害自身的行为", "求助者明确计划要伤害特定的他人", "司法机关依法要求咨询师提供相关咨询信息", "求助者隐瞒了自己的既往心理咨询史", "求助者对咨询师提出超出咨询范围的要求"], "a": [0, 1, 2], "e": "心理咨询的保密例外包括：求助者有伤害自身或伤害他人的明确计划、涉及法定司法程序需要披露信息等情况；求助者隐瞒既往病史、提出不合理要求不属于保密例外的范畴，咨询师仍需遵守保密原则，因此正确选项为ABC。", "num": 17}, {"q": "下列因素中，属于影响人际吸引的核心因素的有哪些？", "o": ["交往的熟悉性", "双方的相似性", "特质的互补性", "个人的外貌特征", "家庭的财富数量"], "a": [0, 1, 2, 3], "e": "影响人际吸引的核心因素包括熟悉性、相似性、互补性、外貌、良好人格品质等，家庭财富数量不属于人际吸引的核心影响因素，因此正确选项为ABCD。", "num": 18}, {"q": "埃里克森人格发展阶段理论认为，6-12岁童年期的主要发展任务包括以下哪些？", "o": ["获得勤奋感", "避免产生自卑感", "建立同一性", "获得主动感", "避免角色混乱"], "a": [0, 1], "e": "埃里克森的理论中，6-12岁童年期的发展任务是获得勤奋感，避免自卑感；建立自我同一性、避免角色混乱是青春期（12-18岁）的发展任务，获得主动感是幼儿期的发展任务，因此正确选项为AB。", "num": 19}, {"q": "青春期是个体心理发展的关键转折期，下列属于青春期心理发展典型特点的有哪些？", "o": ["自我意识进入快速发展阶段", "情绪体验容易呈现两极化特征", "逻辑思维才刚刚开始萌芽发展", "个体性意识逐渐觉醒", "主要依恋对象从父母转向同伴"], "a": [0, 1, 3, 4], "e": "青春期的典型心理发展特点包括自我意识快速发展、情绪两极化明显、性意识逐步觉醒、依恋关系转向同伴，逻辑思维的萌芽发展在童年期后期已经完成，并非起始于青春期，因此C选项错误，正确答案为ABDE。", "num": 20}, {"q": "异常心理评估中，下列选项属于抑郁发作核心症状的有哪些？", "o": ["持续的情绪低落，无法感受到愉悦", "对既往感兴趣的事物出现明显兴趣减退", "精力不足，容易感到疲惫乏力", "入睡困难或早醒等睡眠障碍", "食欲明显下降伴随体重减轻"], "a": [0, 1, 2], "e": "抑郁发作的核心症状为情绪低落、兴趣减退、精力减退，睡眠障碍、食欲下降属于抑郁发作的伴随躯体症状，不属于核心症状，因此DE错误，正确答案为ABC。", "num": 21}, {"q": "下列关于强迫障碍的典型临床表现，描述正确的有哪些？", "o": ["会反复出现闯入性的不必要想法，即强迫思维", "存在反复出现的刻板行为或仪式动作，即强迫行为", "个体明知强迫内容不合理，却无法摆脱控制", "强迫症状往往会让个体产生明显的焦虑痛苦情绪", "多数患者会出现持续的幻觉、妄想等精神病性症状"], "a": [0, 1, 2, 3], "e": "强迫障碍的典型表现包括强迫思维、强迫行为，患者明知症状不合理却无法控制，症状会带来明显的焦虑痛苦体验；幻觉妄想属于精神病性症状，不属于强迫障碍的典型表现，因此E选项错误，正确答案为ABCD。", "num": 22}, {"q": "下列研究内容中，属于健康心理学研究范畴的有哪些？", "o": ["哪些心理因素能够帮助个体维持健康状态", "针对疾病预防开展的心理相关干预方法", "医患互动中心理因素对诊疗效果的影响机制", "恶性肿瘤等躯体疾病的手术治疗方案制定", "针对高压职业人群开展的心理健康支持工作"], "a": [0, 1, 2, 4], "e": "健康心理学主要研究和健康、疾病相关的心理层面问题，包括促进健康的心理因素、疾病预防的心理干预、医患关系心理机制、职业健康心理支持等；躯体疾病的治疗方案属于临床医学研究范畴，不属于健康心理学的研究内容，因此D选项错误，正确答案为ABCE。", "num": 23}, {"q": "社会认知过程中常见的知觉偏差包括下列哪些选项？", "o": ["最初获得的信息对后续认知的影响更大，即首因效应", "最新获得的信息对整体认知的影响更大，即近因效应", "个体某一个突出特点会掩盖对其他特征的知觉，即晕轮效应", "对某个社会群体产生固定笼统的印象，即刻板效应", "回忆信息时出现的内容遗漏或扭曲，即记忆偏差"], "a": [0, 1, 2, 3], "e": "常见的社会知觉偏差包括首因效应、近因效应、晕轮效应、刻板效应；记忆偏差属于记忆过程本身的误差，不属于社会知觉偏差的范畴，因此E选项错误，正确答案为ABCD。", "num": 24}, {"q": "下列选项中，符合幼儿期语言发展主要特点的有哪些？", "o": ["词汇量随年龄增长快速增加", "语法结构从简单向复杂逐步完善", "日常口语的表达能力不断提升", "能够系统学习掌握书面语言", "内部语言已经发展成熟"], "a": [0, 1, 2], "e": "幼儿期语言发展的核心特点包括词汇量快速增长、语法结构逐步完善、口语表达能力提升；书面语言发展和内部语言萌芽成熟主要出现在童年期，不属于幼儿期的典型特点，因此DE错误，正确答案为ABC。", "num": 25}, {"q": "下列练习或方法中，属于积极心理学常用干预技术的有哪些？", "o": ["每天记录三件让自己开心的好事的练习", "定期书写记录值得感恩的人或事的感恩日记", "通过有意识的呼吸和觉察练习的正念冥想", "通过渐进放松对抗焦虑的系统脱敏疗法", "调整不良认知信念的认知重构技术"], "a": [0, 1, 2], "e"
