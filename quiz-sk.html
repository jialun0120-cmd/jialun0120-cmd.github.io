<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>中国心理卫生协会 · 水平评价测试 · 操作技能（助理级）</title><meta name="theme-color" content="#0b0e17"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,PingFang SC,Noto Sans SC,sans-serif;background:#0b0e17;color:#e8e6e3;min-height:100vh}.h{position:fixed;top:0;left:0;right:0;z-index:100;padding:.65rem 1rem;background:rgba(11,14,23,.95);backdrop-filter:blur(12px);display:flex;align-items:center;gap:.6rem;border-bottom:1px solid rgba(255,255,255,.06)}.h .b{background:rgba(80,160,255,.15);color:#50a0ff;font-size:.7rem;padding:.15rem .55rem;border-radius:4px;font-weight:500}.h h1{font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.w{padding:4rem 0 6rem}.cc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.85rem 1rem;margin-bottom:.65rem;cursor:pointer;display:flex;align-items:center;gap:.75rem}.cc:active{background:rgba(255,255,255,.08);border-color:rgba(80,160,255,.3)}.cc .n{width:34px;height:34px;border-radius:8px;background:rgba(80,160,255,.1);color:#50a0ff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}.cc .i{flex:1;min-width:0}.cc .t{font-size:.9rem;font-weight:600;margin-bottom:.12rem}.cc .m{font-size:.75rem;color:rgba(255,255,255,.45)}.cc .a{color:rgba(255,255,255,.25);font-size:1.2rem;flex-shrink:0}.q{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1.15rem;margin-bottom:.85rem}.qn{font-size:.76rem;color:rgba(80,160,255,.55);margin-bottom:.5rem;font-weight:500}.qt{font-size:.95rem;line-height:1.7;margin-bottom:1rem;font-weight:500}.qh{font-size:.75rem;color:rgba(255,255,255,.35);margin-bottom:.8rem;font-style:italic}.op{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.8rem .9rem;cursor:pointer;font-size:.88rem;line-height:1.5;display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.55rem}.op .l{width:21px;height:21px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:600;flex-shrink:0;margin-top:.12rem}.cr{border-color:rgba(80,200,120,.5)!important;background:rgba(80,200,120,.07)!important}.cr .l{background:rgba(80,200,120,.2)!important;border-color:rgba(80,200,120,.5)!important;color:#50c878!important}.wr{border-color:rgba(255,90,90,.5)!important;background:rgba(255,90,90,.07)!important}.wr .l{background:rgba(255,90,90,.2)!important;border-color:rgba(255,90,90,.5)!important;color:#ff5a5a!important}.sl{border-color:rgba(80,160,255,.4)!important;background:rgba(80,160,255,.06)!important}.sl .l{background:rgba(80,160,255,.2)!important;border-color:rgba(80,160,255,.4)!important;color:#50a0ff!important}.di{pointer-events:none;opacity:.7}.ex{display:none;margin-top:.85rem;padding:.85rem .95rem;background:rgba(80,160,255,.06);border:1px solid rgba(80,160,255,.1);border-radius:10px;font-size:.82rem;line-height:1.65;color:rgba(255,255,255,.75)}.bn{width:100%;padding:.85rem;border:none;border-radius:10px;background:linear-gradient(135deg,#3a7bd5,#5fa8ff);color:#fff;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:.4rem}.bn:disabled{opacity:.35;cursor:not-allowed}@media(max-width:600px){.ls{padding:0 .6rem}}</style></head><body><div class="h"><span class="b">助理级</span><h1>操作技能 · 题库练习</h1></div><div class="w"><h2 id="pt" style="padding:1rem 1rem 0;font-size:1.15rem;font-weight:600">操作技能 · 题库练习（助理级）</h2><div id="ls" style="padding:0 .75rem"></div><div id="qz" style="display:none;padding:.75rem"></div><div id="rs" style="display:none;padding:.75rem;text-align:center"></div></div><script>var D=[{"chapter": "操作技能-A2 · 多选题", "questions": [{"q": "求助者,女,28岁,新入职中学教师,因担心讲课出错不敢主动承担公开课任务,咨询师计划联合使用阳性强化法与合理情绪疗法开展干预,下列做法符合操作规范的有哪些?", "o": ["首先引导求助者识别“我每一节课都必须上得完美无缺”的不合理信念", "当求助者主动报名参加小型公开课后,及时给予正向肯定和鼓励", "当面指出求助者逃避行为的错误,批评其胆小懦弱促使改变", "要求求助者压抑紧张不安的情绪,只管上课不要想太多", "和求助者一起调整认知,建立“讲课出错是正常的,可以逐步调整改进”的新信念"], "a": [0, 1, 4], "e": "C选项属于惩罚性干预,违背阳性强化法正性强化的核心原则;D选项忽略求助者的情绪感受,不符合心理咨询的基本要求,错误。A、B、E分别符合合理情绪疗法的识别不合理信念、调整认知,以及阳性强化法及时强化正性行为的操作规范,因此正确。", "num": 1}, {"q": "初诊接待是心理咨询师和求助者的第一次正式接触,下列做法中属于初诊接待中不当行为的有哪些?", "o": ["为了拉近和求助者的距离,主动告诉求助者自己最近的感情困扰等私人生活细节", "为了让求助者安心,直接承诺“你的问题我肯定能帮你解决”", "正式开始咨询前,向求助者说明保密原则以及保密例外的情况", "机构要求积累教学案例,未经求助者同意就将其咨询记录用于课堂教学", "咨询过程中不评判求助者的行为和选择,保持中立态度"], "a": [0, 1, 3], "e": "初诊接待需保持专业边界,不得随意透露咨询师私人信息、做出绝对化解决承诺、未经同意泄露求助者的咨询内容。C、E为初诊接待的正确操作,因此不当行为为ABD。", "num": 2}, {"q": "关于90项症状清单(SCL-90),下列说法正确的有哪些?", "o": ["量表共包含90个项目,可划分为10个不同的症状因子", "阳性项目数指的是得分≥2分的项目的总数量", "根据中国常模标准,总分≥160分时提示受测者可能存在阳性心理症状", "可以直接根据SCL-90得分结果确诊受测者患有精神类疾病", "该量表适用于16岁及以上成年人,可进行团体施测也可个别施测"], "a": [0, 1, 2, 4], "e": "ABCE", "num": 3}, {"q": "咨询师和求助者共同确定心理咨询目标时,下列选项符合合理咨询目标特征与咨询规范的有哪些?", "o": ["咨询目标具体可行,能够通过一定指标进行评估", "咨询目标是积极的,解决的问题属于心理学范畴", "咨询目标由咨询师根据专业经验单独制定,不需要求助者同意", "咨询目标需要经过双方共同认可,是可以实现的", "如果求助者的问题超出咨询师自身的胜任力范围,应当及时转介给合适的咨询师"], "a": [0, 1, 3, 4], "e": "ABDE", "num": 5}, {"q": "咨询师计划使用系统脱敏疗法帮助一名对乘坐电梯感到恐惧的求助者,下列操作符合系统脱敏疗法规范的有哪些?", "o": ["首先和求助者一起建立恐惧/焦虑等级,等级按照从低到高的顺序排列", "让求助者处于放松状态下,按照等级顺序依次想象对应场景", "为了快速见效,直接让求助者进入电梯面对最恐惧的场景进行训练", "开始脱敏训练之前,需要先教会求助者掌握渐进式肌肉放松方法", "当求助者在某一等级训练时出现明显焦虑,应当跳过该等级直接进入下一等级训练"], "a": [0, 1, 3], "e": "C选项错误,系统脱敏需要从最低焦虑等级开始逐步训练,不能直接进入最高等级场景;E选项错误,求助者在某一等级出现明显焦虑时,需要让求助者重新回到放松状态,反复练习该等级直到焦虑消除,不能直接跳过。A、B、D均符合系统脱敏疗法的操作规范,因此正确。", "num": 6}, {"q": "咨询师接待一名因长期失眠前来咨询的求助者,下列做法符合心理咨询职业伦理与操作规范的有哪些?", "o": ["根据求助者的睡眠问题,选择对应的症状评定量表,不盲目施测所有人格测验", "为了保证测验结果准确,提前告知求助者每个题目的具体计分规则", "如果评估发现求助者有高度自杀风险,应当严格保密不能联系其家属", "如果咨询师自身不擅长睡眠障碍的心理干预,应当及时评估并转介给擅长该领域的咨询师", "求助者的父母要求知道测验结果,咨询师可以直接同意告知"], "a": [0, 3], "e": "B选项错误,心理测验操作中无需告知求助者具体计分方式;C选项错误,当求助者存在自杀风险时,属于保密例外,应当及时联系家属保障安全;E选项错误,测验结果属于求助者隐私,需要征得求助者本人同意后才能告知其家属,不能直接同意。A、D符合职业伦理与操作规范,因此正确。", "num": 7}, {"q": "咨询师使用合理情绪疗法为求助者进行干预,下列做法符合修通阶段操作要点的有哪些?", "o": ["使用产婆术式辩论,引导求助者自己意识到自身存在的不合理信念", "帮助求助者建立新的合理信念,替代原有的不合理信念", "直接指出求助者的不合理信念,不需要求助者自行领悟", "布置认知家庭作业,让求助者自己记录日常情绪和引发情绪的信念之间的关联", "整个咨询过程中只倾听求助者表达,不做任何干预性引导"], "a": [0, 1, 3], "e": "ABD", "num": 8}, {"q": "求助者,男,35岁,因和妻子长期冷战导致焦虑易怒、食欲不振2个月,主动前来求助,首次接待时下列做法符合职业伦理与操作规范的有哪些?", "o": ["为了快速找到冲突原因,直接询问求助者是否存在出轨行为", "咨询开始前向求助者明确说明保密原则,以及“存在自杀或伤人风险时可以打破保密”的例外情况", "为了全面评估,直接让求助者完成所有常用的人格和症状心理测验", "耐心倾听求助者的表达,不随意打断,也不使用评判性语言评价求助者的行为", "为了节省求助者时间,听完表述后直接给出“你的问题就是婚姻冲突引发的一般心理问题”的诊断"], "a": [1, 3], "e": "A选项错误,直接询问求助者隐私问题容易引发防御心理,不符合初诊接待规范;C选项错误,应当选择和求助者问题相关的测验,不能盲目施测所有测验;E选项错误,初诊接待阶段以收集资料为主,不能在未完成全面评估的情况下直接给出诊断。B、D符合操作规范与保密原则要求,因此正确。", "num": 9}, {"q": "合理情绪疗法理论中,常见的不合理信念的特征包括下列哪些选项?", "o": ["绝对化要求", "过分概括化", "糟糕至极", "客观看待事件的结果", "以偏概全"], "a": [0, 1, 2, 4], "e": "不合理信念的三大核心特征为绝对化要求、过分概括化(也即以偏概全)、糟糕至极,D选项客观看待结果属于合理认知,不属于不合理信念的特征,因此正确答案为ABCE。", "num": 10}, {"q": "心理测验的标准化过程主要包括下列哪些环节?", "o": ["测验内容的标准化", "施测过程的标准化", "评分记分的标准化", "结果解释的标准化", "允许受测者自主选择测试场地"], "a": [0, 1, 2, 3], "e": "心理测验的标准化包含四个核心环节:测验内容标准化、施测过程标准化、评分记分标准化、结果解释标准化。E选项错误,标准化测验要求所有受测者在统一一致的测试环境下施测,不能由受测者自主选择测试场地,因此正确答案为ABCD。", "num": 11}, {"q": "求助者中心疗法认为,咨询过程中咨询师需要具备的核心咨询条件包括下列哪些?", "o": ["对求助者的共情理解", "对求助者无条件积极关注", "咨询师自身的真诚一致", "直接指导求助者一步步解决问题", "保持专业中立,对求助者不做价值评判"], "a": [0, 1, 2, 4], "e": "求助者中心疗法遵循非指导性原则,不主张咨询师直接指导求助者解决问题,因此D选项错误。求助者中心疗法的核心条件包括共情理解、无条件积极关注、真诚一致、非评判性态度,因此正确答案为ABCE。", "num": 12}, {"q": "心理咨询过程中,求助者表现出的阻抗形式通常包括下列哪些?", "o": ["全程沉默寡言,很少主动表达", "有意回避咨询师问到的敏感话题", "多次迟到,或是无故取消预约咨询", "主动向咨询师分享自己内心的真实感受", "对咨询师的所有提问都答非所问"], "a": [0, 1, 2, 4], "e": "阻抗是求助者在咨询过程中对自我暴露与自我改变的抵抗,表现形式包括讲话程度上的沉默寡言、讲话内容上的回避敏感话题、咨询关系上的迟到/取消咨询、言语表达上的答非所问等。D选项主动分享感受属于正常的咨询互动,不属于阻抗,因此正确答案为ABCE。", "num": 13}, {"q": "咨询师在和求助者会谈过程中做出了下列表述,其中属于参与性技术的有哪些?", "o": ["“你刚才说你和室友相处得很不愉快,能具体说一说上次发生矛盾的具体情况吗?”", "“我觉得你应该主动找室友谈一谈,把问题说开”", "“你现在说起这件事的时候,感觉还是很委屈对吗?”", "“我之前上学的时候也和室友发生过类似的矛盾,特别能理解你的感受”", "“你说的‘心里不舒服’,具体是委屈还是愤怒呢?”"], "a": [0, 2, 4], "e": "B选项属于指导技术,是影响性技术的一种;D选项属于自我开放技术,也属于影响性技术;A选项属于具体化技术,是参与性技术;C选项属于情感反应技术,是参与性技术;E选项属于具体化技术,是参与性技术,因此正确答案为ACE。", "num": 14}, {"q": "求助者说“我这次竞聘科长没选上,我的事业就全完了,单位同事肯定都看不起我”,根据合理情绪疗法的ABC理论,下列说法正确的有哪些?", "o": ["该求助者的不合理信念属于糟糕至极的特征", "诱发事件A是“竞聘科长落选”", "情绪结果C是“感到绝望、自卑,没面子”", "不合理信念B是“竞聘落选就等于事业全完,同事都会看不起我”", "该求助者的心理冲突属于变形冲突,属于神经症性心理问题"], "a": [0, 1, 2, 3], "e": "E选项错误,该求助者的心理冲突和竞聘落选这一现实事件直接相关,属于常形冲突,不属于神经症性心理问题。A、B、C、D均符合ABC理论的内容与不合理信念的分类,因此正确答案为ABCD。", "num": 15}, {"q": "关于艾森克人格问卷(EPQ),下列说法正确的有哪些?", "o": ["EPQ包含E(内外向)、N(神经质)、P(精神质)、L(掩饰性)四个维度", "E维度得分越高,说明个体越外向,更喜欢社交活动", "N维度得分越高,说明个体情绪越稳定,不容易出现焦虑情绪", "P维度得分越高,说明个体越孤僻,不近人情,缺乏共情能力", "L维度得分越高,说明个体作答的掩饰性越强,结果真实性越低"], "a": [0, 1, 3, 4], "e": "C选项错误,N维度(神经质)得分越高,个体情绪越不稳定,越容易出现焦虑、抑郁等情绪反应,表述相反因此错误。A、B、D、E均符合艾森克人格问卷的维度含义与结果解释规范,因此正确答案为ABDE。", "num": 16}, {"q": "心理咨询师使用卡特尔16项人格因素问卷(16PF)为受测者施测后解释结果,下列关于各维度高分特征的描述正确的有:", "o": ["因素A(乐群性)得分高提示受测者外向开朗、乐于交际", "因素C(稳定性)得分高提示受测者情绪稳定、应对从容", "因素E(恃强性)得分高提示受测者谦和温顺、容易服从", "因素N(世故性)得分高提示受测者处世圆滑、精明老练", "因素Q4(紧张性)得分高提示受测者心平气和、闲散宁静"], "a": [0, 1, 3], "e": "选项C中恃强性的高分特征为好强固执、独立积极,低分才对应顺从温和,C错误;选项E中紧张性的高分特征为紧张困扰、激动挣扎,低分才对应放松平静,E错误。其余选项描述均符合16PF的维度解释。", "num": 17}, {"q": "下列心理咨询常用干预技术中,属于放松训练范畴的有:", "o": ["鼻腔呼吸放松法", "渐进式肌肉放松训练", "指导性想象放松训练", "冲击疗法", "身体扫描正念放松训练"], "a": [0, 1, 2, 4], "e": "冲击疗法属于暴露疗法的范畴,主要用于恐惧症等问题的干预,不属于放松训练技术,D错误;其余选项均为临床常用的规范放松训练技术。", "num": 18}, {"q": "使用卡特尔16项人格因素问卷(16PF)施测时,符合施测规范要求的有:", "o": ["每一测题只能选择一个答案", "要求受测者完成所有测题,不可漏答", "指导语提示受测者尽量不选择中性答案", "要求受测者必须在30分钟内完成全部题目", "若受测者对题目难以判断,可以放弃作答"], "a": [0, 1, 2], "e": "16PF施测没有严格的时间限制,D错误;施测规范要求所有题目必须作答,不允许空题,E错误;其余选项均为16PF正确的作答与记分要求。", "num": 19}, {"q": "关于1982年修订完成的中国比内测验,下列描述正确的有:", "o": ["该版本由我国心理学家吴天敏教授主持修订", "适用的年龄范围为2~18岁的受测者", "全套测验共包含51个试题,按照由易到难排序", "该版本仅适合城市受测者使用,不适用农村受测者", "该测验只能个别施测,不支持团体施测"], "a": [0, 1, 2], "e": "中国比内测验适用于2~18岁的城乡受测者,既可以个别施测也可以团体施测,因此D、E错误,其余选项描述均正确。", "num": 20}, {"q": "咨询过程中求助者可能对咨询师产生移情或依赖,下列关于二者的描述正确的有:", "o": ["移情是求助者将过往对重要他人的情感转移到咨询师身上", "依赖是求助者遇到困难时,希望从咨询师处获得实际帮助与支持", "产生移情的求助者往往会十分关注咨询师的情绪和反应", "依赖的求助者核心需求是获得情感寄托", "移情和依赖没有本质区别,均属于咨询中的正常反应"], "a": [0, 1, 2], "e": "ABC", "num": 21}, {"q": "咨询师使用系统脱敏疗法对社交焦虑求助者进行干预,下列操作符合规范要求的有:", "o": ["开始脱敏训练前,先教授求助者掌握放松技巧", "和求助者共同建构焦虑等级,焦虑程度从低到高排列", "相邻等级之间的焦虑差异应可以很大", "脱敏训练从焦虑程度最高的情境开始,逐步向下适应", "若求助者在某一等级情境中出现明显焦虑,暂停训练重新放松后再继续"], "a": [0, 1, 4], "e": "系统脱敏要求焦虑等级的级差均匀适中,差异不能过大,C错误;脱敏训练需要从焦虑程度最低的情境开始,逐步升级到高焦虑情境,D错误;其余选项均为系统脱敏的正确操作要点。", "num": 22}, {"q": "艾森克人格问卷(EPQ)是常用的人格测量工具,下列属于该问卷包含的维度分量表的有:", "o": ["内外向维度(E)", "神经质维度(N)", "精神质维度(P)", "说谎效度量表(L)", "偏执量表(Pa)"], "a": [0, 1, 2, 3], "e": "EPQ包含E、N、P、L四个分量表,L为效度量表用于检测作答掩饰程度;Pa(偏执)是明尼苏达多相人格测验(MMPI)的临床分量表,不属于EPQ的维度,因此E错误,其余选项均正确。", "num": 23}, {"q": "合理情绪疗法是认知行为流派的代表性咨询方法,下列适合使用该方法干预的人群有:", "o": ["存在广泛性焦虑情绪的求助者", "存在中度抑郁情绪的求助者", "急性期发作的精神分裂症患者", "存在强迫行为的求助者", "重度边缘型人格障碍患者"], "a": [0, 1, 3], "e": "合理情绪疗法适用于存在情绪困扰、认知偏差的一般心理问题、神经症性问题求助者;急性期精神分裂症、重度人格障碍患者超出合理情绪疗法适用范围,需优先进行精神科药物治疗,因此C、E错误,其余选项均符合适用范围。", "num": 24}, {"q": "抑郁自评量表(SDS)与焦虑自评量表(SAS)是常用的心理健康筛查工具,下列关于二者的描述正确的有:", "o": ["SDS用于评估抑郁症状严重程度,SAS用于评估焦虑症状严重程度", "按照中国常模标准,SDS的临界值为50分,SAS的临界值也为50分", "两个量表都包含20个自评项目", "SDS采用4级评分,SAS采用5级评分", "SDS可用于抑郁症的初步筛查,SAS可用于焦虑症的初步筛查"], "a": [0, 1, 2, 4], "e": "SDS和SAS均采用4级评分法,因此D错误,其余选项描述均符合两个量表的特征,表述正确。", "num": 25}, {"q": "咨询师和求助者共同商定的正式心理咨询方案,应当包含下列哪些核心内容:", "o": ["咨询的具体目标和长期最终目标", "咨询采用的技术方法和理论基础", "咨询次数、每次时长和收费标准", "咨询师私人联系方式方便私下沟通", "咨询过程中双方的权利与义务"], "a": [0, 1, 2, 4], "e": "完整心理咨询方案需包含咨询目标、方法技术、时间收费、双方权责等核心内容;咨询师私人联系方式不属于方案必备内容,还会破坏咨询专业边界,因此D错误,其余选项均为正确内容。", "num": 27}, {"q": "咨询师使用阳性强化法帮助儿童纠正上课走神的不良行为,下列做法符合操作规范的有:", "o": ["首先明确目标行为为“上课专心听讲10分钟”,定义清晰可测量", "儿童出现符合标准的目标行为后,立即给予强化刺激", "根据儿童的喜好选择强化物,提升强化效果", "儿童出现走神行为时及时批评惩罚,加快纠正速度", "目标行为稳定后,逐步减少强化频率,维持行为改变"], "a": [0, 1, 2, 4], "e": "阳性强化法核心原理是通过正强化强化目标行为,让不良行为自然消退,不需要惩罚不良行为,因此D错误,其余选项均为正确操作要点。", "num": 28}, {"q": "初步诊断心理问题时需要区分心理冲突的常形与变形,下列关于心理冲突常形的描述正确的有:", "o": ["常形心理冲突与现实生活事件直接相关", "常形心理冲突带有明显的道德判断色彩", "常形心理冲突可出现在正常人的心理活动中", "常形心理冲突是神经症性心理问题的核心特征", "常形心理冲突的求助者通常没有明显痛苦体验"], "a": [0, 1, 2], "e": "心理冲突变形才是神经症性心理问题的核心特征,常形可见于正常人;常形心理冲突的求助者通常也有明显痛苦体验,因此D、E错误,其余选项描述均正确。", "num": 29}, {"q": "建立良好信任的咨询关系是咨询起效的基础,咨询师需要做到下列哪些要求:", "o": ["尊重求助者的人格、价值观和生活选择", "初次咨询时热情接待,营造安全温暖的咨询氛围", "合适情境下真诚表达自身真实感受,不虚伪伪装", "站在求助者角度共情理解其情绪体验", "发现求助者明显错误行为时直接批评,帮助其改正"], "a": [0, 1, 2, 3], "e": "建立良好咨询关系的核心要素包括尊重、热情、真诚、共情、积极关注,直接批评会伤害求助者自尊,破坏咨询关系,因此E错误,其余选项均为正确要求。", "num": 30}, {"q": "症状自评量表(SCL-90)是常用的心理健康筛查量表,下列属于该量表包含的因子的有:", "o": ["躯体化", "强迫症状", "人际关系敏感", "精神分裂症", "抑郁"], "a": [0, 1, 2, 4], "e": "SCL-90共包含10个因子,精神分裂症是疾病诊断名称,不属于该量表的因子,因此D错误,其余选项均为SCL-90的因子。", "num": 31}, {"q": "根据心理咨询伦理规范,下列情况属于保密例外,咨询师可以突破保密原则的有:", "o": ["求助者明确告知咨询师自己一周后计划自杀,已经准备好工具", "求助者告知咨询师自己五年前曾经盗窃过邻居财物", "求助者明确告知咨询师自己准备次日伤害出轨对象", "求助者向咨询师隐瞒了自己的高血压慢性病史", "求助者涉及重大刑事案件,法院依法调取咨询记录"], "a": [0, 2, 4], "e": "保密例外包括求助者存在伤害自身/他人的明确危险、司法机关依法要求提供咨询记录等情况;选项B的过往盗窃行为、选项D的隐瞒慢性病史均属于求助者隐私,需要严格保密,不属于保密例外,因此B、D错误,其余选项均正确。", "num": 33}, {"q": "关于卡特尔16项人格因素问卷(16PF)的适用范围,下列说法正确的有?", "o": ["适用于16周岁及以上的成年受测者", "可用于企业招聘中的人才选拔与职业适配指导", "可辅助临床工作中心理问题的初步诊断", "适用于10-15岁的儿童青少年群体", "仅可用于确诊精神障碍患者的人格评估"], "a": [0, 1, 2], "e": "卡特尔16项人格因素问卷(16PF)的适用人群为16岁以上的个体,可应用于人才选拔、职业指导、临床心理诊断等多个场景,16岁以下人群、仅适用于精神障碍患者均不符合该测验的适用范围,因此D、E选项错误。", "num": 34}, {"q": "咨询师使用阳性强化法帮助求助者调整不良行为时,下列操作符合规范要求的有?", "o": ["首先需要明确需要强化的具体目标行为", "当目标行为出现时第一时间给予强化刺激", "根据求助者的个人偏好选择合适的强化物", "对不良行为需要同时给予惩罚以快速消退", "在目标行为稳定后逐步降低强化的频率维持效果"], "a": [0, 1, 2, 4], "e": "阳性强化法的核心原理是通过正强化增强目标行为,自然消退不良行为,不需要对不良行为额外施加惩罚,因此D选项错误,其余选项均为阳性强化法的正确操作要点。", "num": 35}, {"q": "下列符合心理咨询保密原则具体要求的做法有?", "o": ["初诊接待阶段提前向求助者说明保密范围以及保密例外的情形", "未经求助者同意,任何情况下都不得泄露咨询相关内容", "对求助者的咨询记录、个案档案进行严格保密管理", "当求助者明确表示有伤害自身的计划时,可打破保密原则", "可直接将完整咨询内容用于公开教学案例分享"], "a": [0, 2, 3], "e": "心理咨询保密原则要求,需提前向求助者说明保密范围与例外,对咨询相关资料严格保密;当求助者存在自伤、伤人风险等保密例外情形时,可以打破保密原则。选项B中“任何情况下都不得泄露”错误,忽略了保密例外;选项E中直接将咨询内容用于教学需隐去所有可识别求助者身份的隐私信息,不可直接使用,因此B、E错误。", "num": 36}, {"q": "咨询师为求助者选择心理测验工具时,下列符合选择原则的有?", "o": ["选择的测验需要匹配本次评估的具体目的", "优先选择标准化程度较高的测验工具", "优先选用信效度指标符合要求的测验", "选择符合受测者年龄阶段与文化背景的测验", "尽量选用收费最高的测验保证结果准确性"], "a": [0, 1, 2, 3], "e": "选择心理测验的核心原则包括:符合评估目的、标准化程度高、信效度良好、适配受测者的年龄与文化背景。测验的收费高低和测验质量没有必然关联,因此E选项错误。", "num": 37}, {"q": "当咨询师因个人能力或职业规范要求需要为求助者转介时,下列做法正确的有?", "o": ["提前向求助者说明转介的原因和转介的必要性", "不需要提前告知求助者,直接安排转介即可", "和新咨询师沟通求助者情况时,保护求助者核心隐私", "提前将新咨询师的基本信息告知求助者供其选择", "转介完成后不再跟进求助者的后续咨询情况"], "a": [0, 2, 3], "e": "规范转介要求:提前向求助者说明转介原因与必要性,为求助者提供新咨询师的相关信息,与新咨询师沟通求助者情况时注意保护隐私;直接不告知求助者转介不符合伦理,转介后也需要做好交接相关的跟进,因此B、E选项错误。", "num": 38}, {"q": "下列心理咨询技术中,属于参与性技术范畴的有?", "o": ["全神贯注的倾听技术", "对求助者表达的内容进行内容反应", "对求助者的情绪感受进行情感反应", "直接指导求助者做出行为改变", "为求助者的问题提供专业解释"], "a": [0, 1, 2], "e": "ABC", "num": 39}, {"q": "下列心理咨询技术中,属于影响性技术范畴的有?", "o": ["针对求助者的认知误区给出专业解释", "明确指导求助者开展特定的行为练习", "咨询师将自己的观点传递给求助者进行内容表达", "对求助者的情绪感受做出情感反应", "帮助求助者澄清模糊不清的问题使用具体化技术"], "a": [0, 1, 2], "e": "影响性技术是咨询师主动影响求助者咨询过程的技术,包括解释、指导、内容表达、面质、自我开放等;情感反应、具体化属于参与性技术,因此D、E选项错误。", "num": 40}, {"q": "下列人群中,属于冲击疗法禁忌对象的有?", "o": ["存在严重冠心病等心血管疾病的患者", "处于急性精神分裂症发作期的患者", "患有严重哮喘等呼吸道疾病的患者", "存在轻度焦虑情绪的健康成年人", "处于妊娠期的孕妇"], "a": [0, 1, 2, 4], "e": "冲击疗法会让求助者承受强烈的情绪和生理刺激,因此存在严重躯体疾病(心血管、呼吸道疾病等)、急性精神障碍发作、孕妇等均属于禁忌人群;健康的存在轻度心理问题的人群不属于禁忌对象,因此D选项错误。", "num": 41}, {"q": "认知行为疗法是心理咨询中常用的流派取向,下列属于认知行为疗法共同特点的有?", "o": ["咨询过程中咨询师和求助者是合作关系", "该流派认为个体的心理痛苦大多源于认知机能的障碍", "咨询核心是通过调整个体的认知,改善情绪和行为问题", "仅关注个体外显行为的改变,不涉及认知层面的调整", "属于针对具体目标的短期、教育性治疗"], "a": [0, 1, 2, 4], "e": "认知行为疗法兼顾认知调整和行为改变,核心假设认为心理痛苦源于认知障碍,通过改变认知改善情绪行为,咨访双方为合作关系,属于短期教育性治疗;仅关注行为改变不符合认知行为疗法的特点,因此D选项错误。", "num": 42}, {"q": "心理咨询结束阶段需要对咨询效果进行评估,下列属于常用评估维度的有?", "o": ["求助者对咨询效果的自我报告", "咨询师对求助者改变情况的观察评定", "求助者社会功能恢复的情况", "求助者原有心理症状的改善程度", "求助者咨询前后经济收入的变化幅度"], "a": [0, 1, 2, 3], "e": "心理咨询效果的常用评估维度包括:求助者自评、咨询师观察评定、社会功能恢复情况、症状改善程度、他人评价等;经济收入的变化和咨询效果没有直接关联,属于无关维度,因此E选项错误。", "num": 43}, {"q": "临床诊断中,鉴别神经症和正常心理的核心标准包括?", "o": ["求助者心理冲突的类型", "症状持续的病程时间", "求助者内心的痛苦程度", "求助者社会功能的受损程度", "求助者的年龄和性别"], "a": [0, 1, 2, 3], "e": "根据神经症临床评定方法,鉴别神经症与正常心理的核心维度包括:心理冲突的类型、病程长短、痛苦程度、社会功能受损程度,年龄和性别不属于鉴别标准,因此E选项错误。", "num": 44}, {"q": "下列不良行为或心理障碍中,适合使用厌恶疗法进行调整的有?", "o": ["露阴癖、窥阴癖等性心理偏好障碍", "酗酒、尼古丁依赖等成瘾行为", "强迫症中反复出现的强迫行为", "重度抑郁发作的患者", "处于幻觉妄想阶段的精神分裂症患者"], "a": [0, 1, 2], "e": "厌恶疗法通过将不良行为与厌恶刺激建立联结,达到消退不良行为的目的,适用于成瘾行为、性心理障碍、强迫 ,表述正确。", "num": 3}, {"q": "主测者施测卡特尔16种人格因素问卷(16PF)时,需要遵守的注意事项包括下列哪些?", "o": ["主测者必须严格按照原文逐字读出指导语,不能自行修改内容", "引导受测者凭第一感觉快速作答,不要过度思考拖延时间", "要求受测者每一道题目只能选择一个答案,不能漏答题目", "提醒受测者尽量不要选择中性答案,不确定时也要做出倾向性选择", "该测验有严格的时间限制,超过规定时间作答则测验无效"], "a": [0, 1, 2, 3], "e": "16PF施测没有严格的时间限制,因此E选项表述错误,其余选项均为16PF施测需要遵循的正确注意事项。", "num": 4}, {"q": "心理学中判断个体心理活动正常与异常的三项基本原则包括下列哪些?", "o": ["主观世界与客观世界保持统一性原则", "个体内部心理活动保持内在协调性原则", "个体的人格保持相对稳定性原则", "情绪反应与外界刺激完全匹配原则", "个体社会功能保持完全正常原则"], "a": [0, 1, 2], "e": "判断心理正常与异常的官方规定三项基本原则为:主观世界与客观世界统一性、心理活动内在协调性、人格相对稳定性。D、E选项不属于规定的三项基本原则范畴,因此错误。", "num": 5}, {"q": "关于合理情绪疗法的ABC理论,下列表述正确的有哪些?", "o": ["A代表引发求助者情绪困扰的诱发事件", "B代表求助者对诱发事件所持的信念、看法和解释", "C代表诱发事件后个体产生的情绪和行为结果", "诱发事件A是引发情绪行为反应的直接原因", "个体的信念B才是引发情绪行为反应的直接原因"], "a": [0, 1, 2, 4], "e": "合理情绪疗法ABC理论中,引发情绪和行为结果C的直接原因是个体对事件的信念B,而非诱发事件A本身,因此D选项表述错误,其余选项均符合ABC理论的核心定义。", "num": 6}, {"q": "系统脱敏法的标准操作流程包括下列哪些步骤?", "o": ["协助求助者建立焦虑等级量表,所有刺激按照从低到高排序", "正式脱敏前先让求助者掌握肌肉放松训练的技巧", "脱敏训练需要按照焦虑等级从高到低的顺序逐级进行", "当求助者在某一等级刺激下不再产生焦虑反应时,即可进入下一等级", "首次训练直接将求助者暴露在最高等级的焦虑场景中"], "a": [0, 1, 3], "e": "系统脱敏法的规范操作是从最低等级的焦虑刺激开始,逐级向上脱敏,因此C选项从高到低排序表述错误;直接暴露在最高等级焦虑场景是满灌疗法的操作,不属于系统脱敏法,因此E选项错误。其余选项均符合系统脱敏法的标准操作流程。", "num": 7}, {"q": "下列哪些情况属于心理咨询的保密例外情形?", "o": ["求助者明确告诉咨询师自己已经制定了详细的自杀计划", "求助者向咨询师倾诉自己在恋爱中遇到的情感烦恼", "求助者明确说明自己准备伤害和自己有矛盾的同事", "公安机关依法办理案件,要求咨询师提供相关咨询记录", "求助者向咨询师吐槽单位同事的工作态度问题"], "a": [0, 2, 3], "e": "保密例外的情形主要包括:求助者存在伤害自身或他人的明确风险、公检法等司法机关依法要求调取咨询资料等情况。B和E都属于正常的咨询内容,没有突破保密原则的必要,不属于保密例外,因此BE错误。", "num": 8}, {"q": "下列哪些场景适合使用阳性强化法进行行为干预?", "o": ["矫正儿童的多动、注意力不集中行为", "对存在社交障碍的求助者开展社交技能训练", "改善精神分裂症急性期患者的幻觉妄想症状", "塑造培养儿童养成良好的日常行为习惯", "逐步消退求助者已经形成的不良行为习惯"], "a": [0, 1, 3, 4], "e": "阳性强化法主要用于行为矫正和行为塑造,精神分裂症急性期的幻觉妄想症状需要优先以药物治疗为主,阳性强化法无法作为主要干预手段,因此C选项错误,其余选项均属于阳性强化法的适用范围。", "num": 9}, {"q": "初诊接待在整个心理咨询过程中的作用包括下列哪些?", "o": ["帮助心理咨询师和求助者之间建立良好的咨询关系", "搜集整理求助者的相关资料,为后续初步评估打下基础", "直接解决求助者前来咨询的核心心理困扰", "给求助者提供安全的表达空间,帮助求助者释放压抑的情绪", "让求助者在初诊阶段就感受到被接纳、被理解的氛围"], "a": [0, 1, 3, 4], "e": "初诊接待的核心作用是建立咨询关系、搜集相关资料、提供情绪宣泄的空间,并不直接解决求助者的核心困扰,核心
