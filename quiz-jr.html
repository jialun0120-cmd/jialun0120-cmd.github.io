<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content=width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no><title>中国心理卫生协会 · 水平评价测试 · 基础知识（初级）</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,PingFang SC,Noto Sans SC,sans-serif;background:#0b0e17;color:#e8e6e3;min-height:100vh}.h{position:fixed;top:0;left:0;right:0;z-index:100;padding:.65rem 1rem;background:rgba(11,14,23,.95);backdrop-filter:blur(12px);display:flex;align-items:center;gap:.6rem;border-bottom:1px solid rgba(255,255,255,.06)}.h .b{background:rgba(80,160,255,.15);color:#50a0ff;font-size:.7rem;padding:.15rem .55rem;border-radius:4px;font-weight:500}.h h1{font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.w{padding:4rem 0 6rem}.cc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.85rem 1rem;margin-bottom:.65rem;cursor:pointer;display:flex;align-items:center;gap:.75rem}.cc:active{background:rgba(255,255,255,.08);border-color:rgba(80,160,255,.3)}.cc .n{width:34px;height:34px;border-radius:8px;background:rgba(80,160,255,.1);color:#50a0ff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}.cc .i{flex:1;min-width:0}.cc .t{font-size:.9rem;font-weight:600;margin-bottom:.12rem}.cc .m{font-size:.75rem;color:rgba(255,255,255,.45)}.cc .a{color:rgba(255,255,255,.25);font-size:1.2rem;flex-shrink:0}.q{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1.15rem;margin-bottom:.85rem}.qn{font-size:.76rem;color:rgba(80,160,255,.55);margin-bottom:.5rem;font-weight:500}.qt{font-size:.95rem;line-height:1.7;margin-bottom:1rem;font-weight:500}.qh{font-size:.75rem;color:rgba(255,255,255,.35);margin-bottom:.8rem;font-style:italic}.op{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.8rem .9rem;cursor:pointer;font-size:.88rem;line-height:1.5;display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.55rem}.op .l{width:21px;height:21px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:600;flex-shrink:0;margin-top:.12rem}.cr{border-color:rgba(80,200,120,.5)!important;background:rgba(80,200,120,.07)!important}.cr .l{background:rgba(80,200,120,.2)!important;border-color:rgba(80,200,120,.5)!important;color:#50c878!important}.wr{border-color:rgba(255,90,90,.5)!important;background:rgba(255,90,90,.07)!important}.wr .l{background:rgba(255,90,90,.2)!important;border-color:rgba(255,90,90,.5)!important;color:#ff5a5a!important}.sl{border-color:rgba(80,160,255,.4)!important;background:rgba(80,160,255,.06)!important}.sl .l{background:rgba(80,160,255,.2)!important;border-color:rgba(80,160,255,.4)!important;color:#50a0ff!important}.di{pointer-events:none;opacity:.7}.ex{display:none;margin-top:.85rem;padding:.85rem .95rem;background:rgba(80,160,255,.06);border:1px solid rgba(80,160,255,.1);border-radius:10px;font-size:.82rem;line-height:1.65;color:rgba(255,255,255,.75)}.bn{width:100%;padding:.85rem;border:none;border-radius:10px;background:linear-gradient(135deg,#3a7bd5,#5fa8ff);color:#fff;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:.4rem}.bn:disabled{opacity:.35;cursor:not-allowed}@media(max-width:600px){.ls{padding:0 .6rem}}</style></head><body><div class=h><span class=b>初级</span><h1>基础知识 · 题库练习</h1></div><div class=w><h2 id=pt style=padding:1rem 1rem 0;font-size:1.15rem;font-weight:600>基础知识 · 题库练习（初级）</h2><div id=ls style=padding:0 .75rem></div><div id=qz style=display:none;padding:.75rem></div><div id=rs style=display:none;padding:.75rem;text-align:center></div></div><script>var D=[{"chapter": "初级-A1 · 单选题（基础）", "questions": [{"q": "求助者,女,26岁,互联网运营,近3个月来不敢在公司公开会议上发言,哪怕提前准备好内容,上台前也会心跳加速、手抖出汗,担心自己发言出错被同事和领导嘲笑,需要对接合作方时提前好几天就开始焦虑不安,睡不好觉,结束后还会反复回想自己说过的每一句话,明明知道这种担心没必要,可就是控制不住,已经影响到日常工作效率,未服用精神类药物。该求助者最可能的初步评估是?", "o": ["特定恐怖症", "社交焦虑障碍", "广泛性焦虑障碍", "强迫障碍", "抑郁发作"], "a": 1, "e": "选项A特定恐怖症的恐惧对象是单一非社交类的物体或场景,不符合本题的社交互动场景恐惧;选项B社交焦虑障碍核心表现为对社交场合存在持续的恐惧,担心得到负面评价,会主动回避,与题干描述完全吻合;选项C广泛性焦虑障碍没有明确固定的焦虑对象,不符合本题针对社交场景的特点;选项D强迫障碍核心是反复出现的强迫思维或强迫行为,题干未提及相关核心表现;选项E抑郁发作核心是情绪低落、兴趣减退,题干无相关典型症状,因此排除。", "num": 1}, {"q": "求助者,男,16岁,高一学生,近一年来对自己未来要选什么专业、以后从事什么工作一直感到迷茫,频繁换兴趣班,和父母吵架的时候总说父母不理解自己,最近上课注意力没法集中,成绩明显下滑,说“我不知道我到底想要什么,也不知道以后要做什么”,日常学习生活受到中度影响。根据埃里克森的心理社会发展阶段理论,该求助者面临的核心冲突是?", "o": ["主动对内疚", "勤奋对自卑", "同一性对角色混乱", "亲密对孤独", "完善对绝望"], "a": 2, "e": "选项A主动对内疚是学前期(3-6岁)的核心发展冲突,不符合题干;选项B勤奋对自卑是学龄期(6-12岁)的核心冲突,不符合;选项C同一性对角色混乱是青少年期(12-18岁)的核心冲突,对应题干中青少年对自我身份、未来发展方向的迷茫,完全吻合;选项D亲密对孤独是成年早期的核心冲突,不符合;选项E完善对绝望是老年期的核心冲突,不符合。", "num": 2}, {"q": "求助者,女,29岁,互联网产品经理,近一年来和开发同事对接需求后,总是反复回想沟通细节,认定开发同事就是故意针对自己、不配合自己的工作,哪怕对方只是正常提修改意见,也会因此出现心慌胸闷,没法安心推进项目,影响了跨部门协作效率。该求助者的人际归因风格属于?", "o": ["内归因稳定型", "外归因稳定型", "内归因不稳定型", "外归因不稳定型", "混合型归因"], "a": 1, "e": "根据韦纳归因理论,外归因稳定型指将人际冲突、负面事件的原因归为他人身上稳定的特质(如题干中认定对方故意针对),和题干描述一致;内归因是将原因归为自身因素,不符合本题;不稳定型归因是将原因归为临时偶然因素,题干未体现;混合型归因指同时归因为自身和外部多种因素,不符合题干单一猜忌的逻辑,因此排除其他选项。", "num": 3}, {"q": "求助者,男,62岁,冠心病患者,心脏支架术后10个月,近期总是感到焦虑,担心支架会出问题、疾病随时复发,不敢出门散步、甚至不敢做家务,睡眠质量很差,心内科医生评估其心脏功能恢复良好,符合日常活动标准。根据健康心理学的干预原则,以下最适合的干预措施是?", "o": ["强制患者每日进行2小时高强度快走", "采用认知重评技术纠正其灾难化思维", "直接给予大剂量抗焦虑药物治疗", "要求患者长期卧床休息避免意外", "暂时忽略情绪问题,专注身体康复即可"], "a": 1, "e": "选项A高强度运动不符合冠心病支架术后的康复要求,会带来额外健康风险,排除;选项B认知重评可以有效纠正患者“疾病随时复发”的灾难化错误认知,符合健康心理学的心理干预原则,正确;选项C药物治疗不属于心理干预范畴,不符合题干要求,排除;选项D限制日常活动反而会加重患者的焦虑情绪,不利于康复,排除;选项E忽略患者的情绪问题会影响整体康复效果,做法错误,排除。", "num": 4}, {"q": "求助者,男,24岁,研究生,近一个半月来一直存在入睡困难,躺在床上近1小时才能睡着,夜间容易醒,醒了之后很难再次入睡,白天总是浑身乏力、犯困,上课没法集中注意力,明知道睡眠不好影响学业,但是自己没办法调整过来。该求助者的睡眠问题属于?", "o": ["失眠障碍", "睡眠呼吸暂停综合征", "发作性睡病", "梦魇障碍", "睡眠-觉醒节律障碍"], "a": 0, "e": "选项A失眠障碍的核心表现是入睡困难、睡眠维持困难,症状持续1个月以上,符合题干描述,正确;选项B睡眠呼吸暂停综合征核心表现是睡眠过程中反复出现呼吸暂停,题干未提及相关症状,排除;选项C发作性睡病核心是白天过度嗜睡、猝倒发作,不符合题干表现,排除;选项D梦魇障碍核心是频繁做噩梦从睡眠中惊醒,题干未提及,排除;选项E睡眠-觉醒节律障碍核心是自身睡眠周期和外界要求的作息周期紊乱,不符合题干的入睡困难为主的表现,排除。", "num": 5}, {"q": "求助者,女,38岁,会计,近2个月来反复出现“保险柜没有锁好”的想法,出门之后忍不住反复返回办公室检查保险柜,明明知道已经锁好了,但就是控制不住,已经影响了正常下班和日常出行。该求助者最可能的初步评估是?", "o": ["社交焦虑障碍", "强迫障碍", "广泛性焦虑障碍", "特定恐怖症", "抑郁发作"], "a": 1, "e": "B", "num": 6}, {"q": "求助者,女,28岁,全职妈妈,孩子刚满10个月,近半年来照顾孩子的时候经常控制不住发脾气,骂过孩子之后又特别后悔,总说自己“不是个好妈妈”,最近睡眠很差,不想吃饭,平时也不想和朋友出门聚会,日常家务都很难完成。该求助者最可能的初步评估是?", "o": ["适应障碍", "产后抑郁障碍", "人格障碍", "广泛性焦虑障碍", "抑郁发作"], "a": 1, "e": "产后抑郁障碍通常发生于产后4周至1年内,核心表现为情绪失控、自责自罪、躯体症状(睡眠饮食紊乱)、社会功能受损,和题干描述完全一致,正确;选项A适应障碍虽然有应激事件,但没有明显的自责、情绪失控的核心表现,排除;选项C人格障碍是长期稳定的异常行为模式,本题是产后急性起病,不符合,排除;选项D广泛性焦虑障碍没有明确的自责、情绪失控打骂孩子的核心表现,排除;选项E抑郁发作范围更广,题干明确是产后照顾幼儿阶段出现的症状,更符合产后抑郁障碍的诊断,排除。", "num": 7}, {"q": "求助者,女,22岁,应届毕业生,刚入职3个月,每次部门主管交给她工作任务,都会特别紧张,手心出汗,脑子一片空白没法集中注意力工作,总担心自己做不好会被辞退,自己以后找不到好工作,混不下去,因此不想接任何新任务,明知道自己反应过度,但就是控制不住这种想法。根据认知行为疗法,该求助者的核心认知偏差是?", "o": ["绝对化要求", "过分概括化", "灾难化思维", "个性化", "选择性概括"], "a": 2, "e": "灾难化思维指的是将小的负面事件放大为极端严重的灾难性后果,本题中求助者把接到工作任务放大为“做不好就会被辞退,以后找不到工作”的严重后果,完全符合灾难化思维的定义;其他认知偏差均不符合本题场景,因此排除。", "num": 8}, {"q": "求助者,男,65岁,退休教师,近一年来总说自己记性变差了,刚放好的东西转身就找不到,出门买个菜都找不到回家的路,情绪很低落,不想出门下棋,总说自己“得了老年痴呆没用了”,去神经内科做全面检查没有发现器质性病变。根据发展心理学的老年期认知特点,该求助者的症状属于?", "o": ["正常的老年认知老化", "阿尔茨海默病", "抑郁性假性痴呆", "血管性痴呆", "分离性遗忘"], "a": 2, "e": "抑郁性假性痴呆是抑郁情绪导致的记忆力下降等认知症状,检查没有器质性病变,符合题干描述,正确;选项A正常的老年认知老化仅为轻度健忘,不会出现出门迷路这种严重症状,排除;选项B阿尔茨海默病存在明确的脑器质性病变,不符合题干检查结果,排除;选项D血管性痴呆多有脑血管病史,题干未提及,排除;选项E分离性遗忘和创伤事件相关,不符合题干描述,排除。", "num": 9}, {"q": "求助者,女,28岁,设计师,近两个月来不想出门和朋友聚会,总觉得“所有人都觉得我设计的东西不好看”,情绪一直很低落,原来喜欢的画画现在一点兴趣都没有,半年内体重下降了8公斤,每天都睡不好,病程已经超过2周。该求助者最可能的初步评估是?", "o": ["社交焦虑障碍", "抑郁发作", "广泛性焦虑障碍", "强迫障碍", "精神分裂症"], "a": 1, "e": "抑郁发作的核心症状是情绪低落、兴趣减退、快感缺失,伴随睡眠障碍、体重改变、自我评价降低,病程超过2周即可满足症状标准,和题干描述完全吻合;其他选项均没有抑郁发作的核心症状,因此排除。", "num": 10}, {"q": "求助者,男,30岁,销售,每次坐高速电梯到高层办公楼都会出现强烈的恐惧,心跳加速、呼吸困难,想要马上逃离,明知道这种恐惧不合理,但就是控制不住,后来为了避免恐惧,宁可绕路走楼梯也不愿意坐电梯。该求助者最可能的初步评估是?", "o": ["社交焦虑障碍", "特定恐怖症", "广泛性焦虑障碍", "强迫障碍", "抑郁发作"], "a": 1, "e": "特定恐怖症指对某一特定场景或物体产生的不合理的恐惧,会主动回避,题干中针对高空电梯的恐惧符合这一定义;其他选项均没有针对单一特定场景的恐惧回避表现,不符合,因此排除。", "num": 11}, {"q": "求助者,女,36岁,互联网部门总监,近一年来行业下行,团队裁员,业绩压力很大, "繁殖对停滞", "亲密对孤独", "同一性对角色混乱", "完善对绝望", "勤奋对自卑"], "a": 0, "e": "埃里克森将成年中期(30-65岁)的核心冲突定义为繁殖对停滞,个体会在这个阶段探索职业家庭的意义,如果对现状不满就会陷入停滞的纠结,和题干描述完全吻合;亲密对孤独是成年早期的冲突,同一性对角色混乱是青少年期的冲突,完善对绝望是成年晚期的冲突,勤奋对自卑是学龄期的冲突,都不符合年龄阶段,B、C、D、E错误。", "num": 40}, {"q": "求助者,男,42岁,销售,近6年每天都要饮用高度白酒8两左右,如果一整天不喝酒就会出现手抖、心慌、坐立不安,必须喝一点酒才能缓解这些不舒服,明知喝酒伤肝但还是控制不住饮酒。该求助者最可能的初步评估是?", "o": ["酒精依赖综合征", "酒精滥用", "正常社交饮酒", "抑郁发作", "广泛性焦虑障碍"], "a": 0, "e": "酒精依赖综合征的核心特征是长期反复饮酒、出现戒断反应(不饮酒就出现躯体不适)、无法控制饮酒行为,和题干描述完全吻合;酒精滥用仅指饮酒导致社会功能受损,不会出现戒断症状,不符合,B错误;正常社交饮酒不会出现戒断反应,也不会无法控制,C错误;抑郁发作和焦虑障碍核心症状和饮酒无关,不符合题干,D、E错误。", "num": 41}, {"q": "分数:1)求助者,女,29岁,全职妈妈,近半年来情绪持续低落,觉得自己天天在家带孩子没有人生价值,总抱怨家人不理解自己的辛苦。根据积极心理学的感恩干预技术,以下最适合的干预方案是?", "o": ["让求助者每天记录3件值得感恩的小事", "帮助求助者进行认知重评,纠正消极思维", "建议家人减少求助者的家务负担,多出去休闲", "建议求助者服用抗抑郁药物调节情绪", "建议求助者立刻外出工作"], "a": 0, "e": "感恩干预是积极心理学经典的干预技术,核心是通过引导个体每日记录值得感恩的事件,提升积极情绪体验,改善低落心境,完全符合题干需求;认知重评是认知行为疗法的技术,不属于感恩干预,B错误;C、E选项没有针对情绪问题结合感恩干预处理,不符合要求,C、E错误;药物治疗不属于心理干预范畴,不符合题干要求,D错误。", "num": 42}, {"q": "求助者,女,28岁,互联网公司运营,近三个月每次出门后都会反复折返家中检查门锁是否锁好、燃气阀门是否关闭,明知已经关好但无法停止,为此耽误大量时间,正常工作生活受到影响,该求助者的症状最符合哪项诊断?", "o": ["广泛性焦虑障碍", "强迫障碍", "惊恐发作", "特定恐怖症", "社交焦虑障碍"], "a": 1, "e": "强迫障碍核心特征为反复出现的强迫思维或强迫行为,该求助者的反复检查行为属于典型强迫症状,符合强迫障碍诊断标准。A选项广泛性焦虑障碍以持续的无明确对象的焦虑为核心,无固定的强迫行为;C选项惊恐发作以突发濒死感、惊恐体验为核心;D选项特定恐怖症是对特定场景/物体的恐惧回避,无反复强迫检查;E选项社交焦虑障碍核心是对社交场景的恐惧,不符合题干描述。", "num": 43}, {"q": "某公司部门开会讨论新的项目方案,大多数参会人员都同意部门经理提出的方案,求助者小王私下发现该方案的成本预算存在明显疏漏,但在公开投票时还是跟着多数人投了赞成票,会后对自己的行为十分懊恼。根据社会心理学从众理论,该行为属于?", "o": ["真从众", "权益从众", "反从众", "服从", "顺从"], "a": 1, "e": "权益从众的定义是个体表面顺从群体的多数意见,内心并不认同,保留自己的独立判断,与题干描述完全吻合。A选项真从众是个体内心也认同群体观点,不符合题干描述;C选项反从众是个体违背群体多数意见,与题干不符;D选项服从是个体按照权威的明确命令行动,题干是群体压力下的从众,不是权威命令;E选项顺从是接受他人直接提出的要求,不符合本题场景。", "num": 44}, {"q": "求助者,女,29岁,互联网产品经理,近半年持续出现焦虑情绪,经常坐立不安,无法专注完成工作。根据积极心理学正念干预技术,以下哪项是最适合的干预方法?", "o": ["指导其每日进行15分钟的正念呼吸练习", "使用苏格拉底提问纠正不良认知", "减少工作安排,增加外出旅行", "开具抗焦虑药物进行治疗", "建议其更换工作岗位"], "a": 0, "e": "A", "num": 45}, {"q": "某资深设计师接到新的设计项目后,始终习惯沿用自己从业十年以来一直使用的固定流程和设计思路,拒绝尝试新出现的更高效的设计工具和方法,即使团队年轻设计师提出了更优方案也不予采纳。根据基础心理学对思维类型的分类,该设计师的思维风格属于?", "o": ["聚合思维", "发散思维", "常规思维", "创造思维", "具体形象思维"], "a": 2, "e": "常规思维是指个体运用已经掌握的知识经验,按照固定的程序和模式解决问题的思维方式,与题干描述完全吻合。A选项聚合思维是指从多个现有信息中推导得出唯一正确结论的思维;B选项发散思维是指从一个出发点出发,探索多种不同解决方案的思维;D选项创造思维是指产生新颖、独特的思维成果的思维;E选项具体形象思维是依赖事物的具体形象解决问题,均不符合题干描述。", "num": 46}, {"q": "求助者,女,62岁,原发性高血压患者,近期因为家庭琐事经常情绪激动、发脾气,导致血压波动大,控制不佳,医生判断血压波动和情绪密切相关。根据健康心理学中心理干预原则,以下哪项干预措施最适合?", "o": ["强制增加降压药物剂量", "教授渐进式放松训练调节情绪", "给予抗抑郁药物口服", "无需处理情绪,只调整降压药即可", "建议患者搬离现有居住环境"], "a": 1, "e": "放松训练是高血压患者心理干预的常用有效技术,可以帮助患者调节情绪,稳定血压,符合健康心理学心理干预的核心原则。A选项强制调整药物不符合咨询伦理,也不属于心理干预;C选项药物治疗不属于心理干预范畴;D选项忽略情绪因素不利于血压控制;E选项没有针对核心的情绪问题进行干预。", "num": 47}, {"q": "求助者,女,32岁,参加工作后一直人际关系不佳,总觉得同事在背后议论自己、算计自己,对同事主动伸出的善意帮助也充满怀疑,一旦认定自己的想法就很难被他人说服,不愿改变自己的观点。根据CCMD-3的人格障碍分类标准,该求助者最可能的初步评估是?", "o": ["偏执型人格障碍", "分裂样人格障碍", "反社会型人格障碍", "边缘型人格障碍", "表演型人格障碍"], "a": 0, "e": "偏执型人格障碍的核心特征是持续的猜疑、对他人不信任、固执己见,与题干描述完全吻合。B选项分裂样人格障碍核心是情感冷漠、人际关系疏离,不符合;C选项反社会型人格障碍核心是无视社会规范、缺乏愧疚感,不符合;D选项边缘型人格障碍核心是情绪不稳定、身份认同紊乱、害怕被抛弃,不符合;E选项表演型人格障碍核心是过度情绪化、追求他人关注,不符合。", "num": 48}, {"q": "求助者,女,28岁,可以非常清晰地回忆起自己18岁那年第一次收到大学录取通知书时的场景,包括当时的天气、家人的反应、自己的心情,这种记忆属于以下哪种类型?", "o": ["语义记忆", "情景记忆", "程序性记忆", "工作记忆", "感觉记忆"], "a": 1, "e": "情景记忆是指个体对自己亲身经历的、发生在特定时间和地点的事件场景的记忆,和题干描述完全吻合。A选项语义记忆是对一般知识、概念、规律的记忆,不涉及个人特定经历;C选项程序性记忆是对如何做事情、技能的记忆;D选项工作记忆属于短时记忆的一种,是当前正在加工的记忆,不符合;E选项感觉记忆是记忆的第一个阶段,保持时间极短,不符合。", "num": 49}, {"q": "一名大学生在食堂打饭时被另一名学生不小心撞掉了手机,情绪瞬间失控,动手殴打对方导致对方软组织挫伤,事后自己也十分后悔,但是当时无法控制愤怒情绪。根据社会心理学侵犯行为的分类,该行为属于?", "o": ["工具性侵犯", "敌意性侵犯", "习惯性侵犯", "间接性侵犯", "言语性侵犯"], "a": 1, "e": "敌意性侵犯是指出于愤怒、报复等情绪目的,以伤害对方为意图的侵犯行为,和题干描述完全吻合。A选项工具性侵犯是指为了达到其他目的而实施的侵犯行为,侵犯只是手段,不符合本题;其余选项均不符合题干中情绪驱动的伤害行为特征。", "num": 50}, {"q": "一名4岁男童,只会说单个的词语,无法组织完整的句子表达自己的需求,和同伴交流存在明显障碍,到医院检查排除了器质性病变。根据发展心理学幼儿期语言发展的规律,该男童的情况属于?", "o": ["正常的语言发展延迟", "语言发育迟缓", "听力障碍", "智力障碍", "抽动障碍"], "a": 1, "e": "语言发育迟缓指儿童的语言发展水平明显落后于同龄儿童的正常发展水平,一般3岁儿童已经能够说出完整句子,该男童4岁仍只会说单词,符合语言发育迟缓的诊断。A选项正常语言发展延迟仅为轻微落后,不会出现明显交流障碍,不符合;C选项题干已经排除器质性听力损伤,不符合;D选项题干未提及智力发育异常的伴随症状;E选项抽动障碍核心是不自主的抽动,与语言发展无关,不符合。", "num": 51}, {"q": "求助者,男,32岁,在分析问题的时候,总是习惯先把握问题的整体框架,会综合考虑问题涉及到的各个方面,更倾向于用归纳的方式梳理逻辑解决问题,根据人格心理学认知风格理论,该求助者的认知风格属于?", "o": ["场独立型", "场依存型", "整体型", "分析型", "沉思型"], "a": 2, "e": "整体型认知风格的特征是个体解决问题时从整体出发,关注问题的多个维度,综合考量后得出结论,与题干描述完全吻合。A选项场独立型是指认知时不易受外界背景信息干扰,侧重自身内部参照;B选项场依存型是指认知时依赖外界背景信息,参照他人观点;D选项分析型认知风格侧重从细节出发拆分问题,和题干相反;E选项沉思型是指解决问题时倾向于深思熟虑后给出答案,和整体-分析的分类维度不同,不符合。", "num": 52}, {"q": "求助者,男,75岁,退休教师,近两年来变得越来越固执,不愿接受新的生活理念,总是怀念过去的工作和生活,认为现在的生活不如从前,社会功能没有明显受损。根据发展心理学老年期人格变化的特点,该求助者的表现属于?", "o": ["正常的老年人格变化", "偏执型人格障碍", "抑郁发作", "阿尔茨海默病", "血管性痴呆"], "a": 0, "e": "老年期人格会出现一系列正常的发展变化,包括固执性增强、怀旧等特点,题干中求助者无明显器质性病变和社会功能严重受损,属于正常的老年人格变化。其余选项均存在明显的病理改变或社会功能受损,不符合题干描述。", "num": 53}, {"q": "求助者,男,45岁,确诊慢性腰背痛超过1年,长期受疼痛困扰,经常出现“我一辈子都好不了了”的想法,情绪低落,无法正常工作,社会功能明显受损。根据健康心理学慢性疼痛的心理干预原则,以下哪项干预最适合?", "o": ["要求患者每天进行高强度腰部训练", "使用认知重评技术纠正其灾难化负性思维", "长期服用大剂量止痛药物", "不用处理情绪,专注止痛即可", "建议患者长期卧床休息"], "a": 1, "e": "慢性疼痛患者常出现灾难化负性思维,加重疼痛体验和情绪问题,认知重评可以纠正这类不良认知,改善情绪,提升疼痛耐受度,符合慢性疼痛心理干预的核心原则。A选项高强度训练可能加重腰部损伤和疼痛;C选项药物治疗不属于心理干预范畴;D选项忽略情绪问题不利于慢性疼痛的康复;E选项长期卧床会加重功能退化,不利于康复。", "num": 54}, {"q": "求助者,男,24岁,刚刚研究生毕业进入一家国企工作,进入新环境后连续2个月出现情绪低落、食欲下降、失眠,工作效率明显下降,入职5个月后症状逐渐自行缓解,该求助者最可能的初步评估是?", "o": ["适应障碍", "抑郁发作", "广泛性焦虑障碍", "创伤后应激障碍", "重度睡眠障碍"], "a": 0, "e": "适应障碍是指个体在经历生活环境改变等应激事件后,出现情绪或行为症状,一般症状持续时间不超过6个月,可自行缓解,与题干描述完全吻合。B选项抑郁发作症状会持续超过2周且一般不会自行在数月内缓解;C选项广泛性焦虑障碍以持续广泛的焦虑为核心,无明确应激诱因也会持续存在;D选项创伤后应激障碍是经历重大创伤后出现的症状,不会自行缓解;E选项睡眠障碍只是症状,不是完整诊断,不符合。", "num": 55}, {"q": "求助者,女,52岁,退休护士。近2年来反复出现头晕、肩痛、腹胀、心跳快等躯体不适,多次在综合医院多个科室检查,所有检验、影像学结果均无异常,医生告知没有器质性疾病,但求助者仍坚持自己“得了癌症没查出来”,反复更换医院就诊,已经影响正常退休生活,没有持续明显的焦虑或情绪低落,该求助者最可能的诊断是:", "o": ["躯体化障碍", "疑病障碍", "广泛性焦虑障碍", "抑郁症", "躯体形式自主神经紊乱"], "a": 1, "e": "该题考查疑病障碍与其他躯体形式障碍的鉴别。疑病障碍的核心表现是坚信自己患有严重疾病的先占观念,即使检查结果正常、医生解释也无法打消疑虑;躯体化障碍的核心是反复出现的多种躯体症状,而非坚定的患病先占观念。本题中求助者核心表现为坚信患不治之症,因此符合疑病障碍诊断。A选项躯体化障碍核心是多样躯体症状,无坚定先占观念,不符合;C广泛性焦虑以持续过度的整体焦虑为核心,无明确患病先占观念;D抑郁症核心是持续情绪低落兴趣减退,不符合;E躯体形式自主神经紊乱主要是自主神经功能紊乱的症状,不符合。", "num": 56}, {"q": "求助者,男,8岁,小学一年级学生。近半年来老师反映上课经常无法集中听课,总是玩文具、随便插话,很难遵守课堂纪律,坐不住总是起身走动,在家写作业也要断断续续,半小时作业能拖两个小时,学习成绩明显落后于同班同学,脑部检查无器质性病  "某互联网创业团队讨论新功能开发方案,多数成员倾向投入全部人力抢占高端市场,少数成员提出的先做下沉市场验证需求的方案被刻意否决,最终产品上线后资金耗尽项目失败,该团队决策出现了哪些群体偏差?", "o": ["群体极化", "群体思维", "社会惰化", "去个性化", "社会促进"], "a": [0, 1], "e": "群体极化指群体决策过程中观点向极端方向偏移,本题中全体成员偏向激进扩张的极端策略,符合该特征,A正确;群体思维指群体为维持表面一致性刻意忽略反对意见,题干中少数派方案被忽略符合该场景,B正确;社会惰化指个体在群体中努力程度下降,与决策偏差无关,C错误;去个性化指群体情境中个体丧失自我同一性与责任感,与本题场景不符,D错误;社会促进指他人在场时个体表现提升,与本题无关,E错误。", "num": 2}, {"q": "3岁半幼儿在社区和同伴玩“开水果店”游戏,用空矿泉水瓶替代瓶装饮料给布偶顾客“结账”,孩子们共同参与游戏,但没有明确分工、也没有统一的游戏目标,根据皮亚杰的游戏发展理论,该幼儿的游戏属于哪些类型?", "o": ["练习性游戏", "象征性游戏", "联合游戏", "合作游戏", "规则游戏"], "a": [1, 2], "e": "象征性游戏指用替代物模仿现实行为,符合本题“用空矿泉水瓶替代瓶装饮料”的游戏特征,B正确;联合游戏指同伴共同参与游戏但无明确分工与统一目标,符合题干描述,C正确;练习性游戏以重复动作为核心,多出现于感知运动阶段,不符合本题特征,A错误;合作游戏需要明确分工与共同目标,不符合本题描述,D错误;规则游戏需要遵守固定规则,多出现于学龄期,不符合该年龄阶段的游戏特征,E错误。", "num": 3}, {"q": "求助者,女,29岁,已婚,和婆婆同住一年,频繁因家务分工、育儿观念发生争执,认为丈夫始终偏向婆婆,自己感到委屈孤立,出现入睡困难、食欲减退,日常社交轻度受损,根据婚姻家庭咨询的基本原则,咨询师开展干预时的正确做法包括?", "o": ["始终保持中立,不偏袒婆媳任何一方", "直接指出婆婆干涉小家庭生活的错误", "促进夫妻双方开展有效沟通", "协助求助者调整当前负面情绪状态", "直接建议求助者和婆婆分开居住"], "a": [0, 2, 3], "e": "保持中立是婚姻家庭咨询的核心伦理原则,A正确;直接指责某一方违反中立原则,会破坏咨询联盟,B错误;促进家庭成员有效沟通是婚姻家庭咨询的核心目标之一,C正确;先协助求助者调整情绪再处理冲突,符合咨询流程要求,D正确;直接替来访者做分离决定,违反咨询师不替来访者做决策的伦理要求,也无法帮助来访者自主解决问题,E错误。", "num": 4}, {"q": "求助者,男,45岁,确诊2型糖尿病1年半,血糖长期控制不理想,近期出现烦躁焦虑,常认为“糖尿病治不好,早晚会出并发症拖累子女”,从健康心理学视角来看,以下适合的心理干预措施包括?", "o": ["认知重评,纠正“一定会拖累家人”的灾难化思维", "为求助者开具抗焦虑药物改善情绪", "指导进行渐进式肌肉放松训练调节焦虑情绪", "鼓励求助者参与糖尿病患者互助支持小组", "强制限制求助者所有甜食的摄入"], "a": [0, 2, 3], "e": "认知重评可以纠正求助者的负面认知偏差,改善灾难化思维,A正确;开具药物属于临床医疗范畴,不属于心理咨询师可开展的心理干预内容,B错误;放松训练可以有效缓解焦虑情绪,适合该案例,C正确;互助支持小组可以为求助者提供社会支持,改善负性情绪,D正确;强制限制饮食违反咨询伦理,也会加重求助者心理压力,不利于血糖控制,E错误。", "num": 5}, {"q": "求助者,男,26岁,刚入职互联网公司,不敢主动和同事交流,害怕自己表现不好被他人负面评价,甚至不敢去公共食堂就餐,明知自己的担心不对但无法控制。以下哪些属于该求助者可能存在的社交认知偏差?", "o": ["绝对化要求", "过分概括化", "灾难化思维", "个人化", "选择性概括"], "a": [0, 1, 2, 3, 4], "e": "该求助者要求自己必须获得所有人的认可,不能出现任何不好的印象,属于绝对化要求,A正确;一次偶然的社交紧张就认为自己完全不适合社交,属于过分概括化,B正确;把一次小小的社交失误放大为会被所有人排斥的严重后果,属于灾难化思维,C正确;把他人的正常聊天注意力过度归因为是在讨论自己的缺点,属于个人化,D正确;只关注自己社交中的负面表现,忽略正面反馈,属于选择性概括,E正确。", "num": 6}, {"q": "求助者,女,58岁,退休教师,近1年记忆力明显下降,经常忘记刚放好的物品,出门买东西偶尔找不到回家的路,情绪低落不爱出门,到三甲医院检查未发现脑部器质性病变。根据老年心理发展特点,该求助者的症状可能属于?", "o": ["正常老年认知老化", "抑郁性假性痴呆", "阿尔茨海默病", "血管性痴呆", "分离性遗忘"], "a": [0, 1], "e": "正常老年认知老化可出现轻度记忆下降,部分老人可能出现短暂的定向不佳,因此A可选;抑郁情绪引发的抑郁性假性痴呆可表现出类似认知下降的症状,且无器质性病变,符合题干描述,B正确;阿尔茨海默病属于中枢神经系统退行性病变,存在脑部器质性改变,题干未提及相关证据,C错误;血管性痴呆由脑血管病变引发,存在器质性病变基础,题干无相关证据,D错误;分离性遗忘多和创伤性事件相关,题干无创伤史,不符合,E错误。", "num": 7}, {"q": "求助者,女,22岁,大学生,在一次课堂发言时出现大脑空白后,之后每次当众发言都会心跳加速、手抖出汗,逐渐开始回避所有需要当众发言的课程,成绩因此下滑。以下哪些心理咨询干预方法适合该求助者?", "o": ["系统脱敏疗法", "认知重评技术", "暴露疗法", "药物治疗", "阳性强化法"], "a": [0, 1, 2], "e": "系统脱敏疗法可以逐步降低求助者对当众发言的焦虑反应,适合社交焦虑的干预,A正确;认知重评可以纠正求助者“我一定会出丑被同学嘲笑”的负面认知偏差,B正确;暴露疗法通过让求助者直接面对恐惧的发言场景,快速消退焦虑反应,适合该案例,C正确;药物治疗属于医疗干预范畴,不属于心理咨询干预方法,D错误;阳性强化法主要用于行为塑造培养新行为,不符合社交焦虑干预的核心目标,E错误。", "num": 8}, {"q": "求助者,男,40岁,企业高管,近半年工作倦怠明显,对工作失去热情,经常感到疲惫,很少和同事家人外出,自述“每天都是重复劳动,没有任何意义”。根据积极心理学PERMA模型,以下哪些干预措施符合该模型的要求,可以改善其状态?", "o": ["协助求助者识别自身优势,参与公益志愿活动", "指导求助者每天记录3件生活中让自己感到开心的小事", "建议求助者每天增加2小时高强度训练缓解压力", "鼓励求助者每周和老朋友聚餐一次,重建社交联结", "建议求助者跳槽去薪资更高的企业"], "a": [0, 1, 3], "e": "积极心理学PERMA模型的五个核心维度是:积极情绪、投入、人际关系、意义、成就。协助求助者参与公益活动可以提升人生意义感,同时拓展人际关系,A正确;每天记录开心小事可以提升积极情绪,符合模型要求,B正确;建立稳定的社交联结对应PERMA的人际关系维度,D正确;高强度运动不属于PERMA模型的核心干预维度,C错误;更换高薪工作没有解决职业倦怠核心的意义缺失、人际关系疏离等问题,不符合模型要求,E错误。", "num": 9}, {"q": "求助者,女,30岁,全职妈妈,孩子2岁,近半年频繁出现情绪失控,打骂孩子后又极度后悔,经常自责“我不是一个合格的妈妈”,同时出现入睡困难、食欲下降,对以前喜欢的事情都提不起兴趣。以下哪些属于该求助者可能的诊断方向?", "o": ["产后抑郁障碍", "适应障碍", "人格障碍", "广泛性焦虑障碍", "抑郁发作"], "a": [0, 1, 4], "e": "产后抑郁障碍可发生于产后数年,核心症状为情绪低落、自责、情绪失控,符合该求助者的表现,A正确;求助者面临长期育儿这一明确的应激性生活事件,出现适应不良的情绪行为反应,符合适应障碍的特征,B正确;抑郁发作的核心症状为情绪低落、兴趣减退、自责自罪,符合求助者的表现,E正确;人格障碍是长期稳定的异常行为模式,该求助者为产后急性起病,和育儿应激相关,不符合人格障碍的特征,C错误;广泛性焦虑障碍的核心是持续的无明确对象的焦虑,该求助者核心症状为自责、情绪低落,不符合广泛性焦虑障碍的核心表现,D错误。", "num": 10}, {"q": "求助者,男,25岁,经历严重车祸后3个月,反复在睡梦中做噩梦梦到车祸发生场景,不敢靠近马路,睡眠中非常容易惊醒,白天注意力无法集中,明知自己的反应过度但无法控制。以下哪些属于创伤后应激障碍的核心症状?", "o": ["闯入性回忆", "回避与创伤相关的场景", "持续性负性认知", "过度警觉", "分离症状"], "a": [0, 1, 2, 3], "e": "创伤后应激障碍(PTSD)的四大核心症状为:闯入性回忆(包括创伤相关的噩梦)、对创伤相关场景的回避、持续性的负性认知情绪、过度警觉。本题中噩梦属于闯入性回忆,A正确;不敢靠近马路属于回避创伤场景,B正确;PTSD核心症状包含持续性负性认知,C正确;容易惊醒属于过度警觉,D正确;分离症状不属于PTSD的核心症状,仅为部分患者可能出现的伴随症状,E错误。", "num": 11}, {"q": "求助者,女,35岁,教师,近1年反复出门后出现“门没锁好”的想法,无法控制地反复折返检查门锁,每次检查都要按固定顺序确认三次才放心,整个过程需要十分钟以上,明明知道没必要但控制不住,经常因此迟到。以下哪些属于该求助者的强迫行为类型?", "o": ["强迫检查", "强迫清洗", "强迫仪式动作", "强迫计数", "强迫询问"], "a": [0, 2], "e": "强迫检查指反复检查自身担心出错的行为,本题中反复检查门锁符合该特征,A正确;强迫仪式动作指按照固定的程序化顺序重复完成的行为,本题中按固定顺序确认三次锁门属于典型的强迫仪式动作,C正确;强迫清洗指反复清洗消毒,不符合本题场景,B错误;强迫计数指不由自主地计数特定物品,本题中确认次数是仪式动作的一部分,核心表现不是强迫计数,D错误;强迫询问指反复询问他人确认自己的行为,不符合本题,E错误。", "num": 12}, {"q": "求助者,男,50岁,冠心病支架术后1年,近期经常焦虑担心支架会出问题,疾病会复发,不敢出门散步,睡眠差,医生评估心脏功能恢复良好,符合出院运动标准。从健康心理学视角来看,适合的干预措施包括?", "o": ["认知重评纠正“支架随时会出问题”的灾难化思维", "强制要求每天进行2小时高强度运动促进康复", "指导进行腹式呼吸放松训练缓解焦虑情绪", "限制所有日常活动避免心脏负担", "鼓励求助者参与冠心病术后康复互助小组"], "a": [0, 2, 4], "e": "认知重评可以纠正求助者的灾难化负面认知,改善焦虑情绪,A正确;高强度运动不符合冠心病术后康复的要求,会增加心脏负担,B错误;放松训练可以有效缓解焦虑情绪,适合该案例,C正确;限制所有日常活动会加重焦虑情绪,不利于心脏康复,D错误;康复互助小组可以为求助者提供社会支持,帮助调整心态,E正确。", "num": 13}, {"q": "求助者,女,28岁,初产妇,孕32周,近1个月经常担心胎儿发育不正常,害怕顺产疼痛,经常失眠、食欲下降,自知反应过度但无法调整。以下哪些属于该孕妇常见的心理应激源?", "o": ["对胎儿健康的过度担忧", "对分娩疼痛的恐惧", "即将转变为母亲的身份转变压力", "家庭经济压力", "孕期激素水平变化"], "a": [0, 1, 2, 4], "e": "胎儿健康担忧、分娩恐惧、母亲身份转变压力、孕期激素水平变化均为初产妇常见的心理应激源,本题中均有相关体现,因此A、B、C、E正确;本案例未提及存在家庭经济压力相关应激,因此D不选。", "num": 14}, {"q": "求助者,男,10岁,小学四年级学生,上课无法集中注意力听课,经常玩文具转笔,忍不住打断老师讲课,和同学相处时经常因为小事发生冲突打架,学习成绩比上学期明显下滑。本案例中体现了哪些注意缺陷多动障碍(ADHD)的核心症状?", "o": ["注意力不集中", "多动冲动", "品行障碍", "学习困难", "情绪低落"], "a": [0, 1], "e": "注意缺陷多动障碍的核心症状为注意力不集中和多动冲动,本题中上课无法专心、打断老师符合核心症状,因此A、B正确;品行障碍属于注意缺陷多动障碍常见的共病,并非核心症状,C错误;学习困难是注意力缺陷引发的继发症状,并非核心症状,D错误;情绪低落属于常见伴随症状,并非核心症状,E错误。", "num": 15}, {"q": "以下关于阿尔茨海默病的临床典型表现,描述正确的有哪些?", "o": ["患者的记忆力会呈现进行性减退的趋势", "会逐渐出现全方面的认知功能衰退", "多数可查见脑萎缩等脑器质性病变的证据", "常伴随情绪不稳定、行为冲动等情绪行为异常", "核心症状是意识清晰状态下出现身份分离症状"], "a": [0, 1, 2, 3], "e": "阿尔茨海默病(AD)属于脑器质性精神障碍,核心典型表现包括进行性加重的记忆力减退、全面认知功能下降,存在脑萎缩等器质性病变证据,多数患者会伴随情绪行为异常,因此ABCD正确。意识清晰下的分离症状是分离障碍的典型表现,不属于阿尔茨海默病的典型症状,因此E错误。", "num": 16}, {"q": "某男性,35岁,有8年饮酒史,近2年每日必须饮用高度白酒8两以上,不饮酒则浑身不适,以下属于酒精依赖综合征核心特征的有哪些?", "o": ["对酒精的耐受性不断增加,需要饮用更多酒才能达到原有感受", "停止饮酒后会出现手抖、心慌、出汗等戒断症状", "明知饮酒有害但完全无法控制自身的饮酒行为", "因为长期饮酒已经无法正常完成工作,社会功能受损", "突然断酒后出现短暂性意识模糊、幻视等意识障碍"], "a": [0, 1, 2], "e": "酒精依赖综合征的核心特征包括三点:耐受性增加、戒断症状、无法控制饮酒行为,因此ABC正确。社会功能受损是酒精依赖带来的继发结果,不属于核心特征;短暂性意识障碍是震颤谵妄的表现,也不是酒精依赖的核心特征,因此DE错误。", "num": 17}, {"q": "某女性,29岁,全职宝妈,近半年总觉得生活没有价值,情绪低落,抱怨家人不够关心自己,从积极心理学视角出发,适合采用的干预措施包括?", "o": ["指导求助者每日记录3件当天值得感恩的小事", "帮助求助者发现自身核心优势,在日常生活中主动运用", "鼓励求助者安排固定的休闲娱乐时间,做自己喜欢的事", "要求求助者必须尽快外出工作,脱离家庭环境改变状态", "指导求助者通过认知重评纠正自动负性思维"], "a": [0, 1, 2], "e": "积极心理学的常见干预中,感恩记录可以提升个体积极情绪,优势使用能够提升个体自我价值感,增加休闲娱乐可以改善低落情绪,因此ABC正确。强制求助者外出工作违反心理咨询伦理,不属于合理干预;认知重评是认知行为疗法的技术,不属于积极心理学核心干预技术,因此DE错误。", "num": 18}, {"q": "某大学生,女,21岁,在小区散步时看到老人不小心摔倒,主动上前搀扶并联系家属,认为帮助有需要的人是自己应该做的,不期待任何回报。根据社会心理学利他行为理论,该行为符合哪些描述?", "o": ["纯粹利他行为", "利己性利他行为", "互惠性利他行为", "亲社会行为", "应急性利他行为"], "a": [0, 3], "e": "纯粹利他是指出于内在道德准则实施帮助,不期待任何外部回报,符合题干中求助者的行为特征;亲社会行为泛指一切有益于他人和社会的行为,该行为符合亲社会行为的定义,因此AD正确。利己性利他期待获得即时回报,互惠性利他期待未来获得对方回报,均不符合题干;应急性利他发生在突发紧急危险场景,题干属于日常场景,因此BCE错误。", "num": 19}, {"q": "某男性,52岁,原发性高血压患者,近期因为工作压力大情绪烦躁易怒,导致血压控制不佳,波动明显,从健康心理学视角出发,适合的干预措施包括?", "o": ["学习渐进式肌肉放松训练,调节情绪波动", "通过认知重评纠正“所有事都必须做到完美”的不合理愤怒思维", "强制要求患者加大降压药服用剂量", "鼓励患者每周规律参与适度的慢跑、游泳等体育锻炼", "告知患者情绪不影响血压,只需要专注吃药就可以"], "a": [0, 1, 3], "e": "对于高血压患者的心理干预,放松训练可以有效调节情绪,稳定血压;认知重评能够纠正不合理的负性思维,减少情绪冲动;适度体育锻炼可以帮助调整身心状态,稳定血压,因此ABD正确。咨询师无权强制来访者调整用药剂量,违反职业伦理;忽略情绪问题对血压的影响,不利于血压控制,因此CE错误。", "num": 20}, {"q": "某男生,19岁,大学生,因为舍友在宿舍公放音乐严重影响自己休息,和舍友发生口角后情绪愤怒,动手将舍友打伤,事后非常后悔但承认当时就是忍不住想报复对方。根据社会心理学侵犯行为理论,该行为符合哪些分类?", "o": ["敌意性侵犯", "工具性侵犯", "主动性侵犯", "被动性侵犯", "生理性侵犯"], "a": [0, 2], "e": "敌意性侵犯是指出于愤怒、报复等情绪目的实施的侵犯,该行为核心是愤怒报复,符合敌意性侵犯;该侵犯行为由来访者主动发起,符合主动性侵犯的定义,因此AC正确。工具性侵犯是指以侵犯为手段达到其他目的,不是为了报复本身,不符合题干;被动性侵犯是指被动反击对方的侵犯,不符合该案例;生理性侵犯强调生理驱动,不符合题干情绪驱动的特征,因此BDE错误。", "num": 21}, {"q": "某男童,2岁10个月,只会说简单的单字,无法说出完整的主谓句,和其他同龄小朋友交流时存在明显障碍,到医院检查排除了器质性病变。根据幼儿语言发展的相关知识,该男童可能的情况包括?", "o": ["语言发育迟缓", "正常的语言发育延迟", "先天性听力障碍", "中度智力发育障碍", "孤独症谱系障碍"], "a": [0, 1], "e": "3岁左右儿童已经能够说出完整句子,该男童语言能力明显落后于同龄儿童,符合语言发育迟缓的诊断;部分儿童会出现轻微的语言发育波动,属于正常的语言延迟,因此AB正确。题干已经明确排除器质性病变,听力障碍属于器质性病变,智力障碍、孤独症谱系障碍都会伴随其他典型的异常症状,题干未提及,因此CDE错误。", "num": 22}, {"q": "某男性,68岁,退休教师,近一年来变得不愿接受新的生活理念,更习惯按照旧习惯生活,经常和晚辈讲自己年轻时的经历,觉得现在的生活不如过去舒服,不愿意主动参加新的社交活动,以自我感受为先安排生活。根据老年期人格发展的特点,以下属于正常老年人格变化的有哪些?", "o": ["变得固执保守", "存在怀旧倾向", "社交活动减少", "自我中心倾向", "情绪稳定性明显下降"], "a": [0, 1, 2, 3], "e": "老年期正常的人格变化包括固执保守、怀旧倾向、社交活动主动减少、自我中心倾向,因此ABCD正确。情绪稳定性明显下降属于病理性的人格改变,不属于正常老化带来的人格变化,因此E错误。", "num": 23}, {"q": "某女性,42岁,慢性偏头痛患者,疼痛已经持续8个月,因为长期疼痛经常焦虑不安,总觉得“这个疼痛这辈子都好不了了”,从健康心理学视角出发,适合的干预措施包括?", "o": ["通过认知重评纠正“疼痛永远无法治愈”的灾难化思维", "强制要求患者每天进行长时间的高强度运动", "学习深呼吸放松训练,缓解疼痛伴随的焦虑情绪", "邀请患者加入慢性疼痛患者互助小组,获得社会支持", "建议患者忽略疼痛,专注工作转移注意力"], "a": [0, 2, 3], "e": "针对慢性疼痛患者的心理干预,认知重评可以纠正灾难化负性思维,放松训练可以缓解焦虑情绪,互助小组能够提供有效的社会支持,因此ACD正确。高强度运动会加重疼痛症状,不符合干预原则;忽略疼痛不处理不利于患者康复,因此BE错误。", "num": 24}, {"q": "某年轻运动员,男,25岁,每次公开比赛时,现场观众越多,他的发挥就越好,成绩比私下训练更好。根据社会心理学的社会促进理论,该现象的核心影响因素包括?", "o": ["当前任务的难度水平", "在场他人的性质类型", "个体当前的唤醒水平", "现场观众的群体规模", "个体的性格内向还是外向"], "a": [0, 1, 2], "e": "社会促进效应的核心影响因素包括任务难度、他人在场的类型、个体的唤醒水平,因此ABC正确。群体规模是群体其他效应的影响因素,不属于社会促进的核心影响因素;个体性格属于次要因素,不是核心影响因素,因此DE错误。", "num": 25}, {"q": "某女性,23岁,刚入职新公司,不适应新的工作节奏,近3个月出现情绪低落、焦虑失眠、工作效率下降的症状,4个月后症状自行缓解,符合适应障碍诊断的典型特征包括以下哪些?", "o": ["发病前存在明确的应激生活事件", "症状持续时间一般不超过6个月", "多数患者会出现社会功能受损的表现", "症状程度较轻的患者可自行缓解", "一般存在明确的器质性病变基础"], "a": [0, 1, 2, 3], "e": "ABCD", "num": 26}, {"q": "某女大学生,20岁,情绪波动非常大,经常因为一点小事就大发脾气,做事冲动风风火火,缺乏耐心,参加社团活动总是刚开始热情高涨,很快就因为不耐烦半途而废。根据人格心理学中气质类型的相关理论,以下描述正确的有哪些?", "o": ["该求助者的气质类型属于胆汁质", "对应的巴甫洛夫高级神经活动类型为强、不平衡型", "该求助者的气质类型属于多血质", "对应的巴甫洛夫高级神经活动类型为强、平衡、灵活型", "该求助者的气质类型属于抑郁质"], "a": [0, 1], "e": "胆汁质的典型特征是情绪冲动、精力旺盛、缺乏耐心,符合题干求助者的表现;巴甫洛夫的高级神经活动分类中,胆汁质对应强、不平衡的不可遏制型,因此AB正确。多血质虽然善于社交,但耐受性更好,不会轻易半途而废,对应强、平衡、灵活型,不符合题干表现;抑郁质以敏感、内向、脆弱为核心特征,不符合题干,因此CDE错误。", "num": 27}, {"q": "某男性,28岁,设计师,原本认为“不按时下班就是工作效率低”,进入新公司后整个团队都有加班的文化,为了融入团队,他逐渐改变了原有观点,最终接受了“不同行业工作节奏不同,加班是项目制工作的正常环节”的稳定观点。根据社会心理学态度改变的阶段理论,该求助者的态度改变过程包含哪些阶段?", "o": ["依从", "认同", "内化", "服从", "从众"], "a": [1, 2], "e": "认同指个体为融入群体主动调整自身态度,符合题干中求助者为融入新团队主动改变认知的表现,B正确;内化指将新观点纳入自身态度体系,形成稳定的态度,符合题干最终稳定接受新观点的结果,C正确;依从仅为表面顺从,内心仍然保留原有分歧,不符合题干最终形成稳定态度的结果;服从需要有权威的指令要求,题干中没有权威强制要求;从众仅为表面跟随群体行为,没有形成稳定的内在态度改变,不符合题干最终内化的结果,因此ADE错误。", "num": 28}, {"q": "某男性,48岁,医生,近3年出现明显的职业倦怠,对出诊查房失去热情,认为自己的工作“治不好病,没有任何价值”,伴随失眠、食欲下降,无法正常完成门诊工作。根据埃里克森的心理社会发展理论,该求助者面临的核心冲突及相关问题包括?", "o": ["繁殖对停滞的中年期核心冲突", "职业认同危机", "亲密对孤独的成年早期核心冲突", "自我整合对绝望的老年期核心冲突", "亲密关系冲突"], "a": [0, 1], "e": "埃里克森的心理社会发展理论中,中年期的核心冲突是繁殖对停滞,该求助者处于中年阶段,对工作失去意义感,符合停滞的状态,因此A正确;职业认同危机指个体对自身职业角色产生怀疑,找不到职业价值,符合该求助者职业倦怠的表现,因此B正确。C选项是成年早期的冲突,D选项是老年期的冲突,年龄阶段不匹配;题干未提及亲密关系冲突,因此CDE错误。", "num": 29}, {"q": "某互联网公司技术主管,男,38岁,长期认为“三十岁以上的技术人员都学习能力差,跟不上技术迭代”,即使遇到能力优秀的三十岁以上求职者,仍然坚持该观点,拒绝录用该群体。根据社会心理学的偏见相关理论,该主管的认知属于哪些范畴?", "o": ["刻板印象", "偏见态度", "歧视行为", "首因效应", "近因效应"], "a": [0, 1], "e": "刻板印象指对某一特定群体形成固定、概括性的看法,无视个体差异,符合题干中对三十岁以上技术群体的固定认知,A正确;偏见指对特定群体的负面评价与不公平态度,符合题干中的错误认知倾向,B正确;歧视指基于偏见产生的实际行为,题干仅描述了认知与态度层面,未体现实际行为;首因效应、近因效应属于单次人际知觉的偏差,不符合针对整个群体的刻板印象特征,因此C、D、E错误。", "num": 30}, {"q": "求助者,女,29岁,已婚育有一女,和公公婆婆共同居住,家中大小事务均由婆婆做主,丈夫凡事都听从婆婆安排,求助者多次因为孩子教育、家庭开支和婆婆发生矛盾,丈夫每次都躲出去不肯出面协调。根据家庭系统理论,该家庭存在的问题包括?", "o": ["三角缠关系模式", "家庭边界模糊不清", "家庭权力结构失衡", "代际联盟关系异常", "亲子关系冲突"], "a": [0, 1, 2, 3], "e": "家庭系统理论中,三角缠指第三方介入小家庭的核心冲突,本案中丈夫的退缩回避形成三方纠缠的关系模式,A正确;公婆介入小家庭日常事务,属于家庭边界模糊,B正确;婆婆主导所有家庭事务,体现权力结构失衡,C正确;丈夫站在婆婆一边形成排斥求助者的联盟,属于联盟关系异常,D正确;题干未提及亲子冲突,E错误。", "num": 31}, {"q": "求助者,男,38岁,近半年总觉得胸部闷痛、腹胀,多次到三甲医院做CT、胃肠镜等全面检查,未查出任何器质性病变,但仍然坚信自己得了不治之症,反复要求做进一步检查,明知没有问题却控制不住担忧。以下属于该求助者可能的诊断方向的是?", "o": ["躯体形式障碍", "疑病障碍", "广泛性焦虑障碍", "强迫障碍", "躁狂发作"], "a": [0, 1], "e": "躯体形式障碍包含无器质性基础的躯体不适症状,疑病障碍是躯体形式障碍的核心亚型,以持续坚信患重病的表现为核心特征,符合题干描述,A、B正确;广泛性焦虑以无明确对象的持续焦虑为核心,没有坚信患病的核心表现,C错误;强迫障碍以反复出现的强迫思维或强迫行为为核心,不符合题干核心症状,D错误;躁狂发作以情感高涨、思维奔逸为核心,题干未提及相关表现,E错误。", "num": 32}, {"q": "求助者,男,24岁,刚入职的新媒体运营,因为选题出错被主管批评后产生挫败低落情绪,随后主动加班修改内容,最终选题顺利通过获得好评。该案例体现的情绪功能包括?", "o": ["适应功能", "动机功能", "组织功能", "信号功能", "健康功能"], "a": [0, 1], "e": "适应功能指情绪帮助个体调整行为以适应环境变化,该求助者借助负性情绪调整行为完成工作任务,A正确;动机功能指情绪能够驱动个体产生目标行为,低落的挫败情绪推动其主动加班弥补错误,B正确;组织功能指情绪对认知活动的组织影响,题干未体现;信号功能指情绪传递人际信息,不符合题干描述;健康功能指情绪影响身心健康,题干未涉及相关内容,因此C、D、E错误。", "num": 33}, {"q": "求助者,女,62岁,冠心病患者,长期胸闷气短伴随焦虑情绪,坚信自己\"随时会心梗猝死\",不愿意配合医生进行康复训练。健康心理学视角下适合的干预措施包括 : ["症状的病程时长", "抑郁症状的严重程度", "是否存在自杀意念", "情绪低落的波动特征", "社会功能受损的程度"], "a": [0, 1, 3, 4], "e": "抑郁发作的病程要求为至少2周,持续性抑郁障碍要求病程至少2年(儿童青少年为1年),因此病程时长是核心差异点,A正确;抑郁发作的抑郁症状更典型、严重程度更高,持续性抑郁障碍症状更轻,B正确;抑郁发作的情绪低落常呈明显波动,持续性抑郁障碍的情绪低落持续存在、波动不明显,D正确;抑郁发作社会功能受损通常更明显,持续性抑郁障碍社会功能受损较轻,E正确;自杀意念在两类障碍中都可能出现,不属于核心鉴别差异点,C错误。", "num": 51}, {"q": "关于卡特尔提出的流体智力和晶体智力理论,下列说法正确的有?", "o": ["流体智力以先天的神经系统禀赋为基础,发展轨迹随年龄增长先上升后下降", "晶体智力主要依赖后天的学习和经验积累,成年后仍然可以保持提升", "流体智力一般在青少年期达到发展顶峰,成年之后逐渐衰退", "晶体智力的发展水平和个体接受的教育、积累的生活经验密切相关", "流体智力和晶体智力的发展轨迹完全一致"], "a": [0, 1, 2, 3], "e": "流体智力依赖于先天的神经生理发展,随年龄增长先升后降,一般在青少年期达到顶峰,成年后逐渐衰退;晶体智力依赖于后天学习和经验积累,成年后仍然可以不断提升,发展轨迹和流体智力差异明显,因此E错误,ABCD均符合卡特尔的理论描述。", "num": 52}, {"q": "下列选项中,属于影响个体利他行为发生的情境因素的有?", "o": ["求助者和助人者的性格、成长背景相似程度", "现场旁观者的数量以及旁观者的行为表现", "求助情境的清晰可辨程度", "助人者当前的情绪状态好坏", "助人者当前可支配的时间紧张程度"], "a": [0, 1, 2, 4], "e": "利他行为的影响因素中,情境因素包括求助者与助人者的相似性、旁观者效应(旁观者人数与行为影响)、情境清晰度、助人者的时间压力等,因此A、B、C、E正确;个体自身的情绪状态属于助人者的个人特质因素,不属于情境因素,因此D错误。", "num": 53}, {"q": "根据心理咨询的职业伦理规范,下列属于保密原则例外情况的有?", "o": ["求助者明确告知咨询师自己准备三日后实施自杀,且已经购买了药物", "求助者说自己准备次日伤害长期霸凌自己的同事,且已经准备好工具", "求助者签署书面同意书,允许咨询师将自己的案例用于督导教学", "咨询师在咨询中发现求助者患有严重的未确诊的肺癌", "公安机关办理刑事案件,依法要求咨询师提供求助者的相关咨询记录"], "a": [0, 1, 2, 4], "e": "心理咨询保密原则的例外情况包括:求助者存在明确的自杀、伤人风险,经求助者书面同意披露咨询信息,法定机关依法要求披露信息。严重的躯体疾病本身不属于保密例外的范畴,咨询师需要鼓励求助者自行告知家属,但不能违反保密原则披露信息,因此D错误,ABCE均符合保密例外的要求。", "num": 54}, {"q": "下列选项中,属于积极心理学专属的临床干预技术的有?", "o": ["感恩拜访练习", "三件好事记录练习", "优势识别与运用练习", "正念减压疗法", "认知行为重构技术"], "a": [0, 1, 2], "e": "感恩拜访、三件好事记录、优势识别与运用都是积极心理学独创的专属干预技术,因此ABC正确;正念减压疗法属于传统正念干预体系,认知行为重构属于经典认知行为疗法的技术,二者都不是积极心理学专属的干预技术,因此DE错误。", "num": 55}, {"q": "求助者,女,28岁,市场策划,近期连续三个项目提案都没有通过,她将自己的失败归因为\"最近大环境经济不好,客户都砍了营销预算\",同时认为其他同事通过提案都是\"刚好走了狗屎运,遇到老板心情好\"。根据韦纳的归因理论,该求助者的归因包含以下哪些维度?", "o": ["外部归因", "稳定归因", "不稳定归因", "内部归因", "可控归因"], "a": [0, 2], "e": "韦纳归因理论中,大环境、运气都属于外部因素,因此该求助者的归因属于外部归因,A正确,D错误;大环境属于稳定因素,运气属于不稳定因素,该求助者的归因同时包含不稳定维度,因此C正确,B错误;大环境和运气都属于不可控因素,因此E错误。", "num": 56}, {"q": "求助者,男,25岁,新媒体运营,性格外向喜欢结交朋友,日常社交活动很多,情绪很容易受小事影响波动,经常因为工作不顺心焦虑失眠,做事认真细节控,对接工作从不敷衍出错。结合艾森克人格三维度理论与大五人格理论,下列描述正确的有?", "o": ["艾森克外倾性维度得分较高", "大五人格外向性维度得分较高", "艾森克神经质维度得分较高", "大五人格神经质维度得分较高", "大五人格尽责性维度得分较高"], "a": [0, 1, 2, 3, 4], "e": "艾森克理论中外倾性高分对应外向爱社交的特征,符合题干描述,A正确;大五人格中外向性高分同样对应外向爱社交的特征,B正确;艾森克神经质维度高分对应情绪不稳定、容易焦虑波动,符合题干描述,C正确;大五人格神经质维度高分对应情绪不稳定,符合题干,D正确;大五人格尽责性高分对应做事严谨细致、责任心强,符合题干描述,E正确。", "num": 57}, {"q": "求助者,女,29岁,全职妈妈,孩子1岁半,近半年频繁忍不住对孩子发脾气,甚至动手打孩子之后又极度愧疚,总说\"我不是一个合格的妈妈\",伴随入睡困难、食欲下降,对什么都提不起兴趣。作为心理咨询师,适合的干预方向包括?", "o": ["教授情绪调节的实用训练方法", "通过认知重评纠正过度自责的负性思维", "直接指出打骂孩子的错误并批评求助者", "鼓励求助者主动向家人寻求支持帮助", "为求助者开具抗抑郁药物进行治疗"], "a": [0, 1, 3], "e": "情绪调节训练可以帮助求助者控制情绪冲动,改善情绪失控问题,A正确;认知重评可以纠正求助者\"我不是合格妈妈\"的过度自责思维,B正确;鼓励求助者寻求家庭支持可以缓解独自带娃的压力,D正确;直接批评求助者违反咨询伦理,会破坏咨询关系,C错误;开具药物属于精神科医师的工作范畴,不属于心理咨询师的干预内容,E错误。", "num": 58}, {"q": "求助者,男,50岁,原发性高血压患者,近期因为职位调整情绪烦躁易怒,经常控制不住发脾气,导致血压波动明显,控制不佳。从健康心理学视角来看,适合的干预措施包括?", "o": ["教授渐进式肌肉放松训练调节情绪", "认知重评纠正容易引发愤怒的不合理思维", "强制要求求助者加大降压药的服用剂量", "鼓励求助者保持规律的慢跑等体育锻炼", "告诉求助者情绪不影响血压,只要吃药就可以"], "a": [0, 1, 3], "e": "放松训练可以帮助调节情绪,进而稳定血压,A正确;认知重评可以纠正引发愤怒的不合理思维,减少情绪波动对血压的影响,B正确;规律体育锻炼可以帮助调节情绪、控制血压,D正确;强制要求调整药物剂量违反咨询伦理,药物调整需要由内科医师操作,C错误;忽略情绪问题对血压的影响,不利于血压的长期控制,E错误。", "num": 59}, {"q": "某高校心理系课题组开展人格特质相关研究,采用经典大五人格(五因素模型)进行人格测评,下列选项属于该模型标准核心维度的有:", "o": ["经验开放性", "冲动性", "外向性", "宜人性", "神经质"], "a": [0, 2, 3, 4], "e": "大五人格五因素模型的五个核心维度为经验开放性、尽责性、外向性、宜人性、神经质,缩写为OCEAN;冲动性不属于该模型的标准核心维度,因此B选项错误。", "num": 60}, {"q": "求助者,男,35岁,程序员,近1年反复出现手机被监听的想法,无法控制地反复检查手机、更换手机号,明知没必要但无法停止,已经影响了日常工作。该表现属于哪种强迫思维类型?", "o": ["强迫怀疑", "强迫性穷思竭虑", "强迫联想", "强迫表象", "强迫意向"], "a": 0, "e": "强迫怀疑指反复对自身所处环境或行为的安全性产生不必要的怀疑,符合题干中反复怀疑手机被监听的表现,A正确;强迫性穷思竭虑指反复思考无意义的问题,不符合本题场景,B错误;强迫联想指看到某一观念就不由自主联想到相反的观念,不符合本题,C错误;强迫表象指头脑中反复出现特定的形象内容,不符合本题,D错误;强迫意向指反复出现想要做某种违背意愿的动作的冲动,不符合本题,E错误。", "num": 1}]}, {"chapter": "初级-A3 · 案例分析", "questions": [{"q": "根据案例描述,对该求助者的初步诊断最可能是:", "o": ["一般心理问题", "惊恐发作", "神经症性心理问题", "精神病性障碍", "适应障碍"], "a": 0, "e": "该求助者症状由明确的现实工作应激事件引发,持续时间1个半月,情绪未出现泛化,社会功能仅轻度受损,符合一般心理问题的诊断标准。B惊恐发作以突发强烈濒死感、呼吸困难为核心表现,不符合;C神经症性问题的核心是内心冲突变形,与现实处境无关,不符合;D该求助者无精神病性症状,排除;E适应障碍需要应激事件后1个月内起病,病程超过3个月,不符合;F创伤后应激障碍需经历重大创伤性事件,伴随闪回、回避等症状,不符合。", "num": 1}, {"q": "为鉴别该求助者的问题属于一般心理问题还是严重心理问题,咨询师最需要重点核实的内容是?", "o": ["求助者的身高体重变化", "求助者的情绪反应是否出现泛化", "求助者的睡眠质量变化情况", "求助者的既往考试成绩", "求助者的爱好类型"], "a": 1, "e": "一般心理问题和严重心理问题的核心鉴别要点是:一般心理问题情绪反应未泛化,严重心理问题情绪反应已经泛化,因此最需要重点核实的就是情绪是否泛化。其余选项均和二者的鉴别无关,因此正确答案为B。", "num": 2}, {"q": "对该求助者进行初诊接待时,咨询师首先应该完成的工作是?", "o": ["直接询问求职失利的具体细节", "礼貌接待,介绍心理咨询的基本设置和保密原则", "直接给求助者修改简历的建议", "要求求助者立即完成全套人格测验", "评价求助者求职方向选择的合理性"], "a": 1, "e": "初诊接待的首要工作是礼貌接待求助者,清晰告知咨询的基本设置与保密原则,建立安全信任的咨询氛围。A直接询问细节不符合初诊接待流程,C未收集完整资料不能提前给出建议,D初诊不需要立即要求完成测验,E、F都违背了尊重和倾听的基本要求,因此正确答案为B。", "num": 3}, {"q": "该求助者的主诉核心是?", "o": ["和班主任发生矛盾", "不愿正常上学,存在社交回避", "食欲下降", "在家熬夜刷短视频", "出现幻视"], "a": 1, "e": "求助者的主诉核心是求助者最主要的困扰,本案中最主要的问题是不愿正常上学、回避学校社交,其余选项要么未提及,要么是伴随症状,因此正确答案为B。", "num": 4}, {"q": "咨询师在对该求助者进行初诊接待时,下列做法正确的是?", "o": ["直接建议求助者辞去工作专心照顾孩子", "专注倾听求助者表达,不随意打断其叙述", "要求求助者第一时间完成所有心理测评量表", "指出求助者不会平衡生活和工作的问题所在", "忽略求助者的情绪感受直接收集资料"], "a": 1, "e": "初诊接待阶段咨询师最核心的要求是尊重和倾听,需要认真倾听求助者倾诉,不随意打断。选项A、D违背了心理咨询的尊重和不评判原则;选项C,初诊接待阶段先进行会谈收集信息,不需要直接要求立刻完成测验;选项E、F违背初诊接待的基本工作规范,因此正确答案为B。", "num": 5}, {"q": "若咨询师为该求助者选用抑郁自评量表(SDS)进行情绪评估,该测验的主要用途是?", "o": ["评估求助者抑郁症状的严重程度", "直接对求助者做出抑郁症诊断", "评估求助者焦虑症状的严重程度", "直接对求助者做出焦虑症诊断", "评估求助者的人格特质倾向"], "a": 0, "e": "抑郁自评量表SDS的核心用途是评估个体抑郁症状的严重程度,仅作为筛查和评估工具,不能直接用于诊断抑郁症,抑郁症的诊断需要结合临床访谈等综合评估,也无法用于评估焦虑、人格、智力等其他内容,因此B、C、D、E、F均错误,正确答案为A。", "num": 6}, {"q": "该求助者的核心心理问题是?", "o": ["不愿和同学一起游戏", "分离焦虑症状", "上课注意力无法集中", "上学哭闹的行为问题", "担心老师不喜欢自己"], "a": 1, "e": "该求助者核心问题是分离焦虑,即害怕与照料者(妈妈)分离,不愿上学、哭闹、注意力不集中、不愿社交都是分离焦虑引发的伴随症状,A、C、D是伴随表现而非核心问题,E题干未提及,F是求助方式,因此正确答案为B。", "num": 7}, {"q": "若咨询师需要评估该儿童的社交焦虑水平,选用儿童社交焦虑量表(CSAI),该量表的适用人群是?", "o": ["0-3岁婴幼儿", "6-12岁儿童", "18岁以上成年人群", "60岁以上老年人群", "仅适用于已经确诊社交障碍的儿童"], "a": 1, "e": "儿童社交焦虑量表(CSAI)的适用人群为6-12岁的儿童,用于评估该年龄段儿童的社交焦虑水平,并非仅适用于确诊社交障碍的儿童,也不适用于其他年龄段人群,因此A、C、D、E、F均错误,正确答案为B。", "num": 8}, {"q": "该求助者目前最主要的情绪症状是?", "o": ["莫名焦虑不安", "情绪低落", "恐惧害怕出门", "烦躁易怒", "兴奋话多"], "a": 1, "e": "题干中明确提及求助者核心情绪为孤独伴随情绪低落,其余选项的症状在案例中并未提及,因此正确答案为B。", "num": 9}, {"q": "咨询师为了鉴别该求助者的问题是否属于严重心理问题,最需要重点核实的信息是?", "o": ["求助者的情绪反应是否出现泛化", "子女是否计划回国探望", "老伴去世的具体原因", "求助者日常的饮食偏好", "求助者既往是否有精神病家族史"], "a": 0, "e": "严重心理问题的核心鉴别要点是情绪反应是否出现泛化,该求助者病程1个月,是否泛化是核心鉴别点。选项B、C、D、F都属于和诊断无关的信息,选项E既往史不属于严重心理问题诊断的核心鉴别项,因此正确答案为A。", "num": 10}, {"q": "该求助者的核心情绪症状是?", "o": ["人格解体", "焦虑恐惧", "情感淡漠", "烦躁易怒", "入睡困难"], "a": 1, "e": "本题考核焦虑情绪症状的识别。案例中求助者面对公开社交场景出现明显的躯体焦虑反应,核心情绪为对社交场景的焦虑恐惧,其余选项均未在案例中体现,因此正确答案为B。", "num": 11}, {"q": "根据该求助者的症状表现,最符合的初步评估是?", "o": ["精神分裂症", "进食障碍", "社交焦虑障碍", "抑郁发作", "特定恐怖症"], "a": 2, "e": "本题考核社交焦虑障碍的初步评估要点。该求助者症状持续3个月,在社交公开场景下出现明显焦虑反应并主动回避,社会功能受损,符合社交焦虑障碍的评估标准,其余选项不符合症状特征,因此正确答案为C。", "num": 12}, {"q": "若该求助者在咨询中透露有自杀相关的想法或计划,咨询师的正确处理方式是?", "o": ["严格遵守保密原则,不向任何人透露", "打破保密限制,通知其家属或学校心理危机干预部门", "立刻自行终止咨询并转介", "忽略该表述,继续当前咨询话题", "要求求助者签署不伤害自己的承诺书"], "a": 1, "e": "本题考核心理咨询保密例外的伦理规范。当求助者存在明确的自伤、自杀风险时,咨询师必须打破保密原则,通知相关责任方与专业部门保障求助者安全,其余选项均违背咨询伦理与危机干预规范,因此正确答案为B。", "num": 13}, {"q": "该求助者出现的躯体症状属于?", "o": ["心脏出现问题", "故意装病引起注意", "焦虑引发的躯体反应", "缺乏维生素D", "分离障碍"], "a": 2, "e": "本题考核焦虑引发的躯体症状识别。该求助者躯体症状仅在进入学校场景后出现,居家休息后可缓解,无器质性病变的证据,属于厌学相关焦虑情绪引发的躯体反应,其余选项均不符合案例表现,因此正确答案为C。", "num": 14}, {"q": "为鉴别该求助者的厌学问题是否属于严重心理问题,咨询师最需要重点核实的信息是?", "o": ["上学期间最喜欢哪门课程", "厌学情绪是否泛化至其他场景", "家长的教育方式是否存在问题", "同学关系紧张的具体原因", "成绩下滑的具体分数"], "a": 1, "e": "本题考核严重心理问题的核心鉴别要点。严重心理问题的核心诊断标准之一是负性情绪已经发生泛化,即情绪反应不再局限于初始刺激场景,因此需要重点核实厌学情绪是否泛化,其余选项仅为辅助参考信息,不属于核心鉴别项,因此正确答案为B。出处---严重心理问题的鉴别要点,心理诊断技能→初步诊断→严重心理问题的诊断,(掌握)", "num": 15}, {"q": "该求助者最适合的短期咨询目标是?", "o": ["彻底消除厌学情绪", "立刻恢复正常的上学行为", "改善与所有同学的关系", "缓解躯体不适症状", "解决所有家庭矛盾"], "a": 3, "e": "本题考核咨询目标的制定原则。有效的咨询目标需要具体、可实现、可评估,该求助者当前最突出的痛苦症状是头痛、恶心等躯体不适,缓解躯体不适属于具体可实现的短期咨询目标,其余选项均属于长期目标或超出咨询短期可实现范围,因此正确答案为D。", "num": 16}, {"q": "根据该求助者的症状表现,最符合的初步评估是?", "o": ["一般心理问题", "严重心理问题", "精神分裂", "人格解体", "适应障碍"], "a": 0, "e": "本题考核一般心理问题的诊断要点。该求助者的症状由现实婚姻冲突引发,病程1个月,情绪反应未泛化,社会功能仅轻度受损,符合一般心理问题的诊断标准,其余选项均不符合本案例表现,因此正确答案为A。", "num": 17}, {"q": "若咨询师建议该求助者与丈夫进行沟通,正确的沟通技巧是?", "o": ["使用 “你总是” 的指责式语言", "表达自己的感受而非指责对方", "要求丈夫立即改变行为", "忽略丈夫的辩解", "将问题归咎于丈夫的性格"], "a": 1, "e": "本题考核有效沟通的核心技巧。有效的非暴力沟通需要使用“我”语句表达自身感受,避免指责式语言,减少对方的防御心理,其余选项均会引发沟通冲突,达不到沟通目的,因此正确答案为B。", "num": 18}, {"q": "针对该婚姻困扰的求助者,咨询师制定咨询目标时应符合的核心要求是?", "o": ["咨询目标由咨询师最终确定", "咨询目标必须彻底解决婚姻矛盾", "咨询目标要具体可评估", "咨询目标要符合社会主流价值观", "咨询目标不需要和求助者协商"], "a": 2, "e": "本题考核咨询目标的制定原则。有效的咨询目标需要符合具体、可测量、可实现、双方商定、属于心理学范畴等要求,只有C选项符合核心要求,其余选项均违背咨询目标制定原则,因此正确答案为C。", "num": 19}, {"q": "若咨询师指导该求助者和丈夫进行有效沟通,正确的做法是?", "o": ["沟通时多使用“你从来都不做家务”这类表达强调问题", "先说自己的感受,再说出具体的诉求", "要求对方必须按照自己的要求改变", "沟通时如果对方辩解直接终止谈话", "把问题归因为对方性格不好,引发对方改变"], "a": 1, "e": "本题考核有效沟通的技巧。有效沟通需要先表达自身感受,再提出具体诉求,避免指责式归因,减少对方的防御,其余选项均会加剧沟通冲突,因此正确答案为B。", "num": 20}, {"q": "针对婚姻冲突的该求助者,最符合一般心理问题诊断要点的是?", "o": ["冲突由现实因素引发,病程不到2个月,情绪未泛化", "冲突由现实因素引发,病程超过2个月,情绪泛化", "冲突是非现实的,病程1个月,情绪未泛化", "冲突是变形的,社会功能严重受损", "已经出现精神病性症状"], "a": 0, "e": "本题考核一般心理问题的诊断要点。一般心理问题的核心诊断要点为:由现实因素引发,病程不超过2个月,情绪反应未泛化,社会功能轻度受损,只有A选项符合,因此正确答案为A。", "num": 21}, {"q": "该求助者问题的核心关键点包括:", "o": ["成绩下滑被通报批评的应激事件", "早醒、睡眠质量下降", "备课注意力不集中的认知症状", "容易易怒的情绪症状", "对瑜伽失去兴趣的行为症状"], "a": [0, 1, 2, 3, 4], "e": "引发心理问题的关键点包括核心诱发事件,以及伴随出现的躯体、认知、情绪、行为层面的症状,F职业身份仅为背景信息,与本次症状无直接关联,因此排除。", "num": 22}, {"q": "适合该求助者的心理测验工具包括:", "o": ["SAS焦虑自评量表", "SDS抑郁自评量表", "SCL-90症状自评量表", "MMPI明尼苏达多相人格测验(精神病性筛查版)", "Rorschach罗夏墨迹测验"], "a": [0, 1, 2], "e": "该求助者存在情绪、睡眠相关症状,SAS可评估焦虑程度,SDS可评估抑郁程度,SCL-90可全面评估整体心理症状水平,均适合本次评估使用。D用于筛查精神病性障碍,该求助者无相关提示,E属于投射测验,不用于该类一般心理问题的常规评估,F用于人格类型评估,不是本次评估的核心需求,因此排除。", "num": 24}, {"q": "针对该求助者制定心理咨询方案时,需要明确的核心内容包括:", "o": ["双方商定的具体咨询目标", "咨询的保密原则及例外情况", "每次咨询的时间安排", "咨询相关的费用标准", "求助者与咨询师各自的权利与义务"], "a": [0, 1, 2, 3, 4], "e": "正式心理咨询方案必须包含咨询目标、保密原则、时间安排、费用、双方权利义务这些核心内容,F咨询师的私人联系方式不属于咨询方案的必要内容,还会破坏专业咨询边界,因此排除。", "num": 25}, {"q": "咨询初期,咨询师需要向该求助者及家属明确的保密原则内容包括?", "o": ["所有咨询内容都必须绝对保密,不存在例外", "保密原则存在法定例外,比如求助者存在自伤、伤人风险时需突破保密", "无合法正当理由,咨询师不会随意泄露求助者的隐私", "求助者有权拒绝保密原则要求以外的信息披露", "咨询师可以和同行闲聊时讨论求助者的案例"], "a": [1, 2, 3], "e": "心理咨询的保密原则不是绝对的,存在法定的例外情形;无正当理由咨询师不得随意泄露求助者隐私,求助者有权拒绝非必要的信息披露,这都是保密原则需要明确的内容。A认为绝对保密无例外是错误的,E、F都违反了保密规范,因此排除。", "num": 26}, {"q": "该求助者目前存在的情感症状包括?", "o": ["情绪低落", "兴趣减退", "幻听", "自责", "闪回"], "a": [0, 1, 3], "e": "案例中明确提到求助者情绪低落、对爱好失去兴趣即兴趣减退、认为自己什么都做不好即自责,这些都属于情感症状。C幻听属于精神病性症状,E闪回是创伤后应激障碍的典型症状,F案例中明确提到无自伤自杀意念,因此均排除。", "num": 27}, {"q": "该求助者目前存在的社会功能受损表现包括?", "o": ["无法正常上学", "回避学校社交", "食欲减退", "整日在家独处不出门", "体重下降"], "a": [0, 1, 3], "e": "社会功能受损指个体无法正常完成原本的社会角色任务、出现社交退缩回避,本案中无法正常上学、回避社交、整日独处都属于社会功能受损的表现。C食欲减退、E体重下降属于躯体症状,F主动求助是积极行为,不属于社会功能受损,因此排除。", "num": 29}, {"q": "在和该求助者建立咨询关系的过程中,咨询师正确的做法包括?", "o": ["尊重求助者不想上学的感受", "热情接待求助者,让求助者感受到接纳", "随时表达自己对这件事的主观看法", "共情理解求助者面对成绩压力的焦虑情绪", "积极关注求助者主动求助的行为"], "a": [0, 1, 3, 4], "e": "建立良好咨询关系的核心要素包括尊重、热情、真诚、共情、积极关注。真诚不代表随意表达自己的主观判断,C错误;咨询师需要保持专业边界,不能替求助者解决具体的现实事务,F错误,其余选项均符合要求。", "num": 30}, {"q": "下列属于该求助者应激相关情绪症状的有?", "o": ["情绪烦躁", "容易发脾气", "照顾孩子与工作冲突", "对家务感到厌烦", "自行上网搜索情绪调节方法"], "a": [0, 1, 3], "e": "应激相关症状指应激事件引发的情绪、行为等症状,本题中情绪烦躁、易发脾气、对家务厌烦都属于应激引发的情绪相关症状。C是诱发应激的应激事件本身,不属于症状;E是求助者的自发行为,F是求助行为,均不属于应激相关症状,因此正确答案为ABD。", "num": 31}, {"q": "咨询师为该求助者收集临床资料时,需要重点收集的内容包括?", "o": ["求助者近期的睡眠饮食状况", "求助者可获得的家庭支持情况", "求助者日常工作的压力程度", "求助者既往是否出现过类似情绪问题", "求助者孩子的学校和班级信息"], "a": [0, 1, 2, 3], "e": "临床资料收集需要重点关注和求助者当前心理问题相关的核心信息,包括躯体状态(睡眠饮食)、社会支持系统、压力源、既往情绪史等,选项E、F属于和当前问题无关的次要补充信息,不属于重点收集内容,因此正确答案为ABCD。", "num": 32}, {"q": "下列属于规范心理咨询基本流程的选项有?", "o": ["明确求助者的核心心理问题", "和求助者共同制定咨询方案", "按照方案逐步开展咨询工作", "咨询结束阶段评估整体咨询效果", "咨询师直接告知求助者具体解决问题的方法"], "a": [0, 1, 2, 3], "e": "规范心理咨询的基本流程依次为:明确求助者的核心问题、共同制定咨询方案、实施咨询方案、评估咨询效果。咨询师的工作是帮助求助者获得成长,自己解决问题,不能直接替求助者做决策或者直接给出解决方法,选项E、F违背心理咨询的伦理和工作原则,因此正确答案为ABCD。", "num": 33}, {"q": "咨询师和该儿童求助者进行摄入性会谈时,可以采用的技巧包括?", "o": ["借助游戏玩具辅助开展沟通", "使用儿童可以理解的简单语言", "直接询问儿童的家庭隐私问题", "对儿童的表达给予积极正向反馈", "强迫儿童回答他不愿意回答的问题"], "a": [0, 1, 3], "e": "和儿童开展会谈需要适配儿童的认知特点,可使用游戏辅助沟通,用简单易懂的语言交流,及时给予儿童积极反馈。选项C直接询问隐私不尊重求助者,选项E强迫回答违背尊重原则,选项F专业术语儿童无法理解,因此C、E、F错误,正确答案为ABD。", "num": 34}, {"q": "该求助者存在的社会功能受损表现包括?", "o": ["无法正常到校上学", "不愿和同班同学玩耍", "上课注意力不集中,学习受影响", "不愿意按时完成家庭作业", "不愿意主动整理个人书包"], "a": [0, 1, 2], "e": "社会功能受损指个体无法完成正常的社会活动、学习等功能,该案例中无法正常上学、不愿社交、学习受影响都属于社会功能受损表现,D、E为未提及的无关内容,F为求助方式,不属于社会功能受损,因此正确答案为ABC。", "num": 35}, {"q": "咨询师和该儿童求助者建立咨询关系时,正确的做法包括?", "o": ["以平等的态度对待儿童求助者", "尊重儿童自身的感受和想法", "使用儿童能够理解的方式沟通", "关注儿童的安全感,给予足够的包容", "儿童哭闹时直接批评制止这种行为"], "a": [0, 1, 2, 3], "e": "和儿童求助者建立咨询关系,需要做到平等对待、尊重儿童感受、使用儿童可理解的沟通方式、给予儿童足够的安全感。直接批评儿童的哭闹行为、替儿童做所有决定都违背咨询关系建立的基本原则,因此E、F错误,正确答案为ABCD。", "num": 36}, {"q": "该求助者目前存在的社会功能受损表现包括?", "o": ["不再参与原有喜爱的老年合唱团活动", "日常独自在家,社交活动减少", "主动前来心理咨询求助", "入睡困难睡眠质量下降", "老伴去世突发变故"], "a": [0, 1], "e": "社会功能受损指个体无法完成原有的社会活动、出现社交退缩等,选项A不再参与社交活动、B社交减少都属于社会功能受损。C是求助行为,D是躯体症状,E、F是诱发心理问题的应激事件,均不属于社会功能受损表现,因此正确答案为AB。", "num": 37}, {"q": "咨询师和该老年求助者开展咨询时,正确的做法包括?", "o": ["适当放慢语速,保证表达清晰", "给予足够的耐心,预留充足的倾听时间", "使用简单易懂的口语化表达", "避免使用过于专业复杂的心理学术语", "为节省时间直接打断求助者的倾诉"], "a": [0, 1, 2, 3], "e": "针对老年求助者的咨询需要适配老年人的认知和反应节奏,应做到放慢语速、耐心倾听、使用简单语言、避免复杂专业术语。直接打断倾诉违背倾听原则,替求助者做决策违背咨询伦理,因此E、F错误,正确答案为ABCD。", "num": 38}, {"q": "在与该求助者进行咨询时,咨询师可采用的合理情绪疗法技术包括?", "o": ["与求助者共同商讨,挑战其“当众发言一定会出错出丑”的非理性信念", "运用合理情绪想象技术帮助求助者适应社交场景的焦虑", "布置认知家庭作业,让求助者日常记录自己的不合理信念", "运用阳性强化法强化求助者主动参与社交的行为", "运用系统脱敏疗法逐步降低求助者的社交焦虑水平"], "a": [0, 1, 2, 3, 4], "e": "本题考核合理情绪疗法的常用技术。合理情绪疗法的核心技术包括与不合理信念辩论、合理情绪想象技术、认知家庭作业,临床中也可辅助使用系统脱敏、阳性强化法缓解焦虑、强化适应性行为。自由联想属于精神分析疗法的技术,不属于合理情绪疗法的范畴,因此F选项错误,正确答案为ABCDE。", "num": 39}, {"q": "针对该青少年求助者的家庭咨询,咨询师应遵循的原则包括?", "o": ["聚焦家庭系统的互动模式", "关注家庭成员之间的沟通方式", "将问题归因于单个家庭成员", "鼓励家庭成员共同参与咨询", "替家长决定给孩子转学"], "a": [0, 1, 3], "e": "本题考核家庭心理咨询的基本原则。家庭咨询遵循系统观,需要聚焦家庭系统的互动模式,关注家庭成员的沟通方式,鼓励全体相关成员共同参与咨询,尊重每个家庭成员的个人感受;将问题归因于单个家庭成员违背系统家庭咨询的核心原则,替来访者做决策违背咨询伦理,因此C、E选项错误,正确答案为ABDF。", "num": 40}]}, {"chapter": "初级-多选题", "questions": [{"q": "求助者,男,26岁,互联网运营,近1个月因加班过度出现焦虑、注意力无法集中,主动前来心理咨询机构咨询。咨询师在初诊接待环节,以下哪种做法符合专业规范?", "o": ["直接开始询问求助者焦虑的具体表现,不提前说明咨询相关规则", "接待过程中专注倾听,主动向求助者明确说明保密原则及保密例外的情况", "为了节省时间,打断求助者的情绪倾诉,直接给出调整情绪的建议", "初次接待结束就要求求助者付清整个咨询疗程的全部费用", "不做任何书面记录,完全依靠自己的记忆留存会谈内容"], "a": 1, "e": "初诊接待的核心专业规范要求,首次会谈必须主动向求助者说明保密原则与保密例外,这是建立信任咨询关系的基础。A选项未提前说明规则,容易引发求助者的顾虑;C选项打断求助者表达会破坏咨询信任关系;D选项收取全部疗程费用应在咨询设置明确、求助者同意整个咨询方案后进行,不适合在初次接待要求;E选项不记录违背咨询规范,因此只有B符合要求。", "num": 2}, {"q": "求助者,女,38岁,私企部门主管,半年前母亲确诊阿尔茨海默症,2个月前儿子升学进入重点高中后适应不良频繁请假,近1个月出现持续心慌焦虑、夜间早醒、工作效率严重下降,多次体检未发现器质性异常。咨询师收集成长资料发现,求助者自幼被要求“必须照顾好家人、做好所有事情”,无法接受自己没能同时兼顾家庭和工作的现状。该求助者心理问题的关键点是?", "o": ["母亲确诊阿尔茨海默症需要照顾", "儿子升学适应不良的应激事件", "对“必须兼顾所有责任”的固有认知和无力兼顾的内在冲突", "工作效率严重下降", "心慌焦虑与早醒"], "a": 2, "e": "心理问题的关键点是指引发求助者心理行为问题的核心根源,贯穿整个问题发生发展的全过程。C选项是求助者的内在核心认知冲突,是问题产生的根本原因。A、B属于诱发问题的外部应激事件,D、E是问题引发的症状表现,均不是核心关键点,因此正确答案为C。", "num": 3}, {"q": "求助者,男,21岁,大二男生,近3周因为竞选学生会主席失败后,出现情绪低落、对社团活动提不起兴趣,轻度食欲不佳,偶尔入睡困难,但仍能正常上课、完成作业,和室友正常交往,情绪反应没有泛化,全身检查无器质性病变。该求助者最可能的评估是?", "o": ["严重心理问题", "一般心理问题", "精神病性障碍", "神经症性心理问题", "创伤后应激障碍"], "a": 1, "e": "一般心理问题的诊断标准为:由现实因素激发,持续时间1-2个月以内(本案例3周符合),情绪反应未泛化,社会功能轻度受损,无器质性病变基础,该求助者完全符合诊断标准。严重心理问题要求病程2个月以上、情绪泛化、社会功能受损明显;精神病性障碍存在精神病性症状;神经症性心理问题符合神经症的部分特点但病程不足;创伤后应激障碍需由异乎寻常的创伤性事件引发,情绪明显泛化,因此A、C、D、E均不符合。", "num": 4}, {"q": "咨询师在为求助者选择使用心理测验时,以下哪种做法符合心理咨询专业规范要求?", "o": ["为了降低咨询成本,使用未经过标准化的自编测验", "直接将心理测验的结果作为诊断的唯一依据", "根据求助者的具体问题与临床评估选择匹配的心理测验", "为了避免求助者隐瞒,不告知求助者测验的目的与要求", "为了提高咨询收入,要求求助者完成多个和问题无关的心理测验"], "a": 2, "e": "正确使用心理测验的专业规范要求:必须根据求助者的具体问题选择合适的标准化心理测验,明确告知求助者测验目的与要求,不滥用测验,且测验结果仅作为临床评估的辅助依据,不能作为唯一诊断依据。选项A、B、D、E均违背了心理测验使用的专业规范,因此正确答案为C。", "num": 6}, {"q": "求助者,女,36岁,医院护士,近2个月因医院科室调整出现持续情绪烦躁、头痛,主动前来咨询,咨询师已经收集到求助者的主诉、近期体检报告、和同事的交往情况等资料,以下哪项不属于一般临床资料整理的范畴?", "o": ["求助者的生育史与婚姻状况", "求助者的个人成长经历", "求助者每个月的消费金额", "求助者的亲友支持情况", "求助者既往的心理咨询经历"], "a": 2, "e": "一般临床资料整理的范畴包括:人口学资料、生活状况、婚姻家庭、成长经历、社会交往、工作记录、心理健康状况、既往病史咨询史、社会支持系统等。求助者个人的每月消费金额不属于需要整理的一般临床资料范畴,A、B、D、E均属于规范整理的内容,因此正确答案为C。", "num": 7}, {"q": "咨询师收集完求助者的全部临床资料后,需要对求助者的心理健康问题形成初步印象,以下哪项是形成初步印象的正确操作步骤?", "o": ["根据收集到的资料直接给出最终诊断结果", "先对求助者的问题进行归类,再结合临床资料分析问题的严重程度", "忽略躯体检查结果,只关注求助者的心理情绪症状", "直接用心理测验的结果代替临床评估与判断", "无需考虑求助者所处的社会文化背景,直接评估"], "a": 1, "e": "对求助者形成初步印象的正确步骤为:先对求助者的心理行为问题进行归类,再结合收集到的临床资料、心理测验结果分析问题的严重程度,最后结合求助者的社会文化背景做出初步判断。直接给出最终诊断、忽略躯体症状、用测验代替临床评估、不考虑社会文化背景都不符合专业规范,因此A、C、D、E均错误,正确答案为B。", "num": 8}, {"q": "求助者,女,29岁,销售,4个月前自己苦心跟进半年的大订单被同事抢走,之后出现情绪暴躁、经常和家人发脾气,已经辞去原来的工作,不愿和朋友联系,现在看到和抢单同事同名的人都会忍不住愤怒,全身检查没有器质性病变。该求助者最可能的评估是?", "o": ["一般心理问题", "严重心理问题", "精神病性障碍", "适应障碍", "广泛性焦虑障碍"], "a": 1, "e": "严重心理问题的诊断标准为:由强烈的现实应激事件引发,病程在2个月到半年之间,情绪反应出现泛化,社会功能受损明显,无器质性病变基础,该求助者完全符合诊断标准。一般心理问题病程不足2个月,无情绪泛化;精神病性障碍存在幻觉妄想等精神病性症状;适应障碍通常病程更短,应激程度较轻;广泛性焦虑障碍以持续的广泛性焦虑为核心,无明确强烈的现实应激源,因此A、C、D、E均不符合,正确答案为B。", "num": 9}, {"q": "求助者,男,56岁,退休工人,近2个月坚信小区物业人员故意给自己家断水,多次找物业闹事,最近甚至拿石头砸坏物业办公室玻璃,无法正常生活,家属强行陪同前来咨询。咨询师首先应该采取的正确做法是?", "o": ["进行摄入性会谈收集详细资料", "直接转介到精神卫生医疗机构", "使用焦虑自评量表进行测评", "制定心理咨询的方案", "进行放松训练缓解求助者的情绪"], "a": 1, "e": "该求助者出现了妄想症状,属于精神病性问题,已经超出了健康心理咨询的工作范畴,因此首先应当转介到精神卫生医疗机构进行专业的评估与治疗。其他操作都需要在确认问题属于心理咨询工作范畴后才能进行,因此A、C、D、E均不正确,正确答案为B。", "num": 10}, {"q": "求助者,女,19岁,大一学生,因未婚怀孕前来咨询,担心咨询师会骂自己不自重,内心非常不安。咨询师以下哪种做法体现了尊重的核心专业要求?", "o": ["直接告知求助者未婚怀孕是错误的行为,必须马上处理", "拒绝为该求助者提供咨询服务,要求求助者找家长解决", "接纳求助者的处境,不对求助者的行为做道德评判", "要求求助者尽快告诉男方家长,尽快处理问题", "劝说求助者以后一定要洁身自好,不能再犯这种错误"], "a": 2, "e": "尊重的核心要求是咨询师接纳求助者的一切,包括求助者的行为、观念,不做道德评判、不歧视。选项A、B、D、E都带有评判,违背了尊重的专业原则,只有C符合要求,因此正确答案为C。", "num": 11}, {"q": "求助者,男,32岁,公司职员,最近晋升失败,觉得自己努力了五年都没有结果,在咨询室哭诉“我真的太没用了,什么事情都做不好,我根本就是一个失败者”,咨询师以下哪种回应最符合共情的专业要求?", "o": ["“你别这么想了,这次不行下次还有机会啊”", "“你努力了很久想要晋升结果没成功,觉得非常挫败,否定自己,对吗?”", "“你就是太贪心了,没晋升也不至于这样啊”", "“我特别理解你,我上次晋升也失败了,我当时比你还难受”", "“你应该冷静下来,好好想想自己哪里做得不对”"], "a": 1, "e": "共情要求咨询师准确体验求助者的内心世界,并准确将求助者的情绪与认知反馈给求助者,B选项精准匹配了求助者的感受与想法,符合共情的要求。A属于安慰说教;C属于评判性回应;D混淆了咨询师自身的体验和求助者的体验;E属于说教和建议,因此A、C、D、E都不符合共情的要求,正确答案为B。", "num": 12}, {"q": "求助者,女,27岁,创业失败负债,待业在家3个月,认为自己一事无成,什么都做不好。咨询师说“你虽然创业失败负债,但这三个月你一直坚持投简历学习新技能,从来没有放弃找工作,这说明你非常有韧性”,关于咨询师的这个回应,以下说法正确的是?", "o": ["属于盲目乐观,忽视了求助者创业失败的困境", "实事求是地发现了求助者的积极行为并给予肯定,符合积极关注的要求", "咨询师应该直接帮求助者找工作,不需要关注这种小事", "积极关注只需要关注求助者过去的成功经历,不需要关注这种日常行为", "这个回应会让求助者觉得被同情,不会有好的效果"], "a": 1, "e": "积极关注要求咨询师实事求是地发现求助者身上的积极方面,帮助求助者看到自身的资源。该求助者虽然遭遇创业失败,但坚持投简历学习新技能是具体的积极行为,咨询师的回应准确给予肯定,既没有盲目乐观,也没有忽视求助者的困境,符合积极关注的要求。选项A、C、D、E都对积极关注的概念理解有误,因此正确答案为B。", "num": 13}, {"q": "求助者,女,18岁,高中学生,第一次来做咨询,进门之后非常紧张,手攥着衣角不敢说话,头一直低着。咨询师以下哪种做法最能体现热情的专业要求?", "o": ["直接开口问求助者遇到了什么问题,不做寒暄", "微笑等待,主动询问求助者要不要喝水,等到求助者放松之后再开始会谈", "打断求助者的犹豫,直接问问题然后给建议", "表现出不耐烦,催促求助者快点说清楚自己的问题", "忽略求助者的紧张,直接进入正式会谈主题"], "a": 1, "e": "热情要求咨询师在咨询全过程中体现对求助者的关心,初次接待时帮助求助者缓解紧张情绪。B选项通过细节关怀帮助求助者放松,符合热情的要求。A、C、D、E都没有关注求助者的紧张情绪,缺乏对求助者的关怀,不符合热情的要求,因此正确答案为B。", "num": 14}, {"q": "求助者,男,62岁,因持续半年焦虑失眠主动前来咨询,咨询师发现求助者是自己当前任职企业的主要股东,存在直接利益关联,无法保持中立咨询态度。以下哪种转介做法符合专业伦理规范?", "o": ["不告知求助者转介原因,直接将其联系方式提供给其他咨询师", "向求助者说明转介的原因,推荐合适的咨询师并协助完成交接", "要求求助者自行寻找其他心理咨询师,不提供任何帮助", "隐瞒自身与求助者的利益关联,继续勉强开展咨询", "直接拒绝为求助者提供咨询,不做任何后续安排"], "a": 1, "e": "当咨询师因自身原因无法提供专业服务时,应向求助者说明原因,推荐合适的替代咨询师,并协助完成交接,保障求助者的咨询权益。A未说明原因不尊重求助者,C不负责,D违反伦理,E不专业。", "num": 15}, {"q": "求助者,男,22岁,大四考研学生,因考研失利在第三次咨询中透露“我已经网购了农药,打算今晚结束生命”,并要求咨询师为其保密。咨询师以下哪种做法符合专业伦理要求?", "o": ["严格遵守保密原则,不向任何人透露该信息", "立即通知求助者的直系家属,并联系当地精神卫生医疗机构进行紧急干预", "忽略求助者的表述,继续按照原计划开展本次咨询", "要求求助者签署承诺书,承诺不实施伤害行为", "直接将求助者送往精神病院,不告知其家属"], "a": 1, "e": "当求助者明确表达伤害自身的意图时,属于保密原则的例外情况,咨询师需立即通知家属与专业精神卫生机构进行干预,保障求助者的生命安全。A违反伦理,C不负责,D无法阻止风险,E过度干预未尊重求助者意愿。", "num": 16}, {"q": "求助者,男,36岁,离婚后持续情绪低落、兴趣减退3个月,咨询师计划选用抑郁自评量表(SDS)进行测评,以下哪种结果提示求助者可能存在中度及以上抑郁症状?", "o": ["总粗分低于40分", "标准分高于60分", "标准分高于63分", "总粗分高于60分", "总粗分高于63分"], "a": 2, "e": "SDS的标准分计算公式为总粗分 ×1.25后取整数,分界值标准:53-62分为轻度抑郁,63分及以上为中度及以上抑郁。A、B为正常或轻度抑郁范围,D、E混淆了总粗分和标准分的分界规则。", "num": 17}, {"q": "求助者,男,28岁,因项目竞标失败出现焦虑、胸闷、食欲下降18天,情绪反应仅针对竞标事件,未出现泛化,主动前来咨询。以下关于该求助者心理评估的描述,正确的是?", "o": ["该求助者存在精神病性症状,需立即转介精神科医疗机构", "该求助者病程不足1个月,不符合任何心理问题的评估标准", "该求助者的情绪反应由现实因素引发且未泛化,可初步评估为一般心理问题", "该求助者无需进行任何心理测验,仅凭主诉即可直接给出评估结果", "该求助者的问题无需专业干预,可自行缓解"], "a": 2, "e": "一般心理问题的评估标准为:由现实因素引发,病程1~2个月,情绪反应未泛化,社会功能轻度受损,无器质性病变基础。该求助者完全符合该标准。A选项无妄想、幻觉等精神病性症状;B选项病程符合1~2个月的评估区间;D选项需结合心理测验辅助评估,仅凭主诉不够严谨;E选项该求助者主动求助,且存在明显不适,需专业干预。", "num": 18}, {"q": "求助者,女,26岁,因与男友分手情绪低落主动前来咨询,咨询师计划开展摄入性会谈以收集临床资料,以下哪种做法不符合摄入性会谈的专业规范?", "o": ["会谈前提前拟定会谈提纲,明确会谈目标", "会谈过程中耐心倾听,不随意打断求助者的陈述", "会谈中随意发表个人对求助者恋爱选择的主观评判", "会谈结束后详细记录会谈内容与求助者的核心症状", "会谈中保持中立、客观的态度,不偏向任何一方"], "a": 2, "e": "摄入性会谈需避免使用评判性语言,咨询师应保持中立客观,不随意发表主观评判,以免破坏咨询关系与求助者的表达意愿。A、B、D、E均符合摄入性会谈的专业规范要求。", "num": 19}, {"q": "求助者,女,16岁,高中生,因长期熬夜刷短视频导致上课注意力不集中、学习成绩下滑,家长陪同前来咨询。咨询师计划使用阳性强化法帮助求助者减少熬夜刷短视频的行为,以下哪种做法符合阳性强化法的标准操作步骤?", "o": ["对求助者继续熬夜刷短视频的行为进行严厉批评与惩罚", "当求助者主动提前放下手机、不熬夜时,立即给予其喜爱的奖励", "直接要求求助者立即停止所有使用短视频的行为", "忽略求助者的任何行为变化,不给予任何强化物", "以惩罚作为主要的行为干预手段"], "a": 1, "e": "阳性强化法的核心操作逻辑为:当目标行为(减少熬夜刷短视频)出现时,立即给予阳性强化物,以增强该目标行为的出现频率。A、E选项使用惩罚,违背阳性强化法的原则;C选项直接要求停止目标行为,未遵循循序渐进的原则;D选项忽略行为变化,无法强化目标行为。", "num": 20}, {"q": "求助者,男,30岁,销售,近半年因业绩压力大出现持续紧张、心慌、入睡困难,主动前往心理咨询机构求助。咨询师计划为其开展放松训练以缓解焦虑情绪,以下哪种操作步骤符合专业规范?", "o": ["先让求助者坐在舒适的座椅上,闭上眼睛,配合缓慢的腹式呼吸,从四肢到躯干逐次进行肌肉放松训练", "快速抖动全身肌肉,不做任何呼吸调整,仅依靠主观感受放松", "仅放松上肢肌肉,忽略下肢与躯干的肌肉紧张", "放松过程中要求求助者保持清醒,全程不闭眼", "每次放松训练严格控制在5分钟以内,不得延长训练时长"], "a": 0, "e": "A", "num": 21}, {"q": "求助者,女,24岁,刚入职互联网公司,试用期工作汇报被领导当众指出逻辑错误后,出现情绪低落、自我否定,认为“我天生不适合做这份工作,永远都不会得到领导认可”,主动前来咨询。咨询师运用合理情绪疗法的ABC理论进行分析,其中代表不合理信念的B是?", "o": ["领导当众指出汇报工作的错误", "情绪低落、自我否定", "认为自己不适合这份工作,永远不会得到领导认可", "本次汇报工作未达到预期要求", "主动寻求心理咨询帮助"], "a": 2, "e": "C", "num": 22}, {"q": "求助者,女,45岁,近1个月出现情绪烦躁、睡眠质量差、周身不适,家属陪同其前往心理咨询机构。咨询师计划选用90项症状清单(SCL-90)进行测评,以下关于该量表的正确描述是?", "o": ["属于自评式量表,共90个项目,采用1~5级评分制", "属于他评式量表,主要用于评估精神病性症状", "仅能评估抑郁症状,无法覆盖其他心理行为问题", "施测时无需向求助者说明评分规则与测试目的", "量表得分越高,提示求助者心理健康水平越好"], "a": 0, "e": "SCL-90为90项症状自评量表,包含90个项目,采用1~5级评分,可多维度评估多种心理症状;B选项属于他评的描述错误,C选项仅能评估抑郁的描述错误,D选项施测需要提前说明规则要求,E选项得分越高提示症状越严重,而非心理健康水平越好。", "num": 23}, {"q": "求助者,男,28岁,因被公司裁员后出现情绪低落,连续3天闭门不出,家属陪同前来咨询。在咨询初始阶段,求助者始终低头抠手、沉默不语,咨询师以下哪种处理方式最为恰当?", "o": ["主动告知求助者“不想说就不必勉强”,随后保持沉默等待", "直接打断沉默,厉声询问“你到底有什么心事?”", "表现出不耐烦的神情,催促求助者尽快开口说明情况", "转移话题,主动询问求助者以往的业余爱好", "全程不做任何回应,任由求助者保持沉默"], "a": 0, "e": "当求助者出现情绪型沉默时,咨询师应给予理解与空间,允许求助者暂时沉默,同时传递接纳的态度。B打断会破坏信任关系,C不耐烦违背咨询的热情原则,D转移话题偏离核心问题,E无回应会让求助者感到被忽视。", "num": 24}, {"q": "求助者,女,35岁,因和小舅子合伙做生意产生经济纠纷,在咨询中滔滔不绝,反复讲述争吵细节,且多次偏离主题抱怨对方的不是。咨询师以下哪种处理方式符合专业规范?", "o": ["直接打断求助者,要求其直奔核心问题", "耐心倾听,适时通过提问引导求助者聚焦于自身情绪与核心矛盾", "全程不插话,任由求助者自由表达", "表现出厌烦情绪,示意求助者停止讲述", "主动转移话题,谈论与当前问题无关的内容"], "a": 1, "e": "针对宣泄型多话,咨询师应耐心倾听,同时适时引导其聚焦核心问题,避免无意义的重复叙述,推进咨询进程。A打断会伤害求助者感受,不符合尊重原则,C无引导无法推进咨询,D、E违背尊重与中立原则。", "num": 25}, {"q": "求助者,男,26岁,因和父亲长期关系不和前来咨询,经过3次咨询后,求助者表示咨询师的处事风格和自己过世的爷爷很像,对咨询师产生强烈依赖,希望咨询结束后和咨询师成为朋友私下来往。咨询师以下哪种处理方式符合专业伦理要求?", "o": ["接受求助者的好感,与求助者建立咨询外的朋友关系", "明确告知求助者咨询关系的专业边界,解释移情的本质", "回避求助者的话题,直接转移到其他咨询内容", "严厉批评求助者的想法,要求其立刻停止这种念头", "直接将求助者转介给其他咨询师"], "a": 1, "e": "当求助者出现移情时,咨询师应明确咨询关系的专业边界,解释移情的本质,引导求助者将注意力放回解决自身问题上。A违反咨询伦理,C回避无法解决问题,D批评破坏咨询信任关系,E不必要转介,不尊重求助者。", "num": 26}, {"q": "求助者,女,29岁,因社交焦虑障碍不敢前往公共场合与人交流,经过8次系统咨询后,以下哪项不属于评估本次咨询效果的有效维度?", "o": ["求助者的自我报告,如“我现在愿意自己去菜市场买菜了”", "咨询师的观察结果,如求助者在咨询室不再紧张手抖", "求助者家属的反馈,如“她上周主动参加了公司的团建聚餐”", "求助者的躯体症状改善情况,如紧张心慌的症状完全消失", "求助者近3个月的月工资收入增长幅度"], "a": 4, "e": "咨询效果的评估维度包括自我报告、咨询师观察、家属反馈、症状改善、社会功能恢复等。工资收入增长与本次咨询的社交焦虑问题无直接关联,不属于有效评估维度。", "num": 27}, {"q": "求助者,男,25岁,因公司裁员失业后出现孤独感、社交退缩,主动前来咨询。咨询师计划使用应对方式问卷评估其应对压力的方式,以下哪种应对方式属于成熟型应对策略?", "o": ["退避", "自责", "幻想", "解决问题", "合理化"], "a": 3, "e": "应对方式问卷将应对方式分为成熟型(解决问题、求助)、不成熟型(自责、退避、幻想)、混合型(合理化)。其中解决问题属于成熟型应对策略,可有效应对压力事件。", "num": 28}, {"q": "52岁女性,近一年总觉得邻居在自己家水杯下毒,出门觉得被人跟踪,多次向社区反映但未找到任何证据,该女士坚信自己的判断完全正确,拒绝认为自己精神存在问题。该求助者的自知力状态为?", "o": ["自知力完整,能够主动认识到自身精神异常", "自知力部分完整,可部分识别自身异常", "自知力缺失,不承认自身存在精神异常", "无自知力,仅能部分认识自身异常", "无法判断自知力状态"], "a": 2, "e": "自知力指求助者对自身精神状态的认识和判断能力,该求助者存在妄想症状,且坚信妄想内容,完全不承认自身存在精神异常,符合自知力缺失的表现。A、B、D选项对自知力状态的描述不符合该案例情况,案例信息足够明确判断自知力状态,因此E错误。", "num": 29}, {"q": "28岁男性因职场压力来做咨询,咨询过程中求助者多次接到工作电话,每次都简单说明后继续咨询,咨询师以下哪种做法符合有效倾听的专业要求?", "o": ["打断求助者,提醒咨询时间请勿接工作电话", "保持专注,关注求助者的表达内容和情绪变化,不随意打断沟通", "趁接电话的空隙回复自己的工作消息", "引导求助者先处理工作,结束本次咨询", "直接批评求助者不尊重咨询时间"], "a": 1, "e": "有效倾听要求咨询师保持专注,不随意打断求助者的表达,全程关注求助者的语言与非语言信息,B选项符合专业要求。A选项随意打断会破坏咨询信任关系,C选项不专注违背倾听要求,D选项提前结束咨询不符合专业设置,E选项的评判式回应违背尊重的咨询态度。", "num": 30}, {"q": "24岁女性因和恋人相处矛盾前来咨询,反复说“他根本不爱我,我们在一起全都是错的”,但没有说明具体发生了哪些事件让她产生这种感受。咨询师以下哪种回应符合具体化技术的专业要求?", "o": ["“你可以说一说具体发生了哪些事,让你觉得他不爱你吗?”", "“我特别理解你的难过,他这样真的很过分”", "“我觉得你应该和他好好谈一谈,把问题说开”", "“你是不是想多了,他可能只是最近太忙了”", "“我们换个话题聊聊你平时的爱好吧”"], "a": 0, "e": "具体化技术是指咨询师协助求助者清晰准确地表述自己的观点、情绪和经历的具体事件,A选项引导求助者说明具体细节,符合具体化技术的要求。B选项是共情回应但没有起到具体化的作用,C选项是给出建议,D选项是评判式回应,E选项是回避问题,均不符合要求。", "num": 31}, {"q": "30岁男性害怕狗,严重影响日常出行,咨询师计划使用系统脱敏法帮助求助者缓解恐惧,以下操作顺序符合专业规范的是?", "o": ["直接带求助者到有大型犬的环境中,强迫他适应", "先建立恐惧等级梯度,再学习放松训练,最后按照等级逐步暴露", "只让求助者想象狗的样子,不做任何实际暴露", "批评求助者的恐惧,要求他自己克服", "一开始就让求助者接触最高等级的恐惧场景"], "a": 1, "e": "系统脱敏法的标准操作步骤为:首先协助求助者建立恐惧/焦虑的等级梯度,随后教给求助者放松训练技术,最后让求助者按照等级从低到高逐步进行暴露,循序渐进消除恐惧反应,B选项符合规范。A没有放松训练,会引发强烈的焦虑情绪,C仅想象暴露效果有限,D批评违背尊重的咨询伦理,E一开始就接触最高等级会加剧恐惧,不符合操作要求。", "num": 32}, {"q": "48岁女性近三个月经常出现心慌、胸闷、失眠,总觉得自己得了严重心脏病,多次到三甲医院做心电图、心脏彩超等检查,结果都没有发现器质性异常。咨询师排除器质性精神障碍的关键依据是?", "o": ["求助者的年龄和性别", "综合医院的专业医学检查结果", "求助者没有心脏病家族史", "求助者的症状时好时坏", "求助者既往没有严重躯体病史"], "a": 1, "e": "排除器质性精神障碍的核心关键依据是专业医学检查结果,确认不存在相应的躯体器质性病变,其他选项都仅作为参考因素,不能作为排除的关键依据,因此B正确。", "num": 33}, {"q": "32岁男性因婚姻危机主动前来咨询,咨询过程中求助者叙述原生家庭对自己婚姻观的影响时,咨询师多次打断求助者的讲述,催求助者说重点。该咨询师的行为会造成什么影响?", "o": ["可以加快咨询进度,提升咨询效率", "会破坏咨询关系,降低求助者对咨询师的信任", "只要能解决问题,不会有负面影响", "是求助者自己说话太啰嗦,应该适应咨询师的风格", "符合心理咨询的专业伦理要求"], "a": 1, "e": "良好咨询关系的建立需要咨询师保持尊重、耐心、热情的专业态度,随意打断求助者的叙述、催促求助者会损害求助者的被尊重感,破坏信任关系,严重影响咨询效果。A、C、D、E的描述都违背心理咨询的专业伦理和要求,因此B正确。", "num": 34}, {"q": "26岁女性绩效考核不合格被部门约谈,哭着和咨询师说“我辛辛苦苦干了一年,居然不合格,我真的太失败了,什么事都做不好”,以下咨询师的哪种回应属于内容反应技术?", "o": ["“你辛苦了一年结果绩效考核不合格,觉得自己特别失败,什么事都做不好,对吗?”", "“我特别能理解你现在的难过,换做是我也会特别伤心”", "“你下次早点准备,肯定能拿到好成绩”", "“你是不是对领导的考核结果不服气啊?”", "“我们聊聊怎么提升你的工作绩效吧”"], "a": 0, "e": "A", "num": 35}, {"q": "30岁女性准备结婚但和未婚夫谈不拢彩礼,最后分手,和咨询师说“我都快结婚了居然分手,我再也遇不到合适的人了,我这辈子都毁了”,以下哪种回应属于情感反应技术?", "o": ["“你面对婚礼取消分手,觉得非常绝望和痛苦,对吗?”", "“你应该早点走出来,重新开始新的生活”", "“我之前也遇到过类似的事,我特别能理解你的感受”", "“你要不要和家里人聊聊疏解一下情绪?”", "“我们来梳理一下你在这段关系里的问题吧”"], "a": 0, "e": "情感反应技术是指咨询师把求助者陈述中的情绪体验捕捉整理后反馈给求助者,A选项准确捕捉了求助者的绝望和痛苦的情绪并反馈,符合情感反应技术的要求。B是给出建议,C是自我暴露,D是建议,E是转换话题,均不符合要求,因此A正确。", "num": 36}, {"q": "25岁男性不敢在公众场合发言,每次上台都紧张到忘词,咨询师计划用指导技术帮助求助者提升能力,以下哪种回应符合指导技术的专业要求?", "o": ["“你下次上台前,可以先做三次深呼吸,再从左到右扫一遍台下,开口自我介绍就好”", "“你应该大胆一点,不要害怕”", "“你是不是太在意别人的看法了?”", "“我以前上台也紧张,我是这么调整的……”", "“我们来聊聊你为什么害怕上台发言吧”"], "a": 0, "e": "A", "num": 37}, {"q": "28岁女性因职业选择困惑前来咨询,咨询师计划用16PF评估其人格特质,以下关于16PF的描述正确的是?", "o": ["共187个项目,适用于16岁以上人群自评", "共90个项目,适用于18岁以上成年人", "属于他评量表,由咨询师根据求助者表现评分", "量表得分越高,对应的人格特质越优秀", "仅能评估情绪状态,无法评估其他人格维度"], "a": 0, "e": "16PF即卡特尔16种人格因素测验,共包含187个项目,用于评估16种不同的人格特质,适用于16岁以上人群自评,人格特质得分没有优劣之分,因此A正确。B选项是90项症状清单SCL-90的参数,C选项16PF是自评不是他评,D选项得分没有优劣之分,E选项16PF覆盖16种不同人格维度,不止情绪,因此BCDE错误。", "num": 38}, {"q": "31岁男性因情绪波动大前来咨询,咨询师用EPQ评估人格,哪个维度的高分对应情绪不稳定、容易焦虑易怒的特征?", "o": ["E维度高分", "N维度高分", "P维度高分", "L维度高分", "E维度低分"], "a": 1, "e": "B", "num": 39}, {"q": "35岁女性近期经历换工作、亲人住院、买房贷款三件大事,因长期压力大失眠前来咨询,咨询师计划用LES评估压力水平,以下关于LES的描述正确的是?", "o": ["用于评估一段时间内生活事件带来的精神刺激强度", "用于评估人格特征,一共包含88个项目", "属于他评量表,由咨询师根据求助者描述评分", "量表得分越高,说明心理健康水平越好", "仅能评估最近1个月内发生的生活事件"], "a": 0, "e": "生活事件量表LES的作用是评估个体在一段时间内遭遇的生活事件带来的精神刺激强度,属于自评量表,通常评估近1年内的生活事件,得分越高说明个体承受的压力越大,因此A正确。B选项描述的是人格测验的特点,不是LES,C选项LES是自评不是他评,D选项得分越高压力越大,心理健康风险越高,E选项评估的通常是近1年不是1个月,因此BCDE错误。", "num": 40}, {"q": "42岁女性,近3年持续情绪低落,对之前喜欢的书法也提不起兴趣,睡眠质量差,食欲下降,没有自杀计划,日常工作能基本完成,社会功能轻度受损,符合恶劣心境诊断标准的描述是?", "o": ["病程持续2年以上,多数时间情绪低落,间歇期不超过2个月", "病程持续1个月以上,情绪低落明显,伴有强烈自杀念头", "病程持续半年以上,情绪低落呈阵发性发作", "病程持续3个月以内,情绪低落由明确应激事件引发", "无明显躯体症状,社会功能完全正常"], "a": 0, "e": "A", "num": 41}, {"q": "29岁女性社交焦虑经过12次咨询后,症状明显缓解,已经可以正常参与社交活动,咨询师计划结束咨询,开展巩固工作,以下哪种做法符合专业规范?", "o": ["立即停止咨询,不做任何后续安排", "和求助者一起回顾整个咨询过程的进步,共同制定后续的自我调节计划", "要求求助者每月来一次,持续咨询至少一年", "直接告诉求助者你已经完全痊愈,以后都不用来了", "收取额外的巩固咨询费用才安排后续随访"], "a": 1, "e": "咨询结束阶段的巩固工作,需要和求助者共同回顾咨询中的收获与进步,帮助求助者掌握自我调节的方法,制定后续计划巩固效果,因此B正确。A没有任何后续安排不利于巩固效果,C属于过度咨询,D表述过于绝对,没有给求助者支持,E违反收费咨询的专业规范,因此ACDE错误。", "num": 42}, {"q": "求助者,男,21岁,大三学生,因上台演讲被当众嘲笑后出现演讲恐惧,不敢站在人前发言,主动前来咨询,咨询师计划使用系统脱敏法改善其恐惧症状,以下操作步骤正确的是:", "o": ["先进行放松训练,再建立恐惧等级,最后直接暴露最高等级场景", "先建立恐惧等级表,再进行放松训练,最后按等级逐步暴露于恐惧场景", "仅让求助者想象恐惧场景,不需要进行实际场景练习", "对求助者不敢上台的回避行为进行批评,要求其立刻上台演讲", "不需要逐步递进,一次性让求助者面对全校演讲的最高恐惧场景"], "a": 1, "e": "系统脱敏法的标准操作流程为:建立恐惧等级、进行放松训练、按等级逐步暴露于恐惧场景,因此B选项正确。A选项颠倒流程且直接暴露最高等级,会引发强烈焦虑;C选项仅想象无法有效迁移至现实场景;D选项批评会破坏咨询关系,违背尊重原则;E选项一次性暴露高等级场景会加剧恐惧,不符合循序渐进的原则。", "num": 43}, {"q": "求助者,男,28岁,因项目竞标失败后出现焦虑、心慌,持续1个半月,情绪未泛化到日常其他场景,主动前来咨询,初步评估为一般心理问题,以下关于一般心理问题的评估标准,描述错误的是:", "o": ["由现实工作刺激引发,情绪反应和现实事件直接相关", "病程通常持续1-2个月,社会功能仅轻度受损", "情绪反应没有泛化,无器质性病变作为基础", "常伴随幻觉、妄想等精神病性症状", "求助者自知力完整,主动寻求专业帮助"], "a": 3, "e": "一般心理问题的核心特点是无精神病性症状、情绪未泛化、病程1-2个月、由现实因素引发,因此D选项错误,幻觉妄想等精神病性症状是精神病性障碍的核心特征,不属于一般心理问题的表现。A、B、C、E均符合一般心理问题的评估标准。", "num": 44}, {"q": "求助者,女,23岁,本科毕业待业1年,因考公多次失败出现情绪焦虑,和父母关系紧张,主动前往心理咨询机构求助,初诊接待时,咨询师首先引导求助者填写登记表格,准备开展摄入性会谈,以下关于本次初诊接待工作的描述,正确的是:", "o": ["为节省咨询时间,不需要向求助者说明保密原则和咨询设置,直接开始会谈", "为全面评估,直接选用16PF作为本次唯一的心理测评工具", "初诊接待时应当向求助者简要介绍保密原则、咨询设置与咨询目标,同时明确说明保密例外的情况", "不需要记录求助者的基本信息,仅口头询问记住即可", "为加快咨询进程,可以跳过信息收集环节直接制定咨询方案"], "a": 2, "e": "初诊接待的标准流程包括介绍咨询设置、保密原则及保密例外、收集并书面记录求助者基本信息,因此C选项符合专业规范。A选项违背初诊接待的基本要求,必须明确告知保密原则;B选项16PF用于人格测验,针对该求助者的焦虑情绪问题,应当优先选用SAS、SCL-90等症状量表,仅用16PF过于片面;D选项要求必须书面留存求助者基本信息,方便后续评估跟进;E选项制定咨询方案需要基于充足的临床资料,跳过信息收集不符合专业规范。", "num": 45}, {"q": "求助者,女,28岁,因和交往5年的男友分手,出现情绪低落、对任何事都提不起兴趣,持续3个半月,曾有自杀计划未实施,日常工作只能完成一半任务,社会功能中度受损,以下关于该求助者的心理评估,描述正确的是:", "o": ["可以直接评估为一般心理问题,不需要转介精神科", "病程超过2个月,且存在自杀风险,需要转介精神科医疗机构进一步评估", "只需要做心理测验就能确定诊断,不需要开展临床会谈", "这类情绪问题可以自行缓解,不需要专业干预", "心理咨询师可以直接为求助者开具抗抑郁药物进行治疗"], "a": 1, "e": "该求助者病程超过2个月,存在自杀念头,社会功能中度受损,已经超出一般心理问题的评估范围,需要转介精神科进行进一步排查评估,因此B选项正确。A选项不符合一般心理问题的病程和症状严重程度要求;C选项心理测验仅为辅助评估工具,诊断必须结合临床会谈获取的资料;D选项存在自杀风险,必须进行专业干预,无法自行缓解;E选项开具精神类药物是精神科执业医师的权限,超出心理咨询师的执业范围。", "num": 46}, {"q": "求助者,男,45岁,企业部门主管,因最近部门业绩下滑,出现“我必须保住部门第一的位置,一次失利说明我完全不适合做管理”的不合理信念,情绪焦虑难以入睡,主动前来咨询,以下哪种技术最适合帮助求助者调整该不合理信念?", "o": ["阳性强化法", "系统脱敏法", "合理情绪疗法的产婆术式辩论", "放松训练", "代币法"], "a": 2, "e": "产婆术式辩论是合理情绪疗法中调整求助者不合理信念的核心技术,通过辩论引导求助者反思自身信念的不合理之处,因此C选项正确。A选项阳性强化法用于塑造良好行为,不适用于调整认知信念;B选项系统脱敏法用于改善恐惧、焦虑类的恐惧症症状;D选项放松训练仅能缓解情绪症状,无法调整不合理认知;E选项代币法属于行为矫正技术,用于行为塑造,不适用于认知调整。", "num": 47}, {"q": "求助者,男,7岁,小学一年级学生,做作业时总是频繁起身玩玩具,无法专注完成作业,家长多次管教无效,带孩子前来咨询,咨询师计划使用阳性强化法改善孩子的专注行为,以下哪种方案符合阳性强化法的专业规范?", "o": ["只要孩子起身玩玩具,立刻批评惩罚孩子", "孩子连续15分钟专注做作业,就给孩子贴一个小红花,攒够10个小红花可以兑换孩子想要的漫画书", "忽略孩子所有行为,只批评孩子起身玩的行为", "要求孩子必须连续一周不起身,否则就没收孩子所有玩具", "把孩子的玩具全部收走,让孩子面前只有作业"], "a": 1, "e": "阳性强化法核心是通过及时强化目标行为(专注做作业)来提升该行为的发生频率,代币法(小红花兑换奖励)是阳性强化法的常用形式,因此B选项正确。A选项属于惩罚,不符合阳性强化法正强化的核心逻辑;C选项忽略了正确的目标行为,无法增加专注行为的发生;D选项属于惩罚措施,不符合阳性强化的规范;E选项属于环境调整,不属于阳性强化法的操作。", "num": 48}, {"q": "求助者,男,30岁,婚后和父母同住,因生活习惯差异频繁和父母发生矛盾,认为“父母不尊重我的隐私,故意针对我,我的婚姻生活完全过不下去了”,情绪低落持续2个半月,主动前来咨询。咨询师先通过共情接纳了求助者的情绪,接下来计划用合理情绪疗法调整其不合理信念,以下关于本次咨询的描述,正确的是:", "o": ["咨询师应当直接告诉求助者“你的想法不对,父母只是关心你”,直接纠正不合理信念", "只需要共情就能解决问题,不需要其他干预技术", "修通阶段可以在建立良好咨询关系的基础上,运用产婆术式辩论技术引导求助者挑战自身不合理信念", "为了加快咨询进度,可以跳过共情环节直接开展辩论", "咨询只需要关注情绪就好,不需要探讨求助者的认知模式"], "a": 2, "e": "合理情绪疗法的修通阶段需要以良好的咨询关系为基础,在共情建立信任之后,再通过产婆术式辩论调整不合理信念,因此C选项正确。A选项直接否定求助者的感受,违背了尊重的咨询原则,会破坏咨询关系;B选项仅共情无法改变求助者的认知偏差,不能从根源解决问题;D选项跳过共情会阻碍信任关系建立,影响咨询效果;E选项合理情绪疗法认为认知偏差是情绪问题的核心根源,忽略认知模式无法解决根本问题。", "num": 49}, {"q": "求助者,女,28岁,设计师,因和部门总监发生冲突后出现情绪焦虑、回避上班,前两次咨询沟通都正常,第三次咨询中,咨询师询问求助者和总监发生冲突的具体细节时,求助者突然沉默,低头不语,回避该话题,后续多次提及该话题都转移方向,以下关于该求助者的沉默类型和咨询师正确处理方式的描述,正确的是:", "o": ["该沉默属于情绪型沉默,咨询师应当直接打断,要求求助者立刻说出细节", "该沉默属于怀疑型沉默,咨询师应当表现出不耐烦,催促求助者尽快开口", "该沉默属于内向型沉默,咨询师应当直接转移话题,不要再提及冲突内容", "该沉默属于反抗型沉默,咨询师应当温和接纳,询问“你是不是不愿意谈论这个话题,可以说说你现在的感受吗?”", "该沉默属于理智型沉默,咨询师不需要干预,继续按原计划推进咨询"], "a": 3, "e": "反抗型沉默是指求助者因不愿谈论敏感、痛苦的话题而产生的沉默,该求助者刻意回避和上级冲突的细节,符合反抗型沉默的特征。A选项直接打断会破坏咨询信任关系;B选项不耐烦违背了热情尊重的咨询原则;C选项内向型沉默是因求助者个性内向不善表达,不符合本案情况;E选项理智型沉默是求助者正在思考问题,不符合本案情况;D选项温和接纳并引导求助者表达感受,符合专业咨询规范。", "num": 50}, {"q": "求助者,男,32岁,因创业失败负债,出现情绪低落、兴趣减退,持续近4个月,情绪已经泛化到不愿和任何朋友联系,甚至不敢出门见人,无法正常工作,社会功能重度受损,主动前来咨询,以下关于该求助者的心理评估,描述正确的是:", "o": ["可以评估为一般心理问题,不需要转介精神科", "病程超过2个月,情绪泛化,社会功能重度受损,应当评估为严重心理问题或转介精神科进一步评估", "仅由现实因素引发,可以自行缓解,不需要专业干预", "属于神经症性心理问题,不需要做心理测验辅助评估", "咨询师可以直接开展治疗,不需要提前评估"], "a": 1, "e": "严重心理问题的评估标准为:病程超过2个月,情绪泛化,社会功能受损,本案求助者符合该特征,需要进一步评估或转介精神科,因此B选项正确。A选项不符合一般心理问题的病程和严重程度标准;C选项本案社会功能重度受损,存在严重情绪问题,无法自行缓解,需要专业干预;D选项神经症性心理问题的评估也需要结合心理测验结果辅助判断;E选项任何咨询都需要先完成评估才能开展干预,不符合专业规范。", "num": 51}, {"q": "求助者,女,38岁,公司裁员后待业在家,出现情绪低落,咨询师使用应对方式问卷对求助者进行测评,结果显示求助者“退避”“幻想”因子分显著高于常模,“解决问题”“求助”因子分显著低于常模,以下关于该求助者应对方式的描述,正确的是:", "o": ["该求助者使用的都是成熟型应对策略", "该求助者倾向于使用不成熟型应对策略,比如逃避、自我幻想消极结果", "应对方式没有优劣之分,不需要进行干预", "咨询师应当直接要求求助者改变应对方式,不需要引导", "应对方式问卷只能评估情绪状态,无法评估应对行为"], "a": 1, "e": "应对方式问卷将应对方式分为三类:成熟型(解决问题、求助)、不成熟型(退避、自责、幻想)、混合型(合理化),该求助者退避、幻想因子分高,因此属于不成熟型应对策略,B选项正确。A选项明显错误;C选项应对方式确实存在成熟与不成熟之分,不成熟的应对方式会加重情绪问题,需要干预;D选项直接要求求助者改变不符合咨询的专业原则,需要逐步引导;E选项应对方式问卷就是用来评估应对行为类型的,不是评估情绪状态。", "num": 52}, {"q": "求助者,男,24岁,刚辞职准备考研,备考半年没考上,哭诉“我一事无成,这辈子都不会成功了”,咨询师回应:“你现在特别挫败,觉得自己以后都不会做成事情了,对吗?”,该回应属于共情的哪个层次?", "o": ["初级共情,准确反映了求助者当下的情绪和表达的内容", "高级共情,深入挖掘了求助者潜在的情感", "不恰当共情,没有理解求助者的真实感受", "评判式回应,否定了求助者的感受", "建议式回应,引导求助者改变想法"], "a": 0, "e": "初级共情的核心是准确反映求助者已经表达出来的情绪和内容,本案中咨询师的回应准确复述了求助者表达的痛苦感受和想法,属于初级共情,因此A选项正确。高级共情需要挖掘求助者未直接表达的潜在情感,比如“你害怕自己一直这样失败下去”,因此B选项错误;该回应准确理解了求助者感受,是恰当的,因此C错误;该回应没有进行评判,所以D错误;该回应也没有给出任何建议,所以E错误。", "num": 53}, {"q": "求助者,男,41岁,三个月前单位体检发现肺小结节,后续多次复查结果均显示结节无恶变特征,医生判断为良性无需特殊处理,但求助者仍坚信自己已经患上肺癌,认为医生怕自己无法接受隐瞒了病情,先后前往五家三甲医院重复做CT检查,始终不相信阴性检查结果,主动前来咨询。以下对该求助者的心理评估,正确的是?", "o": ["属于严重心理问题,由体检这个现实刺激直接引发", "属于强迫性神经症,反复做CT检查属于典型强迫行为", "属于疑病性神经症,存在牢固的疑病观念,医学检查阴性结果无法消除其疑虑", "属于焦虑性神经症,仅为体检引发的自由浮动性焦虑", "属于躯体形式障碍中的躯体疼痛障碍"], "a": 2, "e": "C", "num": 54}, {"q": "求助者,女,28岁,同时收到两个不同公司的offer,无法决定选择哪一个,主动前来咨询,要求咨询师直接帮自己做出选择。以下哪种做法符合个体心理咨询方案的制定规范?", "o": ["根据自身人生经验直接帮求助者敲定选择,告知哪个offer更适合", "与求助者共同梳理自身职业发展需求、对两份工作的偏好与优劣势分析,共同确定本次咨询目标", "认为求助者独立性太差,直接拒绝咨询并转介", "要求求助者必须听从父母的安排,无需考虑自身感受", "仅和求助者聊两份工作的细节,不设定任何明确的咨询目标"], "a": 1, "e": "咨询方案应由咨询师与求助者共同协商制定,咨询师需尊重求助者的自主性,不得代替求助者做决定,B选项符合要求。A违反了求助者自主性原则;C无必要转介,未履行咨询师的责任;D违背求助者自主意愿,不符合咨询基本伦理;E咨询必须设定明确咨询目标,因此E错误。", "num": 55}, {"q": "求助者,女,31岁,离婚后因情绪适应问题前来咨询,几次咨询后,求助者凡事都打电话询问咨询师意见,大到换工作小到日常购物都要咨询师帮自己做决定,认为咨询师专业可靠,自己完全没法做选择,已经出现明显的依赖行为。以下哪种处理方式符合专业规范?", "o": ["为了维护良好咨询关系,满足求助者的所有要求", "温和告知求助者:“我们咨询的目标是帮助你学会独立解决问题、自己做选择,我不会代替你做决定”", "直接拒绝所有请求,立即终止咨询关系", "为避免冲突,答应求助者要求但不提供实质性意见", "每次都转移话题,回避回应求助者的请求"], "a": 1, "e": "依赖的核心是求助者将解决问题的责任转移给咨询师,咨询师需要引导求助者承担自主责任,明确咨询目标是提升求助者解决自身问题的能力,B选项处理符合专业规范。A会强化依赖行为,违背咨询核心目标;C处理过于极端,会破坏已经建立的咨询关系;D无法解决依赖的核心问题,对求助者没有实质帮助;E回避问题,不能处理依赖问题,因此B正确。", "num": 56}, {"q": "求助者,女,52岁,因退休后适应不良前来咨询,咨询过程中反复讲述自己年轻时工作取得的成绩,每次讲述都持续20分钟以上,完全偏离当前适应不良的咨询主题。咨询师需要处理多话现象,以下哪种方式符合专业规范?", "o": ["直接打断求助者,告知该内容和咨询主题无关,停止讲述", "耐心倾听,待求助者说完后温和引导:“您当年的工作成绩真的很出色,我们接下来聊聊您退休之后的生活感受可以吗?”", "忽略求助者的多话,继续按照原定咨询提纲推进咨询", "表现出不耐烦,暗示求助者缩短当前话题", "直接终止本次咨询"], "a": 1, "e": "处理多话现象需要先接纳求助者的表达,保护求助者自尊,再温和引导回归咨询主题,B选项处理符合要求。
