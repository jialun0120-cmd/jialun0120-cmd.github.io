,改善灾难化思维,A正确;开具药物属于临床医疗范畴,不属于心理咨询师可开展的心理干预内容,B错误;放松训练可以有效缓解焦虑情绪,适合该案例,C正确;互助支持小组可以为求助者提供社会支持,改善负性情绪,D正确;强制限制饮食违反咨询伦理,也会加重求助者心理压力,不利于血糖控制,E错误。", "type": "multi"}, {"q": "求助者,男,26岁,刚入职互联网公司,不敢主动和同事交流,害怕自己表现不好被他人负面评价,甚至不敢去公共食堂就餐,明知自己的担心不对但无法控制。以下哪些属于该求助者可能存在的社交认知偏差?", "o": ["绝对化要求", "过分概括化", "灾难化思维", "个人化", "选择性概括"], "a": [0, 1, 2, 3, 4], "e": "该求助者要求自己必须获得所有人的认可,不能出现任何不好的印象,属于绝对化要求,A正确;一次偶然的社交紧张就认为自己完全不适合社交,属于过分概括化,B正确;把一次小小的社交失误放大为会被所有人排斥的严重后果,属于灾难化思维,C正确;把他人的正常聊天注意力过度归因为是在讨论自己的缺点,属于个人化,D正确;只关注自己社交中的负面表现,忽略正面反馈,属于选择性概括,E正确。", "type": "multi"}, {"q": "求助者,女,58岁,退休教师,近1年记忆力明显下降,经常忘记刚放好的物品,出门买东西偶尔找不到回家的路,情绪低落不爱出门,到三甲医院检查未发现脑部器质性病变。根据老年心理发展特点,该求助者的症状可能属于?", "o": ["正常老年认知老化", "抑郁性假性痴呆", "阿尔茨海默病", "血管性痴呆", "分离性遗忘"], "a": [0, 1], "e": "正常老年认知老化可出现轻度记忆下降,部分老人可能出现短暂的定向不佳,因此A可选;抑郁情绪引发的抑郁性假性痴呆可表现出类似认知下降的症状,且无器质性病变,符合题干描述,B正确;阿尔茨海默病属于中枢神经系统退行性病变,存在脑部器质性改变,题干未提及相关证据,C错误;血管性痴呆由脑血管病变引发,存在器质性病变基础,题干无相关证据,D错误;分离性遗忘多和创伤性事件相关,题干无创伤史,不符合,E错误。", "type": "multi"}, {"q": "求助者,女,22岁,大学生,在一次课堂发言时出现大脑空白后,之后每次当众发言都会心跳加速、手抖出汗,逐渐开始回避所有需要当众发言的课程,成绩因此下滑。以下哪些心理咨询干预方法适合该求助者?", "o": ["系统脱敏疗法", "认知重评技术", "暴露疗法", "药物治疗", "阳性强化法"], "a": [0, 1, 2], "e": "系统脱敏疗法可以逐步降低求助者对当众发言的焦虑反应,适合社交焦虑的干预,A正确;认知重评可以纠正求助者“我一定会出丑被同学嘲笑”的负面认知偏差,B正确;暴露疗法通过让求助者直接面对恐惧的发言场景,快速消退焦虑反应,适合该案例,C正确;药物治疗属于医疗干预范畴,不属于心理咨询干预方法,D错误;阳性强化法主要用于行为塑造培养新行为,不符合社交焦虑干预的核心目标,E错误。", "type": "multi"}, {"q": "求助者,男,40岁,企业高管,近半年工作倦怠明显,对工作失去热情,经常感到疲惫,很少和同事家人外出,自述“每天都是重复劳动,没有任何意义”。根据积极心理学PERMA模型,以下哪些干预措施符合该模型的要求,可以改善其状态?", "o": ["协助求助者识别自身优势,参与公益志愿活动", "指导求助者每天记录3件生活中让自己感到开心的小事", "建议求助者每天增加2小时高强度训练缓解压力", "鼓励求助者每周和老朋友聚餐一次,重建社交联结", "建议求助者跳槽去薪资更高的企业"], "a": [0, 1, 3], "e": "积极心理学PERMA模型的五个核心维度是:积极情绪、投入、人际关系、意义、成就。协助求助者参与公益活动可以提升人生意义感,同时拓展人际关系,A正确;每天记录开心小事可以提升积极情绪,符合模型要求,B正确;建立稳定的社交联结对应PERMA的人际关系维度,D正确;高强度运动不属于PERMA模型的核心干预维度,C错误;更换高薪工作没有解决职业倦怠核心的意义缺失、人际关系疏离等问题,不符合模型要求,E错误。", "type": "multi"}, {"q": "求助者,女,30岁,全职妈妈,孩子2岁,近半年频繁出现情绪失控,打骂孩子后又极度后悔,经常自责“我不是一个合格的妈妈”,同时出现入睡困难、食欲下降,对以前喜欢的事情都提不起兴趣。以下哪些属于该求助者可能的诊断方向?", "o": ["产后抑郁障碍", "适应障碍", "人格障碍", "广泛性焦虑障碍", "抑郁发作"], "a": [0, 1, 4], "e": "产后抑郁障碍可发生于产后数年,核心症状为情绪低落、自责、情绪失控,符合该求助者的表现,A正确;求助者面临长期育儿这一明确的应激性生活事件,出现适应不良的情绪行为反应,符合适应障碍的特征,B正确;抑郁发作的核心症状为情绪低落、兴趣减退、自责自罪,符合求助者的表现,E正确;人格障碍是长期稳定的异常行为模式,该求助者为产后急性起病,和育儿应激相关,不符合人格障碍的特征,C错误;广泛性焦虑障碍的核心是持续的无明确对象的焦虑,该求助者核心症状为自责、情绪低落,不符合广泛性焦虑障碍的核心表现,D错误。", "type": "multi"}, {"q": "求助者,男,25岁,经历严重车祸后3个月,反复在睡梦中做噩梦梦到车祸发生场景,不敢靠近马路,睡眠中非常容易惊醒,白天注意力无法集中,明知自己的反应过度但无法控制。以下哪些属于创伤后应激障碍的核心症状?", "o": ["闯入性回忆", "回避与创伤相关的场景", "持续性负性认知", "过度警觉", "分离症状"], "a": [0, 1, 2, 3], "e": "创伤后应激障碍(PTSD)的四大核心症状为:闯入性回忆(包括创伤相关的噩梦)、对创伤相关场景的回避、持续性的负性认知情绪、过度警觉。本题中噩梦属于闯入性回忆,A正确;不敢靠近马路属于回避创伤场景,B正确;PTSD核心症状包含持续性负性认知,C正确;容易惊醒属于过度警觉,D正确;分离症状不属于PTSD的核心症状,仅为部分患者可能出现的伴随症状,E错误。", "type": "multi"}, {"q": "求助者,女,35岁,教师,近1年反复出门后出现“门没锁好”的想法,无法控制地反复折返检查门锁,每次检查都要按固定顺序确认三次才放心,整个过程需要十分钟以上,明明知道没必要但控制不住,经常因此迟到。以下哪些属于该求助者的强迫行为类型?", "o": ["强迫检查", "强迫清洗", "强迫仪式动作", "强迫计数", "强迫询问"], "a": [0, 2], "e": "强迫检查指反复检查自身担心出错的行为,本题中反复检查门锁符合该特征,A正确;强迫仪式动作指按照固定的程序化顺序重复完成的行为,本题中按固定顺序确认三次锁门属于典型的强迫仪式动作,C正确;强迫清洗指反复清洗消毒,不符合本题场景,B错误;强迫计数指不由自主地计数特定物品,本题中确认次数是仪式动作的一部分,核心表现不是强迫计数,D错误;强迫询问指反复询问他人确认自己的行为,不符合本题,E错误。", "type": "multi"}, {"q": "求助者,男,50岁,冠心病支架术后1年,近期经常焦虑担心支架会出问题,疾病会复发,不敢出门散步,睡眠差,医生评估心脏功能恢复良好,符合出院运动标准。从健康心理学视角来看,适合的干预措施包括?", "o": ["认知重评纠正“支架随时会出问题”的灾难化思维", "强制要求每天进行2小时高强度运动促进康复", "指导进行腹式呼吸放松训练缓解焦虑情绪", "限制所有日常活动避免心脏负担", "鼓励求助者参与冠心病术后康复互助小组"], "a": [0, 2, 4], "e": "认知重评可以纠正求助者的灾难化负面认知,改善焦虑情绪,A正确;高强度运动不符合冠心病术后康复的要求,会增加心脏负担,B错误;放松训练可以有效缓解焦虑情绪,适合该案例,C正确;限制所有日常活动会加重焦虑情绪,不利于心脏康复,D错误;康复互助小组可以为求助者提供社会支持,帮助调整心态,E正确。", "type": "multi"}, {"q": "求助者,女,28岁,初产妇,孕32周,近1个月经常担心胎儿发育不正常,害怕顺产疼痛,经常失眠、食欲下降,自知反应过度但无法调整。以下哪些属于该孕妇常见的心理应激源?", "o": ["对胎儿健康的过度担忧", "对分娩疼痛的恐惧", "即将转变为母亲的身份转变压力", "家庭经济压力", "孕期激素水平变化"], "a": [0, 1, 2, 4], "e": "胎儿健康担忧、分娩恐惧、母亲身份转变压力、孕期激素水平变化均为初产妇常见的心理应激源,本题中均有相关体现,因此A、B、C、E正确;本案例未提及存在家庭经济压力相关应激,因此D不选。", "type": "multi"}, {"q": "求助者,男,10岁,小学四年级学生,上课无法集中注意力听课,经常玩文具转笔,忍不住打断老师讲课,和同学相处时经常因为小事发生冲突打架,学习成绩比上学期明显下滑。本案例中体现了哪些注意缺陷多动障碍(ADHD)的核心症状?", "o": ["注意力不集中", "多动冲动", "品行障碍", "学习困难", "情绪低落"], "a": [0, 1], "e": "注意缺陷多动障碍的核心症状为注意力不集中和多动冲动,本题中上课无法专心、打断老师符合核心症状,因此A、B正确;品行障碍属于注意缺陷多动障碍常见的共病,并非核心症状,C错误;学习困难是注意力缺陷引发的继发症状,并非核心症状,D错误;情绪低落属于常见伴随症状,并非核心症状,E错误。", "type": "multi"}, {"q": "以下关于阿尔茨海默病的临床典型表现,描述正确的有哪些?", "o": ["患者的记忆力会呈现进行性减退的趋势", "会逐渐出现全方面的认知功能衰退", "多数可查见脑萎缩等脑器质性病变的证据", "常伴随情绪不稳定、行为冲动等情绪行为异常", "核心症状是意识清晰状态下出现身份分离症状"], "a": [0, 1, 2, 3], "e": "阿尔茨海默病(AD)属于脑器质性精神障碍,核心典型表现包括进行性加重的记忆力减退、全面认知功能下降,存在脑萎缩等器质性病变证据,多数患者会伴随情绪行为异常,因此ABCD正确。意识清晰下的分离症状是分离障碍的典型表现,不属于阿尔茨海默病的典型症状,因此E错误。", "type": "multi"}, {"q": "某男性,35岁,有8年饮酒史,近2年每日必须饮用高度白酒8两以上,不饮酒则浑身不适,以下属于酒精依赖综合征核心特征的有哪些?", "o": ["对酒精的耐受性不断增加,需要饮用更多酒才能达到原有感受", "停止饮酒后会出现手抖、心慌、出汗等戒断症状", "明知饮酒有害但完全无法控制自身的饮酒行为", "因为长期饮酒已经无法正常完成工作,社会功能受损", "突然断酒后出现短暂性意识模糊、幻视等意识障碍"], "a": [0, 1, 2], "e": "酒精依赖综合征的核心特征包括三点:耐受性增加、戒断症状、无法控制饮酒行为,因此ABC正确。社会功能受损是酒精依赖带来的继发结果,不属于核心特征;短暂性意识障碍是震颤谵妄的表现,也不是酒精依赖的核心特征,因此DE错误。", "type": "multi"}, {"q": "某女性,29岁,全职宝妈,近半年总觉得生活没有价值,情绪低落,抱怨家人不够关心自己,从积极心理学视角出发,适合采用的干预措施包括?", "o": ["指导求助者每日记录3件当天值得感恩的小事", "帮助求助者发现自身核心优势,在日常生活中主动运用", "鼓励求助者安排固定的休闲娱乐时间,做自己喜欢的事", "要求求助者必须尽快外出工作,脱离家庭环境改变状态", "指导求助者通过认知重评纠正自动负性思维"], "a": [0, 1, 2], "e": "积极心理学的常见干预中,感恩记录可以提升个体积极情绪,优势使用能够提升个体自我价值感,增加休闲娱乐可以改善低落情绪,因此ABC正确。强制求助者外出工作违反心理咨询伦理,不属于合理干预;认知重评是认知行为疗法的技术,不属于积极心理学核心干预技术,因此DE错误。", "type": "multi"}, {"q": "某大学生,女,21岁,在小区散步时看到老人不小心摔倒,主动上前搀扶并联系家属,认为帮助有需要的人是自己应该做的,不期待任何回报。根据社会心理学利他行为理论,该行为符合哪些描述?", "o": ["纯粹利他行为", "利己性利他行为", "互惠性利他行为", "亲社会行为", "应急性利他行为"], "a": [0, 3], "e": "纯粹利他是指出于内在道德准则实施帮助,不期待任何外部回报,符合题干中求助者的行为特征;亲社会行为泛指一切有益于他人和社会的行为,该行为符合亲社会行为的定义,因此AD正确。利己性利他期待获得即时回报,互惠性利他期待未来获得对方回报,均不符合题干;应急性利他发生在突发紧急危险场景,题干属于日常场景,因此BCE错误。", "type": "multi"}, {"q": "某男性,52岁,原发性高血压患者,近期因为工作压力大情绪烦躁易怒,导致血压控制不佳,波动明显,从健康心理学视角出发,适合的干预措施包括?", "o": ["学习渐进式肌肉放松训练,调节情绪波动", "通过认知重评纠正“所有事都必须做到完美”的不合理愤怒思维", "强制要求患者加大降压药服用剂量", "鼓励患者每周规律参与适度的慢跑、游泳等体育锻炼", "告知患者情绪不影响血压,只需要专注吃药就可以"], "a": [0, 1, 3], "e": "对于高血压患者的心理干预,放松训练可以有效调节情绪,稳定血压;认知重评能够纠正不合理的负性思维,减少情绪冲动;适度体育锻炼可以帮助调整身心状态,稳定血压,因此ABD正确。咨询师无权强制来访者调整用药剂量,违反职业伦理;忽略情绪问题对血压的影响,不利于血压控制,因此CE错误。", "type": "multi"}, {"q": "某男生,19岁,大学生,因为舍友在宿舍公放音乐严重影响自己休息,和舍友发生口角后情绪愤怒,动手将舍友打伤,事后非常后悔但承认当时就是忍不住想报复对方。根据社会心理学侵犯行为理论,该行为符合哪些分类?", "o": ["敌意性侵犯", "工具性侵犯", "主动性侵犯", "被动性侵犯", "生理性侵犯"], "a": [0, 2], "e": "敌意性侵犯是指出于愤怒、报复等情绪目的实施的侵犯,该行为核心是愤怒报复,符合敌意性侵犯;该侵犯行为由来访者主动发起,符合主动性侵犯的定义,因此AC正确。工具性侵犯是指以侵犯为手段达到其他目的,不是为了报复本身,不符合题干;被动性侵犯是指被动反击对方的侵犯,不符合该案例;生理性侵犯强调生理驱动,不符合题干情绪驱动的特征,因此BDE错误。", "type": "multi"}, {"q": "某男童,2岁10个月,只会说简单的单字,无法说出完整的主谓句,和其他同龄小朋友交流时存在明显障碍,到医院检查排除了器质性病变。根据幼儿语言发展的相关知识,该男童可能的情况包括?", "o": ["语言发育迟缓", "正常的语言发育延迟", "先天性听力障碍", "中度智力发育障碍", "孤独症谱系障碍"], "a": [0, 1], "e": "3岁左右儿童已经能够说出完整句子,该男童语言能力明显落后于同龄儿童,符合语言发育迟缓的诊断;部分儿童会出现轻微的语言发育波动,属于正常的语言延迟,因此AB正确。题干已经明确排除器质性病变,听力障碍属于器质性病变,智力障碍、孤独症谱系障碍都会伴随其他典型的异常症状,题干未提及,因此CDE错误。", "type": "multi"}, {"q": "某男性,68岁,退休教师,近一年来变得不愿接受新的生活理念,更习惯按照旧习惯生活,经常和晚辈讲自己年轻时的经历,觉得现在的生活不如过去舒服,不愿意主动参加新的社交活动,以自我感受为先安排生活。根据老年期人格发展的特点,以下属于正常老年人格变化的有哪些?", "o": ["变得固执保守", "存在怀旧倾向", "社交活动减少", "自我中心倾向", "情绪稳定性明显下降"], "a": [0, 1, 2, 3], "e": "老年期正常的人格变化包括固执保守、怀旧倾向、社交活动主动减少、自我中心倾向,因此ABCD正确。情绪稳定性明显下降属于病理性的人格改变,不属于正常老化带来的人格变化,因此E错误。", "type": "multi"}, {"q": "某女性,42岁,慢性偏头痛患者,疼痛已经持续8个月,因为长期疼痛经常焦虑不安,总觉得“这个疼痛这辈子都好不了了”,从健康心理学视角出发,适合的干预措施包括?", "o": ["通过认知重评纠正“疼痛永远无法治愈”的灾难化思维", "强制要求患者每天进行长时间的高强度运动", "学习深呼吸放松训练,缓解疼痛伴随的焦虑情绪", "邀请患者加入慢性疼痛患者互助小组,获得社会支持", "建议患者忽略疼痛,专注工作转移注意力"], "a": [0, 2, 3], "e": "针对慢性疼痛患者的心理干预,认知重评可以纠正灾难化负性思维,放松训练可以缓解焦虑情绪,互助小组能够提供有效的社会支持,因此ACD正确。高强度运动会加重疼痛症状,不符合干预原则;忽略疼痛不处理不利于患者康复,因此BE错误。", "type": "multi"}, {"q": "某年轻运动员,男,25岁,每次公开比赛时,现场观众越多,他的发挥就越好,成绩比私下训练更好。根据社会心理学的社会促进理论,该现象的核心影响因素包括?", "o": ["当前任务的难度水平", "在场他人的性质类型", "个体当前的唤醒水平", "现场观众的群体规模", "个体的性格内向还是外向"], "a": [0, 1, 2], "e": "社会促进效应的核心影响因素包括任务难度、他人在场的类型、个体的唤醒水平,因此ABC正确。群体规模是群体其他效应的影响因素,不属于社会促进的核心影响因素;个体性格属于次要因素,不是核心影响因素,因此DE错误。", "type": "multi"}, {"q": "某女性,23岁,刚入职新公司,不适应新的工作节奏,近3个月出现情绪低落、焦虑失眠、工作效率下降的症状,4个月后症状自行缓解,符合适应障碍诊断的典型特征包括以下哪些?", "o": ["发病前存在明确的应激生活事件", "症状持续时间一般不超过6个月", "多数患者会出现社会功能受损的表现", "症状程度较轻的患者可自行缓解", "一般存在明确的器质性病变基础"], "a": [0, 1, 2, 3], "e": "适应障碍的典型特征包括:发病前有明确的应激源,症状持续时间不超过6个月,多数患者会出现社会功能受损,症状较轻者可自行缓解,因此ABCD正确。适应障碍属于心理应激相关障碍,没有器质性病变基础,因此E错误。", "type": "multi"}, {"q": "某女大学生,20岁,情绪波动非常大,经常因为一点小事就大发脾气,做事冲动风风火火,缺乏耐心,参加社团活动总是刚开始热情高涨,很快就因为不耐烦半途而废。根据人格心理学中气质类型的相关理论,以下描述正确的有哪些?", "o": ["该求助者的气质类型属于胆汁质", "对应的巴甫洛夫高级神经活动类型为强、不平衡型", "该求助者的气质类型属于多血质", "对应的巴甫洛夫高级神经活动类型为强、平衡、灵活型", "该求助者的气质类型属于抑郁质"], "a": [0, 1], "e": "胆汁质的典型特征是情绪冲动、精力旺盛、缺乏耐心,符合题干求助者的表现;巴甫洛夫的高级神经活动分类中,胆汁质对应强、不平衡的不可遏制型,因此AB正确。多血质虽然善于社交,但耐受性更好,不会轻易半途而废,对应强、平衡、灵活型,不符合题干表现;抑郁质以敏感、内向、脆弱为核心特征,不符合题干,因此CDE错误。", "type": "multi"}, {"q": "某男性,28岁,设计师,原本认为“不按时下班就是工作效率低”,进入新公司后整个团队都有加班的文化,为了融入团队,他逐渐改变了原有观点,最终接受了“不同行业工作节奏不同,加班是项目制工作的正常环节”的稳定观点。根据社会心理学态度改变的阶段理论,该求助者的态度改变过程包含哪些阶段?", "o": ["依从", "认同", "内化", "服从", "从众"], "a": [1, 2], "e": "认同指个体为融入群体主动调整自身态度,符合题干中求助者为融入新团队主动改变认知的表现,B正确;内化指将新观点纳入自身态度体系,形成稳定的态度,符合题干最终稳定接受新观点的结果,C正确;依从仅为表面顺从,内心仍然保留原有分歧,不符合题干最终形成稳定态度的结果;服从需要有权威的指令要求,题干中没有权威强制要求;从众仅为表面跟随群体行为,没有形成稳定的内在态度改变,不符合题干最终内化的结果,因此ADE错误。", "type": "multi"}, {"q": "某男性,48岁,医生,近3年出现明显的职业倦怠,对出诊查房失去热情,认为自己的工作“治不好病,没有任何价值”,伴随失眠、食欲下降,无法正常完成门诊工作。根据埃里克森的心理社会发展理论,该求助者面临的核心冲突及相关问题包括?", "o": ["繁殖对停滞的中年期核心冲突", "职业认同危机", "亲密对孤独的成年早期核心冲突", "自我整合对绝望的老年期核心冲突", "亲密关系冲突"], "a": [0, 1], "e": "埃里克森的心理社会发展理论中,中年期的核心冲突是繁殖对停滞,该求助者处于中年阶段,对工作失去意义感,符合停滞的状态,因此A正确;职业认同危机指个体对自身职业角色产生怀疑,找不到职业价值,符合该求助者职业倦怠的表现,因此B正确。C选项是成年早期的冲突,D选项是老年期的冲突,年龄阶段不匹配;题干未提及亲密关系冲突,因此CDE错误。", "type": "multi"}, {"q": "某互联网公司技术主管,男,38岁,长期认为“三十岁以上的技术人员都学习能力差,跟不上技术迭代”,即使遇到能力优秀的三十岁以上求职者,仍然坚持该观点,拒绝录用该群体。根据社会心理学的偏见相关理论,该主管的认知属于哪些范畴?", "o": ["刻板印象", "偏见态度", "歧视行为", "首因效应", "近因效应"], "a": [0, 1], "e": "刻板印象指对某一特定群体形成固定、概括性的看法,无视个体差异,符合题干中对三十岁以上技术群体的固定认知,A正确;偏见指对特定群体的负面评价与不公平态度,符合题干中的错误认知倾向,B正确;歧视指基于偏见产生的实际行为,题干仅描述了认知与态度层面,未体现实际行为;首因效应、近因效应属于单次人际知觉的偏差,不符合针对整个群体的刻板印象特征,因此C、D、E错误。", "type": "multi"}, {"q": "求助者,女,29岁,已婚育有一女,和公公婆婆共同居住,家中大小事务均由婆婆做主,丈夫凡事都听从婆婆安排,求助者多次因为孩子教育、家庭开支和婆婆发生矛盾,丈夫每次都躲出去不肯出面协调。根据家庭系统理论,该家庭存在的问题包括?", "o": ["三角缠关系模式", "家庭边界模糊不清", "家庭权力结构失衡", "代际联盟关系异常", "亲子关系冲突"], "a": [0, 1, 2, 3], "e": "家庭系统理论中,三角缠指第三方介入小家庭的核心冲突,本案中丈夫的退缩回避形成三方纠缠的关系模式,A正确;公婆介入小家庭日常事务,属于家庭边界模糊,B正确;婆婆主导所有家庭事务,体现权力结构失衡,C正确;丈夫站在婆婆一边形成排斥求助者的联盟,属于联盟关系异常,D正确;题干未提及亲子冲突,E错误。", "type": "multi"}, {"q": "求助者,男,38岁,近半年总觉得胸部闷痛、腹胀,多次到三甲医院做CT、胃肠镜等全面检查,未查出任何器质性病变,但仍然坚信自己得了不治之症,反复要求做进一步检查,明知没有问题却控制不住担忧。以下属于该求助者可能的诊断方向的是?", "o": ["躯体形式障碍", "疑病障碍", "广泛性焦虑障碍", "强迫障碍", "躁狂发作"], "a": [0, 1], "e": "躯体形式障碍包含无器质性基础的躯体不适症状,疑病障碍是躯体形式障碍的核心亚型,以持续坚信患重病的表现为核心特征,符合题干描述,A、B正确;广泛性焦虑以无明确对象的持续焦虑为核心,没有坚信患病的核心表现,C错误;强迫障碍以反复出现的强迫思维或强迫行为为核心,不符合题干核心症状,D错误;躁狂发作以情感高涨、思维奔逸为核心,题干未提及相关表现,E错误。", "type": "multi"}, {"q": "求助者,男,24岁,刚入职的新媒体运营,因为选题出错被主管批评后产生挫败低落情绪,随后主动加班修改内容,最终选题顺利通过获得好评。该案例体现的情绪功能包括?", "o": ["适应功能", "动机功能", "组织功能", "信号功能", "健康功能"], "a": [0, 1], "e": "适应功能指情绪帮助个体调整行为以适应环境变化,该求助者借助负性情绪调整行为完成工作任务,A正确;动机功能指情绪能够驱动个体产生目标行为,低落的挫败情绪推动其主动加班弥补错误,B正确;组织功能指情绪对认知活动的组织影响,题干未体现;信号功能指情绪传递人际信息,不符合题干描述;健康功能指情绪影响身心健康,题干未涉及相关内容,因此C、D、E错误。", "type": "multi"}, {"q": "求助者,女,62岁,冠心病患者,长期胸闷气短伴随焦虑情绪,坚信自己\"随时会心梗猝死\",不愿意配合医生进行康复训练。健康心理学视角下适合的干预措施包括?", "o": ["认知重评纠正灾难化思维", "指导腹式呼吸放松训练", "强制开展高强度运动训练", "鼓励参与冠心病康复互助小组", "开具抗焦虑药物处方"], "a": [0, 1, 3], "e": "认知重评可以纠正\"随时猝死\"的灾难化不合理信念,A正确;腹式呼吸可有效缓解呼吸困难与焦虑情绪,B正确;康复互助小组可提供社会支持与康复经验分享,提升训练依从性,D正确;高强度运动会加重心脏负担,不利于康复,C错误;药物治疗不属于心理咨询干预范畴,E错误。", "type": "multi"}, {"q": "求助者,女,20岁,舞蹈专业大学生,身高168cm,体重仅42kg,仍然觉得自己体型偏胖,过度节食,每天跳操2小时以上,已经停经半年,出现大量毛发脱落,无法正常完成课程学习。以下属于神经性厌食症核心诊断标准的是?", "o": ["显著的体重下降,低于正常标准", "对体重过度关注,恐惧体重增加", "拒绝维持正常的体重水平", "反复暴食后采取催吐代偿行为", "持续情绪低落"], "a": [0, 1, 2], "e": "神经性厌食症核心诊断标准为:显著体重下降/体重低于正常标准、对体重过度关注恐惧增加、拒绝维持正常体重,因此A、B、C正确;暴食后代偿行为是神经性贪食症的核心特征,D错误;情绪低落是常见共病症状,并非核心诊断标准,E错误。", "type": "multi"}, {"q": "求助者,女,28岁,性格内向孤僻,极少主动参与社交活动,遇到突发事情时情绪平稳不慌乱,做事固执己见,很难共情他人的情绪感受。根据艾森克的人格三维度理论,以下描述正确的是?", "o": ["该求助者外倾性(E)维度得分较高", "该求助者神经质(N)维度得分较低", "该求助者精神质(P)维度得分较高", "该求助者外倾性(E)维度得分较低", "该求助者神经质(N)维度得分较高"], "a": [1, 2, 3], "e": "艾森克人格三维度中,外倾性低分对应内向、孤僻、不喜社交,符合题干描述,D正确、A错误;神经质低分对应情绪稳定,面对压力反应平稳,符合题干描述,B正确、E错误;精神质高分对应固执、缺乏共情、人际疏离,符合题干描述,C正确。", "type": "multi"}, {"q": "求助者,女,26岁,设计公司职员,和部门同事关系融洽,她性格乐观热心,经常主动帮助同事,而且和大部分同事都有露营爬山的共同爱好。根据社会心理学人际吸引理论,影响其人际吸引的因素包括?", "o": ["个人积极人格特质", "态度与兴趣相似性", "性格互补性", "熟悉性", "空间临近性"], "a": [0, 1, 3], "e": "性格乐观乐于助人属于积极个人特质,会提升人际吸引,A正确;共同兴趣爱好属于态度与价值观相似性,相似性会提升人际吸引,B正确;作为同事日常频繁接触,熟悉性会提升人际吸引,D正确;题干未提及性格互补或空间距离极近的描述,C、E错误。", "type": "multi"}, {"q": "求助者,男,40岁,程序员,近半年出现入睡困难,一般躺下后超过40分钟才能睡着,夜间经常惊醒,醒后很难再次入睡,白天头晕乏力,严重影响工作效率。健康心理学视角下适合的睡眠干预措施包括?", "o": ["建立规律的睡眠-觉醒节律", "睡前1小时避免使用电子设备", "睡前饮用大量浓咖啡提神", "进行渐进式肌肉放松训练", "长期服用镇静催眠药物"], "a": [0, 1, 3], "e": "规律睡眠节律、避免电子设备蓝光干扰、放松训练均为科学有效的非药物睡眠干预措施,A、B、D正确;咖啡含咖啡因会兴奋神经加重失眠,C错误;长期服用镇静催眠药会产生药物依赖,且不属于心理咨询干预范畴,E错误。", "type": "multi"}, {"q": "求助者,女,16岁,高一学生,近1年频繁更换兴趣班,一会儿学画画一会儿学古筝,对未来考大学选专业十分迷茫,常思考\"我到底想成为什么样的人\",和父母频繁争吵,认为父母完全不理解自己。根据埃里克森人格发展理论,该求助者的表现符合?", "o": ["同一性对角色混乱的核心发展冲突", "同一性延缓状态", "同一性早闭状态", "同一性扩散状态", "勤奋对自卑的学龄期冲突"], "a": [0, 1, 3], "e": "青少年期的核心发展冲突就是同一性对角色混乱,A正确;同一性延缓指个体正在探索自我身份但未做出稳定承诺,符合题干迷茫、频繁更换爱好的表现,B正确;同一性扩散指个体既未探索自我也未做出身份承诺,符合长期迷茫无方向的状态,D正确;同一性早闭指未探索就直接接受他人安排的身份承诺,不符合题干描述;勤奋对自卑是学龄期的核心冲突,E错误。", "type": "multi"}, {"q": "求助者,男,21岁,大学生,原本唱歌水平稳定,正常发挥可以拿到90分,在学院歌手大赛现场,台下坐满了观众和评委,他发挥失常只拿到65分。根据社会心理学社会影响理论,该现象属于?", "o": ["社会抑制", "社会促进", "群体极化", "他人在场的负面影响", "社会惰化"], "a": [0, 3], "e": "社会抑制指他人在场导致个体操作表现下降,符合题干原本发挥稳定、他人在场导致发挥失常成绩下降的表现,A正确;该现象本质就是他人在场带来的负面影响,D正确;社会促进指他人在场提升操作表现,不符合题干;群体极化指群体决策中观点走向极端,不符合;社会惰化指群体合作中个体努力程度下降,不符合,因此B、C、E错误。", "type": "multi"}, {"q": "以下属于惊恐障碍典型临床表现的是?", "o": ["突发的惊恐发作", "发作间期完全正常", "预期性焦虑", "回避发作相关场景", "持续情绪低落"], "a": [0, 1, 2, 3], "e": "惊恐障碍核心特征为突发不可预测的惊恐发作、发作间期完全正常,A、B正确;多数患者发作后会出现预期性焦虑,担心再次发作,C正确;部分患者会回避曾经发作的场所,D正确;持续情绪低落为抑郁发作核心表现,不符合惊恐障碍,E错误。", "type": "multi"}, {"q": "求助者,女,28岁,设计师,所在公司老板经常强制要求修改方案、安排不属于她职责的工作,她很少能和同事深入交流,感觉工作完全没有自主权,最近情绪低落,职业倦怠明显。根据自我决定理论,该求助者缺失的心理需求包括?", "o": ["自主需求", "胜任需求", "关联需求", "尊重需求", "生理需求"], "a": [0, 2], "e": "自我决定理论的三种基本心理需求为自主、胜任、关联。求助者被强制安排工作,缺乏自主控制权,缺失自主需求,A正确;求助者在工作中缺乏与他人的积极情感联结,缺失关联需求,C正确;题干未提及能力不足无法胜任工作,胜任需求未缺失,B错误;尊重需求、生理需求不属于自我决定理论的基本心理需求范畴,D、E错误。", "type": "multi"}, {"q": "求助者,女,32岁,护士,近1年职业倦怠明显,对护理工作失去热情,认为\"自己根本做不好护理工作,没法给病人提供好的照顾\"。积极心理学视角下,优势使用干预的正确步骤包括?", "o": ["识别求助者的核心人格优势", "鼓励将优势应用于日常护理工作", "批评其消极自我评价", "协助发现优势带来的成就感", "强制增加每日工作时长"], "a": [0, 1, 3], "e": "优势使用干预的核心步骤为识别优势、应用优势、强化优势带来的积极体验,A、B、D正确;批评消极自我评价违反积极心理学接纳原则,C错误;强制增加工作时长会加重职业倦怠,E错误。", "type": "multi"}, {"q": "求助者,男,45岁,部门经理,近1年频繁忘记刚发生的日常小事,比如忘记关饮水机、记不起新客户的名字,医院全面检查未发现任何器质性脑部病变。根据记忆遗忘理论,该求助者的遗忘属于?", "o": ["暂时性遗忘", "永久性遗忘", "顺行性遗忘", "逆行性遗忘", "良性记忆减退"], "a": [0, 4], "e": "该求助者的遗忘为暂时的、无器质性病变的良性记忆减退表现,A、E正确;永久性遗忘指无法恢复的记忆丧失,不符合题干描述;顺行性遗忘指无法形成新记忆,题干仅为忘记近期小事而非无法编码新记忆;逆行性遗忘指无法回忆过往经历,均不符合,B、C、D错误。", "type": "multi"}, {"q": "求助者,女,48岁,国企部门主管,近3年对工作逐渐失去动力,觉得日常管理工作毫无价值,不愿带领新员工成长,近年也很少主动规划家庭活动,常伴随入睡困难、体重下降,工作效率明显降低。根据埃里克森的心理社会发展理论,该求助者的状态符合以下哪些描述?", "o": ["中年期繁殖对停滞的核心冲突", "职业认同危机", "成年早期亲密对孤独的冲突", "老年期自我整合对绝望的冲突", "青年期同一性对角色混乱的冲突"], "a": [0, 1], "e": "埃里克森心理社会发展理论中,中年期的核心发展冲突为繁殖感对停滞感,繁殖感不仅指生育后代,也包括通过工作创造价值、指导下一代获得意义感,该求助者对工作和生活都失去价值感,符合停滞的状态,因此A正确;职业认同危机指个体对自身职业角色的意义产生怀疑,符合该求助者倦怠的表现,B正确;C对应18-25岁左右的成年早期,D对应65岁之后的老年期,E对应12-18岁的青年期,均和该求助者年龄阶段与表现不符,因此C、D、E错误。", "type": "multi"}, {"q": "求助者,女,32岁,遭遇重大家暴后1个半月,突然不辞而别离开居住地,两个月后在外地被亲友找到,本人完全无法说出离开后两个多月的经历,颅脑CT等各项器质性检查均无异常结果。该求助者的表现符合哪类症状诊断?", "o": ["分离性漫游", "分离性遗忘", "创伤后应激障碍", "急性应激障碍", "血管性痴呆"], "a": [0, 1], "e": "分离性漫游的核心表现是突然无目的的离开原有居所出行,发作后无法回忆起出行期间的经历,符合题干描述,因此A正确;分离性漫游发作通常伴随分离性遗忘,对出行期间的经历存在记忆缺失,因此B正确;创伤后应激障碍的核心症状是闯入性创伤回忆、回避创伤相关刺激、负性认知和警觉性增高,和该表现不符;急性应激障碍通常发生在创伤事件后1周以内,题干中发生在创伤后一个半月,不符合;血管性痴呆存在器质性脑组织病变,题干检查无异常,不符合,因此C、D、E错误。", "type": "multi"}, {"q": "求助者,女,21岁,大专学生,近一年情绪波动极大,常因和室友的小矛盾大发雷霆,做事冲动从不考虑后果,喜欢参加社团社交但很难坚持完成一项长期活动,小组任务中常常因为不耐烦提前退出,从不顾及团队进度。根据气质类型理论与巴甫洛夫高级神经活动类型学说,该求助者的表现符合以下哪些描述?", "o": ["胆汁质气质类型", "多血质气质类型", "巴甫洛夫强、不平衡型高级神经活动", "巴甫洛夫强、平衡、灵活型高级神经活动", "抑郁质气质类型"], "a": [0, 2], "e": "胆汁质的核心特征是精力旺盛、情绪冲动、难以控制情绪、缺乏耐心,符合题干求助者的表现,因此A正确;巴甫洛夫的高级神经活动类型中,强、不平衡型(不可遏制型)对应胆汁质,因此C正确;多血质对应强、平衡、灵活型,特征是善于社交、适应性强、耐心优于胆汁质,不符合题干冲动缺乏耐心的特征,因此B、D错误;抑郁质核心特征是敏感内向、情绪脆弱,不符合该求助者表现,因此E错误。", "type": "multi"}, {"q": "求助者,男,65岁,退休教师,近2年变得越来越固执,不愿意接受新的线上教学方法,总说\"我之前的方法才是对的\",经常和老同事回忆过去教书的经历,觉得现在的年轻人不如以前,日常出门社交也越来越少,喜欢待在家里看书。根据老年期人格发展的特点,以下属于该年龄段正常人格变化的是?", "o": ["固执保守", "怀旧倾向", "情绪稳定性大幅下降", "社交活动减少", "自我中心倾向"], "a": [0, 1, 3, 4], "e": "老年期正常的人格变化包括固执保守、怀旧倾向、社交活动主动减少、自我中心倾向,因此A、B、D、E正确;情绪稳定性大幅下降属于病理状态的变化,不属于老年期正常的人格发展变化,因此C错误。", "type": "multi"}, {"q": "求助者,男,36岁,互联网公司职员,近一年996加班导致情绪低落,觉得工作毫无意义,抱怨领导不认可自己的付出,从积极心理学视角来看,适合该求助者的干预措施包括?", "o": ["每日记录三件让自己感到开心的小事", "识别并运用自身优势完成工作任务", "认知重评纠正自身的不合理信念", "每周安排固定的个人休闲运动时间", "强制要求立刻辞职换工作"], "a": [0, 1, 3], "e": "记录积极事件可以提升个体积极情绪体验,符合积极心理学干预思路,A正确;优势识别与运用可以提升个体自我价值感,属于积极心理学核心干预方法,B正确;安排休闲时间可以改善负面情绪状态,符合积极心理学干预原则,D正确;认知重评属于认知行为疗法的技术,不属于积极心理学的核心干预方法,C错误;强制辞职违反咨询伦理,也不符合积极心理学助人原则,E错误。", "type": "multi"}, {"q": "求助者,男,22岁,大学生,在食堂排队时被同学无意撞到,随即怒不可遏,动手将对方打成轻伤,事后非常后悔但称当时控制不住愤怒。根据社会心理学对侵犯行为的分类,该行为属于?", "o": ["敌意性侵犯", "工具性侵犯", "主动性侵犯", "被动性侵犯", "生理性侵犯"], "a": [0, 2], "e": "敌意性侵犯是指出于愤怒、报复等情绪动机实施的侵犯行为,符合题干中因为愤怒动手伤人的表现,A正确;主动性侵犯是指主动发起的侵犯行为,该求助者主动动手伤人,符合主动性侵犯的特征,C正确;工具性侵犯是指为了达成其他目标而实施的侵犯,题干中侵犯本身就是情绪发泄的目的,不符合,B错误;被动性侵犯是指被动反击他人的侵犯,不符合题干主动动手的特征,D错误;生理性侵犯是指基于生理本能的侵犯,题干是情绪驱动的社会行为,不符合,E错误。", "type": "multi"}, {"q": "临床心理咨询中,鉴别抑郁发作和持续性抑郁障碍(恶劣心境),需要重点关注的核心差异点包括?", "o": ["症状的病程时长", "抑郁症状的严重程度", "是否存在自杀意念", "情绪低落的波动特征", "社会功能受损的程度"], "a": [0, 1, 3, 4], "e": "抑郁发作的病程要求为至少2周,持续性抑郁障碍要求病程至少2年(儿童青少年为1年),因此病程时长是核心差异点,A正确;抑郁发作的抑郁症状更典型、严重程度更高,持续性抑郁障碍症状更轻,B正确;抑郁发作的情绪低落常呈明显波动,持续性抑郁障碍的情绪低落持续存在、波动不明显,D正确;抑郁发作社会功能受损通常更明显,持续性抑郁障碍社会功能受损较轻,E正确;自杀意念在两类障碍中都可能出现,不属于核心鉴别差异点,C错误。", "type": "multi"}, {"q": "关于卡特尔提出的流体智力和晶体智力理论,下列说法正确的有?", "o": ["流体智力以先天的神经系统禀赋为基础,发展轨迹随年龄增长先上升后下降", "晶体智力主要依赖后天的学习和经验积累,成年后仍然可以保持提升", "流体智力一般在青少年期达到发展顶峰,成年之后逐渐衰退", "晶体智力的发展水平和个体接受的教育、积累的生活经验密切相关", "流体智力和晶体智力的发展轨迹完全一致"], "a": [0, 1, 2, 3], "e": "流体智力依赖于先天的神经生理发展,随年龄增长先升后降,一般在青少年期达到顶峰,成年后逐渐衰退;晶体智力依赖于后天学习和经验积累,成年后仍然可以不断提升,发展轨迹和流体智力差异明显,因此E错误,ABCD均符合卡特尔的理论描述。", "type": "multi"}, {"q": "下列选项中,属于影响个体利他行为发生的情境因素的有?", "o": ["求助者和助人者的性格、成长背景相似程度", "现场旁观者的数量以及旁观者的行为表现", "求助情境的清晰可辨程度", "助人者当前的情绪状态好坏", "助人者当前可支配的时间紧张程度"], "a": [0, 1, 2, 4], "e": "利他行为的影响因素中,情境因素包括求助者与助人者的相似性、旁观者效应(旁观者人数与行为影响)、情境清晰度、助人者的时间压力等,因此A、B、C、E正确;个体自身的情绪状态属于助人者的个人特质因素,不属于情境因素,因此D错误。", "type": "multi"}, {"q": "根据心理咨询的职业伦理规范,下列属于保密原则例外情况的有?", "o": ["求助者明确告知咨询师自己准备三日后实施自杀,且已经购买了药物", "求助者说自己准备次日伤害长期霸凌自己的同事,且已经准备好工具", "求助者签署书面同意书,允许咨询师将自己的案例用于督导教学", "咨询师在咨询中发现求助者患有严重的未确诊的肺癌", "公安机关办理刑事案件,依法要求咨询师提供求助者的相关咨询记录"], "a": [0, 1, 2, 4], "e": "心理咨询保密原则的例外情况包括:求助者存在明确的自杀、伤人风险,经求助者书面同意披露咨询信息,法定机关依法要求披露信息。严重的躯体疾病本身不属于保密例外的范畴,咨询师需要鼓励求助者自行告知家属,但不能违反保密原则披露信息,因此D错误,ABCE均符合保密例外的要求。", "type": "multi"}, {"q": "下列选项中,属于积极心理学专属的临床干预技术的有?", "o": ["感恩拜访练习", "三件好事记录练习", "优势识别与运用练习", "正念减压疗法", "认知行为重构技术"], "a": [0, 1, 2], "e": "感恩拜访、三件好事记录、优势识别与运用都是积极心理学独创的专属干预技术,因此ABC正确;正念减压疗法属于传统正念干预体系,认知行为重构属于经典认知行为疗法的技术,二者都不是积极心理学专属的干预技术,因此DE错误。", "type": "multi"}, {"q": "求助者,女,28岁,市场策划,近期连续三个项目提案都没有通过,她将自己的失败归因为\"最近大环境经济不好,客户都砍了营销预算\",同时认为其他同事通过提案都是\"刚好走了狗屎运,遇到老板心情好\"。根据韦纳的归因理论,该求助者的归因包含以下哪些维度?", "o": ["外部归因", "稳定归因", "不稳定归因", "内部归因", "可控归因"], "a": [0, 2], "e": "韦纳归因理论中,大环境、运气都属于外部因素,因此该求助者的归因属于外部归因,A正确,D错误;大环境属于稳定因素,运气属于不稳定因素,该求助者的归因同时包含不稳定维度,因此C正确,B错误;大环境和运气都属于不可控因素,因此E错误。", "type": "multi"}, {"q": "求助者,男,25岁,新媒体运营,性格外向喜欢结交朋友,日常社交活动很多,情绪很容易受小事影响波动,经常因为工作不顺心焦虑失眠,做事认真细节控,对接工作从不敷衍出错。结合艾森克人格三维度理论与大五人格理论,下列描述正确的有?", "o": ["艾森克外倾性维度得分较高", "大五人格外向性维度得分较高", "艾森克神经质维度得分较高", "大五人格神经质维度得分较高", "大五人格尽责性维度得分较高"], "a": [0, 1, 2, 3, 4], "e": "艾森克理论中外倾性高分对应外向爱社交的特征,符合题干描述,A正确;大五人格中外向性高分同样对应外向爱社交的特征,B正确;艾森克神经质维度高分对应情绪不稳定、容易焦虑波动,符合题干描述,C正确;大五人格神经质维度高分对应情绪不稳定,符合题干,D正确;大五人格尽责性高分对应做事严谨细致、责任心强,符合题干描述,E正确。", "type": "multi"}, {"q": "求助者,女,29岁,全职妈妈,孩子1岁半,近半年频繁忍不住对孩子发脾气,甚至动手打孩子之后又极度愧疚,总说\"我不是一个合格的妈妈\",伴随入睡困难、食欲下降,对什么都提不起兴趣。作为心理咨询师,适合的干预方向包括?", "o": ["教授情绪调节的实用训练方法", "通过认知重评纠正过度自责的负性思维", "直接指出打骂孩子的错误并批评求助者", "鼓励求助者主动向家人寻求支持帮助", "为求助者开具抗抑郁药物进行治疗"], "a": [0, 1, 3], "e": "情绪调节训练可以帮助求助者控制情绪冲动,改善情绪失控问题,A正确;认知重评可以纠正求助者\"我不是合格妈妈\"的过度自责思维,B正确;鼓励求助者寻求家庭支持可以缓解独自带娃的压力,D正确;直接批评求助者违反咨询伦理,会破坏咨询关系,C错误;开具药物属于精神科医师的工作范畴,不属于心理咨询师的干预内容,E错误。", "type": "multi"}, {"q": "求助者,男,50岁,原发性高血压患者,近期因为职位调整情绪烦躁易怒,经常控制不住发脾气,导致血压波动明显,控制不佳。从健康心理学视角来看,适合的干预措施包括?", "o": ["教授渐进式肌肉放松训练调节情绪", "认知重评纠正容易引发愤怒的不合理思维", "强制要求求助者加大降压药的服用剂量", "鼓励求助者保持规律的慢跑等体育锻炼", "告诉求助者情绪不影响血压,只要吃药就可以"], "a": [0, 1, 3], "e": "放松训练可以帮助调节情绪,进而稳定血压,A正确;认知重评可以纠正引发愤怒的不合理思维,减少情绪波动对血压的影响,B正确;规律体育锻炼可以帮助调节情绪、控制血压,D正确;强制要求调整药物剂量违反咨询伦理,药物调整需要由内科医师操作,C错误;忽略情绪问题对血压的影响,不利于血压的长期控制,E错误。", "type": "multi"}, {"q": "某高校心理系课题组开展人格特质相关研究,采用经典大五人格(五因素模型)进行人格测评,下列选项属于该模型标准核心维度的有:", "o": ["经验开放性", "冲动性", "外向性", "宜人性", "神经质"], "a": [0, 2, 3, 4], "e": "大五人格五因素模型的五个核心维度为经验开放性、尽责性、外向性、宜人性、神经质,缩写为OCEAN;冲动性不属于该模型的标准核心维度,因此B选项错误。", "type": "multi"}, {"q": "求助者,男,35岁,程序员,近1年反复出现手机被监听的想法,无法控制地反复检查手机、更换手机号,明知没必要但无法停止,已经影响了日常工作。该表现属于哪种强迫思维类型?", "o": ["强迫怀疑", "强迫性穷思竭虑", "强迫联想", "强迫表象", "强迫意向"], "a": 0, "e": "强迫怀疑指反复对自身所处环境或行为的安全性产生不必要的怀疑,符合题干中反复怀疑手机被监听的表现,A正确;强迫性穷思竭虑指反复思考无意义的问题,不符合本题场景,B错误;强迫联想指看到某一观念就不由自主联想到相反的观念,不符合本题,C错误;强迫表象指头脑中反复出现特定的形象内容,不符合本题,D错误;强迫意向指反复出现想要做某种违背意愿的动作的冲动,不符合本题,E错误。", "type": "single"}, {"q": "根据案例描述,对该求助者的初步诊断最可能是:", "o": ["一般心理问题", "惊恐发作", "神经症性心理问题", "精神病性障碍", "适应障碍", "创伤后应激障碍"], "a": 0, "e": "该求助者症状由明确的现实工作应激事件引发,持续时间1个半月,情绪未出现泛化,社会功能仅轻度受损,符合一般心理问题的诊断标准。B惊恐发作以突发强烈濒死感、呼吸困难为核心表现,不符合;C神经症性问题的核心是内心冲突变形,与现实处境无关,不符合;D该求助者无精神病性症状,排除;E适应障碍需要应激事件后1个月内起病,病程超过3个月,不符合;F创伤后应激障碍需经历重大创伤性事件,伴随闪回、回避等症状,不符合。", "type": "single"}, {"q": "为鉴别该求助者的问题属于一般心理问题还是严重心理问题,咨询师最需要重点核实的内容是?", "o": ["求助者的身高体重变化", "求助者的情绪反应是否出现泛化", "求助者的睡眠质量变化情况", "求助者的既往考试成绩", "求助者的爱好类型", "求助者的饮食习惯"], "a": 1, "e": "一般心理问题和严重心理问题的核心鉴别要点是:一般心理问题情绪反应未泛化,严重心理问题情绪反应已经泛化,因此最需要重点核实的就是情绪是否泛化。其余选项均和二者的鉴别无关,因此正确答案为B。", "type": "single"}, {"q": "对该求助者进行初诊接待时,咨询师首先应该完成的工作是?", "o": ["直接询问求职失利的具体细节", "礼貌接待,介绍心理咨询的基本设置和保密原则", "直接给求助者修改简历的建议", "要求求助者立即完成全套人格测验", "评价求助者求职方向选择的合理性", "忽视求助者的情绪表达直接整理资料"], "a": 1, "e": "初诊接待的首要工作是礼貌接待求助者,清晰告知咨询的基本设置与保密原则,建立安全信任的咨询氛围。A直接询问细节不符合初诊接待流程,C未收集完整资料不能提前给出建议,D初诊不需要立即要求完成测验,E、F都违背了尊重和倾听的基本要求,因此正确答案为B。", "type": "single"}, {"q": "该求助者的主诉核心是?", "o": ["和班主任发生矛盾", "不愿正常上学,存在社交回避", "食欲下降", "在家熬夜刷短视频", "出现幻视", "父母期望过高"], "a": 1, "e": "求助者的主诉核心是求助者最主要的困扰,本案中最主要的问题是不愿正常上学、回避学校社交,其余选项要么未提及,要么是伴随症状,因此正确答案为B。", "type": "single"}, {"q": "咨询师在对该求助者进行初诊接待时,下列做法正确的是?", "o": ["直接建议求助者辞去工作专心照顾孩子", "专注倾听求助者表达,不随意打断其叙述", "要求求助者第一时间完成所有心理测评量表", "指出求助者不会平衡生活和工作的问题所在", "忽略求助者的情绪感受直接收集资料", "初诊接待时直接给出确诊结论"], "a": 1, "e": "初诊接待阶段咨询师最核心的要求是尊重和倾听,需要认真倾听求助者倾诉,不随意打断。选项A、D违背了心理咨询的尊重和不评判原则;选项C,初诊接待阶段先进行会谈收集信息,不需要直接要求立刻完成测验;选项E、F违背初诊接待的基本工作规范,因此正确答案为B。", "type": "single"}, {"q": "若咨询师为该求助者选用抑郁自评量表(SDS)进行情绪评估,该测验的主要用途是?", "o": ["评估求助者抑郁症状的严重程度", "直接对求助者做出抑郁症诊断", "评估求助者焦虑症状的严重程度", "直接对求助者做出焦虑症诊断", "评估求助者的人格特质倾向", "评估求助者的智力发展水平"], "a": 0, "e": "抑郁自评量表SDS的核心用途是评估个体抑郁症状的严重程度,仅作为筛查和评估工具,不能直接用于诊断抑郁症,抑郁症的诊断需要结合临床访谈等综合评估,也无法用于评估焦虑、人格、智力等其他内容,因此B、C、D、E、F均错误,正确答案为A。", "type": "single"}, {"q": "该求助者的核心心理问题是?", "o": ["不愿和同学一起游戏", "分离焦虑症状", "上课注意力无法集中", "上学哭闹的行为问题", "担心老师不喜欢自己", "由家长陪同前来求助"], "a": 1, "e": "该求助者核心问题是分离焦虑,即害怕与照料者(妈妈)分离,不愿上学、哭闹、注意力不集中、不愿社交都是分离焦虑引发的伴随症状,A、C、D是伴随表现而非核心问题,E题干未提及,F是求助方式,因此正确答案为B。", "type": "single"}, {"q": "若咨询师需要评估该儿童的社交焦虑水平,选用儿童社交焦虑量表(CSAI),该量表的适用人群是?", "o": ["0-3岁婴幼儿", "6-12岁儿童", "18岁以上成年人群", "60岁以上老年人群", "仅适用于已经确诊社交障碍的儿童", "仅适用于高校大学生群体"], "a": 1, "e": "儿童社交焦虑量表(CSAI)的适用人群为6-12岁的儿童,用于评估该年龄段儿童的社交焦虑水平,并非仅适用于确诊社交障碍的儿童,也不适用于其他年龄段人群,因此A、C、D、E、F均错误,正确答案为B。", "type": "single"}, {"q": "该求助者目前最主要的情绪症状是?", "o": ["莫名焦虑不安", "情绪低落", "恐惧害怕出门", "烦躁易怒", "兴奋话多", "情感淡漠"], "a": 1, "e": "题干中明确提及求助者核心情绪为孤独伴随情绪低落,其余选项的症状在案例中并未提及,因此正确答案为B。", "type": "single"}, {"q": "咨询师为了鉴别该求助者的问题是否属于严重心理问题,最需要重点核实的信息是?", "o": ["求助者的情绪反应是否出现泛化", "子女是否计划回国探望", "老伴去世的具体原因", "求助者日常的饮食偏好", "求助者既往是否有精神病家族史", "老年合唱团的成员人数"], "a": 0, "e": "严重心理问题的核心鉴别要点是情绪反应是否出现泛化,该求助者病程1个月,是否泛化是核心鉴别点。选项B、C、D、F都属于和诊断无关的信息,选项E既往史不属于严重心理问题诊断的核心鉴别项,因此正确答案为A。", "type": "single"}, {"q": "该求助者的核心情绪症状是?", "o": ["人格解体", "焦虑恐惧", "情感淡漠", "烦躁易怒", "入睡困难", "情感倒错"], "a": 1, "e": "本题考核焦虑情绪症状的识别。案例中求助者面对公开社交场景出现明显的躯体焦虑反应,核心情绪为对社交场景的焦虑恐惧,其余选项均未在案例中体现,因此正确答案为B。", "type": "single"}, {"q": "根据该求助者的症状表现,最符合的初步评估是?", "o": ["精神分裂症", "进食障碍", "社交焦虑障碍", "抑郁发作", "特定恐怖症", "适应障碍"], "a": 2, "e": "本题考核社交焦虑障碍的初步评估要点。该求助者症状持续3个月,在社交公开场景下出现明显焦虑反应并主动回避,社会功能受损,符合社交焦虑障碍的评估标准,其余选项不符合症状特征,因此正确答案为C。", "type": "single"}, {"q": "若该求助者在咨询中透露有自杀相关的想法或计划,咨询师的正确处理方式是?", "o": ["严格遵守保密原则,不向任何人透露", "打破保密限制,通知其家属或学校心理危机干预部门", "立刻自行终止咨询并转介 学校?是怕见同学吗?为什么不早说呢?”", "指责反问:“这么点小事你怎么就扛不住了?”"], "a": [0, 1], "e": "摄入性会谈中,开放式提问可以收集更多信息,封闭式提问可以确认特定问题,二者都是恰当的提问方式。C责备式、D评判式、E连环追问、F指责反问都会引发求助者的防御心理,影响求助者的真实表达,都属于不恰当的提问方式,因此排除。", "type": "multi"}, {"q": "该求助者目前存在的社会功能受损表现包括?", "o": ["无法正常上学", "回避学校社交", "食欲减退", "整日在家独处不出门", "体重下降", "主动求助"], "a": [0, 1, 3], "e": "社会功能受损指个体无法正常完成原本的社会角色任务、出现社交退缩回避,本案中无法正常上学、回避社交、整日独处都属于社会功能受损的表现。C食欲减退、E体重下降属于躯体症状,F主动求助是积极行为,不属于社会功能受损,因此排除。", "type": "multi"}, {"q": "在和该求助者建立咨询关系的过程中,咨询师正确的做法包括?", "o": ["尊重求助者不想上学的感受", "热情接待求助者,让求助者感受到接纳", "随时表达自己对这件事的主观看法", "共情理解求助者面对成绩压力的焦虑情绪", "积极关注求助者主动求助的行为", "替求助者向学校老师请假办理休学"], "a": [0, 1, 3, 4], "e": "建立良好咨询关系的核心要素包括尊重、热情、真诚、共情、积极关注。真诚不代表随意表达自己的主观判断,C错误;咨询师需要保持专业边界,不能替求助者解决具体的现实事务,F错误,其余选项均符合要求。", "type": "multi"}, {"q": "下列属于该求助者应激相关情绪症状的有?", "o": ["情绪烦躁", "容易发脾气", "照顾孩子与工作冲突", "对家务感到厌烦", "自行上网搜索情绪调节方法", "主动求助咨询"], "a": [0, 1, 3], "e": "应激相关症状指应激事件引发的情绪、行为等症状,本题中情绪烦躁、易发脾气、对家务厌烦都属于应激引发的情绪相关症状。C是诱发应激的应激事件本身,不属于症状;E是求助者的自发行为,F是求助行为,均不属于应激相关症状,因此正确答案为ABD。", "type": "multi"}, {"q": "咨询师为该求助者收集临床资料时,需要重点收集的内容包括?", "o": ["求助者近期的睡眠饮食状况", "求助者可获得的家庭支持情况", "求助者日常工作的压力程度", "求助者既往是否出现过类似情绪问题", "求助者孩子的学校和班级信息", "求助者日常的休闲娱乐爱好"], "a": [0, 1, 2, 3], "e": "临床资料收集需要重点关注和求助者当前心理问题相关的核心信息,包括躯体状态(睡眠饮食)、社会支持系统、压力源、既往情绪史等,选项E、F属于和当前问题无关的次要补充信息,不属于重点收集内容,因此正确答案为ABCD。", "type": "multi"}, {"q": "下列属于规范心理咨询基本流程的选项有?", "o": ["明确求助者的核心心理问题", "和求助者共同制定咨询方案", "按照方案逐步开展咨询工作", "咨询结束阶段评估整体咨询效果", "咨询师直接告知求助者具体解决问题的方法", "咨询师替求助者做出人生重大决策"], "a": [0, 1, 2, 3], "e": "规范心理咨询的基本流程依次为:明确求助者的核心问题、共同制定咨询方案、实施咨询方案、评估咨询效果。咨询师的工作是帮助求助者获得成长,自己解决问题,不能直接替求助者做决策或者直接给出解决方法,选项E、F违背心理咨询的伦理和工作原则,因此正确答案为ABCD。", "type": "multi"}, {"q": "咨询师和该儿童求助者进行摄入性会谈时,可以采用的技巧包括?", "o": ["借助游戏玩具辅助开展沟通", "使用儿童可以理解的简单语言", "直接询问儿童的家庭隐私问题", "对儿童的表达给予积极正向反馈", "强迫儿童回答他不愿意回答的问题", "使用专业心理学术语解释问题"], "a": [0, 1, 3], "e": "和儿童开展会谈需要适配儿童的认知特点,可使用游戏辅助沟通,用简单易懂的语言交流,及时给予儿童积极反馈。选项C直接询问隐私不尊重求助者,选项E强迫回答违背尊重原则,选项F专业术语儿童无法理解,因此C、E、F错误,正确答案为ABD。", "type": "multi"}, {"q": "该求助者存在的社会功能受损表现包括?", "o": ["无法正常到校上学", "不愿和同班同学玩耍", "上课注意力不集中,学习受影响", "不愿意按时完成家庭作业", "不愿意主动整理个人书包", "由家长陪同前来求助"], "a": [0, 1, 2], "e": "社会功能受损指个体无法完成正常的社会活动、学习等功能,该案例中无法正常上学、不愿社交、学习受影响都属于社会功能受损表现,D、E为未提及的无关内容,F为求助方式,不属于社会功能受损,因此正确答案为ABC。", "type": "multi"}, {"q": "咨询师和该儿童求助者建立咨询关系时,正确的做法包括?", "o": ["以平等的态度对待儿童求助者", "尊重儿童自身的感受和想法", "使用儿童能够理解的方式沟通", "关注儿童的安全感,给予足够的包容", "儿童哭闹时直接批评制止这种行为", "替儿童做所有和咨询相关的决定"], "a": [0, 1, 2, 3], "e": "和儿童求助者建立咨询关系,需要做到平等对待、尊重儿童感受、使用儿童可理解的沟通方式、给予儿童足够的安全感。直接批评儿童的哭闹行为、替儿童做所有决定都违背咨询关系建立的基本原则,因此E、F错误,正确答案为ABCD。", "type": "multi"}, {"q": "该求助者目前存在的社会功能受损表现包括?", "o": ["不再参与原有喜爱的老年合唱团活动", "日常独自在家,社交活动减少", "主动前来心理咨询求助", "入睡困难睡眠质量下降", "老伴去世突发变故", "子女长期在国外居住"], "a": [0, 1], "e": "社会功能受损指个体无法完成原有的社会活动、出现社交退缩等,选项A不再参与社交活动、B社交减少都属于社会功能受损。C是求助行为,D是躯体症状,E、F是诱发心理问题的应激事件,均不属于社会功能受损表现,因此正确答案为AB。", "type": "multi"}, {"q": "咨询师和该老年求助者开展咨询时,正确的做法包括?", "o": ["适当放慢语速,保证表达清晰", "给予足够的耐心,预留充足的倾听时间", "使用简单易懂的口语化表达", "避免使用过于专业复杂的心理学术语", "为节省时间直接打断求助者的倾诉", "替求助者做出重大生活决策"], "a": [0, 1, 2, 3], "e": "针对老年求助者的咨询需要适配老年人的认知和反应节奏,应做到放慢语速、耐心倾听、使用简单语言、避免复杂专业术语。直接打断倾诉违背倾听原则,替求助者做决策违背咨询伦理,因此E、F错误,正确答案为ABCD。", "type": "multi"}, {"q": "在与该求助者进行咨询时,咨询师可采用的合理情绪疗法技术包括?", "o": ["与求助者共同商讨,挑战其“当众发言一定会出错出丑”的非理性信念", "运用合理情绪想象技术帮助求助者适应社交场景的焦虑", "布置认知家庭作业,让求助者日常记录自己的不合理信念", "运用阳性强化法强化求助者主动参与社交的行为", "运用系统脱敏疗法逐步降低求助者的社交焦虑水平", "引导求助者进行自由联想挖掘早年创伤经历"], "a": [0, 1, 2, 3, 4], "e": "本题考核合理情绪疗法的常用技术。合理情绪疗法的核心技术包括与不合理信念辩论、合理情绪想象技术、认知家庭作业,临床中也可辅助使用系统脱敏、阳性强化法缓解焦虑、强化适应性行为。自由联想属于精神分析疗法的技术,不属于合理情绪疗法的范畴,因此F选项错误,正确答案为ABCDE。", "type": "multi"}, {"q": "针对该青少年求助者的家庭咨询,咨询师应遵循的原则包括?", "o": ["聚焦家庭系统的互动模式", "关注家庭成员之间的沟通方式", "将问题归因于单个家庭成员", "鼓励家庭成员共同参与咨询", "替家长决定给孩子转学", "尊重每个家庭成员的感受"], "a": [0, 1, 3, 5], "e": "本题考核家庭心理咨询的基本原则。家庭咨询遵循系统观,需要聚焦家庭系统的互动模式,关注家庭成员的沟通方式,鼓励全体相关成员共同参与咨询,尊重每个家庭成员的个人感受;将问题归因于单个家庭成员违背系统家庭咨询的核心原则,替来访者做决策违背咨询伦理,因此C、E选项错误,正确答案为ABDF。", "type": "multi"}, {"q": "求助者,女,36岁,中学班主任,近半个月因推行新的班级管理方案不被家长认可引发争议后,出现胸闷、情绪低落,对原本喜欢的花艺活动提不起兴趣,主动到心理咨询机构求助。在本次初诊的摄入性会谈中,咨询师为全面收集临床资料,以下哪种提问方式最为恰当?", "o": ["“你是不是因为和家长的矛盾才出现胸闷的对不对?”", "“你能详细说说这段时间你在工作和生活里的具体经历和内心感受吗?”", "“你难道不觉得你自己的管理方式也有问题吗?”", "“你有没有找学校领导反映过这个问题?”", "“你这个胸闷的情况一共有多少天了?”"], "a": 1, "e": "摄入性会谈中,开放式提问可以引导求助者充分、全面地表达自身的情况与感受,有助于咨询师收集完整的临床资料,B选项属于开放式提问,符合规范要求。A、D、E均属于封闭式提问,仅能获取特定的有限信息,无法帮助收集全面资料;C属于责备性提问,会破坏咨询关系,引发求助者的防御,因此不恰当。", "type": "single"}, {"q": "求助者,男,26岁,互联网运营,近1个月因加班过度出现焦虑、注意力无法集中,主动前来心理咨询机构咨询。咨询师在初诊接待环节,以下哪种做法符合专业规范?", "o": ["直接开始询问求助者焦虑的具体表现,不提前说明咨询相关规则", "接待过程中专注倾听,主动向求助者明确说明保密原则及保密例外的情况", "为了节省时间,打断求助者的情绪倾诉,直接给出调整情绪的建议", "初次接待结束就要求求助者付清整个咨询疗程的全部费用", "不做任何书面记录,完全依靠自己的记忆留存会谈内容"], "a": 1, "e": "初诊接待的核心专业规范要求,首次会谈必须主动向求助者说明保密原则与保密例外,这是建立信任咨询关系的基础。A选项未提前说明规则,容易引发求助者的顾虑;C选项打断求助者表达会破坏咨询信任关系;D选项收取全部疗程费用应在咨询设置明确、求助者同意整个咨询方案后进行,不适合在初次接待要求;E选项不记录违背咨询规范,因此只有B符合要求。", "type": "single"}, {"q": "求助者,女,38岁,私企部门主管,半年前母亲确诊阿尔茨海默症,2个月前儿子升学进入重点高中后适应不良频繁请假,近1个月出现持续心慌焦虑、夜间早醒、工作效率严重下降,多次体检未发现器质性异常。咨询师收集成长资料发现,求助者自幼被要求“必须照顾好家人、做好所有事情”,无法接受自己没能同时兼顾家庭和工作的现状。该求助者心理问题的关键点是?", "o": ["母亲确诊阿尔茨海默症需要照顾", "儿子升学适应不良的应激事件", "对“必须兼顾所有责任”的固有认知和无力兼顾的内在冲突", "工作效率严重下降", "心慌焦虑与早醒"], "a": 2, "e": "心理问题的关键点是指引发求助者心理行为问题的核心根源,贯穿整个问题发生发展的全过程。C选项是求助者的内在核心认知冲突,是问题产生的根本原因。A、B属于诱发问题的外部应激事件,D、E是问题引发的症状表现,均不是核心关键点,因此正确答案为C。", "type": "single"}, {"q": "求助者,男,21岁,大二男生,近3周因为竞选学生会主席失败后,出现情绪低落、对社团活动提不起兴趣,轻度食欲不佳,偶尔入睡困难,但仍能正常上课、完成作业,和室友正常交往,情绪反应没有泛化,全身检查无器质性病变。该求助者最可能的评估是?", "o": ["严重心理问题", "一般心理问题", "精神病性障碍", "神经症性心理问题", "创伤后应激障碍"], "a": 1, "e": "一般心理问题的诊断标准为:由现实因素激发,持续时间1-2个月以内(本案例3周符合),情绪反应未泛化,社会功能轻度受损,无器质性病变基础,该求助者完全符合诊断标准。严重心理问题要求病程2个月以上、情绪泛化、社会功能受损明显;精神病性障碍存在精神病性症状;神经症性心理问题符合神经症的部分特点但病程不足;创伤后应激障碍需由异乎寻常的创伤性事件引发,情绪明显泛化,因此A、C、D、E均不符合。", "type": "single"}, {"q": "心理咨询师进行摄入性会谈收集资料时,需要避免多种不当的提问方式,以下选项中哪一项不属于不当提问?", "o": ["“你为什么总是要和父母对着干呢?”", "“你能不能说说你最近的工作压力和家庭关系情况?”", "“你不觉得你的问题根源就是你性格太内向吗?”", "“你可以详细讲讲你最近情绪变化的整个过程吗?”", "“你难道不应该主动一点和同事化解矛盾吗?”"], "a": 3, "e": "开放式提问是摄入性会谈中恰当的提问方式,可以引导求助者充分表达自身的情况,D选项属于开放式提问,是恰当的提问方式。A属于责备式提问,会引发求助者防御;B属于多重问题,会让求助者不知所措;C属于修饰性反问,会让求助者无法回答;E属于评判式提问,带有咨询师的价值评判,因此A、B、C、E均属于不当提问,正确答案为D。", "type": "single"}, {"q": "咨询师在为求助者选择使用心理测验时,以下哪种做法符合心理咨询专业规范要求?", "o": ["为了降低咨询成本,使用未经过标准化的自编测验", "直接将心理测验的结果作为诊断的唯一依据", "根据求助者的具体问题与临床评估选择匹配的心理测验", "为了避免求助者隐瞒,不告知求助者测验的目的与要求", "为了提高咨询收入,要求求助者完成多个和问题无关的心理测验"], "a": 2, "e": "正确使用心理测验的专业规范要求:必须根据求助者的具体问题选择合适的标准化心理测验,明确告知求助者测验目的与要求,不滥用测验,且测验结果仅作为临床评估的辅助依据,不能作为唯一诊断依据。选项A、B、D、E均违背了心理测验使用的专业规范,因此正确答案为C。", "type": "single"}, {"q": "求助者,女,36岁,医院护士,近2个月因医院科室调整出现持续情绪烦躁、头痛,主动前来咨询,咨询师已经收集到求助者的主诉、近期体检报告、和同事的交往情况等资料,以下哪项不属于一般临床资料整理的范畴?", "o": ["求助者的生育史与婚姻状况", "求助者的个人成长经历", "求助者每个月的消费金额", "求助者的亲友支持情况", "求助者既往的心理咨询经历"], "a": 2, "e": "一般临床资料整理的范畴包括:人口学资料、生活状况、婚姻家庭、成长经历、社会交往、工作记录、心理健康状况、既往病史咨询史、社会支持系统等。求助者个人的每月消费金额不属于需要整理的一般临床资料范畴,A、B、D、E均属于规范整理的内容,因此正确答案为C。", "type": "single"}, {"q": "咨询师收集完求助者的全部临床资料后,需要对求助者的心理健康问题形成初步印象,以下哪项是形成初步印象的正确操作步骤?", "o": ["根据收集到的资料直接给出最终诊断结果", "先对求助者的问题进行归类,再结合临床资料分析问题的严重程度", "忽略躯体检查结果,只关注求助者的心理情绪症状", "直接用心理测验的结果代替临床评估与判断", "无需考虑求助者所处的社会文化背景,直接评估"], "a": 1, "e": "对求助者形成初步印象的正确步骤为:先对求助者的心理行为问题进行归类,再结合收集到的临床资料、心理测验结果分析问题的严重程度,最后结合求助者的社会文化背景做出初步判断。直接给出最终诊断、忽略躯体症状、用测验代替临床评估、不考虑社会文化背景都不符合专业规范,因此A、C、D、E均错误,正确答案为B。", "type": "single"}, {"q": "求助者,女,29岁,销售,4个月前自己苦心跟进半年的大订单被同事抢走,之后出现情绪暴躁、经常和家人发脾气,已经辞去原来的工作,不愿和朋友联系,现在看到和抢单同事同名的人都会忍不住愤怒,全身检查没有器质性病变。该求助者最可能的评估是?", "o": ["一般心理问题", "严重心理问题", "精神病性障碍", "适应障碍", "广泛性焦虑障碍"], "a": 1, "e": "严重心理问题的诊断标准为:由强烈的现实应激事件引发,病程在2个月到半年之间,情绪反应出现泛化,社会功能受损明显,无器质性病变基础,该求助者完全符合诊断标准。一般心理问题病程不足2个月,无情绪泛化;精神病性障碍存在幻觉妄想等精神病性症状;适应障碍通常病程更短,应激程度较轻;广泛性焦虑障碍以持续的广泛性焦虑为核心,无明确强烈的现实应激源,因此A、C、D、E均不符合,正确答案为B。", "type": "single"}, {"q": "求助者,男,56岁,退休工人,近2个月坚信小区物业人员故意给自己家断水,多次找物业闹事,最近甚至拿石头砸坏物业办公室玻璃,无法正常生活,家属强行陪同前来咨询。咨询师首先应该采取的正确做法是?", "o": ["进行摄入性会谈收集详细资料", "直接转介到精神卫生医疗机构", "使用焦虑自评量表进行测评", "制定心理咨询的方案", "进行放松训练缓解求助者的情绪"], "a": 1, "e": "该求助者出现了妄想症状,属于精神病性问题,已经超出了健康心理咨询的工作范畴,因此首先应当转介到精神卫生医疗机构进行专业的评估与治疗。其他操作都需要在确认问题属于心理咨询工作范畴后才能进行,因此A、C、D、E均不正确,正确答案为B。", "type": "single"}, {"q": "求助者,女,19岁,大一学生,因未婚怀孕前来咨询,担心咨询师会骂自己不自重,内心非常不安。咨询师以下哪种做法体现了尊重的核心专业要求?", "o": ["直接告知求助者未婚怀孕是错误的行为,必须马上处理", "拒绝为该求助者提供咨询服务,要求求助者找家长解决", "接纳求助者的处境,不对求助者的行为做道德评判", "要求求助者尽快告诉男方家长,尽快处理问题", "劝说求助者以后一定要洁身自好,不能再犯这种错误"], "a": 2, "e": "尊重的核心要求是咨询师接纳求助者的一切,包括求助者的行为、观念,不做道德评判、不歧视。选项A、B、D、E都带有评判,违背了尊重的专业原则,只有C符合要求,因此正确答案为C。", "type": "single"}, {"q": "求助者,男,32岁,公司职员,最近晋升失败,觉得自己努力了五年都没有结果,在咨询室哭诉“我真的太没用了,什么事情都做不好,我根本就是一个失败者”,咨询师以下哪种回应最符合共情的专业要求?", "o": ["“你别这么想了,这次不行下次还有机会啊”", "“你努力了很久想要晋升结果没成功,觉得非常挫败,否定自己,对吗?”", "“你就是太贪心了,没晋升也不至于这样啊”", "“我特别理解你,我上次晋升也失败了,我当时比你还难受”", "“你应该冷静下来,好好想想自己哪里做得不对”"], "a": 1, "e": "共情要求咨询师准确体验求助者的内心世界,并准确将求助者的情绪与认知反馈给求助者,B选项精准匹配了求助者的感受与想法,符合共情的要求。A属于安慰说教;C属于评判性回应;D混淆了咨询师自身的体验和求助者的体验;E属于说教和建议,因此A、C、D、E都不符合共情的要求,正确答案为B。", "type": "single"}, {"q": "求助者,女,27岁,创业失败负债,待业在家3个月,认为自己一事无成,什么都做不好。咨询师说“你虽然创业失败负债,但这三个月你一直坚持投简历学习新技能,从来没有放弃找工作,这说明你非常有韧性”,关于咨询师的这个回应,以下说法正确的是?", "o": ["属于盲目乐观,忽视了求助者创业失败的困境", "实事求是地发现了求助者的积极行为并给予肯定,符合积极关注的要求", "咨询师应该直接帮求助者找工作,不需要关注这种小事", "积极关注只需要关注求助者过去的成功经历,不需要关注这种日常行为", "这个回应会让求助者觉得被同情,不会有好的效果"], "a": 1, "e": "积极关注要求咨询师实事求是地发现求助者身上的积极方面,帮助求助者看到自身的资源。该求助者虽然遭遇创业失败,但坚持投简历学习新技能是具体的积极行为,咨询师的回应准确给予肯定,既没有盲目乐观,也没有忽视求助者的困境,符合积极关注的要求。选项A、C、D、E都对积极关注的概念理解有误,因此正确答案为B。", "type": "single"}, {"q": "求助者,女,18岁,高中学生,第一次来做咨询,进门之后非常紧张,手攥着衣角不敢说话,头一直低着。咨询师以下哪种做法最能体现热情的专业要求?", "o": ["直接开口问求助者遇到了什么问题,不做寒暄", "微笑等待,主动询问求助者要不要喝水,等到求助者放松之后再开始会谈", "打断求助者的犹豫,直接问问题然后给建议", "表现出不耐烦,催促求助者快点说清楚自己的问题", "忽略求助者的紧张,直接进入正式会谈主题"], "a": 1, "e": "热情要求咨询师在咨询全过程中体现对求助者的关心,初次接待时帮助求助者缓解紧张情绪。B选项通过细节关怀帮助求助者放松,符合热情的要求。A、C、D、E都没有关注求助者的紧张情绪,缺乏对求助者的关怀,不符合热情的要求,因此正确答案为B。", "type": "single"}, {"q": "求助者,男,62岁,因持续半年焦虑失眠主动前来咨询,咨询师发现求助者是自己当前任职企业的主要股东,存在直接利益关联,无法保持中立咨询态度。以下哪种转介做法符合专业伦理规范?", "o": ["不告知求助者转介原因,直接将其联系方式提供给其他咨询师", "向求助者说明转介的原因,推荐合适的咨询师并协助完成交接", "要求求助者自行寻找其他心理咨询师,不提供任何帮助", "隐瞒自身与求助者的利益关联,继续勉强开展咨询", "直接拒绝为求助者提供咨询,不做任何后续安排"], "a": 1, "e": "当咨询师因自身原因无法提供专业服务时,应向求助者说明原因,推荐合适的替代咨询师,并协助完成交接,保障求助者的咨询权益。A未说明原因不尊重求助者,C不负责,D违反伦理,E不专业。", "type": "single"}, {"q": "求助者,男,22岁,大四考研学生,因考研失利在第三次咨询中透露“我已经网购了农药,打算今晚结束生命”,并要求咨询师为其保密。咨询师以下哪种做法符合专业伦理要求?", "o": ["严格遵守保密原则,不向任何人透露该信息", "立即通知求助者的直系家属,并联系当地精神卫生医疗机构进行紧急干预", "忽略求助者的表述,继续按照原计划开展本次咨询", "要求求助者签署承诺书,承诺不实施伤害行为", "直接将求助者送往精神病院,不告知其家属"], "a": 1, "e": "当求助者明确表达伤害自身的意图时,属于保密原则的例外情况,咨询师需立即通知家属与专业精神卫生机构进行干预,保障求助者的生命安全。A违反伦理,C不负责,D无法阻止风险,E过度干预未尊重求助者意愿。", "type": "single"}, {"q": "求助者,男,36岁,离婚后持续情绪低落、兴趣减退3个月,咨询师计划选用抑郁自评量表(SDS)进行测评,以下哪种结果提示求助者可能存在中度及以上抑郁症状?", "o": ["总粗分低于40分", "标准分高于60分", "标准分高于63分", "总粗分高于60分", "总粗分高于63分"], "a": 2, "e": "SDS的标准分计算公式为总粗分 ×1.25后取整数,分界值标准:53-62分为轻度抑郁,63分及以上为中度及以上抑郁。A、B为正常或轻度抑郁范围,D、E混淆了总粗分和标准分的分界规则。", "type": "single"}, {"q": "求助者,男,28岁,因项目竞标失败出现焦虑、胸闷、食欲下降18天,情绪反应仅针对竞标事件,未出现泛化,主动前来咨询。以下关于该求助者心理评估的描述,正确的是?", "o": ["该求助者存在精神病性症状,需立即转介精神科医疗机构", "该求助者病程不足1个月,不符合任何心理问题的评估标准", "该求助者的情绪反应由现实因素引发且未泛化,可初步评估为一般心理问题", "该求助者无需进行任何心理测验,仅凭主诉即可直接给出评估结果", "该求助者的问题无需专业干预,可自行缓解"], "a": 2, "e": "一般心理问题的评估标准为:由现实因素引发,病程1~2个月,情绪反应未泛化,社会功能轻度受损,无器质性病变基础。该求助者完全符合该标准。A选项无妄想、幻觉等精神病性症状;B选项病程符合1~2个月的评估区间;D选项需结合心理测验辅助评估,仅凭主诉不够严谨;E选项该求助者主动求助,且存在明显不适,需专业干预。", "type": "single"}, {"q": "求助者,女,26岁,因与男友分手情绪低落主动前来咨询,咨询师计划开展摄入性会谈以收集临床资料,以下哪种做法不符合摄入性会谈的专业规范?", "o": ["会谈前提前拟定会谈提纲,明确会谈目标", "会谈过程中耐心倾听,不随意打断求助者的陈述", "会谈中随意发表个人对求助者恋爱选择的主观评判", "会谈结束后详细记录会谈内容与求助者的核心症状", "会谈中保持中立、客观的态度,不偏向任何一方"], "a": 2, "e": "摄入性会谈需避免使用评判性语言,咨询师应保持中立客观,不随意发表主观评判,以免破坏咨询关系与求助者的表达意愿。A、B、D、E均符合摄入性会谈的专业规范要求。", "type": "single"}, {"q": "求助者,女,16岁,高中生,因长期熬夜刷短视频导致上课注意力不集中、学习成绩下滑,家长陪同前来咨询。咨询师计划使用阳性强化法帮助求助者减少熬夜刷短视频的行为,以下哪种做法符合阳性强化法的标准操作步骤?", "o": ["对求助者继续熬夜刷短视频的行为进行严厉批评与惩罚", "当求助者主动提前放下手机、不熬夜时,立即给予其喜爱的奖励", "直接要求求助者立即停止所有使用短视频的行为", "忽略求助者的任何行为变化,不给予任何强化物", "以惩罚作为主要的行为干预手段"], "a": 1, "e": "阳性强化法的核心操作逻辑为:当目标行为(减少熬夜刷短视频)出现时,立即给予阳性强化物,以增强该目标行为的出现频率。A、E选项使用惩罚,违背阳性强化法的原则;C选项直接要求停止目标行为,未遵循循序渐进的原则;D选项忽略行为变化,无法强化目标行为。", "type": "single"}, {"q": "求助者,男,30岁,销售,近半年因业绩压力大出现持续紧张、心慌、入睡困难,主动前往心理咨询机构求助。咨询师计划为其开展放松训练以缓解焦虑情绪,以下哪种操作步骤符合专业规范?", "o": ["先让求助者坐在舒适的座椅上,闭上眼睛,配合缓慢的腹式呼吸,从四肢到躯干逐次进行肌肉放松训练", "快速抖动全身肌肉,不做任何呼吸调整,仅依靠主观感受放松", "仅放松上肢肌肉,忽略下肢与躯干的肌肉紧张", "放松过程中要求求助者保持清醒,全程不闭眼", "每次放松训练严格控制在5分钟以内,不得延长训练时长"], "a": 0, "e": "放松训练的标准操作步骤为:让求助者处于舒适环境,采取放松姿势,先进行呼吸训练,再逐次放松全身肌肉,可根据情况调整训练时长。B未做呼吸调整,C忽略多部位肌肉紧张,D禁止闭眼违背放松要求,E强制限制时长不符合操作规范。", "type": "single"}, {"q": "求助者,女,24岁,刚入职互联网公司,试用期工作汇报被领导当众指出逻辑错误后,出现情绪低落、自我否定,认为“我天生不适合做这份工作,永远都不会得到领导认可”,主动前来咨询。咨询师运用合理情绪疗法的ABC理论进行分析,其中代表不合理信念的B是?", "o": ["领导当众指出汇报工作的错误", "情绪低落、自我否定", "认为自己不适合这份工作,永远不会得到领导认可", "本次汇报工作未达到预期要求", "主动寻求心理咨询帮助"], "a": 2, "e": "合理情绪疗法ABC理论中,A为诱发事件,B为个体对事件的认知与信念,C为情绪与行为结果。本案例中A为领导当众指出错误,C为情绪低落,B为求助者的不合理信念,即C选项。", "type": "single"}, {"q": "求助者,女,45岁,近1个月出现情绪烦躁、睡眠质量差、周身不适,家属陪同其前往心理咨询机构。咨询师计划选用90项症状清单(SCL-90)进行测评,以下关于该量表的正确描述是?", "o": ["属于自评式量表,共90个项目,采用1~5级评分制", "属于他评式量表,主要用于评估精神病性症状", "仅能评估抑郁症状,无法覆盖其他心理行为问题", "施测时无需向求助者说明评分规则与测试目的", "量表得分越高,提示求助者心理健康水平越好"], "a": 0, "e": "SCL-90为90项症状自评量表,包含90个项目,采用1~5级评分,可多维度评估多种心理症状;B选项属于他评的描述错误,C选项仅能评估抑郁的描述错误,D选项施测需要提前说明规则要求,E选项得分越高提示症状越严重,而非心理健康水平越好。", "type": "single"}, {"q": "求助者,男,28岁,因被公司裁员后出现情绪低落,连续3天闭门不出,家属陪同前来咨询。在咨询初始阶段,求助者始终低头抠手、沉默不语,咨询师以下哪种处理方式最为恰当?", "o": ["主动告知求助者“不想说就不必勉强”,随后保持沉默等待", "直接打断沉默,厉声询问“你到底有什么心事?”", "表现出不耐烦的神情,催促求助者尽快开口说明情况", "转移话题,主动询问求助者以往的业余爱好", "全程不做任何回应,任由求助者保持沉默"], "a": 0, "e": "当求助者出现情绪型沉默时,咨询师应给予理解与空间,允许求助者暂时沉默,同时传递接纳的态度。B打断会破坏信任关系,C不耐烦违背咨询的热情原则,D转移话题偏离核心问题,E无回应会让求助者感到被忽视。", "type": "single"}, {"q": "求助者,女,35岁,因和小舅子合伙做生意产生经济纠纷,在咨询中滔滔不绝,反复讲述争吵细节,且多次偏离主题抱怨对方的不是。咨询师以下哪种处理方式符合专业规范?", "o": ["直接打断求助者,要求其直奔核心问题", "全程不插话,任由求助者自由表达", "表现出厌烦情绪,示意求助者停止讲述", "主动转移话题,谈论与当前问题无关的内容"], "a": 1, "e": "针对宣泄型多话,咨询师应耐心倾听,同时适时引导其聚焦核心问题,避免无意义的重复叙述,推进咨询进程。A打断会伤害求助者感受,不符合尊重原则,C无引导无法推进咨询,D、E违背尊重与中立原则。", "type": "single"}, {"q": "求助者,男,26岁,因和父亲长期关系不和前来咨询,经过3次咨询后,求助者表示咨询师的处事风格和自己过世的爷爷很像,对咨询师产生强烈依赖,希望咨询结束后和咨询师成为朋友私下来往。咨询师以下哪种处理方式符合专业伦理要求?", "o": ["接受求助者的好感,与求助者建立咨询外的朋友关系", "明确告知求助者咨询关系的专业边界,解释移情的本质", "回避求助者的话题,直接转移到其他咨询内容", "严厉批评求助者的想法,要求其立刻停止这种念头", "直接将求助者转介给其他咨询师"], "a": 1, "e": "当求助者出现移情时,咨询师应明确咨询关系的专业边界,解释移情的本质,引导求助者将注意力放回解决自身问题上。A违反咨询伦理,C回避无法解决问题,D批评破坏咨询信任关系,E不必要转介,不尊重求助者。", "type": "single"}, {"q": "求助者,女,29岁,因社交焦虑障碍不敢前往公共场合与人交流,经过8次系统咨询后,以下哪项不属于评估本次咨询效果的有效维度?", "o": ["求助者的自我报告,如“我现在愿意自己去菜市场买菜了”", "咨询师的观察结果,如求助者在咨询室不再紧张手抖", "求助者家属的反馈,如“她上周主动参加了公司的团建聚餐”", "求助者的躯体症状改善情况,如紧张心慌的症状完全消失", "求助者近3个月的月工资收入增长幅度"], "a": 4, "e": "咨询效果的评估维度包括自我报告、咨询师观察、家属反馈、症状改善、社会功能恢复等。工资收入增长与本次咨询的社交焦虑问题无直接关联,不属于有效评估维度。", "type": "single"}, {"q": "求助者,男,25岁,因公司裁员失业后出现孤独感、社交退缩,主动前来咨询。咨询师计划使用应对方式问卷评估其应对压力的方式,以下哪种应对方式属于成熟型应对策略?", "o": ["退避", "自责", "幻想", "解决问题", "合理化"], "a": 3, "e": "应对方式问卷将应对方式分为成熟型(解决问题、求助)、不成熟型(自责、退避、幻想)、混合型(合理化)。其中解决问题属于成熟型应对策略,可有效应对压力事件。", "type": "single"}, {"q": "52岁女性,近一年总觉得邻居在自己家水杯下毒,出门觉得被人跟踪,多次向社区反映但未找到任何证据,该女士坚信自己的判断完全正确,拒绝认为自己精神存在问题。该求助者的自知力状态为?", "o": ["自知力完整,能够主动认识到自身精神异常", "自知力部分完整,可部分识别自身异常", "自知力缺失,不承认自身存在精神异常", "无自知力,仅能部分认识自身异常", "无法判断自知力状态"], "a": 2, "e": "自知力指求助者对自身精神状态的认识和判断能力,该求助者存在妄想症状,且坚信妄想内容,完全不承认自身存在精神异常,符合自知力缺失的表现。A、B、D选项对自知力状态的描述不符合该案例情况,案例信息足够明确判断自知力状态,因此E错误。", "type": "single"}, {"q": "28岁男性因职场压力来做咨询,咨询过程中求助者多次接到工作电话,每次都简单说明后继续咨询,咨询师以下哪种做法符合有效倾听的专业要求?", "o": ["打断求助者,提醒咨询时间请勿接工作电话", "保持专注,关注求助者的表达内容和情绪变化,不随意打断沟通", "趁接电话的空隙回复自己的工作消息", "引导求助者先处理工作,结束本次咨询", "直接批评求助者不尊重咨询时间"], "a": 1, "e": "有效倾听要求咨询师保持专注,不随意打断求助者的表达,全程关注求助者的语言与非语言信息,B选项符合专业要求。A选项随意打断会破坏咨询信任关系,C选项不专注违背倾听要求,D选项提前结束咨询不符合专业设置,E选项的评判式回应违背尊重的咨询态度。", "type": "single"}, {"q": "24岁女性因和恋人相处矛盾前来咨询,反复说“他根本不爱我,我们在一起全都是错的”,但没有说明具体发生了哪些事件让她产生这种感受。咨询师以下哪种回应符合具体化技术的专业要求?", "o": ["“你可以说一说具体发生了哪些事,让你觉得他不爱你吗?”", "“我特别理解你的难过,他这样真的很过分”", "“我觉得你应该和他好好谈一谈,把问题说开”", "“你是不是想多了,他可能只是最近太忙了”", "“我们换个话题聊聊你平时的爱好吧”"], "a": 0, "e": "具体化技术是指咨询师协助求助者清晰准确地表述自己的观点、情绪和经历的具体事件,A选项引导求助者说明具体细节,符合具体化技术的要求。B选项是共情回应但没有起到具体化的作用,C选项是给出建议,D选项是评判式回应,E选项是回避问题,均不符合要求。", "type": "single"}, {"q": "30岁男性害怕狗,严重影响日常出行,咨询师计划使用系统脱敏法帮助求助者缓解恐惧,以下操作顺序符合专业规范的是?", "o": ["直接带求助者到有大型犬的环境中,强迫他适应", "先建立恐惧等级梯度,再学习放松训练,最后按照等级逐步暴露", "只让求助者想象狗的样子,不做任何实际暴露", "批评求助者的恐惧,要求他自己克服", "一开始就让求助者接触最高等级的恐惧场景"], "a": 1, "e": "系统脱敏法的标准操作步骤为:首先协助求助者建立恐惧/焦虑的等级梯度,随后教给求助者放松训练技术,最后让求助者按照等级从低到高逐步进行暴露,循序渐进消除恐惧反应,B选项符合规范。A没有放松训练,会引发强烈的焦虑情绪,C仅想象暴露效果有限,D批评违背尊重的咨询伦理,E一开始就接触最高等级会加剧恐惧,不符合操作要求。", "type": "single"}, {"q": "48岁女性近三个月经常出现心慌、胸闷、失眠,总觉得自己得了严重心脏病,多次到三甲医院做心电图、心脏彩超等检查,结果都没有发现器质性异常。咨询师排除器质性精神障碍的关键依据是?", "o": ["求助者的年龄和性别", "综合医院的专业医学检查结果", "求助者没有心脏病家族史", "求助者的症状时好时坏", "求助者既往没有严重躯体病史"], "a": 1, "e": "排除器质性精神障碍的核心关键依据是专业医学检查结果,确认不存在相应的躯体器质性病变,其他选项都仅作为参考因素,不能作为排除的关键依据,因此B正确。", "type": "single"}, {"q": "32岁男性因婚姻危机主动前来咨询,咨询过程中求助者叙述原生家庭对自己婚姻观的影响时,咨询师多次打断求助者的讲述,催求助者说重点。该咨询师的行为会造成什么影响?", "o": ["可以加快咨询进度,提升咨询效率", "会破坏咨询关系,降低求助者对咨询师的信任", "只要能解决问题,不会有负面影响", "是求助者自己说话太啰嗦,应该适应咨询师的风格", "符合心理咨询的专业伦理要求"], "a": 1, "e": "良好咨询关系的建立需要咨询师保持尊重、耐心、热情的专业态度,随意打断求助者的叙述、催促求助者会损害求助者的被尊重感,破坏信任关系,严重影响咨询效果。A、C、D、E的描述都违背心理咨询的专业伦理和要求,因此B正确。", "type": "single"}, {"q": "26岁女性绩效考核不合格被部门约谈,哭着和咨询师说“我辛辛苦苦干了一年,居然不合格,我真的太失败了,什么事都做不好”,以下咨询师的哪种回应属于内容反应技术?", "o": ["“你辛苦了一年结果绩效考核不合格,觉得自己特别失败,什么事都做不好,对吗?”", "“我特别能理解你现在的难过,换做是我也会特别伤心”", "“你下次早点准备,肯定能拿到好成绩”", "“你是不是对领导的考核结果不服气啊?”", "“我们聊聊怎么提升你的工作绩效吧”"], "a": 0, "e": "内容反应技术是指咨询师把求助者陈述的主要内容经过概括整理,反馈给求助者,A选项准确概括复述了求助者的核心表述,符合内容反应技术的要求。B是共情回应,C是给出建议,D是提问推断,E是转换话题,均不符合内容反应技术的定义,因此A正确。", "type": "single"}, {"q": "30岁女性准备结婚但和未婚夫谈不拢彩礼,最后分手,和咨询师说“我都快结婚了居然分手,我再也遇不到合适的人了,我这辈子都毁了”,以下哪种回应属于情感反应技术?", "o": ["“你面对婚礼取消分手,觉得非常绝望和痛苦,对吗?”", "“你应该早点走出来,重新开始新的生活”", "“我之前也遇到过类似的事,我特别能理解你的感受”", "“你要不要和家里人聊聊疏解一下情绪?”", "“我们来梳理一下你在这段关系里的问题吧”"], "a": 0, "e": "情感反应技术是指咨询师把求助者陈述中的情绪体验捕捉整理后反馈给求助者,A选项准确捕捉了求助者的绝望和痛苦的情绪并反馈,符合情感反应技术的要求。B是给出建议,C是自我暴露,D是建议,E是转换话题,均不符合要求,因此A正确。", "type": "single"}, {"q": "25岁男性不敢在公众场合发言,每次上台都紧张到忘词,咨询师计划用指导技术帮助求助者提升能力,以下哪种回应符合指导技术的专业要求?", "o": ["“你下次上台前,可以先做三次深呼吸,再从左到右扫一遍台下,开口自我介绍就好”", "“你应该大胆一点,不要害怕”", "“你是不是太在意别人的看法了?”", "“我以前上台也紧张,我是这么调整的……”", "“我们来聊聊你为什么害怕上台发言吧”"], "a": 0, "e": "指导技术是咨询师直接指示求助者按照特定的方式行动或练习,A选项给出了具体可操作的调整步骤,符合指导技术的要求。B是笼统的建议,不是具体的指导,C是提问,D是自我暴露,E是具体化探索原因,均不符合指导技术的定义,因此A正确。", "type": "single"}, {"q": "28岁女性因职业选择困惑前来咨询,咨询师计划用16PF评估其人格特质,以下关于16PF的描述正确的是?", "o": ["共187个项目,适用于16岁以上人群自评", "共90个项目,适用于18岁以上成年人", "属于他评量表,由咨询师根据求助者表现评分", "量表得分越高,对应的人格特质越优秀", "仅能评估情绪状态,无法评估其他人格维度"], "a": 0, "e": "16PF即卡特尔16种人格因素测验,共包含187个项目,用于评估16种不同的人格特质,适用于16岁以上人群自评,人格特质得分没有优劣之分,因此A正确。B选项是90项症状清单SCL-90的参数,C选项16PF是自评不是他评,D选项得分没有优劣之分,E选项16PF覆盖16种不同人格维度,不止情绪,因此BCDE错误。", "type": "single"}, {"q": "31岁男性因情绪波动大前来咨询,咨询师用EPQ评估人格,哪个维度的高分对应情绪不稳定、容易焦虑易怒的特征?", "o": ["E维度高分", "N维度高分", "P维度高分", "L维度高分", "E维度低分"], "a": 1, "e": "艾森克人格问卷EPQ包含四个维度,其中N维度为神经质维度,高分者表现为情绪不稳定、焦虑、易怒、情绪波动大,因此B正确。E维度高分对应外向,低分对应内向,P维度高分对应孤独、冷漠、不近人情,L维度高分对应掩饰性高,因此ACDE错误。", "type": "single"}, {"q": "35岁女性近期经历换工作、亲人住院、买房贷款三件大事,因长期压力大失眠前来咨询,咨询师计划用LES评估压力水平,以下关于LES的描述正确的是?", "o": ["用于评估一段时间内生活事件带来的精神刺激强度", "用于评估人格特征,一共包含88个项目", "属于他评量表,由咨询师根据求助者描述评分", "量表得分越高,说明心理健康水平越好", "仅能评估最近1个月内发生的生活事件"], "a": 0, "e": "生活事件量表LES的作用是评估个体在一段时间内遭遇的生活事件带来的精神刺激强度,属于自评量表,通常评估近1年内的生活事件,得分越高说明个体承受的压力越大,因此A正确。B选项描述的是人格测验的特点,不是LES,C选项LES是自评不是他评,D选项得分越高压力越大,心理健康风险越高,E选项评估的通常是近1年不是1个月,因此BCDE错误。", "type": "single"}, {"q": "42岁女性,近3年持续情绪低落,对之前喜欢的书法也提不起兴趣,睡眠质量差,食欲下降,没有自杀计划,日常工作能基本完成,社会功能轻度受损,符合恶劣心境诊断标准的描述是?", "o": ["病程持续2年以上,多数时间情绪低落,间歇期不超过2个月", "病程持续1个月以上,情绪低落明显,伴有强烈自杀念头", "病程持续半年以上,情绪低落呈阵发性发作", "病程持续3个月以内,情绪低落由明确应激事件引发", "无明显躯体症状,社会功能完全正常"], "a": 0, "e": "恶劣心境即持续性抑郁障碍,诊断标准为病程持续2年及以上,多数时间情绪低落,间歇期不超过2个月,社会功能轻度受损,一般无明显自杀念头,因此A正确。B选项符合抑郁发作的特点,CDE均不符合恶劣心境的诊断标准,因此BCDE错误。", "type": "single"}, {"q": "29岁女性社交焦虑经过12次咨询后,症状明显缓解,已经可以正常参与社交活动,咨询师计划结束咨询,开展巩固工作,以下哪种做法符合专业规范?", "o": ["立即停止咨询,不做任何后续安排", "和求助者一起回顾整个咨询过程的进步,共同制定后续的自我调节计划", "要求求助者每月来一次,持续咨询至少一年", "直接告诉求助者你已经完全痊愈,以后都不用来了", "收取额外的巩固咨询费用才安排后续随访"], "a": 1, "e": "咨询结束阶段的巩固工作,需要和求助者共同回顾咨询中的收获与进步,帮助求助者掌握自我调节的方法,制定后续计划巩固效果,因此B正确。A没有任何后续安排不利于巩固效果,C属于过度咨询,D表述过于绝对,没有给求助者支持,E违反收费咨询的专业规范,因此ACDE错误。", "type": "single"}, {"q": "求助者,男,21岁,大三学生,因上台演讲被当众嘲笑后出现演讲恐惧,不敢站在人前发言,主动前来咨询,咨询师计划使用系统脱敏法改善其恐惧症状,以下操作步骤正确的是:", "o": ["先进行放松训练,再建立恐惧等级,最后直接暴露最高等级场景", "先建立恐惧等级表,再进行放松训练,最后按等级逐步暴露于恐惧场景", "仅让求助者想象恐惧场景,不需要进行实际场景练习", "对求助者不敢上台的回避行为进行批评,要求其立刻上台演讲", "不需要逐步递进,一次性让求助者面对全校演讲的最高恐惧场景"], "a": 1, "e": "系统脱敏法的标准操作流程为:建立恐惧等级、进行放松训练、按等级逐步暴露于恐惧场景,因此B选项正确。A选项颠倒流程且直接暴露最高等级,会引发强烈焦虑;C选项仅想象无法有效迁移至现实场景;D选项批评会破坏咨询关系,违背尊重原则;E选项一次性暴露高等级场景会加剧恐惧,不符合循序渐进的原则。", "type": "single"}, {"q": "求助者,男,28岁,因项目竞标失败后出现焦虑、心慌,持续1个半月,情绪未泛化到日常其他场景,主动前来咨询,初步评估为一般心理问题,以下关于一般心理问题的评估标准,描述错误的是:", "o": ["由现实工作刺激引发,情绪反应和现实事件直接相关", "病程通常持续1-2个月,社会功能仅轻度受损", "情绪反应没有泛化,无器质性病变作为基础", "常伴随幻觉、妄想等精神病性症状", "求助者自知力完整,主动寻求专业帮助"], "a": 3, "e": "一般心理问题的核心特点是无精神病性症状、情绪未泛化、病程1-2个月、由现实因素引发,因此D选项错误,幻觉妄想等精神病性症状是精神病性障碍的核心特征,不属于一般心理问题的表现。A、B、C、E均符合一般心理问题的评估标准。", "type": "single"}, {"q": "求助者,女,23岁,本科毕业待业1年,因考公多次失败出现情绪焦虑,和父母关系紧张,主动前往心理咨询机构求助,初诊接待时,咨询师首先引导求助者填写登记表格,准备开展摄入性会谈,以下关于本次初诊接待工作的描述,正确的是:", "o": ["为节省咨询时间,不需要向求助者说明保密原则和咨询设置,直接开始会谈", "为全面评估,直接选用16PF作为本次唯一的心理测评工具", "初诊接待时应当向求助者简要介绍保密原则、咨询设置与咨询目标,同时明确说明保密例外的情况", "不需要记录求助者的基本信息,仅口头询问记住即可", "为加快咨询进程,可以跳过信息收集环节直接制定咨询方案"], "a": 2, "e": "初诊接待的标准流程包括介绍咨询设置、保密原则及保密例外、收集并书面记录求助者基本信息,因此C选项符合专业规范。A选项违背初诊接待的基本要求,必须明确告知保密原则;B选项16PF用于人格测验,针对该求助者的焦虑情绪问题,应当优先选用SAS、SCL-90等症状量表,仅用16PF过于片面;D选项要求必须书面留存求助者基本信息,方便后续评估跟进;E选项制定咨询方案需要基于充足的临床资料,跳过信息收集不符合专业规范。", "type": "single"}, {"q": "求助者,女,28岁,因和交往5年的男友分手,出现情绪低落、对任何事都提不起兴趣,持续3个半月,曾有自杀计划未实施,日常工作只能完成一半任务,社会功能中度受损,以下关于该求助者的心理评估,描述正确的是:", "o": ["可以直接评估为一般心理问题,不需要转介精神科", "病程超过2个月,且存在自杀风险,需要转介精神科医疗机构进一步评估", "只需要做心理测验就能确定诊断,不需要开展临床会谈", "这类情绪问题可以自行缓解,不需要专业干预", "心理咨询师可以直接为求助者开具抗抑郁药物进行治疗"], "a": 1, "e": "该求助者病程超过2个月,存在自杀念头,社会功能中度受损,已经超出一般心理问题的评估范围,需要转介精神科进行进一步排查评估,因此B选项正确。A选项不符合一般心理问题的病程和症状严重程度要求;C选项心理测验仅为辅助评估工具,诊断必须结合临床会谈获取的资料;D选项存在自杀风险,必须进行专业干预,无法自行缓解;E选项开具精神类药物是精神科执业医师的权限,超出心理咨询师的执业范围。", "type": "single"}, {"q": "求助者,男,45岁,企业部门主管,因最近部门业绩下滑,出现“我必须保住部门第一的位置,一次失利说明我完全不适合做管理”的不合理信念,情绪焦虑难以入睡,主动前来咨询,以下哪种技术最适合帮助求助者调整该不合理信念?", "o": ["阳性强化法", "系统脱敏法", "合理情绪疗法的产婆术式辩论", "放松训练", "代币法"], "a": 2, "e": "产婆术式辩论是合理情绪疗法中调整求助者不合理信念的核心技术,通过辩论引导求助者反思自身信念的不合理之处,因此C选项正确。A选项阳性强化法用于塑造良好行为,不适用于调整认知信念;B选项系统脱敏法用于改善恐惧、焦虑类的恐惧症症状;D选项放松训练仅能缓解情绪症状,无法调整不合理认知;E选项代币法属于行为矫正技术,用于行为塑造,不适用于认知调整。", "type": "single"}, {"q": "求助者,男,7岁,小学一年级学生,做作业时总是频繁起身玩玩具,无法专注完成作业,家长多次管教无效,带孩子前来咨询,咨询师计划使用阳性强化法改善孩子的专注行为,以下哪种方案符合阳性强化法的专业规范?", "o": ["只要孩子起身玩玩具,立刻批评惩罚孩子", "孩子连续15分钟专注做作业,就给孩子贴一个小红花,攒够10个小红花可以兑换孩子想要的漫画书", "忽略孩子所有行为,只批评孩子起身玩的行为", "要求孩子必须连续一周不起身,否则就没收孩子所有玩具", "把孩子的玩具全部收走,让孩子面前只有作业"], "a": 1, "e": "阳性强化法核心是通过及时强化目标行为(专注做作业)来提升该行为的发生频率,代币法(小红花兑换奖励)是阳性强化法的常用形式,因此B选项正确。A选项属于惩罚,不符合阳性强化法正强化的核心逻辑;C选项忽略了正确的目标行为,无法增加专注行为的发生;D选项属于惩罚措施,不符合阳性强化的规范;E选项属于环境调整,不属于阳性强化法的操作。", "type": "single"}, {"q": "求助者,男,30岁,婚后和父母同住,因生活习惯差异频繁和父母发生矛盾,认为“父母不尊重我的隐私,故意针对我,我的婚姻生活完全过不下去了”,情绪低落持续2个半月,主动前来咨询。咨询师先通过共情接纳了求助者的情绪,接下来计划用合理情绪疗法调整其不合理信念,以下关于本次咨询的描述,正确的是:", "o": ["咨询师应当直接告诉求助者“你的想法不对,父母只是关心你”,直接纠正不合理信念", "只需要共情就能解决问题,不需要其他干预技术", "修通阶段可以在建立良好咨询关系的基础上,运用产婆术式辩论技术引导求助者挑战自身不合理信念", "为了加快咨询进度,可以跳过共情环节直接开展辩论", "咨询只需要关注情绪就好,不需要探讨求助者的认知模式"], "a": 2, "e": "合理情绪疗法的修通阶段需要以良好的咨询关系为基础,在共情建立信任之后,再通过产婆术式辩论调整不合理信念,因此C选项正确。A选项直接否定求助者的感受,违背了尊重的咨询原则,会破坏咨询关系;B选项仅共情无法改变求助者的认知偏差,不能从根源解决问题;D选项跳过共情会阻碍信任关系建立,影响咨询效果;E选项合理情绪疗法认为认知偏差是情绪问题的核心根源,忽略认知模式无法解决根本问题。", "type": "single"}, {"q": "求助者,女,28岁,设计师,因和部门总监发生冲突后出现情绪焦虑、回避上班,前两次咨询沟通都正常,第三次咨询中,咨询师询问求助者和总监发生冲突的具体细节时,求助者突然沉默,低头不语,回避该话题,后续多次提及该话题都转移方向,以下关于该求助者的沉默类型和咨询师正确处理方式的描述,正确的是:", "o": ["该沉默属于情绪型沉默,咨询师应当直接打断,要求求助者立刻说出细节", "该沉默属于怀疑型沉默,咨询师应当表现出不耐烦,催促求助者尽快开口", "该沉默属于内向型沉默,咨询师应当直接转移话题,不要再提及冲突内容", "该沉默属于反抗型沉默,咨询师应当温和接纳,询问“你是不是不愿意谈论这个话题,可以说说你现在的感受吗?”", "该沉默属于理智型沉默,咨询师不需要干预,继续按原计划推进咨询"], "a": 3, "e": "反抗型沉默是指求助者因不愿谈论敏感、痛苦的话题而产生的沉默,该求助者刻意回避和上级冲突的细节,符合反抗型沉默的特征。A选项直接打断会破坏咨询信任关系;B选项不耐烦违背了热情尊重的咨询原则;C选项内向型沉默是因求助者个性内向不善表达,不符合本案情况;E选项理智型沉默是求助者正在思考问题,不符合本案情况;D选项温和接纳并引导求助者表达感受,符合专业咨询规范。", "type": "single"}, {"q": "求助者,男,32岁,因创业失败负债,出现情绪低落、兴趣减退,持续近4个月,情绪已经泛化到不愿和任何朋友联系,甚至不敢出门见人,无法正常工作,社会功能重度受损,主动前来咨询,以下关于该求助者的心理评估,描述正确的是:", "o": ["可以评估为一般心理问题,不需要转介精神科", "病程超过2个月,情绪泛化,社会功能重度受损,应当评估为严重心理问题或转介精神科进一步评估", "仅由现实因素引发,可以自行缓解,不需要专业干预", "属于神经症性心理问题,不需要做心理测验辅助评估", "咨询师可以直接开展治疗,不需要提前评估"], "a": 1, "e": "严重心理问题的评估标准为:病程超过2个月,情绪泛化,社会功能受损,本案求助者符合该特征,需要进一步评估或转介精神科,因此B选项正确。A选项不符合一般心理问题的病程和严重程度标准;C选项本案社会功能重度受损,存在严重情绪问题,无法自行缓解,需要专业干预;D选项神经症性心理问题的评估也需要结合心理测验结果辅助判断;E选项任何咨询都需要先完成评估才能开展干预,不符合专业规范。", "type": "single"}, {"q": "求助者,女,38岁,公司裁员后待业在家,出现情绪低落,咨询师使用应对方式问卷对求助者进行测评,结果显示求助者“退避”“幻想”因子分显著高于常模,“解决问题”“求助”因子分显著低于常模,以下关于该求助者应对方式的描述,正确的是:", "o": ["该求助者使用的都是成熟型应对策略", "该求助者倾向于使用不成熟型应对策略,比如逃避、自我幻想消极结果", "应对方式没有优劣之分,不需要进行干预", "咨询师应当直接要求求助者改变应对方式,不需要引导", "应对方式问卷只能评估情绪状态,无法评估应对行为"], "a": 1, "e": "应对方式问卷将应对方式分为三类:成熟型(解决问题、求助)、不成熟型(退避、自责、幻想)、混合型(合理化),该求助者退避、幻想因子分高,因此属于不成熟型应对策略,B选项正确。A选项明显错误;C选项应对方式确实存在成熟与不成熟之分,不成熟的应对方式会加重情绪问题,需要干预;D选项直接要求求助者改变不符合咨询的专业原则,需要逐步引导;E选项应对方式问卷就是用来评估应对行为类型的,不是评估情绪状态。", "type": "single"}, {"q": "求助者,男,24岁,刚辞职准备考研,备考半年没考上,哭诉“我一事无成,这辈子都不会成功了”,咨询师回应:“你现在特别挫败,觉得自己以后都不会做成事情了,对吗?”,该回应属于共情的哪个层次?", "o": ["初级共情,准确反映了求助者当下的情绪和表达的内容", "高级共情,深入挖掘了求助者潜在的情感", "不恰当共情,没有理解求助者的真实感受", "评判式回应,否定了求助者的感受", "建议式回应,引导求助者改变想法"], "a": 0, "e": "初级共情的核心是准确反映求助者已经表达出来的情绪和内容,本案中咨询师的回应准确复述了求助者表达的痛苦感受和想法,属于初级共情,因此A选项正确。高级共情需要挖掘求助者未直接表达的潜在情感,比如“你害怕自己一直这样失败下去”,因此B选项错误;该回应准确理解了求助者感受,是恰当的,因此C错误;该回应没有进行评判,所以D错误;该回应也没有给出任何建议,所以E错误。", "type": "single"}, {"q": "求助者,男,41岁,三个月前单位体检发现肺小结节,后续多次复查结果均显示结节无恶变特征,医生判断为良性无需特殊处理,但求助者仍坚信自己已经患上肺癌,认为医生怕自己无法接受隐瞒了病情,先后前往五家三甲医院重复做CT检查,始终不相信阴性检查结果,主动前来咨询。以下对该求助者的心理评估,正确的是?", "o": ["属于严重心理问题,由体检这个现实刺激直接引发", "属于强迫性神经症,反复做CT检查属于典型强迫行为", "属于疑病性神经症,存在牢固的疑病观念,医学检查阴性结果无法消除其疑虑", "属于焦虑性神经症,仅为体检引发的自由浮动性焦虑", "属于躯体形式障碍中的躯体疼痛障碍"], "a": 2, "e": "疑病性神经症的核心特征是患者坚定不移的坚信自己患有某种严重躯体疾病,反复就医,即使医学检查结果正常仍无法改变其想法,C选项描述正确。A选项:该求助者已经出现神经症性的疑病观念,不属于一般心理问题或严重心理问题的范畴;B选项:强迫性神经症的核心是自我强迫与反强迫的冲突,该求助者核心问题是疑病观念而非强迫冲突;D选项:焦虑性神经症无牢固的疑病观念,不符合该求助者表现;E选项:躯体疼痛障碍核心表现为躯体疼痛主诉,而非坚信自己患有重病,因此错误。", "type": "single"}, {"q": "求助者,女,28岁,同时收到两个不同公司的offer,无法决定选择哪一个,主动前来咨询,要求咨询师直接帮自己做出选择。以下哪种做法符合个体心理咨询方案的制定规范?", "o": ["根据自身人生经验直接帮求助者敲定选择,告知哪个offer更适合", "与求助者共同梳理自身职业发展需求、对两份工作的偏好与优劣势分析,共同确定本次咨询目标", "认为求助者独立性太差,直接拒绝咨询并转介", "要求求助者必须听从父母的安排,无需考虑自身感受", "仅和求助者聊两份工作的细节,不设定任何明确的咨询目标"], "a": 1, "e": "咨询方案应由咨询师与求助者共同协商制定,咨询师需尊重求助者的自主性,不得代替求助者做决定,B选项符合要求。A违反了求助者自主性原则;C无必要转介,未履行咨询师的责任;D违背求助者自主意愿,不符合咨询基本伦理;E咨询必须设定明确咨询目标,因此E错误。", "type": "single"}, {"q": "求助者,女,31岁,离婚后因情绪适应问题前来咨询,几次咨询后,求助者凡事都打电话询问咨询师意见,大到换工作小到日常购物都要咨询师帮自己做决定,认为咨询师专业可靠,自己完全没法做选择,已经出现明显的依赖行为。以下哪种处理方式符合专业规范?", "o": ["为了维护良好咨询关系,满足求助者的所有要求", "温和告知求助者:“我们咨询的目标是帮助你学会独立解决问题、自己做选择,我不会代替你做决定”", "直接拒绝所有请求,立即终止咨询关系", "为避免冲突,答应求助者要求但不提供实质性意见", "每次都转移话题,回避回应求助者的请求"], "a": 1, "e": "依赖的核心是求助者将解决问题的责任转移给咨询师,咨询师需要引导求助者承担自主责任,明确咨询目标是提升求助者解决自身问题的能力,B选项处理符合专业规范。A会强化依赖行为,违背咨询核心目标;C处理过于极端,会破坏已经建立的咨询关系;D无法解决依赖的核心问题,对求助者没有实质帮助;E回避问题,不能处理依赖问题,因此B正确。", "type": "single"}, {"q": "求助者,女,52岁,因退休后适应不良前来咨询,咨询过程中反复讲述自己年轻时工作取得的成绩,每次讲述都持续20分钟以上,完全偏离当前适应不良的咨询主题。咨询师需要处理多话现象,以下哪种方式符合专业规范?", "o": ["直接打断求助者,告知该内容和咨询主题无关,停止讲述", "耐心倾听,待求助者说完后温和引导:“您当年的工作成绩真的很出色,我们接下来聊聊您退休之后的生活感受可以吗?”", "忽略求助者的多话,继续按照原定咨询提纲推进咨询", "表现出不耐烦,暗示求助者缩短当前话题", "直接终止本次咨询"], "a": 1, "e": "处理多话现象需要先接纳求助者的表达,保护求助者自尊,再温和引导回归咨询主题,B选项处理符合要求。A直接打断容易破坏咨询信任关系,伤害求助者自尊;C忽略求助者表达,不利于咨询关系建立,也无法推进咨询目标;D违背热情尊重的咨询原则;E处理过于极端,不符合专业要求。", "type": "single"}, {"q": "求助者,女,20岁,大三学生,因失恋后情绪低落2个月,在第三次咨询中,求助者突然沉默后低声说:“我已经买了安眠药放在包里,今天咨询结束后我就打算走了,你答应我不要告诉任何人,不然我就死在这里”。此时咨询师需兼顾保密伦理与危机干预责任,以下哪种处理方式最符合专业规范?", "o": ["严格遵守保密承诺,不向任何人透露该信息,继续咨询", "立即告知求助者的辅导员与父母,同时启动危机干预流程,保障求助者安全", "要求求助者签署《不自杀承诺书》,承诺不实施自杀行为,不告知他人", "直接拨打110报警,将求助者送往精神病院,不告知其家属", "暂时安抚求助者,待本次咨询结束后再告知学校相关人员"], "a": 1, "e": "当求助者明确表达自杀意图时,属于保密例外的紧急情况,生命安全高于保密原则,需立即启动危机干预,通知家属与校方相关人员保障求助者安全,B选项处理正确。A违反了生命至上的咨询伦理原则;C书面承诺无法保障生命安全,未履行保密例外的责任;D处理过度强制,也未尊重家属的知情权;E延迟干预可能导致不可挽回的悲剧,因此B正确。", "type": "single"}, {"q": "求助者,女,24岁,新入职护士,因准备三甲医院入职考核出现紧张烦躁、入睡困难,症状持续2周,情绪未出现泛化,主动前来咨询。咨询师计划使用症状自评量表(SCL-90)进行辅助评估,以下关于该量表的描述与该求助者的评估,正确的是?", "o": ["SCL-90共包含187个项目,评估16种人格特质,得分无优劣之分,该求助者可评估为严重心理问题", "SCL-90共包含90个项目,评估10个心理症状维度,得分越高提示症状越严重,该求助者可评估为严重心理问题", "SCL-90共包含90个项目,评估10个心理症状维度,得分越高提示症状越严重,该求助者可评估为一般心理问题", "SCL-90属于他评量表,由咨询师根据求助者表现评分,该求助者可评估为神经症性心理问题", "SCL-90仅能评估3个月以上的心理症状,该求助者病程仅2周,无需使用该量表"], "a": 2, "e": "SCL-90共包含90个项目,覆盖10个心理症状维度,得分越高提示心理症状越严重;该求助者症状由现实考核压力引发,病程2周,情绪未泛化,符合一般心理问题的评估标准,C选项正确。A选项中187个项目、16种人格特质是16PF的特征,描述错误;B选项中严重心理问题要求病程超过2个月、情绪泛化,不符合该求助者情况,错误;D选项SCL-90是自评量表,描述错误;E选项SCL-90可评估近1周及以上的症状,该求助者可以使用,描述错误。", "type": "single"}, {"q": "求助者,男,22岁,应届毕业生,想要了解自身人格特质明确职业方向,咨询师计划使用卡特尔16种人格因素测验(16PF)进行评估,以下关于该测验的正确描述是?", "o": ["16PF共包含90个项目,评估10个心理症状维度,得分越高代表人格越优秀", "16PF共包含187个项目,评估16种独立人格特质,适用于16岁以上人群,得分无优劣之分", "16PF共包含187个项目,评估16种人格特质,得分越高代表人格越健康", "16PF属于他评量表,由咨询师根据求助者表现评分", "16PF仅能评估情绪症状,无法评估人格特质"], "a": 1, "e": "16PF是卡特尔编制的自评人格测验,共包含187个项目,评估16种相互独立的人格特质,适用于16岁以上人群,人格特质得分无优劣好坏之分,B选项描述正确。A选项是SCL-90的特征,描述错误;C选项人格得分无优劣之分,描述错误;D选项16PF是自评量表,描述错误;E选项16PF就是用于评估人格特质的,描述错误。", "type": "single"}, {"q": "求助者,男,35岁,因害怕乘坐飞机前来咨询,咨询师运用认知行为疗法干预,在解释该求助者的恐惧情绪时,以下哪种解释符合专业规范?", "o": ["“你害怕坐飞机是因为天生胆子小,根本没法改变”", "“你的恐惧可能源于之前坐飞机时经历过强烈颠簸,形成了条件反射,所以一想到坐飞机就会紧张”", "“你就是太胆小了,坐飞机根本没有危险”", "“你直接多坐几次就好了,克服恐惧就可以”", "“你的恐惧是遗传导致的,心理咨询也没办法缓解”"], "a": 1, "e": "解释技术需要基于心理学理论,结合求助者的具体经历给出合理解释,B选项用经典条件反射理论解释恐惧成因,符合认知行为疗法的逻辑,符合专业规范。A是宿命论观点,违背心理咨询可改变的基本立场;C是评判式否定,会伤害求助者自尊,破坏咨询关系;D是直接建议,未解释恐惧的核心成因,不符合解释技术的要求;E是错误观点,恐惧多与后天学习经历相关,可通过心理咨询干预,因此B正确。", "type": "single"}, {"q": "求助者,男,38岁,部门经理,因总是控制不住对下属发火,事后又十分后悔,前来咨询,求助者提到:“我明明知道乱发脾气影响团队氛围,可我就是控制不住自己的脾气”,存在明显的认知与行为冲突。咨询师计划使用面质技术帮助求助者识别冲突,以下哪种面质方式符合专业规范?", "o": ["“你明明知道不对还控制不住,这不是自相矛盾吗?”", "“你说你知道不该发火却控制不住,对此你有什么感受,可以和我说说吗?”", "“你就是修养不够,才控制不住自己的脾气”", "“你应该多学习情绪管理,就不会随便对下属发火了”", "“你的下属确实太过分,换我也会发火,不用后悔”"], "a": 1, "e": "面质技术需要温和指出求助者的矛盾,同时引导求助者探索内心,避免直接评判,B选项既点明了求助者的认知行为冲突,又以开放式提问引导求助者探索自我,符合专业规范。A过于直接生硬,容易引发求助者的抵触情绪;C是评判式否定,违背尊重原则;D是直接给出建议,未完成面质识别冲突的核心目标;E弱化了求助者的情绪困扰,不符合面质技术的要求,因此B正确。", "type": "single"}, {"q": "求助者,男,40岁,因职场压力出现焦虑、失眠,经过8次咨询后,求助者焦虑症状明显缓解,睡眠恢复正常,能够正常开展工作,主动提出结束咨询。咨询师需要评估咨询效果并制定后续巩固计划,以下哪种做法符合专业规范?", "o": ["立即同意结束咨询,不做任何后续安排", "与求助者共同回顾咨询过程中的成长与进步,一起制定后续自我调节计划,并告知求助者如有需要可随时联系", "要求求助者继续咨询3个月巩固效果", "直接告知求助者“你已经完全康复,以后不用再来了”", "收取额外的巩固咨询费用"], "a": 1, "e": "咨询结束阶段需要和求助者共同回顾咨询收获,制定巩固方案,同时提供后续支持渠道,B做法符合专业规范。A无后续巩固安排,不利于维持咨询效果;C过度干预,违背求助者自主意愿;D说法过于绝对,未考虑潜在复发风险;E违反咨询收费伦理规范,因此B正确。", "type": "single"}], "操作技能-初级": [{"q": "求助者,女,36岁,中学班主任,近半个月因推行新的班级管理方案不被家长认可引发争议后,出现胸闷、情绪低落,对原本喜欢的花艺活动提不起兴趣,主动到心理咨询机构求助。在本次初诊的摄入性会谈中,咨询师为全面收集临床资料,以下哪种提问方式最为恰当?", "o": ["“你是不是因为和家长的矛盾才出现胸闷的对不对?”", "“你能详细说说这段时间你在工作和生活里的具体经历和内心感受吗?”", "“你难道不觉得你自己的管理方式也有问题吗?”", "“你有没有找学校领导反映过这个问题?”", "“你这个胸闷的情况一共有多少天了?”"], "a": 1, "e": "摄入性会谈中,开放式提问可以引导求助者充分、全面地表达自身的情况与感受,有助于咨询师收集完整的临床资料,B选项属于开放式提问,符合规范要求。A、D、E均属于封闭式提问,仅能获取特定的有限信息,无法帮助收集全面资料;C属于责备性提问,会破坏咨询关系,引发求助者的防御,因此不恰当。", "type": "single"}, {"q": "求助者,男,26岁,互联网运营,近1个月因加班过度出现焦虑、注意力无法集中,主动前来心理咨询机构咨询。咨询师在初诊接待环节,以下哪种做法符合专业规范?", "o": ["直接开始询问求助者焦虑的具体表现,不提前说明咨询相关规则", "接待过程中专注倾听,主动向求助者明确说明保密原则及保密例外的情况", "为了节省时间,打断求助者的情绪倾诉,直接给出调整情绪的建议", "初次接待结束就要求求助者付清整个咨询疗程的全部费用", "不做任何书面记录,完全依靠自己的记忆留存会谈内容"], "a": 1, "e": "初诊接待的核心专业规范要求,首次会谈必须主动向求助者说明保密原则与保密例外,这是建立信任咨询关系的基础。A选项未提前说明规则,容易引发求助者的顾虑;C选项打断求助者表达会破坏咨询信任关系;D选项收取全部疗程费用应在咨询设置明确、求助者同意整个咨询方案后进行,不适合在初次接待要求;E选项不记录违背咨询规范,因此只有B符合要求。", "type": "single"}, {"q": "求助者,女,38岁,私企部门主管,半年前母亲确诊阿尔茨海默症,2个月前儿子升学进入重点高中后适应不良频繁请假,近1个月出现持续心慌焦虑、夜间早醒、工作效率严重下降,多次体检未发现器质性异常。咨询师收集成长资料发现,求助者自幼被要求“必须照顾好家人、做好所有事情”,无法接受自己没能同时兼顾家庭和工作的现状。该求助者心理问题的关键点是?", "o": ["母亲确诊阿尔茨海默症需要照顾", "儿子升学适应不良的应激事件", "对“必须兼顾所有责任”的固有认知和无力兼顾的内在冲突", "工作效率严重下降", "心慌焦虑与早醒"], "a": 2, "e": "心理问题的关键点是指引发求助者心理行为问题的核心根源,贯穿整个问题发生发展的全过程。C选项是求助者的内在核心认知冲突,是问题产生的根本原因。A、B属于诱发问题的外部应激事件,D、E是问题引发的症状表现,均不是核心关键点,因此正确答案为C。", "type": "single"}, {"q": "求助者,男,21岁,大二男生,近3周因为竞选学生会主席失败后,出现情绪低落、对社团活动提不起兴趣,轻度食欲不佳,偶尔入睡困难,但仍能正常上课、完成作业,和室友正常交往,情绪反应没有泛化,全身检查无器质性病变。该求助者最可能的评估是?", "o": ["严重心理问题", "一般心理问题", "精神病性障碍", "神经症性心理问题", "创伤后应激障碍"], "a": 1, "e": "一般心理问题的诊断标准为:由现实因素激发,持续时间1-2个月以内(本案例3周符合),情绪反应未泛化,社会功能轻度受损,无器质性病变基础,该求助者完全符合诊断标准。严重心理问题要求病程2个月以上、情绪泛化、社会功能受损明显;精神病性障碍存在精神病性症状;神经症性心理问题符合神经症的部分特点但病程不足;创伤后应激障碍需由异乎寻常的创伤性事件引发,情绪明显泛化,因此A、C、D、E均不符合。", "type": "single"}, {"q": "心理咨询师进行摄入性会谈收集资料时,需要避免多种不当的提问方式,以下选项中哪一项不属于不当提问?", "o": ["“你为什么总是要和父母对着干呢?”", "“你能不能说说你最近的工作压力和家庭关系情况?”", "“你不觉得你的问题根源就是你性格太内向吗?”", "“你可以详细讲讲你最近情绪变化的整个过程吗?”", "“你难道不应该主动一点和同事化解矛盾吗?”"], "a": 3, "e": "开放式提问是摄入性会谈中恰当的提问方式,可以引导求助者充分表达自身的情况,D选项属于开放式提问,是恰当的提问方式。A属于责备式提问,会引发求助者防御;B属于多重问题,会让求助者不知所措;C属于修饰性反问,会让求助者无法回答;E属于评判式提问,带有咨询师的价值评判,因此A、B、C、E均属于不当提问,正确答案为D。", "type": "single"}, {"q": "咨询师在为求助者选择使用心理测验时,以下哪种做法符合心理咨询专业规范要求?", "o": ["为了降低咨询成本,使用未经过标准化的自编测验", "直接将心理测验的结果作为诊断的唯一依据", "根据求助者的具体问题与临床评估选择匹配的心理测验", "为了避免求助者隐瞒,不告知求助者测验的目的与要求", "为了提高咨询收入,要求求助者完成多个和问题无关的心理测验"], "a": 2, "e": "正确使用心理测验的专业规范要求:必须根据求助者的具体问题选择合适的标准化心理测验,明确告知求助者测验目的与要求,不滥用测验,且测验结果仅作为临床评估的辅助依据,不能作为唯一诊断依据。选项A、B、D、E均违背了心理测验使用的专业规范,因此正确答案为C。", "type": "single"}, {"q": "求助者,女,36岁,医院护士,近2个月因医院科室调整出现持续情绪烦躁、头痛,主动前来咨询,咨询师已经收集到求助者的主诉、近期体检报告、和同事的交往情况等资料,以下哪项不属于一般临床资料整理的范畴?", "o": ["求助者的生育史与婚姻状况", "求助者的个人成长经历", "求助者每个月的消费金额", "求助者的亲友支持情况", "求助者既往的心理咨询经历"], "a": 2, "e": "一般临床资料整理的范畴包括:人口学资料、生活状况、婚姻家庭、成长经历、社会交往、工作记录、心理健康状况、既往病史咨询史、社会支持系统等。求助者个人的每月消费金额不属于需要整理的一般临床资料范畴,A、B、D、E均属于规范整理的内容,因此正确答案为C。", "type": "single"}, {"q": "咨询师收集完求助者的全部临床资料后,需要对求助者的心理健康问题形成初步印象,以下哪项是形成初步印象的正确操作步骤?", "o": ["根据收集到的资料直接给出最终诊断结果", "先对求助者的问题进行归类,再结合临床资料分析问题的严重程度", "忽略躯体检查结果,只关注求助者的心理情绪症状", "直接用心理测验的结果代替临床评估与判断", "无需考虑求助者所处的社会文化背景,直接评估"], "a": 1, "e": "对求助者形成初步印象的正确步骤为:先对求助者的心理行为问题进行归类,再结合收集到的临床资料、心理测验结果分析问题的严重程度,最后结合求助者的社会文化背景做出初步判断。直接给出最终诊断、忽略躯体症状、用测验代替临床评估、不考虑社会文化背景都不符合专业规范,因此A、C、D、E均错误,正确答案为B。", "type": "single"}, {"q": "求助者,女,29岁,销售,4个月前自己苦心跟进半年的大订单被同事抢走,之后出现情绪暴躁、经常和家人发脾气,已经辞去原来的工作,不愿和朋友联系,现在看到和抢单同事同名的人都会忍不住愤怒,全身检查没有器质性病变。该求助者最可能的评估是?", "o": ["一般心理问题", "严重心理问题", "精神病性障碍", "适应障碍", "广泛性焦虑障碍"], "a": 1, "e": "严重心理问题的诊断标准为:由强烈的现实应激事件引发,病程在2个月到半年之间,情绪反应出现泛化,社会功能受损明显,无器质性病变基础,该求助者完全符合诊断标准。一般心理问题病程不足2个月,无情绪泛化;精神病性障碍存在幻觉妄想等精神病性症状;适应障碍通常病程更短,应激程度较轻;广泛性焦虑障碍以持续的广泛性焦虑为核心,无明确强烈的现实应激源,因此A、C、D、E均不符合,正确答案为B。", "type": "single"}, {"q": "求助者,男,56岁,退休工人,近2个月坚信小区物业人员故意给自己家断水,多次找物业闹事,最近甚至拿石头砸坏物业办公室玻璃,无法正常生活,家属强行陪同前来咨询。咨询师首先应该采取的正确做法是?", "o": ["进行摄入性会谈收集详细资料", "直接转介到精神卫生医疗机构", "使用焦虑自评量表进行测评", "制定心理咨询的方案", "进行放松训练缓解求助者的情绪"], "a": 1, "e": "该求助者出现了妄想症状,属于精神病性问题,已经超出了健康心理咨询的工作范畴,因此首先应当转介到精神卫生医疗机构进行专业的评估与治疗。其他操作都需要在确认问题属于心理咨询工作范畴后才能进行,因此A、C、D、E均不正确,正确答案为B。", "type": "single"}, {"q": "求助者,女,19岁,大一学生,因未婚怀孕前来咨询,担心咨询师会骂自己不自重,内心非常不安。咨询师以下哪种做法体现了尊重的核心专业要求?", "o": ["直接告知求助者未婚怀孕是错误的行为,必须马上处理", "拒绝为该求助者提供咨询服务,要求求助者找家长解决", "接纳求助者的处境,不对求助者的行为做道德评判", "要求求助者尽快告诉男方家长,尽快处理问题", "劝说求助者以后一定要洁身自好,不能再犯这种错误"], "a": 2, "e": "尊重的核心要求是咨询师接纳求助者的一切,包括求助者的行为、观念,不做道德评判、不歧视。选项A、B、D、E都带有评判,违背了尊重的专业原则,只有C符合要求,因此正确答案为C。", "type": "single"}, {"q": "求助者,男,32岁,公司职员,最近晋升失败,觉得自己努力了五年都没有结果,在咨询室哭诉“我真的太没用了,什么事情都做不好,我根本就是一个失败者”,咨询师以下哪种回应最符合共情的专业要求?", "o": ["“你别这么想了,这次不行下次还有机会啊”", "“你努力了很久想要晋升结果没成功,觉得非常挫败,否定自己,对吗?”", "“你就是太贪心了,没晋升也不至于这样啊”", "“我特别理解你,我上次晋升也失败了,我当时比你还难受”", "“你应该冷静下来,好好想想自己哪里做得不对”"], "a": 1, "e": "共情要求咨询师准确体验求助者的内心世界,并准确将求助者的情绪与认知反馈给求助者,B选项精准匹配了求助者的感受与想法,符合共情的要求。A属于安慰说教;C属于评判性回应;D混淆了咨询师自身的体验和求助者的体验;E属于说教和建议,因此A、C、D、E都不符合共情的要求,正确答案为B。", "type": "single"}, {"q": "求助者,女,27岁,创业失败负债,待业在家3个月,认为自己一事无成,什么都做不好。咨询师说“你虽然创业失败负债,但这三个月你一直坚持投简历学习新技能,从来没有放弃找工作,这说明你非常有韧性”,关于咨询师的这个回应,以下说法正确的是?", "o": ["属于盲目乐观,忽视了求助者创业失败的困境", "实事求是地发现了求助者的积极行为并给予肯定,符合积极关注的要求", "咨询师应该直接帮求助者找工作,不需要关注这种小事", "积极关注只需要关注求助者过去的成功经历,不需要关注这种日常行为", "这个回应会让求助者觉得被同情,不会有好的效果"], "a": 1, "e": "积极关注要求咨询师实事求是地发现求助者身上的积极方面,帮助求助者看到自身的资源。该求助者虽然遭遇创业失败,但坚持投简历学习新技能是具体的积极行为,咨询师的回应准确给予肯定,既没有盲目乐观,也没有忽视求助者的困境,符合积极关注的要求。选项A、C、D、E都对积极关注的概念理解有误,因此正确答案为B。", "type": "single"}, {"q": "求助者,女,18岁,高中学生,第一次来做咨询,进门之后非常紧张,手攥着衣角不敢说话,头一直低着。咨询师以下哪种做法最能体现热情的专业要求?", "o": ["直接开口问求助者遇到了什么问题,不做寒暄", "微笑等待,主动询问求助者要不要喝水,等到求助者放松之后再开始会谈", "打断求助者的犹豫,直接问问题然后给建议", "表现出不耐烦,催促求助者快点说清楚自己的问题", "忽略求助者的紧张,直接进入正式会谈主题"], "a": 1, "e": "热情要求咨询师在咨询全过程中体现对求助者的关心,初次接待时帮助求助者缓解紧张情绪。B选项通过细节关怀帮助求助者放松,符合热情的要求。A、C、D、E都没有关注求助者的紧张情绪,缺乏对求助者的关怀,不符合热情的要求,因此正确答案为B。", "type": "single"}, {"q": "求助者,男,62岁,因持续半年焦虑失眠主动前来咨询,咨询师发现求助者是自己当前任职企业的主要股东,存在直接利益关联,无法保持中立咨询态度。以下哪种转介做法符合专业伦理规范?", "o": ["不告知求助者转介原因,直接将其联系方式提供给其他咨询师", "向求助者说明转介的原因,推荐合适的咨询师并协助完成交接", "要求求助者自行寻找其他心理咨询师,不提供任何帮助", "隐瞒自身与求助者的利益关联,继续勉强开展咨询", "直接拒绝为求助者提供咨询,不做任何后续安排"], "a": 1, "e": "当咨询师因自身原因无法提供专业服务时,应向求助者说明原因,推荐合适的替代咨询师,并协助完成交接,保障求助者的咨询权益。A未说明原因不尊重求助者,C不负责,D违反伦理,E不专业。", "type": "single"}, {"q": "求助者,男,22岁,大四考研学生,因考研失利在第三次咨询中透露“我已经网购了农药,打算今晚结束生命”,并要求咨询师为其保密。咨询师以下哪种做法符合专业伦理要求?", "o": ["严格遵守保密原则,不向任何人透露该信息", "立即通知求助者的直系家属,并联系当地精神卫生医疗机构进行紧急干预", "忽略求助者的表述,继续按照原计划开展本次咨询", "要求求助者签署承诺书,承诺不实施伤害行为", "直接将求助者送往精神病院,不告知其家属"], "a": 1, "e": "当求助者明确表达伤害自身的意图时,属于保密原则的例外情况,咨询师需立即通知家属与专业精神卫生机构进行干预,保障求助者的生命安全。A违反伦理,C不负责,D无法阻止风险,E过度干预未尊重求助者意愿。", "type": "single"}, {"q": "求助者,男,36岁,离婚后持续情绪低落、兴趣减退3个月,咨询师计划选用抑郁自评量表(SDS)进行测评,以下哪种结果提示求助者可能存在中度及以上抑郁症状?", "o": ["总粗分低于40分", "标准分高于60分", "标准分高于63分", "总粗分高于60分", "总粗分高于63分"], "a": 2, "e": "SDS的标准分计算公式为总粗分 ×1.25后取整数,分界值标准:53-62分为轻度抑郁,63分及以上为中度及以上抑郁。A、B为正常或轻度抑郁范围,D、E混淆了总粗分和标准分的分界规则。", "type": "single"}, {"q": "求助者,男,28岁,因项目竞标失败出现焦虑、胸闷、食欲下降18天,情绪反应仅针对竞标事件,未出现泛化,主动前来咨询。以下关于该求助者心理评估的描述,正确的是?", "o": ["该求助者存在精神病性症状,需立即转介精神科医疗机构", "该求助者病程不足1个月,不符合任何心理问题的评估标准", "该求助者的情绪反应由现实因素引发且未泛化,可初步评估为一般心理问题", "该求助者无需进行任何心理测验,仅凭主诉即可直接给出评估结果", "该求助者的问题无需专业干预,可自行缓解"], "a": 2, "e": "一般心理问题的评估标准为:由现实因素引发,病程1~2个月,情绪反应未泛化,社会功能轻度受损,无器质性病变基础。该求助者完全符合该标准。A选项无妄想、幻觉等精神病性症状;B选项病程符合1~2个月的评估区间;D选项需结合心理测验辅助评估,仅凭主诉不够严谨;E选项该求助者主动求助,且存在明显不适,需专业干预。", "type": "single"}, {"q": "求助者,女,26岁,因与男友分手情绪低落主动前来咨询,咨询师计划开展摄入性会谈以收集临床资料,以下哪种做法不符合摄入性会谈的专业规范?", "o": ["会谈前提前拟定会谈提纲,明确会谈目标", "会谈过程中耐心倾听,不随意打断求助者的陈述", "会谈中随意发表个人对求助者恋爱选择的主观评判", "会谈结束后详细记录会谈内容与求助者的核心症状", "会谈中保持中立、客观的态度,不偏向任何一方"], "a": 2, "e": "摄入性会谈需避免使用评判性语言,咨询师应保持中立客观,不随意发表主观评判,以免破坏咨询关系与求助者的表达意愿。A、B、D、E均符合摄入性会谈的专业规范要求。", "type": "single"}, {"q": "求助者,女,16岁,高中生,因长期熬夜刷短视频导致上课注意力不集中、学习成绩下滑,家长陪同前来咨询。咨询师计划使用阳性强化法帮助求助者减少熬夜刷短视频的行为,以下哪种做法符合阳性强化法的标准操作步骤?", "o": ["对求助者继续熬夜刷短视频的行为进行严厉批评与惩罚", "当求助者主动提前放下手机、不熬夜时,立即给予其喜爱的奖励", "直接要求求助者立即停止所有使用短视频的行为", "忽略求助者的任何行为变化,不给予任何强化物", "以惩罚作为主要的行为干预手段"], "a": 1, "e": "阳性强化法的核心操作逻辑为:当目标行为(减少熬夜刷短视频)出现时,立即给予阳性强化物,以增强该目标行为的出现频率。A、E选项使用惩罚,违背阳性强化法的原则;C选项直接要求停止目标行为,未遵循循序渐进的原则;D选项忽略行为变化,无法强化目标行为。", "type": "single"}, {"q": "求助者,男,30岁,销售,近半年因业绩压力大出现持续紧张、心慌、入睡困难,主动前往心理咨询机构求助。咨询师计划为其开展放松训练以缓解焦虑情绪,以下哪种操作步骤符合专业规范?", "o": ["先让求助者坐在舒适的座椅上,闭上眼睛,配合缓慢的腹式呼吸,从四肢到躯干逐次进行肌肉放松训练", "快速抖动全身肌肉,不做任何呼吸调整,仅依靠主观感受放松", "仅放松上肢肌肉,忽略下肢与躯干的肌肉紧张", "放松过程中要求求助者保持清醒,全程不闭眼", "每次放松训练严格控制在5分钟以内,不得延长训练时长"], "a": 0, "e": "放松训练的标准操作步骤为:让求助者处于舒适环境,采取放松姿势,先进行呼吸训练,再逐次放松全身肌肉,可根据情况调整训练时长。B未做呼吸调整,C忽略多部位肌肉紧张,D禁止闭眼违背放松要求,E强制限制时长不符合操作规范。", "type": "single"}, {"q": "求助者,女,24岁,刚入职互联网公司,试用期工作汇报被领导当众指出逻辑错误后,出现情绪低落、自我否定,认为“我天生不适合做这份工作,永远都不会得到领导认可”,主动前来咨询。咨询师运用合理情绪疗法的ABC理论进行分析,其中代表不合理信念的B是?", "o": ["领导当众指出汇报工作的错误", "情绪低落、自我否定", "认为自己不适合这份工作,永远不会得到领导认可", "本次汇报工作未达到预期要求", "主动寻求心理咨询帮助"], "a": 2, "e": "合理情绪疗法ABC理论中,A为诱发事件,B为个体对事件的认知与信念,C为情绪与行为结果。本案例中A为领导当众指出错误,C为情绪低落,B为求助者的不合理信念,即C选项。", "type": "single"}, {"q": "求助者,女,45岁,近1个月出现情绪烦躁、睡眠质量差、周身不适,家属陪同其前往心理咨询机构。咨询师计划选用90项症状清单(SCL-90)进行测评,以下关于该量表的正确描述是?", "o": ["属于自评式量表,共90个项目,采用1~5级评分制", "属于他评式量表,主要用于评估精神病性症状", "仅能评估抑郁症状,无法覆盖其他心理行为问题", "施测时无需向求助者说明评分规则与测试目的", "量表得分越高,提示求助者心理健康水平越好"], "a": 0, "e": "SCL-90为90项症状自评量表,包含90个项目,采用1~5级评分,可多维度评估多种心理症状;B选项属于他评的描述错误,C选项仅能评估抑郁的描述错误,D选项施测需要提前说明规则要求,E选项得分越高提示症状越严重,而非心理健康水平越好。", "type": "single"}, {"q": "求助者,男,28岁,因被公司裁员后出现情绪低落,连续3天闭门不出,家属陪同前来咨询。在咨询初始阶段,求助者始终低头抠手、沉默不语,咨询师以下哪种处理方式最为恰当?", "o": ["主动告知求助者“不想说就不必勉强”,随后保持沉默等待", "直接打断沉默,厉声询问“你到底有什么心事?”", "表现出不耐烦的神情,催促求助者尽快开口说明情况", "转移话题,主动询问求助者以往的业余爱好", "全程不做任何回应,任由求助者保持沉默"], "a": 0, "e": "当求助者出现情绪型沉默时,咨询师应给予理解与空间,允许求助者暂时沉默,同时传递接纳的态度。B打断会破坏信任关系,C不耐烦违背咨询的热情原则,D转移话题偏离核心问题,E无回应会让求助者感到被忽视。", "type": "single"}, {"q": "求助者,女,35岁,因和小舅子合伙做生意产生经济纠纷,在咨询中滔滔不绝,反复讲述争吵细节,且多次偏离主题抱怨对方的不是。咨询师以下哪种处理方式符合专业规范?", "o": ["直接打断求助者,要求其直奔核心问题", "全程不插话,任由求助者自由表达", "表现出厌烦情绪,示意求助者停止讲述", "主动转移话题,谈论与当前问题无关的内容"], "a": 1, "e": "针对宣泄型多话,咨询师应耐心倾听,同时适时引导其聚焦核心问题,避免无意义的重复叙述,推进咨询进程。A打断会伤害求助者感受,不符合尊重原则,C无引导无法推进咨询,D、E违背尊重与中立原则。", "type": "single"}, {"q": "求助者,男,26岁,因和父亲长期关系不和前来咨询,经过3次咨询后,求助者表示咨询师的处事风格和自己过世的爷爷很像,对咨询师产生强烈依赖,希望咨询结束后和咨询师成为朋友私下来往。咨询师以下哪种处理方式符合专业伦理要求?", "o": ["接受求助者的好感,与求助者建立咨询外的朋友关系", "明确告知求助者咨询关系的专业边界,解释移情的本质", "回避求助者的话题,直接转移到其他咨询内容", "严厉批评求助者的想法,要求其立刻停止这种念头", "直接将求助者转介给其他咨询师"], "a": 1, "e": "当求助者出现移情时,咨询师应明确咨询关系的专业边界,解释移情的本质,引导求助者将注意力放回解决自身问题上。A违反咨询伦理,C回避无法解决问题,D批评破坏咨询信任关系,E不必要转介,不尊重求助者。", "type": "single"}, {"q": "求助者,女,29岁,因社交焦虑障碍不敢前往公共场合与人交流,经过8次系统咨询后,以下哪项不属于评估本次咨询效果的有效维度?", "o": ["求助者的自我报告,如“我现在愿意自己去菜市场买菜了”", "咨询师的观察结果,如求助者在咨询室不再紧张手抖", "求助者家属的反馈,如“她上周主动参加了公司的团建聚餐”", "求助者的躯体症状改善情况,如紧张心慌的症状完全消失", "求助者近3个月的月工资收入增长幅度"], "a": 4, "e": "咨询效果的评估维度包括自我报告、咨询师观察、家属反馈、症状改善、社会功能恢复等。工资收入增长与本次咨询的社交焦虑问题无直接关联,不属于有效评估维度。", "type": "single"}, {"q": "求助者,男,25岁,因公司裁员失业后出现孤独感、社交退缩,主动前来咨询。咨询师计划使用应对方式问卷评估其应对压力的方式,以下哪种应对方式属于成熟型应对策略?", "o": ["退避", "自责", "幻想", "解决问题", "合理化"], "a": 3, "e": "应对方式问卷将应对方式分为成熟型(解决问题、求助)、不成熟型(自责、退避、幻想)、混合型(合理化)。其中解决问题属于成熟型应对策略,可有效应对压力事件。", "type": "single"}, {"q": "52岁女性,近一年总觉得邻居在自己家水杯下毒,出门觉得被人跟踪,多次向社区反映但未找到任何证据,该女士坚信自己的判断完全正确,拒绝认为自己精神存在问题。该求助者的自知力状态为?", "o": ["自知力完整,能够主动认识到自身精神异常", "自知力部分完整,可部分识别自身异常", "自知力缺失,不承认自身存在精神异常", "无自知力,仅能部分认识自身异常", "无法判断自知力状态"], "a": 2, "e": "自知力指求助者对自身精神状态的认识和判断能力,该求助者存在妄想症状,且坚信妄想内容,完全不承认自身存在精神异常,符合自知力缺失的表现。A、B、D选项对自知力状态的描述不符合该案例情况,案例信息足够明确判断自知力状态,因此E错误。", "type": "single"}, {"q": "28岁男性因职场压力来做咨询,咨询过程中求助者多次接到工作电话,每次都简单说明后继续咨询,咨询师以下哪种做法符合有效倾听的专业要求?", "o": ["打断求助者,提醒咨询时间请勿接工作电话", "保持专注,关注求助者的表达内容和情绪变化,不随意打断沟通", "趁接电话的空隙回复自己的工作消息", "引导求助者先处理工作,结束本次咨询", "直接批评求助者不尊重咨询时间"], "a": 1, "e": "有效倾听要求咨询师保持专注,不随意打断求助者的表达,全程关注求助者的语言与非语言信息,B选项符合专业要求。A选项随意打断会破坏咨询信任关系,C选项不专注违背倾听要求,D选项提前结束咨询不符合专业设置,E选项的评判式回应违背尊重的咨询态度。", "type": "single"}, {"q": "24岁女性因和恋人相处矛盾前来咨询,反复说“他根本不爱我,我们在一起全都是错的”,但没有说明具体发生了哪些事件让她产生这种感受。咨询师以下哪种回应符合具体化技术的专业要求?", "o": ["“你可以说一说具体发生了哪些事,让你觉得他不爱你吗?”", "“我特别理解你的难过,他这样真的很过分”", "“我觉得你应该和他好好谈一谈,把问题说开”", "“你是不是想多了,他可能只是最近太忙了”", "“我们换个话题聊聊你平时的爱好吧”"], "a": 0, "e": "具体化技术是指咨询师协助求助者清晰准确地表述自己的观点、情绪和经历的具体事件,A选项引导求助者说明具体细节,符合具体化技术的要求。B选项是共情回应但没有起到具体化的作用,C选项是给出建议,D选项是评判式回应,E选项是回避问题,均不符合要求。", "type": "single"}, {"q": "30岁男性害怕狗,严重影响日常出行,咨询师计划使用系统脱敏法帮助求助者缓解恐惧,以下操作顺序符合专业规范的是?", "o": ["直接带求助者到有大型犬的环境中,强迫他适应", "先建立恐惧等级梯度,再学习放松训练,最后按照等级逐步暴露", "只让求助者想象狗的样子,不做任何实际暴露", "批评求助者的恐惧,要求他自己克服", "一开始就让求助者接触最高等级的恐惧场景"], "a": 1, "e": "系统脱敏法的标准操作步骤为:首先协助求助者建立恐惧/焦虑的等级梯度,随后教给求助者放松训练技术,最后让求助者按照等级从低到高逐步进行暴露,循序渐进消除恐惧反应,B选项符合规范。A没有放松训练,会引发强烈的焦虑情绪,C仅想象暴露效果有限,D批评违背尊重的咨询伦理,E一开始就接触最高等级会加剧恐惧,不符合操作要求。", "type": "single"}, {"q": "48岁女性近三个月经常出现心慌、胸闷、失眠,总觉得自己得了严重心脏病,多次到三甲医院做心电图、心脏彩超等检查,结果都没有发现器质性异常。咨询师排除器质性精神障碍的关键依据是?", "o": ["求助者的年龄和性别", "综合医院的专业医学检查结果", "求助者没有心脏病家族史", "求助者的症状时好时坏", "求助者既往没有严重躯体病史"], "a": 1, "e": "排除器质性精神障碍的核心关键依据是专业医学检查结果,确认不存在相应的躯体器质性病变,其他选项都仅作为参考因素,不能作为排除的关键依据,因此B正确。", "type": "single"}, {"q": "32岁男性因婚姻危机主动前来咨询,咨询过程中求助者叙述原生家庭对自己婚姻观的影响时,咨询师多次打断求助者的讲述,催求助者说重点。该咨询师的行为会造成什么影响?", "o": ["可以加快咨询进度,提升咨询效率", "会破坏咨询关系,降低求助者对咨询师的信任", "只要能解决问题,不会有负面影响", "是求助者自己说话太啰嗦,应该适应咨询师的风格", "符合心理咨询的专业伦理要求"], "a": 1, "e": "良好咨询关系的建立需要咨询师保持尊重、耐心、热情的专业态度,随意打断求助者的叙述、催促求助者会损害求助者的被尊重感,破坏信任关系,严重影响咨询效果。A、C、D、E的描述都违背心理咨询的专业伦理和要求,因此B正确。", "type": "single"}, {"q": "26岁女性绩效考核不合格被部门约谈,哭着和咨询师说“我辛辛苦苦干了一年,居然不合格,我真的太失败了,什么事都做不好”,以下咨询师的哪种回应属于内容反应技术?", "o": ["“你辛苦了一年结果绩效考核不合格,觉得自己特别失败,什么事都做不好,对吗?”", "“我特别能理解你现在的难过,换做是我也会特别伤心”", "“你下次早点准备,肯定能拿到好成绩”", "“你是不是对领导的考核结果不服气啊?”", "“我们聊聊怎么提升你的工作绩效吧”"], "a": 0, "e": "内容反应技术是指咨询师把求助者陈述的主要内容经过概括整理,反馈给求助者,A选项准确概括复述了求助者的核心表述,符合内容反应技术的要求。B是共情回应,C是给出建议,D是提问推断,E是转换话题,均不符合内容反应技术的定义,因此A正确。", "type": "single"}, {"q": "30岁女性准备结婚但和未婚夫谈不拢彩礼,最后分手,和咨询师说“我都快结婚了居然分手,我再也遇不到合适的人了,我这辈子都毁了”,以下哪种回应属于情感反应技术?", "o": ["“你面对婚礼取消分手,觉得非常绝望和痛苦,对吗?”", "“你应该早点走出来,重新开始新的生活”", "“我之前也遇到过类似的事,我特别能理解你的感受”", "“你要不要和家里人聊聊疏解一下情绪?”", "“我们来梳理一下你在这段关系里的问题吧”"], "a": 0, "e": "情感反应技术是指咨询师把求助者陈述中的情绪体验捕捉整理后反馈给求助者,A选项准确捕捉了求助者的绝望和痛苦的情绪并反馈,符合情感反应技术的要求。B是给出建议,C是自我暴露,D是建议,E是转换话题,均不符合要求,因此A正确。", "type": "single"}, {"q": "25岁男性不敢在公众场合发言,每次上台都紧张到忘词,咨询师计划用指导技术帮助求助者提升能力,以下哪种回应符合指导技术的专业要求?", "o": ["“你下次上台前,可以先做三次深呼吸,再从左到右扫一遍台下,开口自我介绍就好”", "“你应该大胆一点,不要害怕”", "“你是不是太在意别人的看法了?”", "“我以前上台也紧张,我是这么调整的……”", "“我们来聊聊你为什么害怕上台发言吧”"], "a": 0, "e": "指导技术是咨询师直接指示求助者按照特定的方式行动或练习,A选项给出了具体可操作的调整步骤,符合指导技术的要求。B是笼统的建议,不是具体的指导,C是提问,D是自我暴露,E是具体化探索原因,均不符合指导技术的定义,因此A正确。", "type": "single"}, {"q": "28岁女性因职业选择困惑前来咨询,咨询师计划用16PF评估其人格特质,以下关于16PF的描述正确的是?", "o": ["共187个项目,适用于16岁以上人群自评", "共90个项目,适用于18岁以上成年人", "属于他评量表,由咨询师根据求助者表现评分", "量表得分越高,对应的人格特质越优秀", "仅能评估情绪状态,无法评估其他人格维度"], "a": 0, "e": "16PF即卡特尔16种人格因素测验,共包含187个项目,用于评估16种不同的人格特质,适用于16岁以上人群自评,人格特质得分没有优劣之分,因此A正确。B选项是90项症状清单SCL-90的参数,C选项16PF是自评不是他评,D选项得分没有优劣之分,E选项16PF覆盖16种不同人格维度,不止情绪,因此BCDE错误。", "type": "single"}, {"q": "31岁男性因情绪波动大前来咨询,咨询师用EPQ评估人格,哪个维度的高分对应情绪不稳定、容易焦虑易怒的特征?", "o": ["E维度高分", "N维度高分", "P维度高分", "L维度高分", "E维度低分"], "a": 1, "e": "艾森克人格问卷EPQ包含四个维度,其中N维度为神经质维度,高分者表现为情绪不稳定、焦虑、易怒、情绪波动大,因此B正确。E维度高分对应外向,低分对应内向,P维度高分对应孤独、冷漠、不近人情,L维度高分对应掩饰性高,因此ACDE错误。", "type": "single"}, {"q": "35岁女性近期经历换工作、亲人住院、买房贷款三件大事,因长期压力大失眠前来咨询,咨询师计划用LES评估压力水平,以下关于LES的描述正确的是?", "o": ["用于评估一段时间内生活事件带来的精神刺激强度", "用于评估人格特征,一共包含88个项目", "属于他评量表,由咨询师根据求助者描述评分", "量表得分越高,说明心理健康水平越好", "仅能评估最近1个月内发生的生活事件"], "a": 0, "e": "生活事件量表LES的作用是评估个体在一段时间内遭遇的生活事件带来的精神刺激强度,属于自评量表,通常评估近1年内的生活事件,得分越高说明个体承受的压力越大,因此A正确。B选项描述的是人格测验的特点,不是LES,C选项LES是自评不是他评,D选项得分越高压力越大,心理健康风险越高,E选项评估的通常是近1年不是1个月,因此BCDE错误。", "type": "single"}, {"q": "42岁女性,近3年持续情绪低落,对之前喜欢的书法也提不起兴趣,睡眠质量差,食欲下降,没有自杀计划,日常工作能基本完成,社会功能轻度受损,符合恶劣心境诊断标准的描述是?", "o": ["病程持续2年以上,多数时间情绪低落,间歇期不超过2个月", "病程持续1个月以上,情绪低落明显,伴有强烈自杀念头", "病程持续半年以上,情绪低落呈阵发性发作", "病程持续3个月以内,情绪低落由明确应激事件引发", "无明显躯体症状,社会功能完全正常"], "a": 0, "e": "恶劣心境即持续性抑郁障碍,诊断标准为病程持续2年及以上,多数时间情绪低落,间歇期不超过2个月,社会功能轻度受损,一般无明显自杀念头,因此A正确。B选项符合抑郁发作的特点,CDE均不符合恶劣心境的诊断标准,因此BCDE错误。", "type": "single"}, {"q": "29岁女性社交焦虑经过12次咨询后,症状明显缓解,已经可以正常参与社交活动,咨询师计划结束咨询,开展巩固工作,以下哪种做法符合专业规范?", "o": ["立即停止咨询,不做任何后续安排", "和求助者一起回顾整个咨询过程的进步,共同制定后续的自我调节计划", "要求求助者每月来一次,持续咨询至少一年", "直接告诉求助者你已经完全痊愈,以后都不用来了", "收取额外的巩固咨询费用才安排后续随访"], "a": 1, "e": "咨询结束阶段的巩固工作,需要和求助者共同回顾咨询中的收获与进步,帮助求助者掌握自我调节的方法,制定后续计划巩固效果,因此B正确。A没有任何后续安排不利于巩固效果,C属于过度咨询,D表述过于绝对,没有给求助者支持,E违反收费咨询的专业规范,因此ACDE错误。", "type": "single"}, {"q": "求助者,男,21岁,大三学生,因上台演讲被当众嘲笑后出现演讲恐惧,不敢站在人前发言,主动前来咨询,咨询师计划使用系统脱敏法改善其恐惧症状,以下操作步骤正确的是:", "o": ["先进行放松训练,再建立恐惧等级,最后直接暴露最高等级场景", "先建立恐惧等级表,再进行放松训练,最后按等级逐步暴露于恐惧场景", "仅让求助者想象恐惧场景,不需要进行实际场景练习", "对求助者不敢上台的回避行为进行批评,要求其立刻上台演讲", "不需要逐步递进,一次性让求助者面对全校演讲的最高恐惧场景"], "a": 1, "e": "系统脱敏法的标准操作流程为:建立恐惧等级、进行放松训练、按等级逐步暴露于恐惧场景,因此B选项正确。A选项颠倒流程且直接暴露最高等级,会引发强烈焦虑;C选项仅想象无法有效迁移至现实场景;D选项批评会破坏咨询关系,违背尊重原则;E选项一次性暴露高等级场景会加剧恐惧,不符合循序渐进的原则。", "type": "single"}, {"q": "求助者,男,28岁,因项目竞标失败后出现焦虑、心慌,持续1个半月,情绪未泛化到日常其他场景,主动前来咨询,初步评估为一般心理问题,以下关于一般心理问题的评估标准,描述错误的是:", "o": ["由现实工作刺激引发,情绪反应和现实事件直接相关", "病程通常持续1-2个月,社会功能仅轻度受损", "情绪反应没有泛化,无器质性病变作为基础", "常伴随幻觉、妄想等精神病性症状", "求助者自知力完整,主动寻求专业帮助"], "a": 3, "e": "一般心理问题的核心特点是无精神病性症状、情绪未泛化、病程1-2个月、由现实因素引发,因此D选项错误,幻觉妄想等精神病性症状是精神病性障碍的核心特征,不属于一般心理问题的表现。A、B、C、E均符合一般心理问题的评估标准。", "type": "single"}, {"q": "求助者,女,23岁,本科毕业待业1年,因考公多次失败出现情绪焦虑,和父母关系紧张,主动前往心理咨询机构求助,初诊接待时,咨询师首先引导求助者填写登记表格,准备开展摄入性会谈,以下关于本次初诊接待工作的描述,正确的是:", "o": ["为节省咨询时间,不需要向求助者说明保密原则和咨询设置,直接开始会谈", "为全面评估,直接选用16PF作为本次唯一的心理测评工具", "初诊接待时应当向求助者简要介绍保密原则、咨询设置与咨询目标,同时明确说明保密例外的情况", "不需要记录求助者的基本信息,仅口头询问记住即可", "为加快咨询进程,可以跳过信息收集环节直接制定咨询方案"], "a": 2, "e": "初诊接待的标准流程包括介绍咨询设置、保密原则及保密例外、收集并书面记录求助者基本信息,因此C选项符合专业规范。A选项违背初诊接待的基本要求,必须明确告知保密原则;B选项16PF用于人格测验,针对该求助者的焦虑情绪问题,应当优先选用SAS、SCL-90等症状量表,仅用16PF过于片面;D选项要求必须书面留存求助者基本信息,方便后续评估跟进;E选项制定咨询方案需要基于充足的临床资料,跳过信息收集不符合专业规范。", "type": "single"}, {"q": "求助者,女,28岁,因和交往5年的男友分手,出现情绪低落、对任何事都提不起兴趣,持续3个半月,曾有自杀计划未实施,日常工作只能完成一半任务,社会功能中度受损,以下关于该求助者的心理评估,描述正确的是:", "o": ["可以直接评估为一般心理问题,不需要转介精神科", "病程超过2个月,且存在自杀风险,需要转介精神科医疗机构进一步评估", "只需要做心理测验就能确定诊断,不需要开展临床会谈", "这类情绪问题可以自行缓解,不需要专业干预", "心理咨询师可以直接为求助者开具抗抑郁药物进行治疗"], "a": 1, "e": "该求助者病程超过2个月,存在自杀念头,社会功能中度受损,已经超出一般心理问题的评估范围,需要转介精神科进行进一步排查评估,因此B选项正确。A选项不符合一般心理问题的病程和症状严重程度要求;C选项心理测验仅为辅助评估工具,诊断必须结合临床会谈获取的资料;D选项存在自杀风险,必须进行专业干预,无法自行缓解;E选项开具精神类药物是精神科执业医师的权限,超出心理咨询师的执业范围。", "type": "single"}, {"q": "求助者,男,45岁,企业部门主管,因最近部门业绩下滑,出现“我必须保住部门第一的位置,一次失利说明我完全不适合做管理”的不合理信念,情绪焦虑难以入睡,主动前来咨询,以下哪种技术最适合帮助求助者调整该不合理信念?", "o": ["阳性强化法", "系统脱敏法", "合理情绪疗法的产婆术式辩论", "放松训练", "代币法"], "a": 2, "e": "产婆术式辩论是合理情绪疗法中调整求助者不合理信念的核心技术,通过辩论引导求助者反思自身信念的不合理之处,因此C选项正确。A选项阳性强化法用于塑造良好行为,不适用于调整认知信念;B选项系统脱敏法用于改善恐惧、焦虑类的恐惧症症状;D选项放松训练仅能缓解情绪症状,无法调整不合理认知;E选项代币法属于行为矫正技术,用于行为塑造,不适用于认知调整。", "type": "single"}, {"q": "求助者,男,7岁,小学一年级学生,做作业时总是频繁起身玩玩具,无法专注完成作业,家长多次管教无效,带孩子前来咨询,咨询师计划使用阳性强化法改善孩子的专注行为,以下哪种方案符合阳性强化法的专业规范?", "o": ["只要孩子起身玩玩具,立刻批评惩罚孩子", "孩子连续15分钟专注做作业,就给孩子贴一个小红花,攒够10个小红花可以兑换孩子想要的漫画书", "忽略孩子所有行为,只批评孩子起身玩的行为", "要求孩子必须连续一周不起身,否则就没收孩子所有玩具", "把孩子的玩具全部收走,让孩子面前只有作业"], "a": 1, "e": "阳性强化法核心是通过及时强化目标行为(专注做作业)来提升该行为的发生频率,代币法(小红花兑换奖励)是阳性强化法的常用形式,因此B选项正确。A选项属于惩罚,不符合阳性强化法正强化的核心逻辑;C选项忽略了正确的目标行为,无法增加专注行为的发生;D选项属于惩罚措施,不符合阳性强化的规范;E选项属于环境调整,不属于阳性强化法的操作。", "type": "single"}, {"q": "求助者,男,30岁,婚后和父母同住,因生活习惯差异频繁和父母发生矛盾,认为“父母不尊重我的隐私,故意针对我,我的婚姻生活完全过不下去了”,情绪低落持续2个半月,主动前来咨询。咨询师先通过共情接纳了求助者的情绪,接下来计划用合理情绪疗法调整其不合理信念,以下关于本次咨询的描述,正确的是:", "o": ["咨询师应当直接告诉求助者“你的想法不对,父母只是关心你”,直接纠正不合理信念", "只需要共情就能解决问题,不需要其他干预技术", "修通阶段可以在建立良好咨询关系的基础上,运用产婆术式辩论技术引导求助者挑战自身不合理信念", "为了加快咨询进度,可以跳过共情环节直接开展辩论", "咨询只需要关注情绪就好,不需要探讨求助者的认知模式"], "a": 2, "e": "合理情绪疗法的修通阶段需要以良好的咨询关系为基础,在共情建立信任之后,再通过产婆术式辩论调整不合理信念,因此C选项正确。A选项直接否定求助者的感受,违背了尊重的咨询原则,会破坏咨询关系;B选项仅共情无法改变求助者的认知偏差,不能从根源解决问题;D选项跳过共情会阻碍信任关系建立,影响咨询效果;E选项合理情绪疗法认为认知偏差是情绪问题的核心根源,忽略认知模式无法解决根本问题。", "type": "single"}, {"q": "求助者,女,28岁,设计师,因和部门总监发生冲突后出现情绪焦虑、回避上班,前两次咨询沟通都正常,第三次咨询中,咨询师询问求助者和总监发生冲突的具体细节时,求助者突然沉默,低头不语,回避该话题,后续多次提及该话题都转移方向,以下关于该求助者的沉默类型和咨询师正确处理方式的描述,正确的是:", "o": ["该沉默属于情绪型沉默,咨询师应当直接打断,要求求助者立刻说出细节", "该沉默属于怀疑型沉默,咨询师应当表现出不耐烦,催促求助者尽快开口", "该沉默属于内向型沉默,咨询师应当直接转移话题,不要再提及冲突内容", "该沉默属于反抗型沉默,咨询师应当温和接纳,询问“你是不是不愿意谈论这个话题,可以说说你现在的感受吗?”", "该沉默属于理智型沉默,咨询师不需要干预,继续按原计划推进咨询"], "a": 3, "e": "反抗型沉默是指求助者因不愿谈论敏感、痛苦的话题而产生的沉默,该求助者刻意回避和上级冲突的细节,符合反抗型沉默的特征。A选项直接打断会破坏咨询信任关系;B选项不耐烦违背了热情尊重的咨询原则;C选项内向型沉默是因求助者个性内向不善表达,不符合本案情况;E选项理智型沉默是求助者正在思考问题,不符合本案情况;D选项温和接纳并引导求助者表达感受,符合专业咨询规范。", "type": "single"}, {"q": "求助者,男,32岁,因创业失败负债,出现情绪低落、兴趣减退,持续近4个月,情绪已经泛化到不愿和任何朋友联系,甚至不敢出门见人,无法正常工作,社会功能重度受损,主动前来咨询,以下关于该求助者的心理评估,描述正确的是:", "o": ["可以评估为一般心理问题,不需要转介精神科", "病程超过2个月,情绪泛化,社会功能重度受损,应当评估为严重心理问题或转介精神科进一步评估", "仅由现实因素引发,可以自行缓解,不需要专业干预", "属于神经症性心理问题,不需要做心理测验辅助评估", "咨询师可以直接开展治疗,不需要提前评估"], "a": 1, "e": "严重心理问题的评估标准为:病程超过2个月,情绪泛化,社会功能受损,本案求助者符合该特征,需要进一步评估或转介精神科,因此B选项正确。A选项不符合一般心理问题的病程和严重程度标准;C选项本案社会功能重度受损,存在严重情绪问题,无法自行缓解,需要专业干预;D选项神经症性心理问题的评估也需要结合心理测验结果辅助判断;E选项任何咨询都需要先完成评估才能开展干预,不符合专业规范。", "type": "single"}, {"q": "求助者,女,38岁,公司裁员后待业在家,出现情绪低落,咨询师使用应对方式问卷对求助者进行测评,结果显示求助者“退避”“幻想”因子分显著高于常模,“解决问题”“求助”因子分显著低于常模,以下关于该求助者应对方式的描述,正确的是:", "o": ["该求助者使用的都是成熟型应对策略", "该求助者倾向于使用不成熟型应对策略,比如逃避、自我幻想消极结果", "应对方式没有优劣之分,不需要进行干预", "咨询师应当直接要求求助者改变应对方式,不需要引导", "应对方式问卷只能评估情绪状态,无法评估应对行为"], "a": 1, "e": "应对方式问卷将应对方式分为三类:成熟型(解决问题、求助)、不成熟型(退避、自责、幻想)、混合型(合理化),该求助者退避、幻想因子分高,因此属于不成熟型应对策略,B选项正确。A选项明显错误;C选项应对方式确实存在成熟与不成熟之分,不成熟的应对方式会加重情绪问题,需要干预;D选项直接要求求助者改变不符合咨询的专业原则,需要逐步引导;E选项应对方式问卷就是用来评估应对行为类型的,不是评估情绪状态。", "type": "single"}, {"q": "求助者,男,24岁,刚辞职准备考研,备考半年没考上,哭诉“我一事无成,这辈子都不会成功了”,咨询师回应:“你现在特别挫败,觉得自己以后都不会做成事情了,对吗?”,该回应属于共情的哪个层次?", "o": ["初级共情,准确反映了求助者当下的情绪和表达的内容", "高级共情,深入挖掘了求助者潜在的情感", "不恰当共情,没有理解求助者的真实感受", "评判式回应,否定了求助者的感受", "建议式回应,引导求助者改变想法"], "a": 0, "e": "初级共情的核心是准确反映求助者已经表达出来的情绪和内容,本案中咨询师的回应准确复述了求助者表达的痛苦感受和想法,属于初级共情,因此A选项正确。高级共情需要挖掘求助者未直接表达的潜在情感,比如“你害怕自己一直这样失败下去”,因此B选项错误;该回应准确理解了求助者感受,是恰当的,因此C错误;该回应没有进行评判,所以D错误;该回应也没有给出任何建议,所以E错误。", "type": "single"}, {"q": "求助者,男,41岁,三个月前单位体检发现肺小结节,后续多次复查结果均显示结节无恶变特征,医生判断为良性无需特殊处理,但求助者仍坚信自己已经患上肺癌,认为医生怕自己无法接受隐瞒了病情,先后前往五家三甲医院重复做CT检查,始终不相信阴性检查结果,主动前来咨询。以下对该求助者的心理评估,正确的是?", "o": ["属于严重心理问题,由体检这个现实刺激直接引发", "属于强迫性神经症,反复做CT检查属于典型强迫行为", "属于疑病性神经症,存在牢固的疑病观念,医学检查阴性结果无法消除其疑虑", "属于焦虑性神经症,仅为体检引发的自由浮动性焦虑", "属于躯体形式障碍中的躯体疼痛障碍"], "a": 2, "e": "疑病性神经症的核心特征是患者坚定不移的坚信自己患有某种严重躯体疾病,反复就医,即使医学检查结果正常仍无法改变其想法,C选项描述正确。A选项:该求助者已经出现神经症性的疑病观念,不属于一般心理问题或严重心理问题的范畴;B选项:强迫性神经症的核心是自我强迫与反强迫的冲突,该求助者核心问题是疑病观念而非强迫冲突;D选项:焦虑性神经症无牢固的疑病观念,不符合该求助者表现;E选项:躯体疼痛障碍核心表现为躯体疼痛主诉,而非坚信自己患有重病,因此错误。", "type": "single"}, {"q": "求助者,女,28岁,同时收到两个不同公司的offer,无法决定选择哪一个,主动前来咨询,要求咨询师直接帮自己做出选择。以下哪种做法符合个体心理咨询方案的制定规范?", "o": ["根据自身人生经验直接帮求助者敲定选择,告知哪个offer更适合", "与求助者共同梳理自身职业发展需求、对两份工作的偏好与优劣势分析,共同确定本次咨询目标", "认为求助者独立性太差,直接拒绝咨询并转介", "要求求助者必须听从父母的安排,无需考虑自身感受", "仅和求助者聊两份工作的细节,不设定任何明确的咨询目标"], "a": 1, "e": "咨询方案应由咨询师与求助者共同协商制定,咨询师需尊重求助者的自主性,不得代替求助者做决定,B选项符合要求。A违反了求助者自主性原则;C无必要转介,未履行咨询师的责任;D违背求助者自主意愿,不符合咨询基本伦理;E咨询必须设定明确咨询目标,因此E错误。", "type": "single"}, {"q": "求助者,女,31岁,离婚后因情绪适应问题前来咨询,几次咨询后,求助者凡事都打电话询问咨询师意见,大到换工作小到日常购物都要咨询师帮自己做决定,认为咨询师专业可靠,自己完全没法做选择,已经出现明显的依赖行为。以下哪种处理方式符合专业规范?", "o": ["为了维护良好咨询关系,满足求助者的所有要求", "温和告知求助者:“我们咨询的目标是帮助你学会独立解决问题、自己做选择,我不会代替你做决定”", "直接拒绝所有请求,立即终止咨询关系", "为避免冲突,答应求助者要求但不提供实质性意见", "每次都转移话题,回避回应求助者的请求"], "a": 1, "e": "依赖的核心是求助者将解决问题的责任转移给咨询师,咨询师需要引导求助者承担自主责任,明确咨询目标是提升求助者解决自身问题的能力,B选项处理符合专业规范。A会强化依赖行为,违背咨询核心目标;C处理过于极端,会破坏已经建立的咨询关系;D无法解决依赖的核心问题,对求助者没有实质帮助;E回避问题,不能处理依赖问题,因此B正确。", "type": "single"}, {"q": "求助者,女,52岁,因退休后适应不良前来咨询,咨询过程中反复讲述自己年轻时工作取得的成绩,每次讲述都持续20分钟以上,完全偏离当前适应不良的咨询主题。咨询师需要处理多话现象,以下哪种方式符合专业规范?", "o": ["直接打断求助者,告知该内容和咨询主题无关,停止讲述", "耐心倾听,待求助者说完后温和引导:“您当年的工作成绩真的很出色,我们接下来聊聊您退休之后的生活感受可以吗?”", "忽略求助者的多话,继续按照原定咨询提纲推进咨询", "表现出不耐烦,暗示求助者缩短当前话题", "直接终止本次咨询"], "a": 1, "e": "处理多话现象需要先接纳求助者的表达,保护求助者自尊,再温和引导回归咨询主题,B选项处理符合要求。A直接打断容易破坏咨询信任关系,伤害求助者自尊;C忽略求助者表达,不利于咨询关系建立,也无法推进咨询目标;D违背热情尊重的咨询原则;E处理过于极端,不符合专业要求。", "type": "single"}, {"q": "求助者,女,20岁,大三学生,因失恋后情绪低落2个月,在第三次咨询中,求助者突然沉默后低声说:“我已经买了安眠药放在包里,今天咨询结束后我就打算走了,你答应我不要告诉任何人,不然我
