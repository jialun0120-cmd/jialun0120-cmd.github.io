测验为智力评估工具,与当前症状无关。因此正确答案为ABCDE。", "type": "multi"}, {"q": "该来访者的社会功能受损表现包括:", "o": ["工作出错频率增加", "与搭档争执次数增多", "骑行活动不再参与", "情绪疲惫感明显", "工作效率下降", "食欲明显减退"], "a": [0, 1, 2, 4], "e": "社会功能受损指个体正常工作、社交活动受到影响。A、B、E属于工作功能受损,C属于社交功能受损。D为情绪症状,F案例未提及,因此正确答案为ABCE。", "type": "multi"}, {"q": "咨询师建立与该来访者的咨询关系时,正确的做法包括:", "o": ["共情来访者的高强度工作压力体验", "接纳来访者的负面情绪", "直接建议来访者辞职更换工作以缓解压力", "保持中立态度,不评判来访者的工作表现", "主动询问来访者的兴趣爱好与职业期待"], "a": [0, 1, 3, 4], "e": "建立职场咨询关系需遵循共情、接纳、中立的原则。A、B、D、E符合该原则。C选项直接建议辞职违背咨询伦理,需引导来访者自主决策。因此正确答案为ABDE。", "type": "multi"}, {"q": "符合该来访者咨询目标制定原则的选项包括:", "o": ["改善情绪疲惫状态", "恢复骑行活动的参与", "提高工作效率", "彻底消除所有工作压力", "每周参与1次骑友聚会", "减少与搭档的争执次数"], "a": [0, 1, 2, 4, 5], "e": "咨询目标需遵循具体、可行、积极的原则。A、B、C、E、F均符合该原则。D选项 “彻底消除工作压力” 不现实,不符合可行原则。因此正确答案为ABCEF。", "type": "multi"}, {"q": "适配该来访者的心理测验包括:", "o": ["创伤后应激障碍筛查表(PC-PTSD)", "症状自评量表(SCL-90)", "焦虑自评量表(SAS)", "抑郁状态问卷(DSI)", "生活事件量表(LES)", "主题统觉测验(TAT)"], "a": [0, 1, 2, 3, 4], "e": "PC-PTSD专门评估创伤后应激障碍症状,SCL-90可全面评估心理症状,SAS、DSI可分别评估伴随的焦虑、抑郁情绪,LES可评估创伤事件的影响程度,均适配本案例。F选项TAT为投射测验,不适用于快速评估创伤症状。因此正确答案为ABCDE。", "type": "multi"}, {"q": "该来访者的回避症状包括:", "o": ["不敢独自驾车", "不敢乘坐私家车", "夜间频繁做噩梦", "偶尔心慌出汗", "回避与朋友外出游玩", "日常工作正常完成"], "a": [0, 1, 4], "e": "回避症状指个体主动回避与创伤事件相关的场景或活动。A、B属于对创伤相关交通工具的回避,E属于对社交场景的回避(因回避乘车)。C、D为创伤引发的生理情绪症状,F为社会功能保留的表现,因此正确答案为ABE。", "type": "multi"}, {"q": "咨询师建立咨询关系时,正确的做法包括:", "o": ["耐心倾听来访者的创伤经历", "尊重来访者的回避行为,不强迫其谈论创伤细节", "及时打断来访者的噩梦描述以避免情绪激动", "保持稳定的咨询时间与设置", "共情来访者对车祸的恐惧感受", "向来访者保证绝对不会再发生车祸"], "a": [0, 1, 3, 4], "e": "建立创伤咨询关系需遵循耐心倾听、尊重回避、稳定设置、共情的原则。A、B、D、E符合该原则。C选项不应随意打断来访者的倾诉;F选项不能做出绝对保证,违背客观原则。因此正确答案为ABDE。", "type": "multi"}, {"q": "符合该来访者咨询目标制定原则的选项包括:", "o": ["减轻对驾车的恐惧程度", "能够正常乘坐私家车", "每周参与1次朋友外出游玩", "彻底消除所有恐惧情绪", "夜间不再做与车祸相关的噩梦", "能够独立驾车短途出行"], "a": [0, 1, 2, 4, 5], "e": "咨询目标需遵循具体、可行、积极的原则。A、B、C、E、F均符合该原则。D选项 “彻底消除所有恐惧情绪” 不现实,不符合可行原则。因此正确答案为ABCEF。", "type": "multi"}, {"q": "若为该求助者编制适应不良情绪自评量表,符合文字命题原则的是:", "o": ["使用通俗易懂的表述,避免使用心理学专业生僻词汇", "每个题干语句只表述一个核心意思,不混杂多个概念", "采用双重否定句提升表述的严谨性", "表述完整清晰,不省略必要的限定条件", "把相同的限定词放入题干来简化选项表述", "使用模糊表述减少求助者的抵触心理"], "a": [0, 1, 3], "e": "心理测验的文字命题原则要求:使用准确当代易懂语言、语句简明、每个语句只包含单一概念、避免双重否定、表述完整清晰。A符合要求;B符合要求;C错误,文字命题原则要求避免使用双重否定;D符合要求;E选项将共同词语放入题干简化选项是选择题选项编制的原则,不属于文字命题原则;F选项模糊表述会影响测验结果的准确性,不符合命题原则要求。", "type": "multi"}, {"q": "咨询师在和该求助者工作过程中,需要遵守的伦理规范包括:", "o": ["严格遵守保密原则,仅在法定要求披露的情形下打破保密", "如实告知求助者咨询的设置、流程以及咨询的预期效果", "帮助求助者做决定,更换校外住宿避开冲突", "避免和求助者建立咨询以外的其他关系", "直接要求求助者返回宿舍和舍友和解", "为求助者开具缓解焦虑的药物处方"], "a": [0, 1, 3], "e": "A选项,保密原则是心理咨询核心伦理要求,仅在出现自伤伤人等法定披露情形下可以打破,符合伦理;B选项,知情同意原则要求咨询师如实告知咨询相关信息,符合伦理;C选项,咨询师不得替求助者做出任何生活重大决策,不符合伦理;D选项,双重关系会影响咨询的中立性和客观性,需要避免,符合伦理;E选项,直接要求求助者和解会加重求助者的应激反应,越界替求助者决策,不符合伦理;F选项,心理咨询师没有处方权,不得为求助者提供药物治疗建议或处方,不符合伦理。", "type": "multi"}, {"q": "适合该求助者的初步干预措施包括:", "o": ["开展渐进式放松训练,缓解焦虑失眠症状", "修正“所有同学都在议论我”的不合理认知", "直接建议求助者办理退学避开当前压力", "若焦虑情绪严重,转介精神科评估是否需要药物干预", "协助练习沟通技巧,帮助求助者和舍友重新沟通", "因求助者问题超出能力范围,直接拒绝提供服务"], "a": [0, 1, 3, 4], "e": "A选项,放松训练可以有效缓解求助者的焦虑情绪和失眠症状,是合理干预措施;B选项,认知调整是认知行为疗法的核心内容,可修正求助者的不合理信念,适合该求助者;C选项,咨询师不得替求助者做出退学这类重大人生决策,不符合伦理要求;D选项,若求助者焦虑情绪严重超出咨询干预范围,转介精神科评估药物需求是合理的;E选项,协助求助者练习沟通,改善同伴关系,解决诱发问题,是合理干预;F选项,无正当理由拒绝求助者不符合咨询伦理要求。", "type": "multi"}, {"q": "若为该求助者编制职业压力自评问卷,涉及职业倦怠这类敏感性问题时,可以采用的合理策略包括:", "o": ["假定受测者已经存在该行为,如“你是否经常觉得工作让你身心俱疲?”", "假定对该行为的规范不一致,如“有人认为职场妈妈出现职业倦怠很正常,有人不认可,你是否存在倦怠感受?”", "说明该行为在人群中十分常见,如“多数兼顾工作和育儿的职场妈妈都曾出现过职业倦怠,你是否有类似感受?”", "直接询问“你是不是因为倦怠所以想辞掉班主任工作?”", "为了避免尴尬,回避所有敏感性问题"], "a": [0, 1, 2], "e": "菲力普提出的社会敏感性问题处理策略包括三条:1.假定受测者具有该行为,用肯定式提问;2.假定规范不一致,降低受测者防御;3.指出该行为是常见的,减少受测者的心理负担。A选项对应第一条策略,正确;B选项对应第二条策略,正确;C选项对应第三条策略,正确;D选项直接提问敏感性问题容易引发受测者的防御心理,影响结果真实性,错误;E选项回避敏感性问题不符合测验目的,错误;F选项心理测验命题原则要求避免使用双重否定句,表述容易造成理解偏差,错误。", "type": "multi"}, {"q": "该求助者出现心理问题的易感因素包括:", "o": ["同时承担教学、班主任和育儿多重任务", "既往没有同时处理多项重大任务的经验", "习惯独立解决问题,不愿主动求助他人", "学校新增工作任务带来的压力", "丈夫不提供家庭支持", "长期睡眠不足"], "a": [1, 2], "e": "易感因素指个体自身本身存在的、容易诱发心理问题的特质因素,B选项既往无多重任务处理经验、C选项性格独立不愿求助都属于个体自身的易感因素,正确。A同时承担多重任务、D学校工作压力、F睡眠不足都属于外部诱发因素,不属于易感因素;E选项案例中未提及丈夫不支持,属于干扰选项,错误。", "type": "multi"}, {"q": "针对该求助者的合理短期咨询目标包括:", "o": ["延长每日睡眠时间,改善睡眠质量", "调整“我什么都做不好”的不合理认知", "完全消除所有工作和家庭压力", "恢复按时批改作业完成教学任务的能力", "辞去班主任工作减轻压力", "把孩子交给父母照顾减少负担"], "a": [0, 1, 3], "e": "合理的咨询目标需要具体、可行、属于心理学范畴。A选项改善睡眠是具体可行的短期目标,正确;B选项调整不合理认知,属于心理学范畴的具体目标,正确;C选项完全消除压力是不现实的目标,过高,错误;D选项恢复正常工作能力是具体可行的短期目标,正确;E、F选项,咨询师不得替求助者做出生活或职业的重大决策,不符合咨询要求,错误。", "type": "multi"}, {"q": "若为该求助者编制考试焦虑自评量表,符合内容命题原则的是:", "o": ["题目内容需要覆盖考试焦虑的核心情绪、躯体症状", "内容取样需要有代表性,符合测验的目的", "各个题目之间相互独立,没有内容重叠", "使用生僻专业词汇提高测验的专业性", "题目内容可以超出高三学生的理解范围", "一个题目包含多个相关问题提高效率"], "a": [0, 1, 2], "e": "心理测验内容命题原则要求:内容符合测验目的、取样有代表性、题目之间相互独立不重叠。A选项符合要求,正确;B选项符合要求,正确;C选项符合要求,正确;D选项错误,命题要求避免生僻词汇,方便受测者理解;E选项错误,题目内容不能超出受测者的理解范围;F选项错误,一个题目只能包含一个概念一个问题,避免回答混淆。", "type": "multi"}, {"q": "咨询师在和该求助者工作时,需要注意的伦理事项包括:", "o": ["保护求助者的个人隐私不泄露", "如实告知求助者咨询的效果局限性", "未经同意直接向父母通报求助者的咨询情况", "避免和求助者建立咨询以外的双重关系", "替求助者和父母沟通要求降低学业要求", "因为问题复杂直接拒绝为求助者提供服务"], "a": [0, 1, 3], "e": "A选项保密原则是心理咨询核心伦理要求,正确;B选项知情同意原则要求如实告知咨询的局限性,正确;C选项未经求助者同意不得向第三方泄露咨询隐私,错误;D选项双重关系会影响咨询的中立性,需要避免,正确;E选项咨询师不得替求助者做出沟通决策,越界干预求助者家庭关系,错误;F选项无正当理由拒绝求助者不符合咨询伦理,错误。", "type": "multi"}, {"q": "该求助者目前可获得的社会支持包括:", "o": ["女儿定期探望提供的支持", "小区老年活动中心的活动支持", "专业心理咨询的支持", "丈夫生前留下的遗产支持", "邻居的日常社交支持", "原单位工会的慰问支持"], "a": [0, 2], "e": "A求助者女儿每两周定期探望,能够为其提供情感支持,属于当前可获得的社会支持;C求助者主动求助心理咨询,已经获得专业心理咨询的支持;B求助者未参加小区老年活动,无法获得该项支持;D丈夫已经去世,该项不属于当前可获得的有效社会支持;E求助者几乎不与邻居来往,无法获得该项支持;F求助者已经退休,案例未提及原单位提供支持,不属于已获得的社会支持。", "type": "multi"}, {"q": "当该求助者向咨询师提及自杀念头时,咨询师正确的应对措施包括:", "o": ["直接询问求助者是否已经制定具体的自杀计划", "完成风险评估后转介精神科医生评估处理", "直接联系求助者女儿告知其自杀风险", "立即开展危机干预,全面评估自杀风险等级", "为避免强化不提自杀,继续原来咨询主题", "以超出咨询范围为由拒绝提供服务"], "a": [0, 1, 3], "e": "A当求助者提及自杀意念时,需要直接询问确认是否有具体计划,准确评估风险,做法正确;B存在自杀意念的求助者,评估后需要转介精神科医生进一步评估处理,做法正确;C未经求助者同意,不符合保密例外的法定情形时,不可以直接通知家属,做法错误;D自杀意念属于危机事件,需要立即开展危机干预,先评估风险程度,做法正确;E自杀念头是重大危机信号,绝对不能忽略,必须优先处理,做法错误;F该做法不符合心理咨询伦理要求,错误。", "type": "multi"}, {"q": "适合该求助者的心理咨询干预措施包括:", "o": ["开展哀伤辅导,帮助处理丧亲后的哀伤情绪", "调整“我没用,拖累孩子”的消极认知", "教授放松训练,缓解低落焦虑的情绪", "直接要求求助者每周必须参加一次小区老年活动", "评估后转介精神科医生评估是否需要药物干预", "为了减轻求助者负担,帮求助者料理家务照顾日常"], "a": [0, 1, 2, 4], "e": "A哀伤辅导可以帮助求助者处理丧亲之后的未处理哀伤情绪,适合该求助者;B认知调整可以修正求助者的不合理负性认知,符合咨询原则;C放松训练能够缓解求助者的情绪低落、焦虑等症状,适合;D直接要求求助者立即参加活动可能会加重求助者的应激反应,引发抵触,做法错误;E求助者存在自杀意念,需要转介精神科评估药物干预的需求,做法正确;F咨询师不能替求助者承担原本属于求助者的生活照料责任,超出咨询边界,做法错误。", "type": "multi"}, {"q": "该求助者出现心理问题的直接诱发因素包括:", "o": ["入职后新工作带来的压力", "被主管当众批评的事件", "家庭需要贴补的经济压力", "对这份第一份工作的过度重视", "本身工作经验不足", "长期失眠睡眠不足"], "a": [0, 1], "e": "诱发因素是直接导致心理问题出现的应激事件,A入职后的新工作压力、B被主管批评都是直接诱发问题的事件。C、D、E属于求助者本身的易感素质因素,不是直接诱发因素;F失眠是心理问题带来的症状表现,不是诱发因素。", "type": "multi"}, {"q": "适合该求助者的心理咨询干预措施包括:", "o": ["开展放松训练,缓解焦虑情绪改善失眠", "调整“我能力不行”的不合理消极认知", "直接帮求助者找主管沟通调整工作任务", "教授时间管理训练,帮助合理安排工作", "立即转介精神科医生评估药物治疗", "认为超出能力范围拒绝为求助者咨询"], "a": [0, 1, 3], "e": "A放松训练可以有效缓解求助者的焦虑情绪,改善失眠症状,适合;B认知调整可以修正求助者的不合理负性认知,符合认知行为疗法的应用;C咨询师不可以替求助者去和上级沟通工作安排,超出咨询边界,做法错误;D时间管理训练可以帮助求助者合理规划工作,提升工作效率,适合;E求助者没有严重的焦虑症状或精神病性症状,不需要转介精神科评估药物治疗;F该案例属于心理咨询的工作范围,拒绝服务不符合伦理要求,做法错误。", "type": "multi"}, {"q": "下列选项属于知觉基本特性的有哪些？", "o": ["整体性", "选择性", "恒常性", "理解性", "适应性"], "a": [0, 1, 2, 3], "e": "知觉的四个基本特性为整体性、选择性、恒常性、理解性，适应性属于感觉现象，不属于知觉的基本特性，因此正确选项为ABCD。", "type": "multi"}, {"q": "根据记忆保持时长的不同，可将记忆划分为以下哪些类型？", "o": ["瞬时记忆", "短时记忆", "长时记忆", "内隐记忆", "外显记忆"], "a": [0, 1, 2], "e": "按照记忆保持时间的长短，记忆可分为保持时长在1秒以内的瞬时记忆、1分钟以内的短时记忆、1分钟以上的长时记忆；内隐记忆和外显记忆是按照记忆的意识参与程度划分的类型，不符合题干分类标准，因此正确选项为ABC。", "type": "multi"}, {"q": "情绪情感对人的心理活动具有多种核心功能，以下属于情绪情感核心功能的有哪些？", "o": ["适应功能", "动机功能", "组织功能", "信号功能", "概括功能"], "a": [0, 1, 2, 3], "e": "情绪情感的核心功能包括适应环境功能、行为动机功能、对认知活动的组织功能、信息传递的信号功能，概括功能属于思维的基本特征，不属于情绪情感的功能，因此正确选项为ABCD。", "type": "multi"}, {"q": "马斯洛需要层次理论将需要分为缺失性需要和成长性需要，下列属于缺失性需要的有哪些？", "o": ["生理需要", "安全需要", "归属与爱的需要", "尊重需要", "审美需要"], "a": [0, 1, 2, 3], "e": "马斯洛的需要层次理论中，缺失性需要是个体生存所必需的基本需要，包括生理需要、安全需要、归属与爱的需要、尊重需要；审美需要和自我实现需要都属于成长性需要，因此正确选项为ABCD。", "type": "multi"}, {"q": "人格是一个人相对稳定的心理特征的总和，其核心组成部分包括以下哪些？", "o": ["气质", "性格", "观察力", "思维", "意志"], "a": [0, 1], "e": "人格的核心组成部分是气质和性格，观察力属于能力范畴，思维和意志属于心理过程，不属于人格的核心组成部分，因此正确选项为AB。", "type": "multi"}, {"q": "社会心理学的研究范围涵盖多个层面，下列属于社会心理学研究范畴的有哪些？", "o": ["个体层面的社会心理与行为", "群体层面的社会心理与行为", "人际互动过程", "各类社会影响现象", "纯生理层面的神经心理现象"], "a": [0, 1, 2, 3], "e": "社会心理学主要研究个体、群体层面的社会心理与行为，以及人际互动、社会影响相关内容，纯生理层面的神经心理现象属于生理心理学研究范畴，不属于社会心理学的研究范围，因此正确选项为ABCD。", "type": "multi"}, {"q": "社会化是个体掌握社会规范、成为社会成员的过程，常见的社会化类型包括以下哪些？", "o": ["政治社会化", "道德社会化", "性别角色社会化", "语言社会化", "独立社会化"], "a": [0, 1, 2, 3], "e": "心理学中公认的常见社会化类型包括政治社会化、道德社会化、性别角色社会化、语言社会化，不存在\"独立社会化\"这一规范分类，因此正确选项为ABCD。", "type": "multi"}, {"q": "从结构分类来看，自我概念的核心成分包括以下哪些？", "o": ["生理自我", "社会自我", "心理自我", "应该自我", "理想自我"], "a": [0, 1, 2], "e": "自我概念按照结构可划分为生理自我、社会自我和心理自我三个核心成分，应该自我和理想自我属于自我差异理论中的分类，不属于自我概念的核心结构成分，因此正确选项为ABC。", "type": "multi"}, {"q": "社会心理学中态度的ABC模型包含以下哪些核心成分？", "o": ["认知成分", "情感成分", "行为倾向成分", "意志成分", "需要成分"], "a": [0, 1, 2], "e": "态度的ABC模型中，A对应情感成分、B对应行为倾向成分、C对应认知成分，意志成分和需要成分不属于态度ABC模型的核心成分，因此正确选项为ABC。", "type": "multi"}, {"q": "下列选项中，属于影响个体从众行为的核心因素有哪些？", "o": ["群体的规模大小", "群体的凝聚力水平", "判断任务的难度", "个体的自我评价程度", "群体的血型比例分布"], "a": [0, 1, 2, 3], "e": "影响从众行为的核心因素包括群体规模、群体凝聚力、任务难度、个体人格特质（如自我评价）等，群体的血型比例分布与个体从众行为没有关联，不属于影响从众的核心因素，因此正确选项为ABCD。", "type": "multi"}, {"q": "积极心理学的PERMA模型包含下列哪些核心要素？", "o": ["积极情绪", "对生活的投入", "积极的人际关系", "生命的意义与价值", "良好的睡眠质量"], "a": [0, 1, 2, 3], "e": "PERMA模型的五个核心要素分别是P（积极情绪）、E（投入）、R（人际关系）、M（意义）、A（成就），睡眠质量不属于PERMA模型的核心要素，因此正确选项为ABCD。", "type": "multi"}, {"q": "大五人格理论中的核心人格维度包括以下哪些？", "o": ["神经质", "外倾性", "开放性", "尽责性", "攻击性"], "a": [0, 1, 2, 3], "e": "大五人格的五个核心维度为神经质、外倾性、开放性、尽责性、宜人性，攻击性是神经质的相关子特质，不属于大五人格的核心维度，因此正确选项为ABCD。", "type": "multi"}, {"q": "发展心理学家托马斯和切斯对婴儿气质进行分类，其提出的经典气质类型包括以下哪些？", "o": ["容易型", "困难型", "迟缓型", "稳定型", "不稳定型"], "a": [0, 1, 2], "e": "托马斯和切斯将婴儿气质划分为容易型、困难型、迟缓型三种经典类型，稳定型和不稳定型是其他气质分类体系的划分，不属于托马斯和切斯的分类，因此正确选项为ABC。", "type": "multi"}, {"q": "一般心理问题是心理咨询中常见的心理不适类型，其诊断要点包括以下哪些？", "o": ["由现实生活刺激因素引发", "持续时间通常在1-2个月", "不良情绪未出现泛化", "社会功能保持相对完整，未严重受损", "存在明显的精神病性症状"], "a": [0, 1, 2, 3], "e": "一般心理问题的诊断要点为：由现实因素激发，持续时间1-2个月，情绪反应未泛化，社会功能未受到严重损害，一般不出现精神病性症状，因此正确选项为ABCD。", "type": "multi"}, {"q": "下列学者中，属于心理测量学发展早期代表人物的有哪些？", "o": ["高尔顿", "卡特尔", "比内", "罗杰斯", "荣格"], "a": [0, 1, 2], "e": "高尔顿是心理测量运动的创始人，卡特尔最早提出\"心理测验\"的概念，比内编制了世界上第一个正式的智力测验，三者都是心理测量学早期代表人物；罗杰斯是人本主义心理学代表，荣格是分析心理学代表，均不属于心理测量学早期代表人物，因此正确选项为ABC。", "type": "multi"}, {"q": "下列选项中，属于应激反应的中介变量的有哪些？", "o": ["个体对事件的认知评价", "个体可获得的社会支持", "个体的人格特征", "原发性高血压", "重大亲人离世事件"], "a": [0, 1, 2], "e": "应激的中介变量是调节应激源和应激反应关系的因素，主要包括认知评价、社会支持、人格特征等；原发性高血压属于应激可能导致的躯体结果，重大亲人离世属于应激源，二者都不属于中介变量，因此正确选项为ABC。", "type": "multi"}, {"q": "心理咨询工作中需要遵守保密原则，下列属于保密例外情况的有哪些？", "o": ["求助者明确表示将要实施伤害自身的行为", "求助者明确计划要伤害特定的他人", "司法机关依法要求咨询师提供相关咨询信息", "求助者隐瞒了自己的既往心理咨询史", "求助者对咨询师提出超出咨询范围的要求"], "a": [0, 1, 2], "e": "心理咨询的保密例外包括：求助者有伤害自身或伤害他人的明确计划、涉及法定司法程序需要披露信息等情况；求助者隐瞒既往病史、提出不合理要求不属于保密例外的范畴，咨询师仍需遵守保密原则，因此正确选项为ABC。", "type": "multi"}, {"q": "下列因素中，属于影响人际吸引的核心因素的有哪些？", "o": ["交往的熟悉性", "双方的相似性", "特质的互补性", "个人的外貌特征", "家庭的财富数量"], "a": [0, 1, 2, 3], "e": "影响人际吸引的核心因素包括熟悉性、相似性、互补性、外貌、良好人格品质等，家庭财富数量不属于人际吸引的核心影响因素，因此正确选项为ABCD。", "type": "multi"}, {"q": "埃里克森人格发展阶段理论认为，6-12岁童年期的主要发展任务包括以下哪些？", "o": ["获得勤奋感", "避免产生自卑感", "建立同一性", "获得主动感", "避免角色混乱"], "a": [0, 1], "e": "埃里克森的理论中，6-12岁童年期的发展任务是获得勤奋感，避免自卑感；建立自我同一性、避免角色混乱是青春期（12-18岁）的发展任务，获得主动感是幼儿期的发展任务，因此正确选项为AB。", "type": "multi"}, {"q": "青春期是个体心理发展的关键转折期，下列属于青春期心理发展典型特点的有哪些？", "o": ["自我意识进入快速发展阶段", "情绪体验容易呈现两极化特征", "逻辑思维才刚刚开始萌芽发展", "个体性意识逐渐觉醒", "主要依恋对象从父母转向同伴"], "a": [0, 1, 3, 4], "e": "青春期的典型心理发展特点包括自我意识快速发展、情绪两极化明显、性意识逐步觉醒、依恋关系转向同伴，逻辑思维的萌芽发展在童年期后期已经完成，并非起始于青春期，因此C选项错误，正确答案为ABDE。", "type": "multi"}, {"q": "异常心理评估中，下列选项属于抑郁发作核心症状的有哪些？", "o": ["持续的情绪低落，无法感受到愉悦", "对既往感兴趣的事物出现明显兴趣减退", "精力不足，容易感到疲惫乏力", "入睡困难或早醒等睡眠障碍", "食欲明显下降伴随体重减轻"], "a": [0, 1, 2], "e": "抑郁发作的核心症状为情绪低落、兴趣减退、精力减退，睡眠障碍、食欲下降属于抑郁发作的伴随躯体症状，不属于核心症状，因此DE错误，正确答案为ABC。", "type": "multi"}, {"q": "下列关于强迫障碍的典型临床表现，描述正确的有哪些？", "o": ["会反复出现闯入性的不必要想法，即强迫思维", "存在反复出现的刻板行为或仪式动作，即强迫行为", "个体明知强迫内容不合理，却无法摆脱控制", "强迫症状往往会让个体产生明显的焦虑痛苦情绪", "多数患者会出现持续的幻觉、妄想等精神病性症状"], "a": [0, 1, 2, 3], "e": "强迫障碍的典型表现包括强迫思维、强迫行为，患者明知症状不合理却无法控制，症状会带来明显的焦虑痛苦体验；幻觉妄想属于精神病性症状，不属于强迫障碍的典型表现，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列研究内容中，属于健康心理学研究范畴的有哪些？", "o": ["哪些心理因素能够帮助个体维持健康状态", "针对疾病预防开展的心理相关干预方法", "医患互动中心理因素对诊疗效果的影响机制", "恶性肿瘤等躯体疾病的手术治疗方案制定", "针对高压职业人群开展的心理健康支持工作"], "a": [0, 1, 2, 4], "e": "健康心理学主要研究和健康、疾病相关的心理层面问题，包括促进健康的心理因素、疾病预防的心理干预、医患关系心理机制、职业健康心理支持等；躯体疾病的治疗方案属于临床医学研究范畴，不属于健康心理学的研究内容，因此D选项错误，正确答案为ABCE。", "type": "multi"}, {"q": "社会认知过程中常见的知觉偏差包括下列哪些选项？", "o": ["最初获得的信息对后续认知的影响更大，即首因效应", "最新获得的信息对整体认知的影响更大，即近因效应", "个体某一个突出特点会掩盖对其他特征的知觉，即晕轮效应", "对某个社会群体产生固定笼统的印象，即刻板效应", "回忆信息时出现的内容遗漏或扭曲，即记忆偏差"], "a": [0, 1, 2, 3], "e": "常见的社会知觉偏差包括首因效应、近因效应、晕轮效应、刻板效应；记忆偏差属于记忆过程本身的误差，不属于社会知觉偏差的范畴，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列选项中，符合幼儿期语言发展主要特点的有哪些？", "o": ["词汇量随年龄增长快速增加", "语法结构从简单向复杂逐步完善", "日常口语的表达能力不断提升", "能够系统学习掌握书面语言", "内部语言已经发展成熟"], "a": [0, 1, 2], "e": "幼儿期语言发展的核心特点包括词汇量快速增长、语法结构逐步完善、口语表达能力提升；书面语言发展和内部语言萌芽成熟主要出现在童年期，不属于幼儿期的典型特点，因此DE错误，正确答案为ABC。", "type": "multi"}, {"q": "下列练习或方法中，属于积极心理学常用干预技术的有哪些？", "o": ["每天记录三件让自己开心的好事的练习", "定期书写记录值得感恩的人或事的感恩日记", "通过有意识的呼吸和觉察练习的正念冥想", "通过渐进放松对抗焦虑的系统脱敏疗法", "调整不良认知信念的认知重构技术"], "a": [0, 1, 2], "e": "三件好事练习、感恩日记、正念冥想都属于积极心理学取向的干预技术；系统脱敏疗法、认知重构属于认知行为疗法的常用技术，不属于积极心理学干预技术，因此DE错误，正确答案为ABC。", "type": "multi"}, {"q": "下列属于公认的常见人格障碍类型的有哪些？", "o": ["偏执型人格障碍", "强迫型人格障碍", "回避型人格障碍", "自恋型人格障碍", "焦虑型人格障碍"], "a": [0, 1, 2, 3], "e": "权威分类体系中，常见的人格障碍类型包括偏执型、强迫型、回避型、自恋型人格障碍，焦虑型人格不属于规范的人格障碍分类，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "评价一个心理测验质量好坏的核心指标包括下列哪些选项？", "o": ["测验结果的一致性和稳定性，即信度", "测验是否准确测量到了想要测的内容，即效度", "测验题目的整体难易程度，即难度", "测验能否区分不同水平的被测者，即区分度", "测验施测计分的标准化程度"], "a": [0, 1, 2, 3], "e": "心理测验的核心质量指标包括信度、效度、难度、区分度，标准化程度是测验编制过程的要求，不属于测验本身的质量指标，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列属于老年期认知发展变化典型特点的有哪些？", "o": ["依赖生理机能的流体智力呈缓慢下降趋势", "依靠知识经验的晶体智力保持相对稳定", "日常记忆能力出现轻度的减退", "信息加工的速度减慢，思维速度下降", "所有老年人的创造力都会完全丧失"], "a": [0, 1, 2, 3], "e": "老年期认知变化的特点包括流体智力缓慢下降、晶体智力相对稳定、记忆轻度减退、思维速度减慢；老年期创造力并不会完全丧失，不少老年人依然可以保持良好的创造力，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列属于社交焦虑障碍典型临床表现的有哪些？", "o": ["对公开演讲、聚会等社交场景存在强烈的恐惧情绪", "会主动回避需要社交互动的场合", "患者自身也知道这种恐惧是不合理的，但无法控制", "身处社交场景时会伴随脸红、手抖、心跳加快等躯体症状", "多数患者会存在持续的幻觉、妄想等精神病性症状"], "a": [0, 1, 2, 3], "e": "社交焦虑障碍的典型表现包括对社交场景的强烈恐惧、主动回避、明知不合理无法控制、伴随自主神经兴奋相关的躯体症状；幻觉妄想属于精神病性症状，不属于社交焦虑障碍的典型表现，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列属于发展心理学特有的核心研究方法有哪些？", "o": ["在同一时间点测量不同年龄组被试的横断研究", "对同一组被试进行长时间追踪研究的纵向研究", "结合横断和纵向设计优点的聚合交叉研究", "对研究对象行为进行系统观察的观察研究", "控制变量探究因果关系的实验研究"], "a": [0, 1, 2, 3], "e": "发展心理学特有的核心研究方法包括横断研究、纵向研究、聚合交叉研究、观察研究；实验研究是心理学所有分支都通用的研究方法，不属于发展心理学专属特有的研究方法，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列选项中，属于意志品质核心维度的有哪些？", "o": ["对行动目的有清晰认识，能够自觉支配行动的自觉性", "能够迅速且合理地做出决策执行的果断性", "坚持目标，在困难面前百折不挠的坚韧性", "能够控制约束自身情绪和行为的自制性", "能够根据环境变化快速调整方案的灵活性"], "a": [0, 1, 2, 3], "e": "意志的四项核心品质为自觉性、果断性、坚韧性、自制性；灵活性不属于意志品质的核心维度，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列属于社会影响常见表现形式的有哪些？", "o": ["个体在群体压力下改变行为与观念的从众", "个体按照他人命令做出行为改变的服从", "个体在他人在场情况下活动效率提升的社会助长", "群体共同完成任务时个体努力程度下降的社会惰化", "人与人之间信息与情感交流的人际沟通"], "a": [0, 1, 2, 3], "e": "常见的社会影响形式包括从众、服从、社会助长、社会惰化；人际沟通属于社会互动的基本形式，不属于社会影响的范畴，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列属于临床常见进食障碍类型的有哪些？", "o": ["神经性厌食", "神经性贪食", "暴食障碍", "异食癖", "功能性消化不良"], "a": [0, 1, 2, 3], "e": "临床常见的进食障碍类型包括神经性厌食、神经性贪食、暴食障碍、异食癖；功能性消化不良属于常见的躯体消化系统疾病，不属于进食障碍范畴，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "建立良好咨询关系的核心要素包括下列哪些选项？", "o": ["对求助者无条件接纳的尊重", "对求助者情绪感受关心的热情", "咨询师真实真诚面对求助者的真诚", "体验求助者内心世界的共情", "引导求助者解决问题的指导"], "a": [0, 1, 2, 3], "e": "咨询关系建立的核心要素包括尊重、热情、真诚、共情，指导属于心理咨询的影响性技术，不属于建立咨询关系的核心要素，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列属于发展心理学研究对象范畴的有哪些？", "o": ["个体从出生到衰老整个生命历程的心理发展", "心理从低等动物到人类的种系发展", "不同民族人类心理发展的种族发展", "各类社会群体的共同行为规律", "各类异常心理活动的表现与机制"], "a": [0, 1, 2], "e": "发展心理学的研究对象包括个体全程心理发展、心理的种系发展、心理的种族发展；社会群体行为属于社会心理学研究范畴，异常心理属于变态心理学研究范畴，因此DE错误，正确答案为ABC。", "type": "multi"}, {"q": "按照情绪的强度和持续性划分，下列属于情绪状态分类的有哪些？", "o": ["微弱持久具有弥散性的心境", "强烈爆发短暂的激情", "由意外紧张情境引发的应激", "与人的社会需要相关的情感", "和道德修养相关的情操"], "a": [0, 1, 2], "e": "按照强度和持续性划分，情绪状态可分为心境、激情、应激三类；情感、情操属于情绪情感的高级分类，不属于情绪状态的划分范畴，因此DE选项错误，正确答案为ABC。", "type": "multi"}, {"q": "下列选项中属于注意品质的有哪些？", "o": ["同一时间内能清晰把握对象数量的注意广度", "注意能够保持在某一对象上时间长短的注意稳定性", "同一时间内能把注意分配到不同对象上的注意分配", "根据任务要求主动把注意从一个对象转到另一个对象的注意转移", "注意不自觉离开当前任务被无关刺激吸引的注意分散"], "a": [0, 1, 2, 3], "e": "注意的四项核心品质包括注意的广度、注意的稳定性、注意的分配、注意的转移；注意分散是注意稳定性受到破坏的消极表现，不属于注意的品质，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列选项中，属于社会心理学学科发展标准阶段划分的有哪些？", "o": ["哲学思辨阶段", "经验描述阶段", "实证分析阶段", "后现代整合阶段"], "a": [0, 1, 3], "e": "社会心理学的发展历程被学术界划分为三个核心阶段，分别是哲学思辨阶段、经验描述阶段、实证分析阶段，统计分析阶段、后现代整合阶段不属于标准的三阶段划分，因此正确答案为ABD。", "type": "multi"}, {"q": "下列各项中，属于创伤后应激障碍（PTSD）核心临床表现的有哪些？", "o": ["不由自主反复闯入创伤性体验的回忆", "长期回避所有和创伤事件相关的场景刺激", "对创伤相关事件存在持续的负面认知与情绪", "整体警觉性水平异常增高，易惊跳失眠", "持续存在心境低落、兴趣减退症状"], "a": [0, 1, 2, 3], "e": "创伤后应激障碍的四大核心症状为闯入性回忆、回避创伤相关刺激、认知与情绪的负面改变、警觉性增高。持续心境低落兴趣减退是抑郁症的核心症状，不属于创伤后应激障碍的核心症状，因此正确答案为ABCD。", "type": "multi"}, {"q": "下列选项中，属于人格心理学核心研究范畴的有哪些？", "o": ["人格的构成结构", "人格的毕生发展规律", "人格发展的内在动力", "人格的量化测量方法", "重度异常心理的药物治疗"], "a": [0, 1, 2, 3], "e": "人格心理学的核心研究范畴包括人格结构、人格发展、人格动力、人格测量四大板块，重度异常心理的药物治疗属于精神病学与临床心理学范畴，不属于人格心理学研究范畴，因此正确答案为ABCD。", "type": "multi"}, {"q": "下列日常场景中，属于有意注意（随意注意）状态的有哪些？", "o": ["考研学生为了上岸，集中注意力听专业课直播", "消防员出警路上被路边突发的交通事故吸引注意", "外卖员为了准时送达，集中注意力导航找路", "幼儿被公园里色彩鲜艳的氢气球无意识吸引目光", "熟练的收银员扫码收款时不需要刻意关注按键位置"], "a": [0, 2], "e": "有意注意的定义是有预先目的、需要一定意志努力维持的注意，A选项学生为了学习主动集中注意力、C选项外卖员为了送达任务主动维持专注，都符合有意注意的特征。B、D选项是无预定目的、不需要意志努力的无意注意，E选项是熟练后不需要意志努力的有意后注意，因此正确答案为AC。", "type": "multi"}, {"q": "人们在对行为原因进行推断时常常出现偏差，下列属于常见归因偏差类型的有哪些？", "o": ["基本归因错误", "自我服务偏差", "首因效应", "晕轮效应", "活动者-观察者偏差"], "a": [0, 1, 4], "e": "常见的归因偏差包括三类：基本归因错误、自我服务偏差、活动者-观察者偏差。首因效应和晕轮效应属于社会知觉过程中的认知偏差，不属于归因偏差范畴，因此正确答案为ABE。", "type": "multi"}, {"q": "依据发展心理学的游戏发展理论，下列属于幼儿期典型游戏类型的有哪些？", "o": ["练习性游戏", "象征性游戏", "规则性游戏", "结构化合作竞赛游戏", "职业专业竞技游戏"], "a": [0, 1, 2], "e": "发展心理学认为，幼儿期的典型游戏类型包括练习性游戏、象征性游戏、规则性游戏三类。合作性游戏、竞技性游戏更多出现在童年期及之后的发展阶段，不属于幼儿期典型游戏类型，因此正确答案为ABC。", "type": "multi"}, {"q": "下列各项症状中，属于典型精神病性症状的有哪些？", "o": ["幻听幻视等幻觉体验", "被害妄想等病理性妄想", "思维破裂这类思维形式障碍", "持续的情绪低落兴趣减退", "意志力减退行动减少"], "a": [0, 1, 2], "e": "精神病性症状的核心判定标准是现实检验能力受损，主要包括幻觉、妄想、思维形式障碍（如思维破裂）等。情绪低落、意志减退是抑郁发作的典型症状，不属于精神病性症状范畴，因此正确答案为ABC。", "type": "multi"}, {"q": "下列选项中，属于职业倦怠核心临床表现的有哪些？", "o": ["情绪资源耗尽，对服务对象失去耐心", "对工作产生疏离感，刻意和工作对象保持距离", "个人成就感降低，觉得自己工作没有价值", "长期入睡困难睡眠质量差", "食欲下降体重异常波动"], "a": [0, 1, 2], "e": "职业倦怠的三大核心表现为情绪耗竭、工作疏离感、个人成就感降低，睡眠障碍、食欲下降是职业倦怠可能伴随的躯体症状，并非核心表现，因此正确答案为ABC。", "type": "multi"}, {"q": "下列智力测验工具中，属于团体智力测验的有哪些？", "o": ["韦克斯勒成人智力量表", "瑞文标准推理测验", "陆军甲种团体测验", "斯坦福-比内智力量表", "中国团体儿童智力测验"], "a": [1, 2, 4], "e": "团体智力测验可以同时对多名被试施测，瑞文推理测验、陆军甲种测验、团体儿童智力测验都属于团体智力测验。韦氏成人智力量表、斯坦福-比内智力量表属于个别智力测验，只能一对一施测，因此正确答案为BCE。", "type": "multi"}, {"q": "弗洛伊德经典精神分析理论中，人格结构包含下列哪些成分？", "o": ["本我", "自我", "超我", "意识", "潜意识"], "a": [0, 1, 2], "e": "弗洛伊德将人格结构划分为本我、自我、超我三个部分，意识和潜意识是弗洛伊德对心理活动的意识层次划分，不属于人格结构范畴，因此正确答案为ABC。", "type": "multi"}, {"q": "积极心理学提出的PERMA幸福模型认为，影响个体幸福感的核心要素包括下列哪些？", "o": ["积极情绪体验", "专注投入当下活动", "良好的人际关系", "生命的意义感", "可感知的成就"], "a": [0, 1, 2, 3, 4], "e": "积极心理学PERMA模型中，幸福的五大核心要素正好对应五个选项，分别是积极情绪（P）、投入（E）、人际关系（R）、意义（M）、成就（A），因此正确答案为ABCDE。", "type": "multi"}, {"q": "社会心理学认为，下列选项中属于亲密关系核心特征的有哪些？", "o": ["双方在生活上相互依赖", "双方的决策和行为相互影响", "双方存在深度的情感联结", "双方有较多共同的活动安排", "获得群体层面的社会认同"], "a": [0, 1, 2, 3], "e": "亲密关系的核心特征包括相互依赖、相互影响、情感联结、共同活动。社会认同是群体层面对个体或群体的身份认可，不属于亲密关系的核心特征，因此正确答案为ABCD。", "type": "multi"}, {"q": "基础心理学认为，记忆的基本过程包括下列哪些环节？", "o": ["识记", "保持", "再认", "回忆", "遗忘"], "a": [0, 1, 2, 3], "e": "记忆的完整基本过程依次为识记、保持、再认/回忆三个大环节，再认和回忆都是提取信息的不同形式，都属于基本过程。遗忘是记忆内容无法提取的消极现象，不属于记忆的基本过程环节，因此正确答案为ABCD。", "type": "multi"}, {"q": "埃里克森人格发展阶段理论中，中年期的核心发展任务包括下列哪些？", "o": ["获得繁殖感", "避免停滞感", "获得亲密感", "避免孤独感", "建立统一的自我同一性"], "a": [0, 1], "e": "埃里克森认为，中年期的发展任务是获得繁殖感，避免停滞感。获得亲密感避免孤独感是成年早期的发展任务，建立自我同一性是青春期的发展任务，因此正确答案为AB。", "type": "multi"}, {"q": "下列心理障碍分类中，属于焦虑障碍范畴的有哪些？", "o": ["社交焦虑障碍", "特定场所恐惧障碍", "广泛性焦虑障碍", "急性惊恐障碍", "强迫障碍"], "a": [0, 1, 2, 3], "e": "现行精神障碍分类中，焦虑障碍的范畴包括社交焦虑障碍、特定恐惧障碍、广泛性焦虑障碍、惊恐障碍，强迫障碍属于独立的强迫及相关障碍范畴，因此不属于焦虑障碍核心分类，正确答案为ABCD。", "type": "multi"}, {"q": "下列选项中，属于我国心理咨询师专业伦理要求的有哪些？", "o": ["严格遵守保密原则，保护来访者隐私", "咨询前充分落实知情同意", "避免和来访者建立双重关系", "按照规定合理收取咨询费用", "可根据咨询师时间随意终止咨询"], "a": [0, 1, 2, 3], "e": "心理咨询专业伦理明确要求咨询师遵守保密原则、落实知情同意、避免双重关系、合理收费，同时要求咨询师不得随意终止咨询，需要提前告知并做好转介等安排，因此正确答案为ABCD。", "type": "multi"}, {"q": "社会心理学研究发现，下列因素中会增加个体从众行为发生倾向的有哪些？", "o": ["群体的整体规模越大", "群体内部凝聚力越高", "当前面临的任务难度越高", "个体对自身判断的自信心越低", "群体内部成员的意见一致性越高"], "a": [0, 1, 2, 3, 4], "e": "影响从众倾向的因素中，群体规模越大、凝聚力越高、任务难度越高、个体自信心越低、群体意见一致性越高，都会提升个体从众的概率，所有选项都符合要求，因此正确答案为ABCDE。", "type": "multi"}, {"q": "基础心理学认为，情绪的基本维度包括下列哪些？", "o": ["情绪的强度", "情绪的紧张度", "情绪的快感度", "情绪的复杂度", "情绪的持续性"], "a": [0, 1, 2, 3], "e": "情绪的四个基本维度为强度、紧张度、快感度、复杂度，持续性是区分不同情绪状态（如心境、激情）的分类维度，不属于情绪的基本维度，因此正确答案为ABCD。", "type": "multi"}, {"q": "发展心理学认为，下列属于老年期正常心理变化的有哪些？", "o": ["出现轻度的记忆减退", "思维加工速度减慢", "晶体智力长期保持稳定", "流体智力随年龄缓慢下降", "人格发生完全的改变"], "a": [0, 1, 2, 3], "e": "老年期的正常心理变化包括轻度记忆减退、思维速度减慢、晶体智力保持稳定、流体智力缓慢下降。人格具有稳定性，即使到老年期也不会发生完全改变，因此正确答案为ABCD。", "type": "multi"}, {"q": "临床心理咨询工作中，下列选项属于已明确分类的常见睡眠障碍的是哪些？", "o": ["慢性失眠障碍", "阻塞性睡眠呼吸暂停低通气综合征", "发作性睡病", "梦魇障碍", "偶发入睡延迟波动"], "a": [0, 1, 2, 3], "e": "临床常见的睡眠障碍包括失眠障碍、睡眠呼吸相关障碍、发作性睡病、梦魇障碍等类型；偶发的正常睡眠波动不属于病理层面的睡眠障碍范畴，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "大五人格理论的五维度模型中，下列属于外倾性维度典型特征的有哪些？", "o": ["乐于参与社交活动", "对人热情友善", "做事果断有主见", "不喜刻意社交", "偏好独处思考"], "a": [0, 1, 2], "e": "大五人格的外倾性维度核心特征包括社交主动性、热情开放性、果断自信等；不喜社交、偏好独处属于内倾性维度的特征，因此DE选项错误，正确答案为ABC。", "type": "multi"}, {"q": "心理测量学中，下列属于常用信度分类类型的是哪些？", "o": ["重测信度", "复本信度", "内部一致性信度", "评分者信度", "效标效度"], "a": [0, 1, 2, 3], "e": "经典测量理论中，信度主要分为四类：重测信度、复本信度、内部一致性信度、评分者信度；效标效度（效标关联效度）属于效度的类型，不属于信度，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "社会心理学中，人际沟通活动包含的核心基本要素有哪些？", "o": ["信息发出者", "传递的信息内容", "信息传递通道", "信息接收者", "沟通信息的反馈"], "a": [0, 1, 2, 3, 4], "e": "完整的人际沟通活动核心要素包括信息源（信息发出者）、信息内容、信息传递通道、信息接收者、反馈，此外还包括障碍与背景，题干所列选项全部属于基本要素，因此全部正确，答案为ABCDE。", "type": "multi"}, {"q": "传统气质体液说分类中，下列属于公认的气质类型的是哪些？", "o": ["胆汁质", "多血质", "黏液质", "抑郁质", "均衡质"], "a": [0, 1, 2, 3], "e": "古希腊希波克拉底提出的传统气质体液说将气质分为胆汁质、多血质、黏液质、抑郁质四种经典类型，均衡质不属于传统分类范畴，因此E错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列异常心理症状分类中，属于躯体形式障碍范畴的是哪些？", "o": ["多系统躯体不适的躯体化障碍", "坚信自己患病的疑病障碍", "运动/感觉功能异常的转换障碍", "无法解释的慢性疼痛障碍", "突发濒死感的惊恐障碍"], "a": [0, 1, 2, 3], "e": "ICD及CCMD分类中，躯体形式障碍主要包括躯体化障碍、疑病障碍、转换障碍、躯体形式疼痛障碍等；惊恐障碍属于焦虑障碍分类，不属于躯体形式障碍，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列干预技术中，属于积极心理学常用的积极干预技术的是哪些？", "o": ["感恩拜访练习", "识别优势使用练习", "正念冥想练习", "每日三件好事记录", "系统脱敏训练"], "a": [0, 1, 2, 3], "e": "积极心理学常用干预技术包括感恩拜访、优势探索与使用、正念冥想、三件好事练习等；系统脱敏疗法是经典行为治疗技术，不属于积极心理学干预技术，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "发展心理学中，童年期儿童进入学校学习，其学习活动的主要特点包括下列哪些？", "o": ["学习内容以间接经验为主", "学习过程需要专业教师的指导", "学习动机逐渐从外部动机向内部动机转化", "学习兴趣逐步出现分化特点", "日常活动以游戏为绝对核心"], "a": [0, 1, 2, 3], "e": "童年期儿童进入学校阶段，学习的核心特点包括：以间接经验学习为主、需要教师指导、学习动机从外部向内部转化、学习兴趣逐渐分化；以游戏为主要活动是幼儿期的发展特点，不属于童年期学习的特点，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "心理咨询过程中，咨询师建立良好咨询关系的核心要素包括下列哪些？", "o": ["对来访者保持尊重", "向来访者传递热情", "对来访者保持真诚", "准确共情来访者的感受", "对来访者进行积极关注"], "a": [0, 1, 2, 3, 4], "e": "建立良好心理咨询关系的五大核心要素就是尊重、热情、真诚、共情、积极关注，五个选项均符合要求，全部正确，因此答案为ABCDE。", "type": "multi"}, {"q": "基础心理学中，下列选项属于心理过程范畴的是哪些？", "o": ["感知觉记忆思维构成的认知过程", "对刺激产生评价体验的情绪情感过程", "有意识克服困难达成目标的意志过程", "个体稳定的人格特征", "体现能力差异的能力特质"], "a": [0, 1, 2], "e": "基础心理学将心理现象分为心理过程和人格两大范畴，心理过程包括认知过程、情绪情感过程、意志过程三个动态部分；人格特征、能力特质都属于人格（个性心理）范畴，不属于动态心理过程，因此DE选项错误，正确答案为ABC。", "type": "multi"}, {"q": "下列情绪分类中，属于人与动物共有的先天基本情绪的选项是哪些？", "o": ["需求满足后的快乐", "目标受阻后的愤怒", "丧失目标后的悲哀", "面临威胁后的恐惧", "对未来不确定的焦虑"], "a": [0, 1, 2, 3], "e": "基本情绪是进化中形成的先天共有的情绪，经典分类中基本情绪包括快乐、愤怒、悲哀、恐惧四种；焦虑是由多种基本情绪复合形成的复合情绪，不属于基本情绪，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "基础心理学中，根据注意发生时有无预定目的、是否需要意志努力，可以将注意分为哪几类独立类型？", "o": ["无意注意", "有意注意", "有意后注意", "被动注意", "主动注意"], "a": [0, 1, 2], "e": "按照题干所述分类标准，注意可以分为三类独立类型：无意注意（无预定目的无需意志努力）、有意注意（有预定目的需要意志努力）、有意后注意（有预定目的无需意志努力）；被动注意是无意注意的别称，主动注意是有意注意的别称，不属于独立分类，因此DE选项错误，正确答案为ABC。", "type": "multi"}, {"q": "变态心理学中，下列症状属于感知障碍范畴的是哪些？", "o": ["对低强度刺激感受性增高的感觉过敏", "无客观刺激时出现的听觉性幻觉幻听", "感知外界物体大小形状发生改变的视物变形症", "坚信被人跟踪迫害的被害妄想", "反复出现无法控制的强迫思维"], "a": [0, 1, 2], "e": "感知障碍分为感觉障碍、知觉障碍、感知综合障碍三类，感觉过敏属于感觉障碍，幻听属于知觉障碍中的幻觉，视物变形症属于感知综合障碍，均属于感知障碍；被害妄想属于思维内容障碍，强迫思维属于思维障碍，均不属于感知障碍，因此DE选项错误，正确答案为ABC。", "type": "multi"}, {"q": "社会心理学研究认为，从众行为产生的主要原因包括下列哪些？", "o": ["在不确定情境下寻找合适的行为参照", "害怕自己偏离群体被排斥的恐惧", "群体自身的凝聚力对个体的吸引", "个体本身具有先天攻击性特质", "来自权威下达命令的强制压力"], "a": [0, 1, 2], "e": "从众行为的三个核心诱发原因分别是：寻求行为参照、对偏离群体的恐惧、群体凝聚力；个体攻击性与从众行为无直接关联，权威命令压力是服从行为的核心诱发因素，不属于从众的原因，因此DE选项错误，正确答案为ABC。", "type": "multi"}, {"q": "塞利格曼提出的积极心理学PERMA幸福模型，包含下列哪些核心内容？", "o": ["积极情绪体验", "全然投入当下的状态", "良好的人际关系", "生命的意义感", "个人资产的财富积累"], "a": [0, 1, 2, 3], "e": "PERMA幸福模型是塞利格曼提出的积极心理学核心框架，五个核心要素分别是：P（Positive emotion）积极情绪、E（Engagement）投入、R（Relationships）人际关系、M（Meaning）意义、A（Accomplishment）成就；财富积累不属于PERMA模型的官方核心内容，因此E选项错误，正确答案为ABCD。", "type": "multi"}, {"q": "下列选项中，属于合格心理测验的标准化核心指标的是哪些？", "o": ["测验结果的稳定性即信度", "测验准确测量目标特质的效度", "用于分数解释参照的常模", "统一规范的标准化施测程序", "统一标准的标准化评分规则"], "a": [0, 1, 2, 3, 4], "e": "心理测验的标准化覆盖内容、施测流程、评分、分数解释全流程，信度和效度是衡量测验质量的核心指标，常模是分数解释的参照标准，标准化施测和评分是测验标准化的流程保障，题干五个选项全部属于心理测验标准化的指标，因此全部正确，答案为ABCDE。", "type": "multi"}, {"q": "发展心理学家安斯沃斯通过陌生情境实验，将婴儿依恋划分为下列哪几类经典类型？", "o": ["安全型依恋", "回避型依恋", "反抗型依恋", "焦虑混乱型依恋", "依赖型依恋"], "a": [0, 1, 2], "e": "安斯沃斯通过陌生情境实验得到的经典婴儿依恋分类为三类：安全型依恋、回避型依恋、反抗型（也叫矛盾型）依恋；混乱型依恋不属于该实验提出的原始分类范畴，依赖型也不是该分类，因此DE选项错误，正确答案为ABC。", "type": "multi"}, {"q": "合理情绪疗法中，下列属于典型不合理信念特征的是哪些？", "o": ["&ldquo;我必须每件事都成功&rdquo;的绝对化要求", "&ldquo;一次失败我就是完全没用的人&rdquo;的过分概括化", "&ldquo;一次考试失利人生就全毁了&rdquo;的糟糕至极", "根据客观事实调整认知的客观化思维", "能够根据情境调整认知的灵活化认知"], "a": [0, 1, 2], "e": "艾利斯提出的不合理信念三大核心特征就是绝对化要求、过分概括化、糟糕至极；客观化思维、灵活化认知都属于合理信念的特征，不属于不合理信念，因此DE选项错误，正确答案为ABC。", "type": "multi"}], "操作技能-助理级": [{"q": "求助者,女,28岁,新入职中学教师,因担心讲课出错不敢主动承担公开课任务,咨询师计划联合使用阳性强化法与合理情绪疗法开展干预,下列做法符合操作规范的有哪些?", "o": ["首先引导求助者识别“我每一节课都必须上得完美无缺”的不合理信念", "当求助者主动报名参加小型公开课后,及时给予正向肯定和鼓励", "当面指出求助者逃避行为的错误,批评其胆小懦弱促使改变", "要求求助者压抑紧张不安的情绪,只管上课不要想太多", "和求助者一起调整认知,建立“讲课出错是正常的,可以逐步调整改进”的新信念"], "a": [0, 1, 4], "e": "C选项属于惩罚性干预,违背阳性强化法正性强化的核心原则;D选项忽略求助者的情绪感受,不符合心理咨询的基本要求,错误。A、B、E分别符合合理情绪疗法的识别不合理信念、调整认知,以及阳性强化法及时强化正性行为的操作规范,因此正确。", "type": "multi"}, {"q": "初诊接待是心理咨询师和求助者的第一次正式接触,下列做法中属于初诊接待中不当行为的有哪些?", "o": ["为了拉近和求助者的距离,主动告诉求助者自己最近的感情困扰等私人生活细节", "为了让求助者安心,直接承诺“你的问题我肯定能帮你解决”", "正式开始咨询前,向求助者说明保密原则以及保密例外的情况", "机构要求积累教学案例,未经求助者同意就将其咨询记录用于课堂教学", "咨询过程中不评判求助者的行为和选择,保持中立态度"], "a": [0, 1, 3], "e": "初诊接待需保持专业边界,不得随意透露咨询师私人信息、做出绝对化解决承诺、未经同意泄露求助者的咨询内容。C、E为初诊接待的正确操作,因此不当行为为ABD。", "type": "multi"}, {"q": "关于90项症状清单(SCL-90),下列说法正确的有哪些?", "o": ["量表共包含90个项目,可划分为10个不同的症状因子", "阳性项目数指的是得分≥2分的项目的总数量", "根据中国常模标准,总分≥160分时提示受测者可能存在阳性心理症状", "可以直接根据SCL-90得分结果确诊受测者患有精神类疾病", "该量表适用于16岁及以上成年人,可进行团体施测也可个别施测"], "a": [0, 1, 2, 4], "e": "D选项错误,SCL-90仅用于心理症状的筛查,不能直接确诊精神类疾病。A、B、C、E均符合SCL-90的结构、常模标准与适用范围规范,因此正确。", "type": "multi"}, {"q": "咨询师在对求助者进行摄入性会谈收集资料时,下列提问方式符合操作规范的有哪些?", "o": ["“你近一个月的饮食状态怎么样?”", "“你是不是经常因为和父母吵架而心情低落对不对?”", "“你能具体说一说你和领导这次矛盾产生的过程吗?”", "“你为什么会对同事的玩笑这么敏感呢?”", "“你觉得你目前的困扰主要和哪些因素有关呢?”"], "a": [0, 2, 4], "e": "B选项属于带有暗示性的封闭式提问,容易引导求助者按照咨询师预设方向回答,不符合提问要求;D选项使用“为什么”提问,容易引发求助者的防御心理,不合适。A、C、E均为开放式的中性提问,符合摄入性会谈的提问规范,因此正确。", "type": "multi"}, {"q": "咨询师和求助者共同确定心理咨询目标时,下列选项符合合理咨询目标特征与咨询规范的有哪些?", "o": ["咨询目标具体可行,能够通过一定指标进行评估", "咨询目标是积极的,解决的问题属于心理学范畴", "咨询目标由咨询师根据专业经验单独制定,不需要求助者同意", "咨询目标需要经过双方共同认可,是可以实现的", "如果求助者的问题超出咨询师自身的胜任力范围,应当及时转介给合适的咨询师"], "a": [0, 1, 3, 4], "e": "C选项错误,合理咨询目标需要由咨询师和求助者共同协商制定,不能由咨询师单独确定。A、B、D、E均符合合理咨询目标的特征与转介规范,因此正确。", "type": "multi"}, {"q": "咨询师计划使用系统脱敏疗法帮助一名对乘坐电梯感到恐惧的求助者,下列操作符合系统脱敏疗法规范的有哪些?", "o": ["首先和求助者一起建立恐惧/焦虑等级,等级按照从低到高的顺序排列", "让求助者处于放松状态下,按照等级顺序依次想象对应场景", "为了快速见效,直接让求助者进入电梯面对最恐惧的场景进行训练", "开始脱敏训练之前,需要先教会求助者掌握渐进式肌肉放松方法", "当求助者在某一等级训练时出现明显焦虑,应当跳过该等级直接进入下一等级训练"], "a": [0, 1, 3], "e": "C选项错误,系统脱敏需要从最低焦虑等级开始逐步训练,不能直接进入最高等级场景;E选项错误,求助者在某一等级出现明显焦虑时,需要让求助者重新回到放松状态,反复练习该等级直到焦虑消除,不能直接跳过。A、B、D均符合系统脱敏疗法的操作规范,因此正确。", "type": "multi"}, {"q": "咨询师接待一名因长期失眠前来咨询的求助者,下列做法符合心理咨询职业伦理与操作规范的有哪些?", "o": ["根据求助者的睡眠问题,选择对应的症状评定量表,不盲目施测所有人格测验", "为了保证测验结果准确,提前告知求助者每个题目的具体计分规则", "如果评估发现求助者有高度自杀风险,应当严格保密不能联系其家属", "如果咨询师自身不擅长睡眠障碍的心理干预,应当及时评估并转介给擅长该领域的咨询师", "求助者的父母要求知道测验结果,咨询师可以直接同意告知"], "a": [0, 3], "e": "B选项错误,心理测验操作中无需告知求助者具体计分方式;C选项错误,当求助者存在自杀风险时,属于保密例外,应当及时联系家属保障安全;E选项错误,测验结果属于求助者隐私,需要征得求助者本人同意后才能告知其家属,不能直接同意。A、D符合职业伦理与操作规范,因此正确。", "type": "multi"}, {"q": "咨询师使用合理情绪疗法为求助者进行干预,下列做法符合修通阶段操作要点的有哪些?", "o": ["使用产婆术式辩论,引导求助者自己意识到自身存在的不合理信念", "帮助求助者建立新的合理信念,替代原有的不合理信念", "直接指出求助者的不合理信念,不需要求助者自行领悟", "布置认知家庭作业,让求助者自己记录日常情绪和引发情绪的信念之间的关联", "整个咨询过程中只倾听求助者表达,不做任何干预性引导"], "a": [0, 1, 3], "e": "C选项错误,合理情绪疗法修通阶段的核心是引导求助者自主领悟不合理信念,不能直接告知代替求助者思考;E选项错误,仅倾听不引导是初诊接待收集资料阶段的要求,修通阶段需要进行主动干预,因此错误。A、B、D均符合修通阶段的操作要求,因此正确。", "type": "multi"}, {"q": "求助者,男,35岁,因和妻子长期冷战导致焦虑易怒、食欲不振2个月,主动前来求助,首次接待时下列做法符合职业伦理与操作规范的有哪些?", "o": ["为了快速找到冲突原因,直接询问求助者是否存在出轨行为", "咨询开始前向求助者明确说明保密原则,以及“存在自杀或伤人风险时可以打破保密”的例外情况", "为了全面评估,直接让求助者完成所有常用的人格和症状心理测验", "耐心倾听求助者的表达,不随意打断,也不使用评判性语言评价求助者的行为", "为了节省求助者时间,听完表述后直接给出“你的问题就是婚姻冲突引发的一般心理问题”的诊断"], "a": [1, 3], "e": "A选项错误,直接询问求助者隐私问题容易引发防御心理,不符合初诊接待规范;C选项错误,应当选择和求助者问题相关的测验,不能盲目施测所有测验;E选项错误,初诊接待阶段以收集资料为主,不能在未完成全面评估的情况下直接给出诊断。B、D符合操作规范与保密原则要求,因此正确。", "type": "multi"}, {"q": "合理情绪疗法理论中,常见的不合理信念的特征包括下列哪些选项?", "o": ["绝对化要求", "过分概括化", "糟糕至极", "客观看待事件的结果", "以偏概全"], "a": [0, 1, 2, 4], "e": "不合理信念的三大核心特征为绝对化要求、过分概括化(也即以偏概全)、糟糕至极,D选项客观看待结果属于合理认知,不属于不合理信念的特征,因此正确答案为ABCE。", "type": "multi"}, {"q": "心理测验的标准化过程主要包括下列哪些环节?", "o": ["测验内容的标准化", "施测过程的标准化", "评分记分的标准化", "结果解释的标准化", "允许受测者自主选择测试场地"], "a": [0, 1, 2, 3], "e": "心理测验的标准化包含四个核心环节:测验内容标准化、施测过程标准化、评分记分标准化、结果解释标准化。E选项错误,标准化测验要求所有受测者在统一一致的测试环境下施测,不能由受测者自主选择测试场地,因此正确答案为ABCD。", "type": "multi"}, {"q": "求助者中心疗法认为,咨询过程中咨询师需要具备的核心咨询条件包括下列哪些?", "o": ["对求助者的共情理解", "对求助者无条件积极关注", "咨询师自身的真诚一致", "直接指导求助者一步步解决问题", "保持专业中立,对求助者不做价值评判"], "a": [0, 1, 2, 4], "e": "求助者中心疗法遵循非指导性原则,不主张咨询师直接指导求助者解决问题,因此D选项错误。求助者中心疗法的核心条件包括共情理解、无条件积极关注、真诚一致、非评判性态度,因此正确答案为ABCE。", "type": "multi"}, {"q": "心理咨询过程中,求助者表现出的阻抗形式通常包括下列哪些?", "o": ["全程沉默寡言,很少主动表达", "有意回避咨询师问到的敏感话题", "多次迟到,或是无故取消预约咨询", "主动向咨询师分享自己内心的真实感受"], "a": [0, 1, 2, 4], "e": "阻抗是求助者在咨询过程中对自我暴露与自我改变的抵抗,表现形式包括讲话程度上的沉默寡言、讲话内容上的回避敏感话题、咨询关系上的迟到/取消咨询、言语表达上的答非所问等。D选项主动分享感受属于正常的咨询互动,不属于阻抗,因此正确答案为ABCE。", "type": "multi"}, {"q": "咨询师在和求助者会谈过程中做出了下列表述,其中属于参与性技术的有哪些?", "o": ["“你刚才说你和室友相处得很不愉快,能具体说一说上次发生矛盾的具体情况吗?”", "“我觉得你应该主动找室友谈一谈,把问题说开”", "“你现在说起这件事的时候,感觉还是很委屈对吗?”", "“我之前上学的时候也和室友发生过类似的矛盾,特别能理解你的感受”", "“你说的‘心里不舒服’,具体是委屈还是愤怒呢?”"], "a": [0, 2, 4], "e": "B选项属于指导技术,是影响性技术的一种;D选项属于自我开放技术,也属于影响性技术;A选项属于具体化技术,是参与性技术;C选项属于情感反应技术,是参与性技术;E选项属于具体化技术,是参与性技术,因此正确答案为ACE。", "type": "multi"}, {"q": "求助者说“我这次竞聘科长没选上,我的事业就全完了,单位同事肯定都看不起我”,根据合理情绪疗法的ABC理论,下列说法正确的有哪些?", "o": ["该求助者的不合理信念属于糟糕至极的特征", "诱发事件A是“竞聘科长落选”", "情绪结果C是“感到绝望、自卑,没面子”", "不合理信念B是“竞聘落选就等于事业全完,同事都会看不起我”", "该求助者的心理冲突属于变形冲突,属于神经症性心理问题"], "a": [0, 1, 2, 3], "e": "E选项错误,该求助者的心理冲突和竞聘落选这一现实事件直接相关,属于常形冲突,不属于神经症性心理问题。A、B、C、D均符合ABC理论的内容与不合理信念的分类,因此正确答案为ABCD。", "type": "multi"}, {"q": "关于艾森克人格问卷(EPQ),下列说法正确的有哪些?", "o": ["EPQ包含E(内外向)、N(神经质)、P(精神质)、L(掩饰性)四个维度", "E维度得分越高,说明个体越外向,更喜欢社交活动", "N维度得分越高,说明个体情绪越稳定,不容易出现焦虑情绪", "P维度得分越高,说明个体越孤僻,不近人情,缺乏共情能力", "L维度得分越高,说明个体作答的掩饰性越强,结果真实性越低"], "a": [0, 1, 3, 4], "e": "C选项错误,N维度(神经质)得分越高,个体情绪越不稳定,越容易出现焦虑、抑郁等情绪反应,表述相反因此错误。A、B、D、E均符合艾森克人格问卷的维度含义与结果解释规范,因此正确答案为ABDE。", "type": "multi"}, {"q": "心理咨询师使用卡特尔16项人格因素问卷(16PF)为受测者施测后解释结果,下列关于各维度高分特征的描述正确的有:", "o": ["因素A(乐群性)得分高提示受测者外向开朗、乐于交际", "因素C(稳定性)得分高提示受测者情绪稳定、应对从容", "因素E(恃强性)得分高提示受测者谦和温顺、容易服从", "因素N(世故性)得分高提示受测者处世圆滑、精明老练", "因素Q4(紧张性)得分高提示受测者心平气和、闲散宁静"], "a": [0, 1, 3], "e": "选项C中恃强性的高分特征为好强固执、独立积极,低分才对应顺从温和,C错误;选项E中紧张性的高分特征为紧张困扰、激动挣扎,低分才对应放松平静,E错误。其余选项描述均符合16PF的维度解释。", "type": "multi"}, {"q": "下列心理咨询常用干预技术中,属于放松训练范畴的有:", "o": ["鼻腔呼吸放松法", "渐进式肌肉放松训练", "指导性想象放松训练", "冲击疗法", "身体扫描正念放松训练"], "a": [0, 1, 2, 4], "e": "冲击疗法属于暴露疗法的范畴,主要用于恐惧症等问题的干预,不属于放松训练技术,D错误;其余选项均为临床常用的规范放松训练技术。", "type": "multi"}, {"q": "使用卡特尔16项人格因素问卷(16PF)施测时,符合施测规范要求的有:", "o": ["每一测题只能选择一个答案", "要求受测者完成所有测题,不可漏答", "指导语提示受测者尽量不选择中性答案", "要求受测者必须在30分钟内完成全部题目", "若受测者对题目难以判断,可以放弃作答"], "a": [0, 1, 2], "e": "16PF施测没有严格的时间限制,D错误;施测规范要求所有题目必须作答,不允许空题,E错误;其余选项均为16PF正确的作答与记分要求。", "type": "multi"}, {"q": "关于1982年修订完成的中国比内测验,下列描述正确的有:", "o": ["该版本由我国心理学家吴天敏教授主持修订", "适用的年龄范围为2~18岁的受测者", "全套测验共包含51个试题,按照由易到难排序", "该版本仅适合城市受测者使用,不适用农村受测者", "该测验只能个别施测,不支持团体施测"], "a": [0, 1, 2], "e": "中国比内测验适用于2~18岁的城乡受测者,既可以个别施测也可以团体施测,因此D、E错误,其余选项描述均正确。", "type": "multi"}, {"q": "咨询过程中求助者可能对咨询师产生移情或依赖,下列关于二者的描述正确的有:", "o": ["移情是求助者将过往对重要他人的情感转移到咨询师身上", "依赖是求助者遇到困难时,希望从咨询师处获得实际帮助与支持", "产生移情的求助者往往会十分关注咨询师的情绪和反应", "依赖的求助者核心需求是获得情感寄托", "移情和依赖没有本质区别,均属于咨询中的正常反应"], "a": [0, 1, 2], "e": "依赖的核心是寻求实际帮助支持,移情才是寻求情感寄托,二者有明确的本质区别,因此D、E错误,其余选项描述均正确。", "type": "multi"}, {"q": "咨询师使用系统脱敏疗法对社交焦虑求助者进行干预,下列操作符合规范要求的有:", "o": ["开始脱敏训练前,先教授求助者掌握放松技巧", "和求助者共同建构焦虑等级,焦虑程度从低到高排列", "相邻等级之间的焦虑差异应可以很大", "脱敏训练从焦虑程度最高的情境开始,逐步向下适应", "若求助者在某一等级情境中出现明显焦虑,暂停训练重新放松后再继续"], "a": [0, 1, 4], "e": "系统脱敏要求焦虑等级的级差均匀适中,差异不能过大,C错误;脱敏训练需要从焦虑程度最低的情境开始,逐步升级到高焦虑情境,D错误;其余选项均为系统脱敏的正确操作要点。", "type": "multi"}, {"q": "艾森克人格问卷(EPQ)是常用的人格测量工具,下列属于该问卷包含的维度分量表的有:", "o": ["内外向维度(E)", "神经质维度(N)", "精神质维度(P)", "说谎效度量表(L)", "偏执量表(Pa)"], "a": [0, 1, 2, 3], "e": "EPQ包含E、N、P、L四个分量表,L为效度量表用于检测作答掩饰程度;Pa(偏执)是明尼苏达多相人格测验(MMPI)的临床分量表,不属于EPQ的维度,因此E错误,其余选项均正确。", "type": "multi"}, {"q": "合理情绪疗法是认知行为流派的代表性咨询方法,下列适合使用该方法干预的人群有:", "o": ["存在广泛性焦虑情绪的求助者", "存在中度抑郁情绪的求助者", "急性期发作的精神分裂症患者", "存在强迫行为的求助者", "重度边缘型人格障碍患者"], "a": [0, 1, 3], "e": "合理情绪疗法适用于存在情绪困扰、认知偏差的一般心理问题、神经症性问题求助者;急性期精神分裂症、重度人格障碍患者超出合理情绪疗法适用范围,需优先进行精神科药物治疗,因此C、E错误,其余选项均符合适用范围。", "type": "multi"}, {"q": "抑郁自评量表(SDS)与焦虑自评量表(SAS)是常用的心理健康筛查工具,下列关于二者的描述正确的有:", "o": ["SDS用于评估抑郁症状严重程度,SAS用于评估焦虑症状严重程度", "按照中国常模标准,SDS的临界值为50分,SAS的临界值也为50分", "两个量表都包含20个自评项目", "SDS采用4级评分,SAS采用5级评分", "SDS可用于抑郁症的初步筛查,SAS可用于焦虑症的初步筛查"], "a": [0, 1, 2, 4], "e": "SDS和SAS均采用4级评分法,因此D错误,其余选项描述均符合两个量表的特征,表述正确。", "type": "multi"}, {"q": "咨询师在摄入性会谈中收集求助者资料,下列提问属于不当提问,需要避免的有:", "o": ["你为什么会对同事这句话产生这么大的情绪反应?", "你不觉得你处理这件事的方式太冲动了吗?", "你最近一周平均每天的睡眠时间大概是多久?", "你这次来咨询,是因为工作压力还是情感问题呢?", "你可以说说你最近和家人相处的具体情况吗?"], "a": [0, 1, 3], "e": "A属于“为什么”类提问,容易引发求助者防御心理,属于不当提问;B属于评判性提问,会让求助者产生被指责的感受,属于不当提问;D属于多重选择性提问,会限制求助者回答范围,属于不当提问;C是恰当的封闭式提问,E是恰当的开放式引导提问,均不属于不当提问。", "type": "multi"}, {"q": "咨询师和求助者共同商定的正式心理咨询方案,应当包含下列哪些核心内容:", "o": ["咨询的具体目标和长期最终目标", "咨询采用的技术方法和理论基础", "咨询次数、每次时长和收费标准", "咨询师私人联系方式方便私下沟通", "咨询过程中双方的权利与义务"], "a": [0, 1, 2, 4], "e": "完整心理咨询方案需包含咨询目标、方法技术、时间收费、双方权责等核心内容;咨询师私人联系方式不属于方案必备内容,还会破坏咨询专业边界,因此D错误,其余选项均为正确内容。", "type": "multi"}, {"q": "咨询师使用阳性强化法帮助儿童纠正上课走神的不良行为,下列做法符合操作规范的有:", "o": ["首先明确目标行为为“上课专心听讲10分钟”,定义清晰可测量", "儿童出现符合标准的目标行为后,立即给予强化刺激", "根据儿童的喜好选择强化物,提升强化效果", "儿童出现走神行为时及时批评惩罚,加快纠正速度", "目标行为稳定后,逐步减少强化频率,维持行为改变"], "a": [0, 1, 2, 4], "e": "阳性强化法核心原理是通过正强化强化目标行为,让不良行为自然消退,不需要惩罚不良行为,因此D错误,其余选项均为正确操作要点。", "type": "multi"}, {"q": "初步诊断心理问题时需要区分心理冲突的常形与变形,下列关于心理冲突常形的描述正确的有:", "o": ["常形心理冲突与现实生活事件直接相关", "常形心理冲突带有明显的道德判断色彩", "常形心理冲突可出现在正常人的心理活动中", "常形心理冲突是神经症性心理问题的核心特征", "常形心理冲突的求助者通常没有明显痛苦体验"], "a": [0, 1, 2], "e": "心理冲突变形才是神经症性心理问题的核心特征,常形可见于正常人;常形心理冲突的求助者通常也有明显痛苦体验,因此D、E错误,其余选项描述均正确。", "type": "multi"}, {"q": "建立良好信任的咨询关系是咨询起效的基础,咨询师需要做到下列哪些要求:", "o": ["尊重求助者的人格、价值观和生活选择", "初次咨询时热情接待,营造安全温暖的咨询氛围", "合适情境下真诚表达自身真实感受,不虚伪伪装", "站在求助者角度共情理解其情绪体验", "发现求助者明显错误行为时直接批评,帮助其改正"], "a": [0, 1, 2, 3], "e": "建立良好咨询关系的核心要素包括尊重、热情、真诚、共情、积极关注,直接批评会伤害求助者自尊,破坏咨询关系,因此E错误,其余选项均为正确要求。", "type": "multi"}, {"q": "症状自评量表(SCL-90)是常用的心理健康筛查量表,下列属于该量表包含的因子的有:", "o": ["躯体化", "强迫症状", "人际关系敏感", "精神分裂症", "抑郁"], "a": [0, 1, 2, 4], "e": "SCL-90共包含10个因子,精神分裂症是疾病诊断名称,不属于该量表的因子,因此D错误,其余选项均为SCL-90的因子。", "type": "multi"}, {"q": "下列摄入性会谈中的提问方式,属于不当提问,咨询师需要避免的有:", "o": ["你为什么会对领导的安排感到这么焦虑?", "你这次来咨询,是因为工作问题还是家庭问题呢?", "你最近一周的睡眠质量和食欲怎么样?", "你能说说你和合作伙伴发生冲突的具体经过吗?", "你难道不觉得你的这种想法本身就很荒谬吗?"], "a": [0, 1, 4], "e": "A属于“为什么”类提问,容易引发求助者防御,属于不当提问;B属于多重选择性提问,限制求助者回答范围,属于不当提问;E属于评判性指责提问,会给求助者造成压力,属于不当提问;C是恰当的封闭式提问,D是恰当的开放式引导提问,不属于不当提问。", "type": "multi"}, {"q": "根据心理咨询伦理规范,下列情况属于保密例外,咨询师可以突破保密原则的有:", "o": ["求助者明确告知咨询师自己一周后计划自杀,已经准备好工具", "求助者告知咨询师自己五年前曾经盗窃过邻居财物", "求助者明确告知咨询师自己准备次日伤害出轨对象", "求助者向咨询师隐瞒了自己的高血压慢性病史", "求助者涉及重大刑事案件,法院依法调取咨询记录"], "a": [0, 2, 4], "e": "保密例外包括求助者存在伤害自身/他人的明确危险、司法机关依法要求提供咨询记录等情况;选项B的过往盗窃行为、选项D的隐瞒慢性病史均属于求助者隐私,需要严格保密,不属于保密例外,因此B、D错误,其余选项均正确。", "type": "multi"}, {"q": "关于卡特尔16项人格因素问卷(16PF)的适用范围,下列说法正确的有?", "o": ["适用于16周岁及以上的成年受测者", "可用于企业招聘中的人才选拔与职业适配指导", "可辅助临床工作中心理问题的初步诊断", "适用于10-15岁的儿童青少年群体", "仅可用于确诊精神障碍患者的人格评估"], "a": [0, 1, 2], "e": "卡特尔16项人格因素问卷(16PF)的适用人群为16岁以上的个体,可应用于人才选拔、职业指导、临床心理诊断等多个场景,16岁以下人群、仅适用于精神障碍患者均不符合该测验的适用范围,因此D、E选项错误。", "type": "multi"}, {"q": "咨询师使用阳性强化法帮助求助者调整不良行为时,下列操作符合规范要求的有?", "o": ["首先需要明确需要强化的具体目标行为", "当目标行为出现时第一时间给予强化刺激", "根据求助者的个人偏好选择合适的强化物", "对不良行为需要同时给予惩罚以快速消退", "在目标行为稳定后逐步降低强化的频率维持效果"], "a": [0, 1, 2, 4], "e": "阳性强化法的核心原理是通过正强化增强目标行为,自然消退不良行为,不需要对不良行为额外施加惩罚,因此D选项错误,其余选项均为阳性强化法的正确操作要点。", "type": "multi"}, {"q": "下列符合心理咨询保密原则具体要求的做法有?", "o": ["初诊接待阶段提前向求助者说明保密范围以及保密例外的情形", "未经求助者同意,任何情况下都不得泄露咨询相关内容", "对求助者的咨询记录、个案档案进行严格保密管理", "当求助者明确表示有伤害自身的计划时,可打破保密原则", "可直接将完整咨询内容用于公开教学案例分享"], "a": [0, 2, 3], "e": "心理咨询保密原则要求,需提前向求助者说明保密范围与例外,对咨询相关资料严格保密;当求助者存在自伤、伤人风险等保密例外情形时,可以打破保密原则。选项B中“任何情况下都不得泄露”错误,忽略了保密例外;选项E中直接将咨询内容用于教学需隐去所有可识别求助者身份的隐私信息,不可直接使用,因此B、E错误。", "type": "multi"}, {"q": "咨询师为求助者选择心理测验工具时,下列符合选择原则的有?", "o": ["选择的测验需要匹配本次评估的具体目的", "优先选择标准化程度较高的测验工具", "优先选用信效度指标符合要求的测验", "选择符合受测者年龄阶段与文化背景的测验", "尽量选用收费最高的测验保证结果准确性"], "a": [0, 1, 2, 3], "e": "选择心理测验的核心原则包括:符合评估目的、标准化程度高、信效度良好、适配受测者的年龄与文化背景。测验的收费高低和测验质量没有必然关联,因此E选项错误。", "type": "multi"}, {"q": "当咨询师因个人能力或职业规范要求需要为求助者转介时,下列做法正确的有?", "o": ["提前向求助者说明转介的原因和转介的必要性", "不需要提前告知求助者,直接安排转介即可", "和新咨询师沟通求助者情况时,保护求助者核心隐私", "提前将新咨询师的基本信息告知求助者供其选择", "转介完成后不再跟进求助者的后续咨询情况"], "a": [0, 2, 3], "e": "规范转介要求:提前向求助者说明转介原因与必要性,为求助者提供新咨询师的相关信息,与新咨询师沟通求助者情况时注意保护隐私;直接不告知求助者转介不符合伦理,转介后也需要做好交接相关的跟进,因此B、E选项错误。", "type": "multi"}, {"q": "下列心理咨询技术中,属于参与性技术范畴的有?", "o": ["全神贯注的倾听技术", "对求助者表达的内容进行内容反应", "对求助者的情绪感受进行情感反应", "直接指导求助者做出行为改变", "为求助者的问题提供专业解释"], "a": [0, 1, 2], "e": "参与性技术的核心是引导求助者自我探索,包括倾听、内容反应、情感反应、开放式提问、具体化等;指导和解释属于影响性技术,是咨询师主动影响求助者的技术,因此D、E选项错误。", "type": "multi"}, {"q": "下列心理咨询技术中,属于影响性技术范畴的有?", "o": ["针对求助者的认知误区给出专业解释", "明确指导求助者开展特定的行为练习", "咨询师将自己的观点传递给求助者进行内容表达", "对求助者的情绪感受做出情感反应", "帮助求助者澄清模糊不清的问题使用具体化技术"], "a": [0, 1, 2], "e": "影响性技术是咨询师主动影响求助者咨询过程的技术,包括解释、指导、内容表达、面质、自我开放等;情感反应、具体化属于参与性技术,因此D、E选项错误。", "type": "multi"}, {"q": "下列人群中,属于冲击疗法禁忌对象的有?", "o": ["存在严重冠心病等心血管疾病的患者", "处于急性精神分裂症发作期的患者", "患有严重哮喘等呼吸道疾病的患者", "存在轻度焦虑情绪的健康成年人", "处于妊娠期的孕妇"], "a": [0, 1, 2, 4], "e": "冲击疗法会让求助者承受强烈的情绪和生理刺激,因此存在严重躯体疾病(心血管、呼吸道疾病等)、急性精神障碍发作、孕妇等均属于禁忌人群;健康的存在轻度心理问题的人群不属于禁忌对象,因此D选项错误。", "type": "multi"}, {"q": "认知行为疗法是心理咨询中常用的流派取向,下列属于认知行为疗法共同特点的有?", "o": ["咨询过程中咨询师和求助者是合作关系", "该流派认为个体的心理痛苦大多源于认知机能的障碍", "咨询核心是通过调整个体的认知,改善情绪和行为问题", "仅关注个体外显行为的改变,不涉及认知层面的调整", "属于针对具体目标的短期、教育性治疗"], "a": [0, 1, 2, 4], "e": "认知行为疗法兼顾认知调整和行为改变,核心假设认为心理痛苦源于认知障碍,通过改变认知改善情绪行为,咨访双方为合作关系,属于短期教育性治疗;仅关注行为改变不符合认知行为疗法的特点,因此D选项错误。", "type": "multi"}, {"q": "心理咨询结束阶段需要对咨询效果进行评估,下列属于常用评估维度的有?", "o": ["求助者对咨询效果的自我报告", "咨询师对求助者改变情况的观察评定", "求助者社会功能恢复的情况", "求助者原有心理症状的改善程度", "求助者咨询前后经济收入的变化幅度"], "a": [0, 1, 2, 3], "e": "心理咨询效果的常用评估维度包括:求助者自评、咨询师观察评定、社会功能恢复情况、症状改善程度、他人评价等;经济收入的变化和咨询效果没有直接关联,属于无关维度,因此E选项错误。", "type": "multi"}, {"q": "临床诊断中,鉴别神经症和正常心理的核心标准包括?", "o": ["求助者心理冲突的类型", "症状持续的病程时间", "求助者内心的痛苦程度", "求助者社会功能的受损程度", "求助者的年龄和性别"], "a": [0, 1, 2, 3], "e": "根据神经症临床评定方法,鉴别神经症与正常心理的核心维度包括:心理冲突的类型、病程长短、痛苦程度、社会功能受损程度,年龄和性别不属于鉴别标准,因此E选项错误。", "type": "multi"}, {"q": "下列不良行为或心理障碍中,适合使用厌恶疗法进行调整的有?", "o": ["露阴癖、窥阴癖等性心理偏好障碍", "酗酒、尼古丁依赖等成瘾行为", "强迫症中反复出现的强迫行为", "重度抑郁发作的患者", "处于幻觉妄想阶段的精神分裂症患者"], "a": [0, 1, 2], "e": "厌恶疗法通过将不良行为与厌恶刺激建立联结,达到消退不良行为的目的,适用于成瘾行为、性心理障碍、强迫行为等;重度精神障碍、重度抑郁症不属于厌恶疗法的适用范围,因此D、E选项错误。", "type": "multi"}, {"q": "下列人群中,适合采用求助者中心疗法开展心理咨询的有?", "o": ["存在人际关系冲突困扰的求助者", "存在短期情绪困扰的正常成人求助者", "急性期发作的精神分裂症患者", "存在焦虑情绪的青少年来访者", "重度人格障碍来访者"], "a": [0, 1, 3], "e": "求助者中心疗法适用于存在一般人际关系问题、情绪困扰的正常人群以及存在轻度心理问题的来访者;急性期精神分裂症发作期、重度人格障碍不属于该疗法的适用范围,因此C、E选项错误。", "type": "multi"}, {"q": "心理咨询师开展初诊接待前,下列属于需要提前完成的准备工作有?", "o": ["布置整洁舒适、安静私密的咨询室环境", "提前了解求助者的基本背景信息", "准备好咨询记录所需的工具材料", "直接开始咨询无需遵循规范接待流程", "提前熟悉初步的咨询方案框架"], "a": [0, 1, 2, 4], "e": "初诊接待前需要完成环境、资料、工具、咨询框架等多方面的准备工作,必须按照规范流程开展初诊接待,不能直接跳过接待流程开始咨询,因此D选项错误,其余选项均为正确的准备工作。", "type": "multi"}, {"q": "心理咨询师使用面质技术时,下列符合操作注意事项的有?", "o": ["面质必须以充分的事实依据作为前提", "避免将面质变成咨询师的个人情绪发泄", "对于存在争议的内容可以使用尝试性面质", "面质时需要直接批评求助者的错误想法", "需要结合咨询关系的进展程度选择合适的时机面质"], "a": [0, 1, 2, 4], "e": "面质技术的核心目的是促进求助者意识到自身存在的矛盾,促进自我探索,操作时需以事实为基础,避免个人发泄,可采用温和的尝试性面质,需要在建立良好咨询关系的基础上选择合适时机使用;直 , 4], "e": "渐进式肌肉放松训练需要提前告知流程原理,可配合背景音乐辅助放松,出现无法放松的情况时需要暂停调整,训练频率可灵活调整;并非必须在完全封闭无干扰的空间开展训练,因此D错误。", "type": "multi"}, {"q": "在合理情绪疗法的修通阶段,常用的核心技术包括下列哪些选项?", "o": ["与来访者的不合理信念进行辩论", "使用合理情绪想象技术调整认知", "布置认知家庭作业强化认知改变", "使用阳性强化法矫正偏差行为", "使用系统脱敏法缓解焦虑情绪"], "a": [0, 1, 2], "e": "修通阶段是合理情绪疗法改变来访者不合理信念的核心阶段,常用技术包括与不合理信念辩论、合理情绪想象技术、家庭作业;阳性强化法、系统脱敏疗法属于行为疗法技术,不属于合理情绪疗法修通阶段的专属核心技术,因此D、E错误。", "type": "multi"}, {"q": "在心理咨询会谈过程中,来访者表现出沉默时,常见的沉默类型包括下列哪些选项?", "o": ["怀疑型沉默", "茫然型沉默", "情绪型沉默", "反抗型沉默", "宣泄型沉默"], "a": [0, 1, 2, 3], "e": "心理咨询中常见的沉默类型包括怀疑型、茫然型、情绪型、思考型、内向型、反抗型;宣泄型属于多话的常见类型,不属于沉默类型,因此E错误。", "type": "multi"}, {"q": "在心理咨询会谈过程中,常见的多话类型包括下列哪些选项?", "o": ["宣泄型多话", "倾吐型多话", "表现型多话", "思考型多话", "掩饰型多话"], "a": [0, 1, 2, 4], "e": "心理咨询中常见的多话类型包括宣泄型、倾吐型、癔症型、表现型、表白型、掩饰型、外向型;思考型属于沉默的常见类型,不属于多话类型,因此D错误。", "type": "multi"}, {"q": "临床上鉴别一般心理问题、严重心理问题与神经症性心理问题的核心维度包括下列哪些选项?", "o": ["心理冲突的性质类型", "症状持续的病程时长", "情绪反应的泛化程度", "社会功能的受损程度", "求助者的家庭经济状况"], "a": [0, 1, 2, 3], "e": "三类心理问题鉴别诊断的核心维度为心理冲突类型、病程时长、情绪泛化程度、社会功能受损程度,求助者的经济状况不属于鉴别维度,因此E错误。", "type": "multi"}, {"q": "关于焦虑自评量表(SAS),下列描述正确的有哪些选项?", "o": ["主要用于评估来访者焦虑症状的严重程度", "量表标准分≥50分提示存在焦虑症状", "量表得分越高,说明来访者的焦虑程度越严重", "量表总共包含20个评估项目", "量表的分界临界值和抑郁自评量表(SDS)相同"], "a": [0, 1, 2, 3], "e": "焦虑自评量表(SAS)用于评估焦虑严重程度,共包含20个项目,标准分临界值为50分,得分越高焦虑程度越重;抑郁自评量表(SDS)临界值为53分,和SAS临界值不同,因此E错误。", "type": "multi"}, {"q": "社会支持评定量表(SSRS)包含的正式维度包括下列哪些选项?", "o": ["客观支持维度", "主观支持维度", "对支持的利用度维度", "情绪支持维度", "行为支持维度"], "a": [0, 1, 2], "e": "社会支持评定量表(SSRS)包含三个正式维度:客观支持、主观支持、个体对社会支持的利用度;情绪支持、行为支持不属于该量表官方划分的正式维度,因此D、E错误。", "type": "multi"}, {"q": "应对方式问卷(CSQ)包含的常用正式因子包括下列哪些选项?", "o": ["解决问题", "自责", "求助", "退避", "逃避"], "a": [0, 1, 2, 3], "e": "应对方式问卷(CSQ)包含六个正式因子:解决问题、自责、求助、幻想、退避、合理化;“逃避”不属于该量表官方命名的正式因子,对应因子名称为“退避”,因此E错误。", "type": "multi"}, {"q": "根据心理咨询师职业伦理要求,下列属于应当禁止的双重关系情形有哪些?", "o": ["咨询师和来访者存在商业合作关系", "咨询师和来访者存在直系亲属关系", "咨询师和来访者是私下交往的朋友关系", "咨询师仅为来访者提供约定范围内的正常专业咨询服务", "咨询师同时为来访者所在单位的多名同事提供咨询服务"], "a": [0, 1, 2, 4], "e": "双重关系指咨询师与来访者除专业咨询关系外,还存在其他社会关系,可能影响咨询师的专业判断,损害来访者利益,商业合作、亲属、朋友关系都属于禁止的双重关系;仅提供正常咨询服务不属于双重关系,因此D错误。", "type": "multi"}, {"q": "90项症状清单(SCL-90)是临床常用的心理健康筛查量表,下列属于该量表包含的因子维度的是?", "o": ["躯体化", "强迫症状", "人际关系敏感", "精神病性", "应对方式"], "a": [0, 1, 2, 3], "e": "SCL-90共包含9个核心因子,分别为躯体化、强迫症状、人际关系敏感、抑郁、焦虑、敌对、恐怖、偏执、精神病性,应对方式不属于SCL-90的因子范畴,因此E选项错误。", "type": "multi"}, {"q": "咨询过程中因求助者核心问题发生变化,需要调整原有咨询方案时,下列符合专业规范的处理方式是?", "o": ["与求助者共同协商方案变更的原因与具体调整内容", "为提升咨询效率直接修改方案无需告知求助者", "重新确认变更后的方案符合双方共同的咨询需求", "完整记录方案变更内容并由双方签字确认", "无需遵循流程即可根据咨询师经验随意变更方案"], "a": [0, 2, 3], "e": "根据心理咨询专业规范,变更咨询方案必须与求助者共同协商,确认变更内容符合双方需求,完整记录变更内容并签字确认;直接修改、随意变更均违反专业咨询要求,因此B、E选项错误。", "type": "multi"}, {"q": "咨询过程中求助者产生的阻抗会阻碍咨询推进,下列属于常见阻抗类型的是?", "o": ["内容阻抗", "情绪阻抗", "关系阻抗", "讲话方式阻抗", "主动情绪宣泄"], "a": [0, 1, 2, 3], "e": "心理咨询中常见的阻抗类型包括内容阻抗、情绪阻抗、关系阻抗、讲话方式阻抗四类;主动进行情绪宣泄是求助者正常的咨询表达,不属于阻抗,因此E选项错误。", "type": "multi"}, {"q": "下列关于求助者中心疗法各治疗阶段的特征,描述正确的是?", "o": ["初始阶段:求助者对自我感受僵化封闭,拒绝表达内心真实想法", "成长过渡阶段:求助者开始自由谈论外在事件,但仍回避内在感受", "中期防御阶段:求助者开始表达当下真实感受,但仍存在防御顾虑", "成熟结束阶段:求助者能够完全接纳真实自我,咨询目标基本达成", "全程咨询阶段:咨询师需要主动直接指导求助者调整行为模式"], "a": [0, 1, 2, 3], "e": "求助者中心疗法遵循非指导性咨询原则,咨询师不会直接指导求助者的行为改变,因此E选项错误,其余选项均符合该疗法的阶段特征描述。", "type": "multi"}, {"q": "初诊接待阶段,咨询师需要向求助者明确告知的保密原则相关内容包括?", "o": ["所有咨询内容均需绝对保密,不存在任何保密例外", "保密范围覆盖咨询过程中的口头沟通内容与书面记录材料", "需明确告知求助者保密原则的例外情形与触发条件", "只有司法机关依法调阅时才能披露求助者的咨询信息", "未经求助者书面同意,不会向任何第三方泄露咨询内容"], "a": [1, 2, 4], "e": "初诊接待阶段咨询师必须向求助者明确保密原则的相关内容:保密范围涵盖所有咨询相关的口头和书面内容,需要明确说明保密例外的情形与触发条件,承诺未经同意不泄露内容。A选项错误,咨询存在法定保密例外;D选项错误,保密例外除司法依法调阅外,还包括求助者有自伤、伤人风险等法定情形,表述不全面,因此AD错误。", "type": "multi"}, {"q": "即时化技术是心理咨询常用的参与性技术,下列属于即时化技术正确应用方式的是?", "o": ["咨询师主动关注当下咨询过程中的互动状态", "引导求助者聚焦于当前的情绪感受与体验", "直接讨论当前咨询互动中出现的矛盾与问题", "引导求助者回顾成长过程中的早期创伤经历", "帮助求助者预测未来生活中可能出现的行为变化"], "a": [0, 1, 2], "e": "即时化技术的核心是聚焦当下咨询互动与感受,核心内容包括关注当下的咨询互动、引导求助者觉察当下感受、讨论当前互动中的问题;回顾过往经历、预测未来变化均不属于即时化技术的应用范畴,因此DE错误。", "type": "multi"}, {"q": "系统脱敏疗法是治疗特定恐惧症的常用行为疗法,实施过程中需要遵循的操作规范包括?", "o": ["焦虑等级划分需要保持均匀梯度,相邻等级之间的差异不宜过大", "如果求助者在某一焦虑等级出现强烈焦虑反应,需要退回上一等级重新适应", "脱敏前的放松训练需要帮助求助者达到肌肉完全松弛的状态", "可以配合使用阳性强化物,帮助求助者更快适应放松状态", "为保证脱敏效果,可无需征得求助者同意直接开展训练"], "a": [0, 1, 2, 3], "e": "系统脱敏疗法的操作规范要求:均匀划分焦虑等级,若求助者在某一等级出现强烈焦虑需退回上一级重新适应,训练前需达到充分放松,可结合阳性强化加速进程;所有咨询操作都必须提前征得求助者知情同意,因此E选项错误。", "type": "multi"}, {"q": "按照心理咨询职业伦理规范,咨询过程中求助者依法享有的权利包括?", "o": ["有权了解咨询师的受训背景与执业资质信息", "有权选择或更换符合自身需求的执业咨询师", "有权拒绝咨询方案中不符合自身需求的内容", "有权要求咨询师对所有咨询内容绝对保密", "有权随时终止咨询且无需说明任何理由"], "a": [0, 1, 2], "e": "求助者享有了解咨询师资质、更换咨询师、拒绝不合理方案的权利;但咨询存在法定保密例外,并非所有内容都需要绝对保密,因此D错误;求助者终止咨询需要提前与咨询师沟通,并非无需任何理由即可随时终止,因此E错误。", "type": "multi"}, {"q": "摄入性会谈是搜集求助者临床资料的核心方式,实施过程中咨询师需要注意的事项包括?", "o": ["避免使用带有评判性的语言对求助者的问题进行评价", "会谈过程中可随意打断求助者的表述以控制时间", "会谈结束后需要及时整理并完整记录会谈内容", "可根据自身经验提前对求助者的问题做出主观推断", "会谈开始前需要明确本次会谈的核心目标与范围"], "a": [0, 2, 4], "e": "摄入性会谈的注意事项包括:提前明确会谈目标、避免使用评判性语言、不随意打断求助者表达、不进行主观推断、会谈后及时记录整理。随意打断求助者会影响其表达意愿,主观推断会影响资料的客观性与真实性,因此BD错误。", "type": "multi"}, {"q": "自我暴露是心理咨询中常用的影响性技术,咨询师使用自我暴露技术时需要遵循的原则包括?", "o": ["暴露的内容需要与当前咨询的主题紧密相关", "暴露的深度和程度需要匹配当前咨询关系的进展程度", "自我暴露需要以满足求助者的咨询需求为核心", "需要详细暴露咨询师自身的私人生活细节以获得信任", "可以随意进行自我暴露以拉近和求助者的心理距离"], "a": [0, 1, 2], "e": "自我暴露技术的应用原则为:暴露内容紧扣当前咨询主题、暴露程度匹配咨询关系进展、始终以求助者的需求为核心;过度暴露私人生活细节或随意暴露会破坏专业咨询边界,对咨询进程产生不利影响,因此DE错误。", "type": "multi"}, {"q": "放松训练是心理咨询中常用的行为训练技术,下列属于临床常见放松训练类型的有?", "o": ["渐进式肌肉放松训练", "腹式深呼吸放松训练", "场景想象放松训练", "正念冥想放松训练", "冲击暴露放松训练"], "a": [0, 1, 2, 3], "e": "常见的放松训练类型包括渐进式肌肉放松、深呼吸放松、想象放松、正念冥想放松等;冲击疗法是一种专门的行为治疗方法,不属于放松训练的类型,因此E选项错误。", "type": "multi"}, {"q": "合理情绪疗法的核心理论基础是ABC理论,下列属于ABC理论核心要素的有?", "o": ["引发求助者情绪困扰的诱发事件A", "求助者对诱发事件所持有的信念B", "求助者产生的情绪和行为反应结果C", "咨询师针对问题采取的干预技术D", "咨询最终达成的咨询效果E"], "a": [0, 1, 2], "e": "合理情绪疗法ABC理论中,A代表诱发事件,B代表求助者对事件的信念,C代表由信念引发的情绪和行为结果;咨询师的干预措施和咨询效果不属于ABC理论的核心要素,因此DE错误。", "type": "multi"}, {"q": "咨询过程中咨询师识别到求助者出现阻抗行为时,符合专业规范的处理方式包括?", "o": ["坦诚地和求助者讨论咨询师观察到的阻抗现象", "直接指责求助者故意对抗咨询进程", "适当调整咨询的节奏与策略,缓解求助者的防御反应", "尊重求助者的防御反应,给予接纳和理解", "立即终止咨询避免双方矛盾冲突升级"], "a": [0, 2, 3], "e": "处理阻抗的正确方式为:坦诚和求助者讨论阻抗现象、尊重求助者的防御反应、适当调整咨询节奏与策略;直接指责会加剧求助者的阻抗,立即终止咨询是不专业的极端处理方式,因此BE错误。", "type": "multi"}, {"q": "咨询过程中求助者对咨询师产生移情现象时,咨询师恰当的处理方式包括?", "o": ["始终保持 ,不能自行修改内容", "引导受测者凭第一感觉快速作答,不要过度思考拖延时间", "要求受测者每一道题目只能选择一个答案,不能漏答题目", "提醒受测者尽量不要选择中性答案,不确定时也要做出倾向性选择", "该测验有严格的时间限制,超过规定时间作答则测验无效"], "a": [0, 1, 2, 3], "e": "16PF施测没有严格的时间限制,因此E选项表述错误,其余选项均为16PF施测需要遵循的正确注意事项。", "type": "multi"}, {"q": "心理学中判断个体心理活动正常与异常的三项基本原则包括下列哪些?", "o": ["主观世界与客观世界保持统一性原则", "个体内部心理活动保持内在协调性原则", "个体的人格保持相对稳定性原则", "情绪反应与外界刺激完全匹配原则", "个体社会功能保持完全正常原则"], "a": [0, 1, 2], "e": "判断心理正常与异常的官方规定三项基本原则为:主观世界与客观世界统一性、心理活动内在协调性、人格相对稳定性。D、E选项不属于规定的三项基本原则范畴,因此错误。", "type": "multi"}, {"q": "关于合理情绪疗法的ABC理论,下列表述正确的有哪些?", "o": ["A代表引发求助者情绪困扰的诱发事件", "B代表求助者对诱发事件所持的信念、看法和解释", "C代表诱发事件后个体产生的情绪和行为结果", "诱发事件A是引发情绪行为反应的直接原因", "个体的信念B才是引发情绪行为反应的直接原因"], "a": [0, 1, 2, 4], "e": "合理情绪疗法ABC理论中,引发情绪和行为结果C的直接原因是个体对事件的信念B,而非诱发事件A本身,因此D选项表述错误,其余选项均符合ABC理论的核心定义。", "type": "multi"}, {"q": "系统脱敏法的标准操作流程包括下列哪些步骤?", "o": ["协助求助者建立焦虑等级量表,所有刺激按照从低到高排序", "正式脱敏前先让求助者掌握肌肉放松训练的技巧", "脱敏训练需要按照焦虑等级从高到低的顺序逐级进行", "当求助者在某一等级刺激下不再产生焦虑反应时,即可进入下一等级", "首次训练直接将求助者暴露在最高等级的焦虑场景中"], "a": [0, 1, 3], "e": "系统脱敏法的规范操作是从最低等级的焦虑刺激开始,逐级向上脱敏,因此C选项从高到低排序表述错误;直接暴露在最高等级焦虑场景是满灌疗法的操作,不属于系统脱敏法,因此E选项错误。其余选项均符合系统脱敏法的标准操作流程。", "type": "multi"}, {"q": "下列哪些情况属于心理咨询的保密例外情形?", "o": ["求助者明确告诉咨询师自己已经制定了详细的自杀计划", "求助者向咨询师倾诉自己在恋爱中遇到的情感烦恼", "求助者明确说明自己准备伤害和自己有矛盾的同事", "公安机关依法办理案件,要求咨询师提供相关咨询记录", "求助者向咨询师吐槽单位同事的工作态度问题"], "a": [0, 2, 3], "e": "保密例外的情形主要包括:求助者存在伤害自身或他人的明确风险、公检法等司法机关依法要求调取咨询资料等情况。B和E都属于正常的咨询内容,没有突破保密原则的必要,不属于保密例外,因此BE错误。", "type": "multi"}, {"q": "下列哪些场景适合使用阳性强化法进行行为干预?", "o": ["矫正儿童的多动、注意力不集中行为", "对存在社交障碍的求助者开展社交技能训练", "改善精神分裂症急性期患者的幻觉妄想症状", "塑造培养儿童养成良好的日常行为习惯", "逐步消退求助者已经形成的不良行为习惯"], "a": [0, 1, 3, 4], "e": "阳性强化法主要用于行为矫正和行为塑造,精神分裂症急性期的幻觉妄想症状需要优先以药物治疗为主,阳性强化法无法作为主要干预手段,因此C选项错误,其余选项均属于阳性强化法的适用范围。", "type": "multi"}, {"q": "初诊接待在整个心理咨询过程中的作用包括下列哪些?", "o": ["帮助心理咨询师和求助者之间建立良好的咨询关系", "搜集整理求助者的相关资料,为后续初步评估打下基础", "直接解决求助者前来咨询的核心心理困扰", "给求助者提供安全的表达空间,帮助求助者释放压抑的情绪", "让求助者在初诊阶段就感受到被接纳、被理解的氛围"], "a": [0, 1, 3, 4], "e": "初诊接待的核心作用是建立咨询关系、搜集相关资料、提供情绪宣泄的空间,并不直接解决求助者的核心困扰,核心问题的解决需要在后续咨询阶段开展,因此C选项表述错误,其余选项均为初诊接待的正确作用。", "type": "multi"}, {"q": "关于焦虑自评量表(SAS),下列表述正确的有哪些?", "o": ["该量表用于评估求助者主观感受到的焦虑程度", "中国常模的阳性筛查分界值为总分超过50分", "量表共包含20个项目,其中10个为正向计分,10个为反向计分", "该量表可以直接用于临床诊断焦虑症", "量表总分越高,说明求助者的焦虑程度越轻"], "a": [0, 1, 2], "e": "焦虑自评量表SAS仅可用于焦虑症状的初步筛查,无法直接对焦虑症做出临床诊断,因此D选项错误;SAS的总分越高,代表求助者感受到的焦虑程度越重,因此E选项错误。其余选项均符合SAS的基本特点。", "type": "multi"}, {"q": "关于抑郁自评量表(SDS),下列表述正确的有哪些?", "o": ["该量表用于评估求助者主观感受到的抑郁症状水平", "中国常模的阳性筛查标准为总分超过53分", "量表共包含20个项目,其中10个正向计分,10个反向计分", "总分低于50分即可判定为无抑郁症状", "该量表可以直接用于抑郁症的临床诊断"], "a": [0, 1, 2], "e": "抑郁自评量表SDS仅可用于抑郁症状的初步筛查,不能直接用于抑郁症的临床诊断,因此E选项错误;中国常模中SDS总分低于53分才可以判定为无抑郁症状,因此D选项表述错误。其余选项均符合SDS的基本特点,表述正确。", "type": "multi"}, {"q": "下列选项中,属于心理咨询中建立良好咨询关系的核心要素的有哪些?", "o": ["咨询师对求助者保持尊重", "咨询师对求助者表达热情", "咨询师对求助者保持真诚", "咨询师能够准确对求助者做出共情", "咨询师对求助者保持积极关注"], "a": [0, 1, 2, 3, 4], "e": "建立良好咨询关系的五大核心要素分别是尊重、热情、真诚、共情、积极关注,所有选项均为正确要素,因此全选。", "type": "multi"}, {"q": "初诊接待开展摄入性会谈时,下列提问方式中属于心理咨询师需要避免的不当提问有哪些?", "o": ["“你为什么会产生这样的想法呢?”", "没有实际指导意义的修饰性反问"], "a": [0, 2, 3, 4], "e": "开放式提问是摄入性会谈中推荐使用的提问方式,能够帮助求助者充分表达自己的问题,不属于不当提问,因此B选项错误。其余选项均属于初诊接待中需要避免的不当提问类型。", "type": "multi"}, {"q": "心理咨询师为求助者选择心理测验时,需要遵循的原则包括下列哪些?", "o": ["针对性原则,根据求助者的具体问题选择匹配的测验", "常模匹配原则,选择的测验常模需要符合求助者所在群体", "经济性原则,优先选择收费更低的心理测验", "标准化原则,选择经过标准化信效度检验的测验", "实用性原则,结合测验实施的难度选择合适的测验"], "a": [0, 1, 3, 4], "e": "心理咨询师选择心理测验时,核心依据是求助者的问题、测验的科学性和适用性,不能将价格高低作为选择的核心标准,因此C选项表述错误,其余选项均为选择心理测验的正确原则。", "type": "multi"}, {"q": "当求助者出现下列哪些情况时,心理咨询师适合使用具体化技术?", "o": ["求助者对自身问题的表述模糊笼统,无法清晰说明具体情况", "求助者情绪激动,无法平静下来表达自身感受", "求助者存在言行不一致的矛盾表现", "求助者对自己问题的表述混乱不清,逻辑杂乱", "求助者已经清晰主动说出了具体的问题和感受"], "a": [0, 3], "e": "具体化技术主要适用于求助者对问题表述模糊、混乱不清的情况,帮助咨询师明确求助者的具体问题。B选项情绪激动时需要先安抚情绪,不适合优先使用具体化;C选项言行不一致的情况适合使用面质技术,不适合具体化;E选项求助者已经表述清晰,不需要使用具体化技术,因此BCE错误。", "type": "multi"}, {"q": "心理咨询过程中,求助者对咨询师产生移情反应后,咨询师符合专业要求的处理方法有哪些?", "o": ["始终保持中立专业的咨询立场", "温和地将咨询焦点拉回到原定的咨询主题中", "直接生硬拒绝求助者的情感投射", "为了维持关系迎合求助者的情感需求", "若无法妥善处理可适时转介或调整咨询方案"], "a": [0, 1, 4], "e": "直接拒绝求助者会伤害咨询关系,迎合需求违背专业伦理,因此C、D错误。保持中立立场、引导求助者回到咨询主题、必要时转介调整方案,都是处理移情的正确专业做法。", "type": "multi"}, {"q": "以下选项中,属于一份规范完整的心理咨询方案必须包含的内容有哪些?", "o": ["明确的咨询目标、咨询次数与时间安排", "咨询将采用的具体方法、对应原理及实施过程", "咨询过程中双方各自的权利与义务", "求助者的所有家庭成员详细隐私信息", "咨询相关的费用收费标准"], "a": [0, 1, 2, 4], "e": "求助者无关隐私不属于心理咨询方案需要涵盖的内容,D选项错误,其余选项均为心理咨询方案的标准必备内容。", "type": "multi"}, {"q": "在开展摄入性会谈工作时,心理咨询师搜集求助者相关资料的符合专业规范的途径包括?", "o": ["求助者提前填写的心理咨询登记表格", "和求助者进行的一对一直接会谈沟通", "会谈过程中观察求助者的言行举止状态", "求助者家属主动提供的求助者相关背景信息", "根据过往经验主观推测求助者未提及的潜在问题"], "a": [0, 1, 2, 3], "e": "主观推测属于无依据臆断,不属于正规的资料搜集途径,E选项错误,其余选项均为符合专业规范的资料搜集方式。", "type": "multi"}, {"q": "对求助者的问题进行初步诊断时,一般心理问题的核心评估要点包含以下哪些选项?", "o": ["情绪困扰由现实具体因素引发,反应和现实事件直接相关", "不良情绪持续时间通常不超过2个月", "社会功能未受到严重损害,基本可以正常完成工作学习任务", "情绪反应没有出现泛化,仅针对最初引发情绪的事件", "通常伴随明显的精神病性症状"], "a": [0, 1, 2, 3], "e": "一般心理问题不会出现精神病性症状,E选项错误,其余选项均为一般心理问题的核心评估标准。", "type": "multi"}, {"q": "临床心理咨询中,常用的标准化放松训练类型包含以下哪几项?", "o": ["呼吸放松法", "渐进式肌肉放松法", "想象放松法", "深度催眠放松法", "药物辅助放松法"], "a": [0, 1, 2], "e": "催眠放松不属于心理咨询临床常用的标准化放松训练类型,药物放松属于医学干预手段,不属于心理咨询常规放松训练范畴,因此D、E选项错误,A、B、C均为临床常用的放松训练方法。", "type": "multi"}, {"q": "艾森克人格问卷(EPQ)包含的正式维度有以下哪几项?", "o": ["内外向维度(E)", "神经质维度(N)", "精神质维度(P)", "掩饰性维度(L)", "焦虑性维度(A)"], "a": [0, 1, 2, 3], "e": "焦虑性不属于艾森克人格问卷的正式维度,EPQ的四个维度为内外向、神经质、精神质、掩饰性,因此E选项错误,其余选项均正确。", "type": "multi"}, {"q": "执业心理咨询师需要遵守的保密原则,下列表述正确的有哪些?", "o": ["需要对求助者透露的所有个人信息严格保密", "未经求助者本人同意,不得随意披露求助者的咨询内容", "司法机关按照法定程序依法调取相关信息时,可以披露对应内容", "只要是为了求助者的利益,可以随意披露求助者的隐私", "和督导讨论案例时,需要隐去可以识别出求助者身份的信息"], "a": [0, 1, 2, 4], "e": "即便是为了求助者利益,也不能随意披露求助者隐私,随意披露违背心理咨询职业伦理,因此D选项错误,其余选项均符合保密原则的要求。", "type": "multi"}, {"q": "心理咨询中使用面质技术时,应当注意的事项包含下列哪几项?", "o": ["必须以事实依据作为前提,避免无依据面质", "不能把面质当成发泄个人情绪的渠道", "避免对求助者进行无情的攻击和指责", "可以根据情况使用尝试性的面质", "需要一次性直接指出求助者所有存在的矛盾点"], "a": [0, 1, 2, 3], "e": "一次性直接指出求助者所有矛盾点,容易引发求助者的抵触和防御,不利于咨询推进,因此E选项错误,其余选项均为使用面质技术的正确注意事项。", "type": "multi"}, {"q": "90项症状自评量表(SCL-90)包含的因子有以下哪些选项?", "o": ["躯体化因子", "强迫症状因子", "人际关系敏感因子", "抑郁、焦虑因子", "精神病性因子"], "a": [0, 1, 2, 3, 4], "e": "SCL-90一共包含10个因子,题目中的所有选项都属于其官方规定的因子范畴,因此全部正确。", "type": "multi"}, {"q": "初诊接待过程中,属于避免提问失误的正确做法有哪些?", "o": ["避免使用无法 , "e": "说谎量表L属于MMPI的效度量表,用于检验受测者的作答态度,不属于临床量表,因此D错误,其余选项均属于MMPI的临床量表。", "type": "multi"}, {"q": "摄入性会谈是心理咨询中收集资料的核心技术,下列符合摄入性会谈操作规范的有哪些?", "o": ["会谈过程中尽量不随意打断求助者的表达,给求助者足够的表达空间", "会谈过程中可以插入一些无关话题,帮助求助者放松情绪", "会谈结束后需要及时整理完整的会谈记录,保证信息完整", "会谈过程中咨询师需要保持中立态度,不随意评判求助者的言行"], "a": [0, 2, 4], "e": "摄入性会谈要求避免插入与会谈无关的话题,也不能使用诱导性提问,避免影响求助者表达的客观性,因此B、D错误,其余选项均符合摄入性会谈的操作规范。", "type": "multi"}, {"q": "心理咨询过程中,出现下列哪些情况时,心理咨询师可以和求助者协商变更既定的咨询方案?", "o": ["咨询一段时间后,求助者的症状和问题出现了明显的变化", "当前咨询进度刚好完成了原定咨询目标的一半", "咨询师评估后发现初始制定的咨询方案不适用于当前求助者", "求助者因为自身安排原因,提出调整咨询的时间与频率", "咨询机构整体更换了办公场地,位置发生变化"], "a": [0, 2, 3], "e": "咨询方案变更需要基于求助者的问题变化或者方案适配性问题,仅仅完成一半咨询目标、机构更换场地不属于需要变更咨询方案的合理理由,因此B、E错误,其余选项均属于合理变更咨询方案的情况。", "type": "multi"}, {"q": "瑞文推理测验是常用的团体智力筛查量表,下列属于瑞文测验适用场景的有哪些?", "o": ["智力发育异常人群的智力水平初步评估", "不同文化背景群体的跨文化智力筛查", "儿童青少年群体的智力发展水平评估", "精神分裂症急性期患者幻觉症状的临床干预", "老年人群智力退行性改变的初步评估"], "a": [0, 1, 2, 4], "e": "瑞文测验属于智力评估工具,仅用于评估智力水平,无法用于精神分裂症幻觉症状的干预,因此D错误,其余选项均符合瑞文测验的适用范围。", "type": "multi"}, {"q": "放松训练是心理咨询中常用的情绪调节技术,它可以有效缓解下列哪些情绪相关问题?", "o": ["重要考试前出现的过度考试焦虑", "社交场合中出现的过度紧张社交焦虑", "急性精神分裂症发作带来的情绪紊乱", "难治性人格障碍的核心情绪症状", "已经出现严重自杀倾向的抑郁情绪"], "a": [0, 1], "e": "急性精神分裂症发作、严重自杀倾向、人格障碍核心症状都需要专业的精神医学干预,放松训练无法有效缓解这些问题,因此C、D、E错误,放松训练可用于缓解轻度到中度的焦虑情绪问题,因此AB正确。", "type": "multi"}, {"q": "抑郁自评量表SDS是常用的抑郁筛查工具,下列关于SDS计分规则的说法,正确的有哪些?", "o": ["SDS共包含20个评定项目,其中10个项目为反向计分项目", "正向计分项目中,得分越高说明受测者抑郁程度越轻", "依据中国常模标准,SDS总分≥53分即可判定为抑郁筛查阳性", "SDS的总得分越高,代表受测者的抑郁程度越严重", "SDS结果可以直接用于抑郁症的临床确诊"], "a": [0, 2, 3], "e": "SDS的正向计分项目得分越高,抑郁程度越重,且SDS仅用于抑郁症状筛查,不能直接确诊抑郁症,因此B、E错误,其余选项均符合SDS的计分规则与使用要求。", "type": "multi"}, {"q": "面质是心理咨询中常用的影响性技术,下列属于面质技术适用场景的有哪些?", "o": ["求助者的言行之间存在明显的不一致", "求助者不同时间的表述之间存在矛盾冲突", "求助者对自身存在的问题认识模糊不清", "求助者的想法和现实之间存在明显的不一致", "求助者主动向咨询师提出想要获得直接的反馈"], "a": [0, 1, 3, 4], "e": "当求助者对自身问题认识模糊时,适合使用具体化技术来澄清问题,不属于面质技术的适用场景,因此C错误,其余选项均符合面质技术的适用场景。", "type": "multi"}, {"q": "许又新教授提出的神经症临床评定方法中,评分标准包含的维度有哪些?", "o": ["症状的持续病程长短", "患者主观感受到的精神痛苦程度", "患者社会功能的受损情况", "患者情绪反应的泛化范围", "患者心理冲突的性质"], "a": [0, 1, 2], "e": "许又新神经症临床评分标准的三个核心维度为病程、精神痛苦程度、社会功能受损情况,情绪反应泛化范围、心理冲突性质不属于该评分标准的维度,因此D、E错误,本题选ABC。", "type": "multi"}, {"q": "心理咨询过程中,求助者的阻抗会影响咨询进展,下列属于阻抗常见表现形式的有哪些?", "o": ["咨询过程中始终沉默不语,拒绝回答咨询师提出的相关问题", "全程过度多话,一直谈论无关内容回避核心问题", "主动向咨询师分享自己内心的真实感受与过往经历", "完全遗忘和咨询核心主题相关的重要个人经历", "多次以各种理由推迟或者取消约定好的咨询预约"], "a": [0, 1, 3, 4], "e": "主动向咨询师分享真实感受与经历属于积极配合咨询的行为,不属于阻抗表现,因此C错误,其余选项均为阻抗的常见表现形式。", "type": "multi"}, {"q": "合理情绪疗法(RET)分为多个阶段,修通阶段是帮助求助者改变不合理信念的核心阶段,下列属于修通阶段常用干预技术的有哪些?", "o": ["咨询师和求助者的不合理信念进行辩论", "合理情绪想象技术", "布置家庭作业,比如使用RET自助表练习", "放松训练", "和求助者建立良好的咨询关系"], "a": [0, 1, 2, 3], "e": "建立良好咨询关系属于咨询初始阶段的工作内容,不属于修通阶段的专属干预技术,因此E错误,其余选项均为合理情绪疗法修通阶段的常用技术。", "type": "multi"}, {"q": "下列哪些情形下,心理咨询师可以依法突破保密原则,公开求助者的相关咨询信息?", "o": ["求助者告知咨询师自己已经做好准备,三日内实施自杀行为", "求助者提及自己五年前曾小偷小摸过一台旧手机", "公安机关办案需要,依法持正式文书调取求助者的咨询记录", "求助者明确说要报复伤害他人,且已经准备好了作案工具", "求助者的父母反复向咨询师索要孩子咨询的具体内容"], "a": [0, 2, 3], "e": "保密原则的例外仅包含涉及自身或他人生命安全的紧急情况、司法机关依法调取等法定情形,普通的过往轻微违法行为不涉及重大伤害,无需打破保密;家属要求获取咨询内容必须征得求助者本人同意,因此B、E错误,A、C、D符合保密例外的要求。", "type": "multi"}, {"q": "关于心理测验信度与效度的概念和相互关系,下列表述正确的有?", "o": ["只要测验的信度达标,测验的效度就一定合格", "测验效度能够达到要求的前提,一定是信度达标", "信度用来描述测验结果的一致性和稳定性水平", "效度用来描述测验结果的准确性和有效性程度", "所有标准化出版的心理测验,不需要验证就能保证信效度合格"], "a": [1, 2, 3], "e": "信度高是效度高的必要非充分条件,仅信度高无法保证效度一定高,因此A错误;标准化仅代表测验编制流程规范,仍需要后续实证研究验证其信效度,因此E错误;B选项中,效度高说明测验结果准确稳定,因此信度必然达标,表述正确;C、D分别是信度和效度的正确定义,因此正确答案为BCD。", "type": "multi"}, {"q": "合理情绪疗法在心理咨询中设定的核心咨询目标包含下列哪些内容?", "o": ["降低求助者当前的负面情绪强度,缓解情绪困扰", "协助求助者调整原有的不合理认知,建立更理性的信念系统", "彻底清除求助者生活中所有的负面情绪反应", "帮助求助者学会自我调整,获得长期稳定的心理平衡", "让求助者能够完全适应所有不理想的现实生活环境"], "a": [0, 1, 3], "e": "合理情绪疗法的目标是减少情绪困扰、建立合理信念、帮助求助者获得长期心理平衡,不可能也不追求消除所有情绪反应、要求个体适应所有现实环境,这两类目标不符合心理咨询的实际,因此C、E错误,A、B、D为正确核心目标。", "type": "multi"}, {"q": "下列哪些情况中,心理咨询师需要按照规范将求助者转介给其他合适的专业人员?", "o": ["咨询师发现求助者是自己孩子学校的班主任,存在工作上的交集利益", "求助者求助的议题,咨询师从未接受过相关专业训练", "求助者觉得当前咨询师风格不适合自己,提出想换一位咨询师咨询", "咨询师因为要出国访学半年,无法继续为求助者提供定期咨询", "求助者的问题属于精神病性障碍范畴,超出了心理咨询的工作范围"], "a": [0, 1, 3, 4], "e": "按照转介原则,当咨询师和求助者存在双重关系/利益冲突、咨询师不熟悉该类问题、咨询师个人原因无法继续、问题超出咨询师专业范围时,均需要转介;求助者主动提出更换咨询师属于双方协商内容,并非必须转介的法定要求,因此C错误,A、B、D、E正确。", "type": "multi"}, {"q": "下列选项中,属于心理咨询师职业伦理基本要求的有哪些?", "o": ["咨询过程保持价值中立,避免和求助者建立咨询以外的双重关系", "必须严格遵守保密原则,任何情况下都不能泄露求助者信息", "不能向求助者承诺100%解决问题、一定能获得痊愈的绝对效果", "可以根据求助者的经济情况随意调整收费,无需提前约定", "仅在自身已经接受专业训练的专业范围内提供咨询服务"], "a": [0, 2, 4], "e": "心理咨询的保密原则存在法定例外情况,比如涉及生命安全、司法依法调取等,因此并非任何情况都不能泄露,B错误;咨询收费必须按照提前约定的标准执行,不能自行随意调整,因此D错误;A、C、E均符合职业伦理的基本要求,为正确选项。", "type": "multi"}, {"q": "合理情绪疗法总结的常见不合理信念,核心特征包含下列哪些选项?", "o": ["对自己或他人提出绝对化要求,认为事情必须按照自己预期发展", "以偏概全,根据一件小事就对个体整体做出极端概括评价", "习惯把小概率不良事件预判为灾难性的无法承受的结果", "要求自己任何时候都要保持情绪平稳稳定", "要求所有人的行为都符合统一的社会标准"], "a": [0, 1, 2], "e": "合理情绪疗法中,明确不合理信念的三个核心特征是绝对化要求、过分概括化、糟糕至极;D选项的情绪稳定自我要求、E选项的行为统一标准不属于典型的不合理信念核心特征,因此D、E错误,正确答案为ABC。", "type": "multi"}, {"q": "在个体心理咨询过程中,求助者出现的沉默属于常见类型的有哪些?", "o": ["求助者对咨询师不够信任,对谈论隐私内容犹豫不决,属于怀疑型沉默", "求助er不知道自己该说什么,不清楚咨询师想要自己表达什么,属于茫然型沉默", "求助者因为当前出现了强烈的情绪,比如感到愤怒羞愧,暂时无法说话,属于情绪型沉默", "求助者话太多不停表达,打断咨询节奏,属于多话型沉默"], "a": [0, 1, 2, 3], "e": "多话是咨询中独立的阻抗表现类型,不属于沉默的类别,因此E错误;怀疑型、茫然型、情绪型、反抗型均为咨询中常见的沉默类型,因此正确答案为ABCD。", "type": "multi"}, {"q": "在初诊接待阶段进行摄入性会谈时,话题选择需要遵循哪些原则?", "o": ["话题需要围绕求助者主动提出的核心困扰和主诉展开", "话题的深度和难度要符合求助者的文化水平和理解能力", "可以为了拓展内容,随意引入和求助者主诉无关的话题", "为了获取完整资料,直接询问求助者最隐私的敏感问题", "话题选择保持中立,不偏向某一方的立场或观点"], "a": [0, 1, 4], "e": "摄入性会谈的核心目的是收集求助者的相关资料,必须围绕核心主诉展开,不能随意引入无关话题,同时需要尊重求助者的边界,不能直接强制询问隐私问题,因此C、D错误;A、B、E均符合摄入性会谈话题选择的原则,为正确选项。", "type": "multi"}, {"q": "求助者中心疗法中,咨询师需要掌握的核心咨询技术包含下列哪些选项?", "o": ["站在求助者的角度体验其内心世界,做到设身处地的理解", "对求助者的所有感受和表达给予无条件的积极关注", "咨询师坦诚开放的和求助者交流,不刻意隐藏自己的真实感受", "主动指导求助者解决具体的生活问题,给出明确的解决方案", "主动指出求助者的不合理信念,帮助其调整认知偏差"], "a": [0, 1, 2], "e": "求助者中心疗法强调求助者是咨询的主导,咨询师不主张直接指导求助者解决具体问题,也不主动解释和纠正求助者的不合理信念,因此D、E错误;设身处地理解、无条件积极关注、坦诚交流是求助者中心疗法的三大核心技术,因此正确答案为ABC。", "type": "multi"}, {"q": "心理咨询进入终止阶段时,咨询师需要注意的事项包含下列哪些?", "o": ["按照咨询计划提前告知求助者咨询即将终止的时间", "关注求助者因为离别产生的情绪反应,妥善处理分离焦虑", "如果求助者不愿意结束,可以直接终止咨询无需提前告知", "为了保证求助者完全适应,无限延长咨询时间直到求助者满意", "如果需要转介其他咨询师,转介前要做好各项准备工作"], "a": [0, 1, 4], "e": "咨询终止需要按照计划提前告知求助者,不能直接突然终止,同时不能随意无限制延长咨询时间,不符合咨询设置的要求,因此C、D错误;提前告知时间、处理离别情绪、转介前 会规范、攻击他人财物等行为为核心,题干未提及,排除B;对立违抗障碍以对抗权威、违抗规则为核心,题干未提及,排除C;特定学习障碍以特定学习能力缺陷为核心,排除D;焦虑障碍核心为情绪焦虑,不符合题干表现,排除E。", "type": "single"}, {"q": "求助者,女,48岁,退休会计,近三个月来情绪低落,对以前喜欢的跳广场舞、织毛衣都失去了兴趣,经常觉得乏力,入睡困难,食欲下降,觉得自己“是家里的累赘”,病程超过2周。根据人本主义疗法的核心条件,咨询师首先需要做到的是?", "o": ["给求助者提供具体的调整生活的建议", "无条件积极关注求助者的情绪体验", "直接指出求助者自我评价过低的错误", "帮助求助者进行认知重评纠正负性思维", "建议求助者去医院服用抗抑郁药物"], "a": 1, "e": "人本主义疗法的核心治疗条件包括无条件积极关注、真诚一致、共情,咨询师首先需要对求助者的情绪给予无条件积极关注,建立良好咨询关系,而非直接纠正、给出建议;A、C不符合人本主义的治疗原则,D是认知疗法的技术,不属于人本主义核心操作,E不属于心理咨询的工作范畴,因此排除。", "type": "single"}, {"q": "求助者,女,19岁,模特专业大学生,近半年来出现反复大量进食,一次能吃3份汉堡加炸鸡,吃完后又担心体重上涨,会自行用手抠喉催吐,体重在正常范围但仍坚持认为自己“太胖”,已经影响正常上课。该求助者最可能的初步评估是?", "o": ["神经性厌食症", "神经性贪食症", "暴食障碍", "躯体变形障碍", "抑郁发作"], "a": 1, "e": "神经性贪食症的核心特征是反复暴饮暴食、之后出现催吐、导泻等代偿行为,同时伴随对自身体重的过度关注,与题干描述完全吻合;神经性厌食症以主动限制进食、体重明显低于正常水平为核心,不符合题干,排除A;暴食障碍没有进食后的代偿行为(催吐),排除C;其余选项均不符合进食障碍的核心表现,排除。", "type": "single"}, {"q": "求助者,男,42岁,快递分拣员,近一年来反复出现“自己分拣快递会不会把病毒带回家传染给家人”的想法,明知道不对但没法控制,因此反复消毒快递和双手,影响了日常工作效率。该求助者的强迫思维属于哪一类型?", "o": ["强迫怀疑", "强迫性穷思竭虑", "强迫联想", "强迫表象", "强迫意向"], "a": 0, "e": "强迫怀疑指个体反复怀疑自身行为的正确性,反复担心未做好某件事,符合题干中反复怀疑自己携带病毒的表现;其余强迫思维类型均不符合该表现,强迫性穷思竭虑是反复思考无意义的问题,强迫联想是由一个观念联想到一系列相关观念,强迫表象是反复出现生动的画面,强迫意向是反复出现违背意愿的冲动意向,因此排除B、C、D、E。", "type": "single"}, {"q": "求助者,女,26岁,网店店主,近三个月来出现情绪异常高涨,每天只睡2-3小时就精力充沛,不停进货包装发货,说话滔滔不绝,说自己“马上就能做成全国最大的网店,赚好几个亿”,活动明显增多,已经没法正常经营店铺。该求助者最可能的初步评估是?", "o": ["抑郁发作", "躁狂发作", "混合发作", "环性心境障碍", "适应障碍"], "a": 1, "e": "躁狂发作的核心症状是情绪高涨、精力充沛、睡眠需求减少、自我评价过高、活动增多,完全符合题干描述;其余选项均没有典型的持续情绪高涨、精力充沛的核心表现,因此排除。", "type": "single"}, {"q": "求助者,男,62岁,退休工程师,近一年来情绪低落,对以前喜欢的摄影、下棋都失去了兴趣,经常感到浑身乏力,睡眠质量差,食欲下降,觉得自己“没用了,给孩子添麻烦”,病程超过2个月,全身检查未发现器质性病变。该求助者最可能的初步评估是?", "o": ["老年抑郁障碍", "正常老年情绪波动", "阿尔茨海默病", "血管性痴呆", "强迫障碍"], "a": 0, "e": "老年抑郁障碍的核心症状是情绪低落、兴趣减退、自我评价降低、睡眠食欲异常,病程超过2周,无器质性病变,与题干描述完全吻合;正常老年情绪波动症状轻,不会影响社会功能,排除B;阿尔茨海默病、血管性痴呆以认知功能减退为核心,不符合,排除C、D;强迫障碍核心为强迫症状,不符合,排除E。", "type": "single"}, {"q": "求助者,女,21岁,大专学生,近半年来总觉得室友在自己的水杯里下毒,认为全班同学都在背后说自己坏话,耳边经常能听到有人骂自己,不敢去教室上课,社会功能受损,未服用精神类药物。该求助者最可能的初步评估是?", "o": ["社交焦虑障碍", "精神分裂症", "强迫障碍", "抑郁发作", "创伤后应激障碍"], "a": 1, "e": "精神分裂症的核心特征是存在幻觉、妄想等精神病性症状,题干中的被害妄想、幻听均符合精神分裂症的典型表现;其余选项均不会出现典型的精神病性症状(妄想、幻觉),因此排除。", "type": "single"}, {"q": "求助者,女,28岁,护士,近一年来反复出现饭前便后洗手,每次洗手都要反复搓洗十几次,时长超过15分钟,明知道已经洗干净了但没法控制,已经影响了正常上班节奏。该求助者的强迫行为属于哪一类型?", "o": ["强迫检查", "强迫清洗", "强迫计数", "强迫仪式动作", "强迫询问"], "a": 1, "e": "强迫清洗的核心表现是反复洗手、洗澡、消毒等清洁行为,害怕被污染,符合题干描述;其余强迫行为类型均不符合:强迫检查是反复检查门窗、电源等是否关好,强迫计数是反复计数台阶、路面砖等,强迫仪式动作是按固定顺序完成特定动作,强迫询问是反复询问他人确认自己的行为,因此排除A、C、D、E。", "type": "single"}, {"q": "分数:1)求助者,男,48岁,出租车司机,近一年来和妻子沟通越来越少,经常因为家庭开支、老人赡养问题吵架,感到婚姻生活很压抑,觉得“这段婚姻已经没法继续了”,日常工作也受到影响。根据婚姻家庭心理咨询的核心目标,咨询师首先需要做的是?", "o": ["指责求助者的错误", "帮助求助者发泄情绪", "促进夫妻双方的有效沟通", "直接建议求助者离婚", "给求助者提供家庭开支规划建议"], "a": 2, "e": "婚姻家庭心理咨询的核心目标是改善家庭成员之间的沟通模式,促进有效沟通,从根源解决婚姻矛盾;A指责违反咨询中立原则,错误;B调整发泄情绪是次要目标,不是核心目标;D直接建议离婚违反咨询伦理;E提供开支规划不是婚姻咨询的核心目标,因此排除。", "type": "single"}, {"q": "求助者,男,17岁,高二学生,近半年来频繁旷课去网吧打游戏,多次故意殴打低年级同学索要财物,家长和老师多次管教无效,学习成绩从班级前10下滑到倒数,人际交往严重受损。该求助者的行为最可能的评估是?", "o": ["青少年期正常的同伴交往行为", "品行障碍", "对立违抗障碍", "注意缺陷多动障碍", "青春期抑郁发作"], "a": 1, "e": "品行障碍的核心诊断特征是长期反复违反社会规范、侵犯他人合法权利,题干中殴打勒索、频繁旷课符合该诊断;正常青少年同伴交往不会出现违反规则侵犯他人的行为,因此A错误;对立违抗障碍核心为对抗权威,不会出现严重侵犯他人的欺凌勒索行为,因此C错误;注意缺陷多动障碍核心为注意力不集中、活动过度,与题干表现不符,D错误;抑郁发作核心为持续情绪低落、兴趣减退,与题干不符,E错误。", "type": "single"}, {"q": "求助者,女,48岁,胃癌术后化疗期,近期情绪持续低落,觉得自己已经没有活下去的价值,对治疗完全提不起信心,入睡困难,食欲减退,日常生活和治疗配合度严重下降。根据健康心理学癌症患者的心理干预原则,以下最合适的干预方案是?", "o": ["要求患者必须配合治疗,强制完成化疗", "通过意义疗法帮助患者重新探索生命的价值与意义", "直接开具抗抑郁药物进行治疗", "优先关注肿瘤治疗,暂不处理情绪问题", "建议患者家属放弃激进治疗,回家休养"], "a": 1, "e": "意义疗法是针对重症患者心理干预的核心技术,可帮助患者重构生命意义,改善低落情绪,符合健康心理学心理干预的基本原则;强制治疗违反咨询伦理,A错误;药物治疗不属于心理干预范畴,不符合题干要求,C错误;忽略情绪问题会影响患者治疗配合度与生存质量,不利于康复,D错误;放弃治疗不符合医疗与干预规范,E错误。", "type": "single"}, {"q": "求助者,女,23岁,刚入职互联网公司,部门投票选部门新总监的时候,其他同事都投票给总经理推荐候选人,虽然求助者认为该候选人能力不足不适合岗位,但还是跟着投了赞成票,内心依旧不认可这个候选人。根据社会心理学从众理论,该行为属于?", "o": ["真从众", "权益从众", "反从众", "服从", "依从"], "a": 1, "e": "权益从众的定义是个体表面顺从群体的意见,内心依然保留自己不同的判断,与题干描述完全吻合;真从众指个体内心也认同群体的意见,与题干不符,A错误;反从众指个体故意反对群体的意见,不符合题干描述,C错误;服从是个体按照权威的命令行动,题干是群体压力而非权威命令,D错误;依从是个体按照他人的直接要求行动,不符合题干场景,E错误。", "type": "single"}, {"q": "求助者,男,32岁,经历严重的电梯坠落事故后,突然无法记起自己的身份信息、工作经历,对事故前的所有个人信息完全遗忘,到多家医院检查头颅CT、脑电图均未发现脑器质性损伤,该症状已经持续2个月。该求助者最可能的初步评估是?", "o": ["阿尔茨海默病", "分离性遗忘", "创伤后应激障碍", "抑郁性假性痴呆", "血管性痴呆"], "a": 1, "e": "分离性遗忘属于分离性障碍,核心表现为创伤后出现选择性的记忆丧失,无器质性脑病变基础,与题干描述完全吻合;阿尔茨海默病、血管性痴呆均存在进行性脑器质性病变,与题干检查结果不符,A、E错误;创伤后应激障碍核心表现为闯入性创伤回忆、回避、警觉性增高,不会出现完全的身份遗忘,C错误;抑郁性假性痴呆核心是抑郁情绪导致的认知功能下降,不会出现完全的身份记忆丧失,D错误。", "type": "single"}, {"q": "求助者,女,40岁,护士,近两年来对护理工作产生严重倦怠,觉得自己的护理工作没有任何价值,对患者失去耐心,工作效率严重下降。根据积极心理学的优势使用干预技术,以下最适合的干预方案是?", "o": ["让求助者每天写下3件让自己开心的小事", "帮助求助者识别自身的核心优势,并将优势应用到日常护理工作中", "帮助求助者进行认知重评,纠正对工作的消极想法", "建议求助者减少工作量,多出去旅游休闲", "建议求助者服用情绪调节类药物"], "a": 1, "e": "优势使用干预是积极心理学的核心干预技术,核心是帮助个体识别自身天生优势,并将优势重新应用到当前的工作生活中,提升满意度与价值感,与题干需求完全匹配;A选项属于感恩干预技术,不符合,A错误;C选项属于认知行为疗法的技术,不属于优势干预,C错误;D、E选项没有针对工作倦怠的核心问题结合优势干预进行处理,不符合要求,D、E错误。", "type": "single"}, {"q": "求助者,男,28岁,查到自己考上了目标院校的博士生,突然出现心跳加快、手舞足蹈、激动得在图书馆大喊出来,这种强烈的情绪状态属于?", "o": ["心境", "激情", "应激", "焦虑", "抑郁"], "a": 1, "e": "激情是一种强烈的、爆发式的、短暂的情绪状态,题干描述的突然爆发的激动状态完全符合激情的特征;心境是微弱、持久、弥散性的情绪状态,不符合题干爆发式的表现,A错误;应激是个体面对突发压力事件时的适应性情绪反应,题干是正性的激动事件,不是压力应对,C错误;焦虑和抑郁都是负性情绪,题干是正性的激动情绪,不符合,D、E错误。", "type": "single"}, {"q": "求助者,女,40岁,部门经理,认为“东北人都性格粗犷,不适合做精细的财务工作”,哪怕遇到非常细心严谨的东北籍财务人员,也依然坚持这个看法。根据社会心理学相关理论,该认知属于?", "o": ["首因效应", "近因效应", "刻板印象", "晕轮效应", "投射效应"], "a": 2, "e": "刻板印象指对某个特定群体形成固定、概括、笼统的看法,忽视群体内的个体差异,与题干描述完全吻合;首因效应是指第一次见面获得的信息影响更大,近因效应是最新获得的信息影响更大,晕轮效应是个体某一个优点掩盖其他特征,投射效应是将自己的特点投射到他人身上,都不符合群体固定认知的特点,A、B、D、E错误。", "type": "single"}, {"q": "1岁半男婴,母亲出门上班的时候会哭闹不安,母亲下班回家后,男婴立刻爬过去主动抱母亲,几分钟后就平静下来,自己去玩积木了。根据安斯沃斯的依恋理论,该婴儿的依恋类型属于?", "o": ["安全型依恋", "回避型依恋", "反抗型依恋", "混乱型依恋", "无依恋类型"], "a": 0, "e": "安全型依恋是健康的依恋类型,表现为母亲分离时会表现出不安,母亲重逢时主动寻求接触,很快就能平静下来继续探索游戏,和题干描述完全吻合;回避型依恋表现为母亲离开和回来都没有明显反应,反抗型依恋表现为重逢后既想接触又反抗,无法平静,混乱型依恋表现为行为缺乏一致性,都不符合题干描述,B、C、D、E错误。", "type": "single"}, {"q": "求助者,男,50岁,货车司机,近3个月来入睡困难,平均每天睡眠不足4小时,白天开车的时候总是困倦乏力,已经影响了正常工作,求助者知道自己睡眠有问题但是没办法调整。根据健康心理学的睡眠干预原则,以下最合适的干预措施是?", "o": ["睡前喝大量浓茶提神", "建立固定的起床和睡觉时间,形成规律的睡眠-觉醒节律", "睡前刷短视频放松心情", "长期服用镇静催眠药物帮助睡眠", "不用处理,慢慢适应就好"], "a": 1, "e": "建立规律的睡眠-觉醒节律是睡眠障碍心理干预的核心方法,能够帮助个体重建稳定的生物钟,有效改善入睡困难,符合干预原则;睡前饮用浓茶、长时间使用电子设备都会兴奋神经,加重入睡困难,A、C错误;长期服用催眠药物有依赖性风险,不属于心理干预的首选方案,D错误;放任睡眠问题会持续影响社会功能,不利于恢复,E错误。", "type": "single"}, {"q": "求助者,女,28岁,服装设计师,近半年来多次无诱因突发胸口憋闷、喘不上气、手脚发麻,感觉自己马上要猝死了,每次发作持续大概10分钟左右就能缓解,不发作的时候完全正常,多次去医院做心脏检查都没有发现器质性病变。该求助者最可能的初步评估是?", "o": ["广泛性焦虑障碍", "惊恐障碍", "特定恐怖症", "社交焦虑障碍", "抑郁发作"], "a": 1, "e": "惊恐障碍的核心特征是反复突发的惊恐发作,发作间期完全正常,没有器质性病变基础,与题干描述完全吻合;广泛性焦虑障碍是长期持续的焦虑,没有突发的强烈发作,A错误;特定恐怖症是对特定场景或物体的恐惧,不会无诱因突发,C错误;社交焦虑障碍是对社交场景的恐惧,不符合题干表现,D错误;抑郁发作核心是持续情绪低落兴趣减退,不符合,E错误。", "type": "single"}, {"q": "求助者,男,45岁,销售总监,性格急躁好胜,做什么都要争第一,总觉得时间不够用,同时推进好几个项目,容易和人发生争执,动不动就发脾气。根据人格心理学的人格类型理论,该求助者属于?", "o": ["A型人格", "B型人格", "C型人格", "D型人格", "E型人格"], "a": 0, "e": "A型人格的核心特征就是性格急躁、争强好胜、有强烈的时间紧迫感、容易发脾气,和题干描述完全吻合;B型人格的特征是性情温和、没有时间紧迫感,不符合,B错误;C型人格特征是习惯压抑情绪,过分合作,不符合,C错误;D型人格特征是长期消极情绪、社交退缩,不符合,D错误;E型人格不属于经典的人格分类,E错误。", "type": "single"}, {"q": "求助者,女,22岁,研究生,雨天看到路人摔倒主动上去扶起,还帮着联系家人,她说“帮助遇到困难的人是应该做的”,没有接受对方的感谢红包,也不期待任何回报。根据社会心理学利他行为理论,该行为属于?", "o": ["利己性利他", "纯粹利他", "互惠性利他", "强制性利他", "应急性利他"], "a": 1, "e": "纯粹利他指个体出于自身内化的道德准则帮助他人,不期待任何外在回报,和题干描述完全吻合;利己性利他指帮助他人是为了获得外在回报或者自身利益,不符合,A错误;互惠性利他指帮助他人期待未来得到对方的回报,不符合,C错误;强制性利他指被迫帮助他人,不符合,D错误;应急性利他特指紧急危机场景下的利他,题干不符合该类型的核心定义,E错误。", "type": "single"}, {"q": "求助者,女,42岁,医院护士长,近两年来对当前的护理管理工作感到厌倦,想要转行去做公益组织,但是又怕转行失败,每天十分纠结,工作效率轻度下降。根据埃里克森的心理社会发展阶段理论,该求助者当前面临的核心冲突是?", "o": ["繁殖对停滞", "亲密对孤独", "同一性对角色混乱", "完善对绝望", "勤奋对自卑"], "a": 0, "e": "埃里克森将成年中期(30-65岁)的核心冲突定义为繁殖对停滞,个体会在这个阶段探索职业家庭的意义,如果对现状不满就会陷入停滞的纠结,和题干描述完全吻合;亲密对孤独是成年早期的冲突,同一性对角色混乱是青少年期的冲突,完善对绝望是成年晚期的冲突,勤奋对自卑是学龄期的冲突,都不符合年龄阶段,B、C、D、E错误。", "type": "single"}, {"q": "求助者,男,42岁,销售,近6年每天都要饮用高度白酒8两左右,如果一整天不喝酒就会出现手抖、心慌、坐立不安,必须喝一点酒才能缓解这些不舒服,明知喝酒伤肝但还是控制不住饮酒。该求助者最可能的初步评估是?", "o": ["酒精依赖综合征", "酒精滥用", "正常社交饮酒", "抑郁发作", "广泛性焦虑障碍"], "a": 0, "e": "酒精依赖综合征的核心特征是长期反复饮酒、出现戒断反应(不饮酒就出现躯体不适)、无法控制饮酒行为,和题干描述完全吻合;酒精滥用仅指饮酒导致社会功能受损,不会出现戒断症状,不符合,B错误;正常社交饮酒不会出现戒断反应,也不会无法控制,C错误;抑郁发作和焦虑障碍核心症状和饮酒无关,不符合题干,D、E错误。", "type": "single"}, {"q": "分数:1)求助者,女,29岁,全职妈妈,近半年来情绪持续低落,觉得自己天天在家带孩子没有人生价值,总抱怨家人不理解自己的辛苦。根据积极心理学的感恩干预技术,以下最适合的干预方案是?", "o": ["让求助者每天记录3件值得感恩的小事", "帮助求助者进行认知重评,纠正消极思维", "建议家人减少求助者的家务负担,多出去休闲", "建议求助者服用抗抑郁药物调节情绪", "建议求助者立刻外出工作"], "a": 0, "e": "感恩干预是积极心理学经典的干预技术,核心是通过引导个体每日记录值得感恩的事件,提升积极情绪体验,改善低落心境,完全符合题干需求;认知重评是认知行为疗法的技术,不属于感恩干预,B错误;C、E选项没有针对情绪问题结合感恩干预处理,不符合要求,C、E错误;药物治疗不属于心理干预范畴,不符合题干要求,D错误。", "type": "single"}, {"q": "求助者,女,28岁,互联网公司运营,近三个月每次出门后都会反复折返家中检查门锁是否锁好、燃气阀门是否关闭,明知已经关好但无法停止,为此耽误大量时间,正常工作生活受到影响,该求助者的症状最符合哪项诊断?", "o": ["广泛性焦虑障碍", "强迫障碍", "惊恐发作", "特定恐怖症", "社交焦虑障碍"], "a": 1, "e": "强迫障碍核心特征为反复出现的强迫思维或强迫行为,该求助者的反复检查行为属于典型强迫症状,符合强迫障碍诊断标准。A选项广泛性焦虑障碍以持续的无明确对象的焦虑为核心,无固定的强迫行为;C选项惊恐发作以突发濒死感、惊恐体验为核心;D选项特定恐怖症是对特定场景/物体的恐惧回避,无反复强迫检查;E选项社交焦虑障碍核心是对社交场景的恐惧,不符合题干描述。", "type": "single"}, {"q": "某公司部门开会讨论新的项目方案,大多数参会人员都同意部门经理提出的方案,求助者小王私下发现该方案的成本预算存在明显疏漏,但在公开投票时还是跟着多数人投了赞成票,会后对自己的行为十分懊恼。根据社会心理学从众理论,该行为属于?", "o": ["真从众", "权益从众", "反从众", "服从", "顺从"], "a": 1, "e": "权益从众的定义是个体表面顺从群体的多数意见,内心并不认同,保留自己的独立判断,与题干描述完全吻合。A选项真从众是个体内心也认同群体观点,不符合题干描述;C选项反从众是个体违背群体多数意见,与题干不符;D选项服从是个体按照权威的明确命令行动,题干是群体压力下的从众,不是权威命令;E选项顺从是接受他人直接提出的要求,不符合本题场景。", "type": "single"}, {"q": "求助者,女,29岁,互联网产品经理,近半年持续出现焦虑情绪,经常坐立不安,无法专注完成工作。根据积极心理学正念干预技术,以下哪项是最适合的干预方法?", "o": ["指导其每日进行15分钟的正念呼吸练习", "减少工作安排,增加外出旅行", "开具抗焦虑药物进行治疗", "建议其更换工作岗位"], "a": 0, "e": "正念呼吸练习是积极心理学中经典的正念干预技术,能够帮助个体锚定当下,调节焦虑情绪,改善焦虑状态,符合题干需求。B选项苏格拉底提问/认知重评属于认知行为疗法的技术,不属于正念干预;C、E选项没有针对核心情绪问题进行干预;D选项药物治疗不属于心理干预范畴。", "type": "single"}, {"q": "某资深设计师接到新的设计项目后,始终习惯沿用自己从业十年以来一直使用的固定流程和设计思路,拒绝尝试新出现的更高效的设计工具和方法,即使团队年轻设计师提出了更优方案也不予采纳。根据基础心理学对思维类型的分类,该设计师的思维风格属于?", "o": ["聚合思维", "发散思维", "常规思维", "创造思维", "具体形象思维"], "a": 2, "e": "常规思维是指个体运用已经掌握的知识经验,按照固定的程序和模式解决问题的思维方式,与题干描述完全吻合。A选项聚合思维是指从多个现有信息中推导得出唯一正确结论的思维;B选项发散思维是指从一个出发点出发,探索多种不同解决方案的思维;D选项创造思维是指产生新颖、独特的思维成果的思维;E选项具体形象思维是依赖事物的具体形象解决问题,均不符合题干描述。", "type": "single"}, {"q": "求助者,女,62岁,原发性高血压患者,近期因为家庭琐事经常情绪激动、发脾气,导致血压波动大,控制不佳,医生判断血压波动和情绪密切相关。根据健康心理学中心理干预原则,以下哪项干预措施最适合?", "o": ["强制增加降压药物剂量", "教授渐进式放松训练调节情绪", "给予抗抑郁药物口服", "无需处理情绪,只调整降压药即可", "建议患者搬离现有居住环境"], "a": 1, "e": "放松训练是高血压患者心理干预的常用有效技术,可以帮助患者调节情绪,稳定血压,符合健康心理学心理干预的核心原则。A选项强制调整药物不符合咨询伦理,也不属于心理干预;C选项药物治疗不属于心理干预范畴;D选项忽略情绪因素不利于血压控制;E选项没有针对核心的情绪问题进行干预。", "type": "single"}, {"q": "求助者,女,32岁,参加工作后一直人际关系不佳,总觉得同事在背后议论自己、算计自己,对同事主动伸出的善意帮助也充满怀疑,一旦认定自己的想法就很难被他人说服,不愿改变自己的观点。根据CCMD-3的人格障碍分类标准,该求助者最可能的初步评估是?", "o": ["偏执型人格障碍", "分裂样人格障碍", "反社会型人格障碍", "边缘型人格障碍", "表演型人格障碍"], "a": 0, "e": "偏执型人格障碍的核心特征是持续的猜疑、对他人不信任、固执己见,与题干描述完全吻合。B选项分裂样人格障碍核心是情感冷漠、人际关系疏离,不符合;C选项反社会型人格障碍核心是无视社会规范、缺乏愧疚感,不符合;D选项边缘型人格障碍核心是情绪不稳定、身份认同紊乱、害怕被抛弃,不符合;E选项表演型人格障碍核心是过度情绪化、追求他人关注,不符合。", "type": "single"}, {"q": "求助者,女,28岁,可以非常清晰地回忆起自己18岁那年第一次收到大学录取通知书时的场景,包括当时的天气、家人的反应、自己的心情,这种记忆属于以下哪种类型?", "o": ["语义记忆", "情景记忆", "程序性记忆", "工作记忆", "感觉记忆"], "a": 1, "e": "情景记忆是指个体对自己亲身经历的、发生在特定时间和地点的事件场景的记忆,和题干描述完全吻合。A选项语义记忆是对一般知识、概念、规律的记忆,不涉及个人特定经历;C选项程序性记忆是对如何做事情、技能的记忆;D选项工作记忆属于短时记忆的一种,是当前正在加工的记忆,不符合;E选项感觉记忆是记忆的第一个阶段,保持时间极短,不符合。", "type": "single"}, {"q": "一名大学生在食堂打饭时被另一名学生不小心撞掉了手机,情绪瞬间失控,动手殴打对方导致对方软组织挫伤,事后自己也十分后悔,但是当时无法控制愤怒情绪。根据社会心理学侵犯行为的分类,该行为属于?", "o": ["工具性侵犯", "敌意性侵犯", "习惯性侵犯", "间接性侵犯", "言语性侵犯"], "a": 1, "e": "敌意性侵犯是指出于愤怒、报复等情绪目的,以伤害对方为意图的侵犯行为,和题干描述完全吻合。A选项工具性侵犯是指为了达到其他目的而实施的侵犯行为,侵犯只是手段,不符合本题;其余选项均不符合题干中情绪驱动的伤害行为特征。", "type": "single"}, {"q": "一名4岁男童,只会说单个的词语,无法组织完整的句子表达自己的需求,和同伴交流存在明显障碍,到医院检查排除了器质性病变。根据发展心理学幼儿期语言发展的规律,该男童的情况属于?", "o": ["正常的语言发展延迟", "语言发育迟缓", "听力障碍", "智力障碍", "抽动障碍"], "a": 1, "e": "语言发育迟缓指儿童的语言发展水平明显落后于同龄儿童的正常发展水平,一般3岁儿童已经能够说出完整句子,该男童4岁仍只会说单词,符合语言发育迟缓的诊断。A选项正常语言发展延迟仅为轻微落后,不会出现明显交流障碍,不符合;C选项题干已经排除器质性听力损伤,不符合;D选项题干未提及智力发育异常的伴随症状;E选项抽动障碍核心是不自主的抽动,与语言发展无关,不符合。", "type": "single"}, {"q": "求助者,男,32岁,在分析问题的时候,总是习惯先把握问题的整体框架,会综合考虑问题涉及到的各个方面,更倾向于用归纳的方式梳理逻辑解决问题,根据人格心理学认知风格理论,该求助者的认知风格属于?", "o": ["场独立型", "场依存型", "整体型", "分析型", "沉思型"], "a": 2, "e": "整体型认知风格的特征是个体解决问题时从整体出发,关注问题的多个维度,综合考量后得出结论,与题干描述完全吻合。A选项场独立型是指认知时不易受外界背景信息干扰,侧重自身内部参照;B选项场依存型是指认知时依赖外界背景信息,参照他人观点;D选项分析型认知风格侧重从细节出发拆分问题,和题干相反;E选项沉思型是指解决问题时倾向于深思熟虑后给出答案,和整体-分析的分类维度不同,不符合。", "type": "single"}, {"q": "求助者,男,75岁,退休教师,近两年来变得越来越固执,不愿接受新的生活理念,总是怀念过去的工作和生活,认为现在的生活不如从前,社会功能没有明显受损。根据发展心理学老年期人格变化的特点,该求助者的表现属于?", "o": ["正常的老年人格变化", "偏执型人格障碍", "抑郁发作", "阿尔茨海默病", "血管性痴呆"], "a": 0, "e": "老年期人格会出现一系列正常的发展变化,包括固执性增强、怀旧等特点,题干中求助者无明显器质性病变和社会功能严重受损,属于正常的老年人格变化。其余选项均存在明显的病理改变或社会功能受损,不符合题干描述。", "type": "single"}, {"q": "求助者,男,45岁,确诊慢性腰背痛超过1年,长期受疼痛困扰,经常出现“我一辈子都好不了了”的想法,情绪低落,无法正常工作,社会功能明显受损。根据健康心理学慢性疼痛的心理干预原则,以下哪项干预最适合?", "o": ["要求患者每天进行高强度腰部训练", "使用认知重评技术纠正其灾难化负性思维", "长期服用大剂量止痛药物", "不用处理情绪,专注止痛即可", "建议患者长期卧床休息"], "a": 1, "e": "慢性疼痛患者常出现灾难化负性思维,加重疼痛体验和情绪问题,认知重评可以纠正这类不良认知,改善情绪,提升疼痛耐受度,符合慢性疼痛心理干预的核心原则。A选项高强度训练可能加重腰部损伤和疼痛;C选项药物治疗不属于心理干预范畴;D选项忽略情绪问题不利于慢性疼痛的康复;E选项长期卧床会加重功能退化,不利于康复。", "type": "single"}, {"q": "求助者,男,24岁,刚刚研究生毕业进入一家国企工作,进入新环境后连续2个月出现情绪低落、食欲下降、失眠,工作效率明显下降,入职5个月后症状逐渐自行缓解,该求助者最可能的初步评估是?", "o": ["适应障碍", "抑郁发作", "广泛性焦虑障碍", "创伤后应激障碍", "重度睡眠障碍"], "a": 0, "e": "适应障碍是指个体在经历生活环境改变等应激事件后,出现情绪或行为症状,一般症状持续时间不超过6个月,可自行缓解,与题干描述完全吻合。B选项抑郁发作症状会持续超过2周且一般不会自行在数月内缓解;C选项广泛性焦虑障碍以持续广泛的焦虑为核心,无明确应激诱因也会持续存在;D选项创伤后应激障碍是经历重大创伤后出现的症状,不会自行缓解;E选项睡眠障碍只是症状,不是完整诊断,不符合。", "type": "single"}, {"q": "求助者,女,52岁,退休护士。近2年来反复出现头晕、肩痛、腹胀、心跳快等躯体不适,多次在综合医院多个科室检查,所有检验、影像学结果均无异常,医生告知没有器质性疾病,但求助者仍坚持自己“得了癌症没查出来”,反复更换医院就诊,已经影响正常退休生活,没有持续明显的焦虑或情绪低落,该求助者最可能的诊断是:", "o": ["躯体化障碍", "疑病障碍", "广泛性焦虑障碍", "抑郁症", "躯体形式自主神经紊乱"], "a": 1, "e": "该题考查疑病障碍与其他躯体形式障碍的鉴别。疑病障碍的核心表现是坚信自己患有严重疾病的先占观念,即使检查结果正常、医生解释也无法打消疑虑;躯体化障碍的核心是反复出现的多种躯体症状,而非坚定的患病先占观念。本题中求助者核心表现为坚信患不治之症,因此符合疑病障碍诊断。A选项躯体化障碍核心是多样躯体症状,无坚定先占观念,不符合;C广泛性焦虑以持续过度的整体焦虑为核心,无明确患病先占观念;D抑郁症核心是持续情绪低落兴趣减退,不符合;E躯体形式自主神经紊乱主要是自主神经功能紊乱的症状,不符合。", "type": "single"}, {"q": "求助者,男,8岁,小学一年级学生。近半年来老师反映上课经常无法集中听课,总是玩文具、随便插话,很难遵守课堂纪律,坐不住总是起身走动,在家写作业也要断断续续,半小时作业能拖两个小时,学习成绩明显落后于同班同学,脑部检查无器质性病变,该求助者最可能的诊断是:", "o": ["注意缺陷多动障碍", "孤独症谱系障碍", "分离性焦虑障碍", "品行障碍", "特定学习障碍"], "a": 0, "e": "注意缺陷多动障碍的核心症状是注意力不集中、多动冲动,多起病于童年期,会影响学习与社会功能,符合该求助者表现。B选项孤独症谱系障碍核心是社交互动障碍、兴趣狭窄刻板行为,不符合本题描述;C分离性焦虑核心是与依恋对象分离后的过度焦虑,不符合;D品行障碍核心是反复持续的攻击他人、违反规则的破坏性行为,不符合;E特定学习障碍只局限于特定学习技能受损,无明显多动注意力不集中症状,不符合。", "type": "single"}, {"q": "求助者,女,26岁,已婚,产后3个月。近2个月来持续情绪低落,对之前一直喜欢的插花、旅行完全提不起兴趣,不愿抱孩子、不想照顾新生儿,夜间久久无法入睡,凌晨两三点就醒了再也睡不着,体重下降了近5k
