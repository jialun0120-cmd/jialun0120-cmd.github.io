咨询师运用认知行为疗法干预,在解释该求助者的恐惧情绪时,以下哪种解释符合专业规范?", "o": ["“你害怕坐飞机是因为天生胆子小,根本没法改变”", "“你的恐惧可能源于之前坐飞机时经历过强烈颠簸,形成了条件反射,所以一想到坐飞机就会紧张”", "“你就是太胆小了,坐飞机根本没有危险”", "“你直接多坐几次就好了,克服恐惧就可以”", "“你的恐惧是遗传导致的,心理咨询也没办法缓解”"], "a": 1, "e": "解释技术需要基于心理学理论,结合求助者的具体经历给出合理解释,B选项用经典条件反射理论解释恐惧成因,符合认知行为疗法的逻辑,符合专业规范。A是宿命论观点,违背心理咨询可改变的基本立场;C是评判式否定,会伤害求助者自尊,破坏咨询关系;D是直接建议,未解释恐惧的核心成因,不符合解释技术的要求;E是错误观点,恐惧多与后天学习经历相关,可通过心理咨询干预,因此B正确。", "type": "single"}, {"q": "求助者,男,38岁,部门经理,因总是控制不住对下属发火,事后又十分后悔,前来咨询,求助者提到:“我明明知道乱发脾气影响团队氛围,可我就是控制不住自己的脾气”,存在明显的认知与行为冲突。咨询师计划使用面质技术帮助求助者识别冲突,以下哪种面质方式符合专业规范?", "o": ["“你明明知道不对还控制不住,这不是自相矛盾吗?”", "“你说你知道不该发火却控制不住,对此你有什么感受,可以和我说说吗?”", "“你就是修养不够,才控制不住自己的脾气”", "“你应该多学习情绪管理,就不会随便对下属发火了”", "“你的下属确实太过分,换我也会发火,不用后悔”"], "a": 1, "e": "面质技术需要温和指出求助者的矛盾,同时引导求助者探索内心,避免直接评判,B选项既点明了求助者的认知行为冲突,又以开放式提问引导求助者探索自我,符合专业规范。A过于直接生硬,容易引发求助者的抵触情绪;C是评判式否定,违背尊重原则;D是直接给出建议,未完成面质识别冲突的核心目标;E弱化了求助者的情绪困扰,不符合面质技术的要求,因此B正确。", "type": "single"}, {"q": "求助者,男,40岁,因职场压力出现焦虑、失眠,经过8次咨询后,求助者焦虑症状明显缓解,睡眠恢复正常,能够正常开展工作,主动提出结束咨询。咨询师需要评估咨询效果并制定后续巩固计划,以下哪种做法符合专业规范?", "o": ["立即同意结束咨询,不做任何后续安排", "与求助者共同回顾咨询过程中的成长与进步,一起制定后续自我调节计划,并告知求助者如有需要可随时联系", "要求求助者继续咨询3个月巩固效果", "直接告知求助者“你已经完全康复,以后不用再来了”", "收取额外的巩固咨询费用"], "a": 1, "e": "咨询结束阶段需要和求助者共同回顾咨询收获,制定巩固方案,同时提供后续支持渠道,B做法符合专业规范。A无后续巩固安排,不利于维持咨询效果;C过度干预,违背求助者自主意愿;D说法过于绝对,未考虑潜在复发风险;E违反咨询收费伦理规范,因此B正确。", "type": "single"}, {"q": "求助者,女,26岁,公司职员,因和部门同事关系紧张出现情绪低落、失眠1个月,主动前来咨询。初诊接待时,求助者反复诉说“整个部门的人都排挤我,我根本待不下去了”,但未说明冲突的具体事件、次数与细节。咨询师既要建立良好咨询关系,又要获取准确临床资料,以下哪种回应同时符合尊重原则和具体化技术的专业要求?", "o": ["“我特别理解你的感受,你的同事真的太过分了,别太难过了”", "“你说大家都排挤你,能具体说说最近一次冲突是怎么发生的吗?”", "“你应该主动请同事吃饭,搞好关系就能解决问题了”", "“你是不是太敏感了,同事怎么会无缘无故排挤你呢”", "“我们先不谈这个话题,换个轻松的话题吧”"], "a": 1, "e": "尊重原则要求接纳求助者的情绪,具体化技术需要引导求助者明确具体事件细节,获取准确临床资料。B选项既隐含接纳了求助者的情绪,又引导其提供具体信息,同时符合两项要求,因此正确。A仅表达了共情,未落实具体化技术,无法收集到所需资料;C是越界建议,违背求助者自主性;D是评判式否定,破坏咨询信任关系;E回避资料收集,不符合初诊接待的目标,因此B正确。", "type": "single"}, {"q": "求助者,女,28岁,小学班主任,上周公开课展示时出现PPT操作失误,被教研组长当场指出,之后同事约饭时有人聊起这次展示,求助者提前离场,次日来咨询,说“我当时就是有点累,根本没觉得不好意思,所以提前走了”,咨询师发现其言语与非言语信息存在矛盾,以下关于该求助者的防御机制与咨询回应的描述,正确的是?", "o": ["该求助者使用了合理化防御机制,咨询师应当直接指出她言行的矛盾,强迫她面对", "该求助者使用了转移防御机制,咨询师应该立刻转移话题不要再提这件事", "该求助者使用了反向形成防御机制,咨询师应当直接批评她回避问题的行为", "该求助者使用了退行防御机制,咨询师应该只关注她的行为不用管她说的话"], "a": 1, "e": "该求助者内心感到尴尬羞愧,但口头否认,同时行为上提前回避,属于否认心理防御机制,温和引导求助者表达真实感受,既尊重求助者又能澄清情绪矛盾,因此B正确。A选项,合理化是指为不符合逻辑的行为找借口开脱,不符合该案例的防御机制,且直接强迫面对不符合咨询伦理;C选项,转移是将情绪转移到安全目标,和该案例不符,转移话题也不利于问题解决;D选项,反向形成是指表现出和内心真实想法完全相反的行为,不符合该案例,直接批评也不符合咨询要求;E选项,退行是指退回到早期幼稚行为模式,不符合该案例,忽略言语表述不符合咨询规范。", "type": "single"}, {"q": "求助者,男,35岁,互联网产品经理,因业绩压力大出现焦虑抑郁前来咨询,在第三次咨询中,求助者透露自己上个月闯红灯撞伤行人后,因为没有监控离开现场,没有被查处,现在非常愧疚,同时要求咨询师必须严格保密,按照心理咨询专业伦理与记录规范,哪项做法是正确的?", "o": ["将该事件写入咨询记录,放在咨询中心的公共档案柜方便其他咨询师查阅", "不把该事件写入正式咨询记录,只自己写在私人笔记本上", "将该事件写入加密保护的正式咨询记录,只有负责咨询的咨询师本人可以查阅,同时提前告知求助者保密的例外情况", "为了避免路人后续再遇到危险,直接联系当地警方举报求助者", "为了避免咨询师承担风险,立刻终止和求助者的咨询关系"], "a": 2, "e": "根据心理咨询保密原则与咨询记录规范,求助者透露的个人隐私需要加密保存,仅授权人员可查阅,同时需要明确告知求助者保密的例外情形,因此C正确。A选项,放在公共区域会严重泄露求助者隐私,违反伦理;B选项,不写入正式咨询记录不符合咨询记录规范要求;D选项,该事件不属于保密例外的伤人伤己紧急情况,直接举报违反保密原则;E选项,无正当理由直接终止咨询违反咨询关系维护的伦理要求。", "type": "single"}, {"q": "求助者,男,38岁,货车司机,近一年父亲确诊尿毒症需要每周透析,儿子刚考上大学需要缴纳学费,自己最近被查出腰椎间盘突出无法长时间开车,近2个月出现躺卧难眠、白天情绪低落,对以前喜欢的钓鱼都没兴趣,主动到心理服务中心求助,咨询师计划先做摄入性会谈收集资料,再用生活事件量表(LES)评估应激,用SCL-90评估症状严重程度,以下说法正确的是?", "o": ["生活事件量表(LES)只能评估积极的生活事件,不能评估负面事件带来的压力", "症状自评量表(SCL-90)得分越高,说明求助者的心理健康程度越好", "摄入性会谈为了节省时间,可以直接询问隐私,不需要提前说明目的和保密原则", "为了提高咨询效率,可以直接跳过摄入性会谈,只用心理测验结果制定咨询方案"], "a": 3, "e": "生活事件量表LES可以同时量化评估正性和负性生活事件对个体产生的应激影响,帮助咨询师梳理心理问题的诱因,因此D正确。A选项错误,LES可以同时评估正性和负性生活事件;B选项错误,SCL-90得分越高提示心理症状越严重,心理健康水平越差;C选项错误,摄入性会谈需要首先告知会谈目的、保密原则,建立咨访信任关系后才能深入询问隐私内容;E选项错误,心理测验仅为辅助评估工具,必须结合摄入性会谈收集的临床资料才能制定合理的咨询方案。", "type": "single"}, {"q": "求助者,男,24岁,研究生,因为被猫抓伤过,现在特别害怕猫,咨询师计划使用系统脱敏法帮助求助者消除恐惧,以下哪种操作是错误的?", "o": ["咨询师先和求助者一起整理恐惧等级,从引起恐惧程度最低的场景开始排列", "让求助者在放松状态下想象对应等级的恐惧场景,适应后再逐步提升等级", "如果求助者在某一等级场景中出现无法耐受的强烈焦虑,就退回到上一等级重新做放松训练", "为了快速见效,直接让求助者抱着真猫,直面最高等级的恐惧场景", "系统脱敏法可以根据情况结合想象暴露和现实暴露两种方式"], "a": 3, "e": "系统脱敏法的核心原则是循序渐进,从低等级到高等级逐步适应,直接让求助者面对最高等级恐惧会引发强烈的焦虑反应,甚至会加重恐惧,属于错误操作,因此D正确。ABCE均为系统脱敏法的标准正确操作。", "type": "single"}, {"q": "求助者,女,52岁,退休人员,子女都在外地定居,最近半年经常感到心慌烦躁,夜间睡眠不好,主动来咨询,咨询师计划用放松训练缓解求助者的情绪症状,以下关于放松训练的操作,正确的是?", "o": ["放松训练只能在咨询室由咨询师带领完成,求助者没办法在日常生活中自己练习", "放松训练必须先做肌肉放松,再做呼吸放松,顺序不能调整", "腹式呼吸放松法的标准操作是缓慢吸气、短暂屏息后再缓慢呼气,以此调节自主神经平复情绪", "如果求助者在放松练习过程中感到烦躁,必须立刻停止训练不能继续", "放松训练操作简单,不需要咨询师指导,求助者自己看资料就能掌握"], "a": 2, "e": "腹式呼吸放松法的正确操作步骤就是缓慢吸气、屏息数秒后缓慢呼气,可以帮助调节自主神经兴奋性,缓解焦虑情绪,因此C正确。A选项错误,放松训练掌握方法后,求助者可以在日常出现情绪问题时自行练习;B选项错误,放松训练通常先做呼吸放松,再进行肌肉放松;D选项错误,求助者练习中出现轻微烦躁可以调整呼吸节奏,不需要立刻停止;E选项错误,放松训练需要咨询师专业指导,掌握正确方法才能达到效果。", "type": "single"}, {"q": "求助者,女,25岁,刚工作一年,因为最近多次出错,觉得“我什么能力都没有,做什么都做不对,我根本不适合这份工作”,咨询师想要用具体化技术识别求助者的自动思维,以下哪个提问是最恰当的?", "o": ["“你是什么时候开始产生这个想法的呢?”", "“你说做什么都做不对,能不能说说最近一次你觉得自己没做好的工作具体是什么情况吗?”", "“你可以换个角度想想,你其实做得挺好的”", "“我能理解你现在难过的心情”", "“你是不是太不自信了,才会这么想?”"], "a": 1, "e": "具体化技术的作用是引导求助者将模糊概括的负性想法转化为具体的事件,帮助澄清想法,识别自动思维,B选项通过提问具体事件,帮助求助者明确自己想法的具体依据,符合具体化技术的要求,因此B正确。A选项只是询问想法出现的时间,没有聚焦具体事件,不符合具体化要求;C选项属于给建议,不是提问具体化;D选项是共情,没有落实具体化;E选项是评判性提问,不符合咨询技术要求。", "type": "single"}, {"q": "求助者,女,23岁,应届毕业生,拿到两个互联网公司的offer,不知道该选择哪一个,希望咨询师直接帮她做决定,以下哪种回应符合心理咨询的专业原则?", "o": ["“我建议你选头部那家大公司,平台好更有发展前途”", "“我们可以一起梳理分析两个岗位的优缺点、发展前景,还有你自己的职业需求,之后你再自己做决定”", "“我不能帮你做决定,你自己看着选吧”", "“你肯定要选自己喜欢的,不用考虑薪资和发展这些因素”", "“我对这两个公司都不了解,没办法给你意见,你自己决定吧”"], "a": 1, "e": "心理咨询需要尊重求助者的自主性,咨询师的角色是帮助求助者梳理信息、分析利弊,引导求助者自主做出决策,既不能直接替求助者做决定,也不能完全不提供支持,因此B正确。A选项错误,直接替求助者做决定违背了求助者自主性原则;C选项错误,直接让求助者自己选没有提供必要的专业引导,不符合要求;D选项错误,否定了其他现实因素的影响,没有帮助求助者全面分析;E选项错误,没有为求助者提供必要的专业支持,未尽到咨询师的责任。", "type": "single"}, {"q": "求助者,男,41岁,建筑设计师,最近半年连续赶项目,经常熬夜,近1个月出现紧张不安、入睡困难、情绪提不起来,咨询师计划用焦虑自评量表SAS和抑郁自评量表SDS辅助评估,以下关于这两个量表的描述,正确的是?", "o": ["SAS和SDS都是他评量表,需要咨询师根据求助者的表现打分", "SAS得分≥50分提示存在焦虑症状,SDS得分≥53分提示存在抑郁症状", "SAS和SDS只能评估最近1天的情绪,没办法评估一段时间的心理状态", "SAS和SDS得分越高,说明情绪症状越轻", "施测的时候不需要跟求助者说明填写要求,求助者随便填就行"], "a": 1, "e": "焦虑自评量表SAS和抑郁自评量表SDS都属于自评量表,SAS的分界值为50分,SDS的分界值为53分,得分越高提示症状越严重,因此B正确。A选项错误,二者都是自评量表,由求助者自行填写;C选项错误,两个量表评估的是评定时间段内的症状,可辅助判断一段时间的心理状态;D选项错误,得分越高提示情绪症状越严重;E选项错误,施测时需要说明填写目的和要求,才能保证结果准确有效。", "type": "single"}, {"q": "求助者,男,31岁,程序员,婚后和父母住在一起,最近经常因为生活习惯和父母发生冲突,觉得“父母总是不尊重我的隐私,老婆也不站在我这边,这个家我根本待不下去”,情绪非常低落,咨询师做共情回应,以下属于高级共情的是?", "o": ["“你现在很不开心,觉得父母不尊重你,对吗?”", "“你感到特别委屈又孤独,因为最亲近的家人都不站在你这边,你觉得在这个家里没有归属感,是吗?”", "“我特别理解你的感受,如果我是你我也会很难过”", "“你别不开心了,过段时间和父母沟通开了就好了”", "“你是不是想得太多了,父母其实也是为了你好”"], "a": 1, "e": "高级共情是指咨询师不仅回应求助者表面表达出的情绪,还深入挖掘求助者没有直接说出来的潜在感受和需求,B选项不仅回应了情绪,还挖掘出求助者内心孤独、没有归属感的潜在感受,属于高级共情,因此B正确。A选项只复述了求助者表面表达的内容,属于初级共情;C选项只是表达理解,没有深入挖掘潜在感受;D选项属于空洞的安慰,不是共情;E选项是否定评判求助者的感受,不符合共情要求。", "type": "single"}, {"q": "求助者,女,22岁,大三考研学生,因考研初试失败被父母当众指责,近一周严重失眠,求助者偷偷网购了100片安眠药存放于宿舍柜子中,私下对咨询师说“我实在撑不下去了,这周了结了就不用再痛苦了”,并反复要求咨询师严格保密,声称如果消息泄露,父母绝不会原谅自己,学校也会开除自己的学籍。以下关于咨询师的正确处理方式是?", "o": ["严格遵守保密承诺,不向任何人透露该信息,继续开展常规咨询", "立即联系求助者的学校辅导员与父母,同时对接学校心理危机干预中心与精神科医师进行风险评估,启动危机干预流程", "要求求助者签署《不自杀承诺书》,承诺不实施自杀行为,不告知任何第三方", "直接拨打110报警,将求助者送往精神病院强制治疗,不告知家属", "暂时安抚求助者,待本次咨询结束后再告知其家属与学校"], "a": 1, "e": "该求助者已明确表达自杀意图且持有自杀工具,属于高自杀风险,符合保密例外的紧急情形,需立即通知家属、相关单位并联系专业人员启动危机干预,B正确。A违反生命至上的咨询伦理原则;C书面承诺无法保障生命安全,未履行保密例外责任;D过度强制,未尊重求助者及家属的知情权;E延迟干预会大大提升自杀风险,可能导致悲剧发生。", "type": "single"}, {"q": "求助者,男,28岁,因人际敏感、社交回避主动前来咨询,咨询师计划使用艾森克人格问卷(EPQ)评估其人格特征,以下关于EPQ的正确描述是?", "o": ["EPQ共包含90个项目,评估10个症状维度,适用于18岁以上成年人群", "EPQ共包含88个项目,评估E、N、P、L四个维度,得分越高代表人格特质越健康优秀", "EPQ共包含88个项目,评估E、N、P、L四个维度,得分本身无优劣之分", "EPQ属于他评量表,由咨询师根据求助者的日常表现进行评分", "EPQ仅能评估情绪稳定性,无法测量内外向人格维度"], "a": 2, "e": "EPQ共88个项目,包含E(内外向)、N(神经质)、P(精神质)、L(说谎)四个维度,得分仅反映人格倾向,无优劣之分,C正确。A描述符合SCL-90的特征;B错误,得分无优劣之分;D错误,EPQ属于自评量表;E错误,EPQ核心维度之一就是内外向人格。", "type": "single"}, {"q": "求助者,男,28岁,因社交恐惧症完成了12次心理咨询,以下哪种评估维度不属于心理咨询效果的有效评估维度?", "o": ["求助者的自我报告,如“我现在敢主动去食堂就餐,不再一直躲在宿舍”", "咨询师的观察,如“求助者现在咨询时能主动进行眼神交流,不再一直低头回避”", "求助者室友的反馈,如“他现在愿意和我们一起出去聚餐,不再整天闭门不出”", "心理测验结果的前后对比,如SAS得分从68分降至41分", "求助者每次都能按时支付咨询费用,从未迟到缺诊"], "a": 4, "e": "咨询效果评估的维度包括求助者自我报告、咨询师观察、第三方(家属/朋友/同事)反馈、心理测验前后对比、社会功能恢复情况等,是否遵守付费、准时等咨询设置属于咨询关系维护的内容,不属于咨询效果评估维度,E正确。", "type": "single"}, {"q": "求助者,女,19岁,大一学生,因和室友发生冲突主动前来咨询,当咨询师询问冲突发生时求助者具体的言行时,求助者突然低头沉默,持续数分钟后才开口说“我不想提这件事”,这种沉默属于哪种类型?", "o": ["情绪型沉默", "怀疑型沉默", "反抗型沉默", "内向型沉默", "理智型沉默"], "a": 2, "e": "反抗型沉默是指求助者因不愿谈论相关敏感话题,从而产生的沉默,该案例中求助者明确表示不想提及和室友冲突的内容,属于反抗型沉默,C正确。A情绪型沉默是因情绪激动导致的沉默;B怀疑型沉默是对咨询师不信任,担心咨询师不能保密产生的沉默;D内向型沉默是因求助者本身性格内向不善表达导致;E理智型沉默是求助者正在思考问题产生的沉默。", "type": "single"}, {"q": "求助者,男,38岁,因职场晋升失败情绪低落主动前来咨询,咨询师计划使用求助者中心疗法开展咨询,以下不属于该疗法核心条件的是?", "o": ["真诚一致", "无条件积极关注", "共情理解", "解释技术", "接纳与尊重"], "a": 3, "e": "求助者中心疗法的核心咨询条件包括真诚一致、无条件积极关注、共情理解,接纳与尊重属于共情理解的组成部分,解释技术属于合理情绪疗法等其他流派的咨询技术,不属于求助者中心疗法的核心条件,D正确。", "type": "single"}, {"q": "求助者,男,24岁,研究生应届毕业生,同时拿到一线城市互联网大厂offer和老家省会公务员offer,两个机会各有优势和劣势,求助者难以抉择,近1个月出现焦虑失眠、注意力不集中,社会功能轻度受损,情绪未出现泛化。以下关于该求助者的心理冲突类型与咨询目标的描述,正确的是?", "o": ["该求助者的心理冲突属于双趋冲突,可初步评估为严重心理问题,咨询目标应设定为“立即做出选择”", "该求助者的心理冲突属于趋避冲突,可初步评估为一般心理问题,咨询目标应设定为“学会平衡两份工作的时间分配”", "该求助者的心理冲突属于双避冲突,可初步评估为严重心理问题,咨询目标应设定为“彻底消除焦虑情绪”", "该求助者的心理冲突属于双趋冲突,可初步评估为一般心理问题,咨询目标应设定为“帮助求助者理清两个选择的利弊,做出符合自身需求的决策”", "该求助者的心理冲突属于多重趋避冲突,可初步评估为严重心理问题,咨询目标应设定为“放弃其中一个选择”"], "a": 3, "e": "双趋冲突指同时存在两个具有吸引力的目标且各有优劣,该案例符合该特征;病程1个月、未泛化、社会功能轻度受损,符合一般心理问题的评估标准;咨询目标需尊重求助者自主性,引导其自主决策而非替求助者做决定。A错误,严重心理问题需要情绪泛化且病程≥2个月,“立即做选择”违背求助者自主性;B错误,趋避冲突针对单一目标的利弊,本题特征不符合;C错误,双避冲突为两个均想回避的目标,且诊断和咨询目标描述均错误;E错误,多重趋避冲突为多个目标各有利弊,且诊断不符合。", "type": "single"}, {"q": "求助者,女,28岁,订婚前夕发现未婚夫婚前出轨,咨询中多次说“男人没有一个好东西,我再也不相信爱情了”,同时又表示“我和他谈了5年,我离不开他,我分不了手”,咨询师观察到求助者言行存在明显矛盾,以下关于面质技术的正确应用是?", "o": ["直接指责:“你说男人没一个好东西,又离不开未婚夫,这明显就是自相矛盾,你在自欺欺人”", "温和引导:“你似乎同时有两种不一样的感受,一方面觉得男人都不可信,另一方面又离不开现在的未婚夫,能说说你内心真实的想法吗?”", "忽略矛盾,继续倾听求助者的情绪表达", "直接说教:“你的想法错了,不是所有男人都不好,不能一棍子打死”", "强制要求:“你必须立刻解释清楚这个矛盾,否则我们无法继续咨询”"], "a": 1, "e": "面质技术需要以尊重、温和的方式引导求助者自我探索矛盾,而非直接指责、说教或强制要求。A直接破坏咨询关系;C回避核心咨询问题;D违背共情原则;E违反求助者自主性原则,B符合面质技术的正确应用要求。", "type": "single"}, {"q": "求助者,男,60岁,退休工人,儿子车祸去世10个月,仍持续情绪低落、闭门不出、每天酗酒,症状已经超过8个月,主动前来咨询,咨询师评估后初步判断符合抑郁发作特征,自身缺乏处理严重抑郁的临床经验,以下关于转介的正确做法是?", "o": ["直接告知求助者“你得了抑郁症,我治不了,你去找别人吧”", "向求助者说明其症状的情况,推荐具备精神科资质的心理咨询机构或医师,并说明转介的原因", "隐瞒症状严重程度,继续为求助者开展咨询", "直接将求助者转介给其他咨询师,无需告知求助者转介原因", "要求求助者自行寻找合适的咨询师,不提供任何帮助"], "a": 1, "e": "规范转介需向求助者说明情况,推荐合适的专业人员,B正确。A表述过于直接,会破坏求助者对咨询的信任;C错误,超出咨询师自身能力范围强行咨询会耽误求助者;D错误,转介需告知求助者并获得知情同意;E错误,咨询师需要为求助者提供适当的转介支持,不能推诿。", "type": "single"}, {"q": "求助者,女,16岁,高一学生,因考试作弊被监考老师在考场当众点名批评,之后出现情绪低落、摔砸书本、拒绝去学校,认为“全班同学都看不起我,所有人都在背后笑话我”。咨询师运用合理情绪疗法,以下对其ABC理论对应关系正确的是?", "o": ["A:“全班同学都看不起我”;B:老师当众批评;C:情绪低落、拒绝去学校", "A:老师当众批评;B:“全班同学都看不起我,所有人都笑话我”;C:情绪低落、摔砸书本", "A:情绪低落、摔砸书本;B:老师当众批评;C:“全班同学都看不起我”", "A:“全班同学都笑话我”;B:情绪低落;C:老师当众批评", "A:拒绝去学校;B:“考试作弊”;C:老师当众批评"], "a": 1, "e": "合理情绪疗法ABC理论中,A为诱发事件,B为个体对事件的信念,C为事件发生后产生的情绪行为结果。本题中诱发事件A是老师当众批评,不合理信念B是“全班同学都看不起我、都笑话我”,情绪行为结果C是情绪低落、摔砸书本、拒绝上学,B对应正确,其余选项均颠倒了三者的逻辑关系。", "type": "single"}, {"q": "求助者,女,40岁,公司中层管理人员,4个月前公司裁员,本人差点被优化,近2个半月出现情绪低落、睡眠差,对以往热衷的瑜伽、逛街都失去兴趣,不愿参加公司聚会,工作效率明显下降,主动前来咨询。咨询师在初诊接待中需收集临床资料并选择合适的心理测验辅助评估,以下描述正确的是?", "o": ["该求助者的病程超过2个月,情绪泛化,可初步评估为严重心理问题,应选用SCL-90评估症状严重程度", "该求助者的病程不足3个月,情绪未泛化,可初步评估为一般心理问题,应选用MMPI评估人格特征", "该求助者一定存在自杀念头,应直接转介精神科医生,无需进行心理测验", "该求助者的症状符合抑郁发作的全部特征,应直接诊断为抑郁症", "咨询师应仅通过心理测验结果制定咨询方案,无需进行摄入性会谈"], "a": 0, "e": "该求助者病程2个半月,超过2个月,情绪已泛化(兴趣减退、社交退缩),符合严重心理问题的评估标准,SCL-90可用于评估多症状的严重程度,A正确。B错误,病程已超过2个月且情绪泛化,不符合一般心理问题标准;C错误,题干未提及明确自杀念头,可先进行心理测验辅助评估;D错误,心理咨询师无精神疾病诊断权;E错误,需要结合摄入性会谈等临床资料综合制定方案,不能仅依赖心理测验结果。", "type": "single"}, {"q": "求助者,女,45岁,退休教师,因女儿准备婚礼,近半年出现焦虑、紧张性头痛,主动前来咨询,咨询师计划使用放松训练缓解其焦虑情绪,以下关于放松训练的正确应用是?", "o": ["放松训练仅能在咨询室内进行,无法应用于日常场景", "放松训练需先进行肌肉放松,再进行呼吸训练", "渐进式肌肉放松法是通过依次紧张、放松全身肌肉群来调节情绪与自主神经功能", "当求助者在放松训练中出现烦躁情绪时,应立即停止训练", "放松训练无需专业指导,求助者可自行看视频掌握"], "a": 2, "e": "渐进式肌肉放松法的正确操作是依次紧张、放松全身各个肌肉群,调节自主神经功能,缓解焦虑情绪,C正确。A错误,放松训练掌握后可迁移至日常生活场景中;B错误,放松训练通常先进行呼吸训练,再进行肌肉放松;D错误,训练中出现烦躁可调整呼吸节奏,无需立即停止;E错误,放松训练需要专业指导才能掌握正确操作方法,自行练习容易操作不规范影响效果。", "type": "single"}, {"q": "关于90项症状清单(SCL-90),下列说法正确的是", "o": ["共包含90个测验项目,划分10个症状因子,属于自评式心理症状筛查量表", "共包含100个测验项目,仅用于评估精神病性障碍,属于他评量表", "总分超过160分即可确诊为重型精神疾病", "施测时不需要向被试说明测验用途,避免刻意隐瞒", "仅可用于18岁以上成年群体,不适用于未成年人"], "a": 0, "e": "SCL-90共包含90个项目,划分为10个症状因子,属于自评量表,用于筛查不同类型的心理症状严重程度,因此A正确。B错误,项目数量、评估范围和评定方式均错误;C错误,SCL-90得分仅反映症状严重程度,无绝对诊断标准,不能直接确诊精神疾病;D错误,施测时需要向被试说明测验目的,获得被试配合;E错误,SCL-90可用于16岁以上的青少年群体,并非仅适用于18岁以上成人。", "type": "single"}, {"q": "求助者,女,20岁,大二学生,因宿舍人际关系矛盾出现烦躁、入睡困难,持续1个月半仍未缓解,尚能正常上课,主动求助咨询,初诊评估为一般心理问题,下列描述符合该诊断标准的是", "o": ["病程超过3个月,负性情绪已经泛化,社会功能中度受损", "由现实人际刺激引发,病程不足2个月,情绪未泛化,社会功能轻度受损", "病程超过半年,情绪泛化,社会功能严重受损", "由未变形的内心冲突引发,情绪泛化,社会功能受损", "无明确现实诱因,情绪低落持续超过2个月"], "a": 1, "e": "一般心理问题的诊断标准为:由现实刺激引发的常形内心冲突,病程1-2个月,负性情绪未泛化,社会功能轻度受损,不影响正常学习工作,因此B正确。A属于严重心理问题的表现;C符合抑郁发作的病程特征;D是神经症性心理问题的特征;E无明确现实诱因不符合一般心理问题的诱发特点。", "type": "single"}, {"q": "求助者,男,17岁,高二学生,因学业压力大出现紧张焦虑、考试发挥失常,主动前来咨询,咨询师使用解释技术时,符合规范要求的做法是", "o": ["直接给求助者下诊断“你这是焦虑症,必须去精神科吃药”", "结合求助者的成长经历和表述,用通俗易懂的语言解释其问题产生的原因", "直接说教“你就是想太多了,放平心态自然就好了”", "要求求助者必须接受咨询师给出的解释", "跳过求助者的情绪表达,直接解释问题的根源"], "a": 1, "e": "解释技术的正确应用要求咨询师结合求助者的实际情况,用求助者能够理解的语言解释其心理问题,避免使用晦涩的专业术语,尊重求助者的接受程度,因此B正确。A未经规范诊断直接下结论违反职业伦理;C属于指导性建议,不是正确的解释技术;D强制要求求助者接受解释,违背了求助者中心的自主性原则;E忽略求助者情绪表达不符合咨询关系建立的要求。", "type": "single"}, {"q": "求助者,女,29岁,因职场人际关系紧张前来咨询,咨询中求助者说到“我每次和领导汇报工作都特别怕出错”,咨询师回应道“你刚刚说每次面对领导汇报都很担心出错,同时我发现你说到这里的时候攥紧了拳头,呼吸也变快了,对吗?”,该咨询师的回应包含哪两种咨询技术", "o": ["内容反应与情感反应", "内容反应与非言语行为反馈", "情感反应与具体化技术", "具体化技术和面质技术", "解释技术与内容反应"], "a": 1, "e": "内容反应技术是指咨询师复述求助者表达的核心言语内容,帮助求助者明确自身表达;非言语行为反馈是指咨询师指出求助者表现出的肢体动作、神态等非言语表现,帮助求助者觉察自身状态,题干中的回应同时包含了复述求助者内容、反馈非言语行为两个部分,因此B正确。A未包含情感反应,情感反应是针对求助者的情绪进行反馈,题干没有涉及;C、D、E均不符合题干中两种技术的组合。", "type": "single"}, {"q": "下列哪种情况属于心理咨询的保密例外情形", "o": ["求助者透露自己大学期间曾经旷课被通报批评", "求助者告知咨询师自己已经准备了刀具,三日内要伤害长期霸凌自己的同事", "求助者透露自己私下经常熬夜刷手机", "求助者说自己和父母吵架冷战了一周", "求助者透露自己曾经工作中犯过错误被罚款"], "a": 1, "e": "保密例外的核心情形包括求助者存在明确的伤害自身或伤害他人安全的计划,选项B中求助者有明确的伤害计划,严重危害他人生命安全,属于保密例外,咨询师需要按规范上报相关方,因此B正确。其余选项均不涉及严重伤害自身或他人安全的情形,不属于保密例外。", "type": "single"}, {"q": "求助者,女,26岁,上班途中突发强烈心慌、胸闷、濒死感,被送往急诊后未发现器质性病变,初步怀疑惊恐障碍,下列关于惊恐障碍的评估要点描述正确的是", "o": ["发作通常持续超过2小时,伴随持续的肢体麻木症状", "发作时意识模糊,发作前一定有明确的压力触发事件", "发作突然,表现为强烈的恐惧、濒死感,持续时间多为数分钟到数十分钟", "发作后一定会持续出现情绪低落、兴趣减退的症状", "惊恐障碍仅会在夜间休息时发作"], "a": 2, "e": "惊恐障碍的核心特点是突发的强烈恐惧、濒死感或躯体不适感,发作时意识清晰,无明确的触发因素,持续时间多为数分钟至数十分钟,因此C正确。A错误,发作持续时间通常不超过1小时;B错误,惊恐障碍发作大多无明确触发因素,发作时意识清晰;D错误,情绪低落兴趣减退是抑郁发作的核心症状,不是惊恐障碍发作后的典型表现;E错误,惊恐障碍可在任何时间、任何场景下发作,无特定发作时间限制。", "type": "single"}, {"q": "求助者,男,30岁,因项目开发失败被公司问责后出现严重自我否定,认为自己什么都做不好,人生彻底没希望了,咨询师使用合理情绪疗法的产婆术式辩论,下列提问符合该技术要求的是", "o": ["“你为什么会觉得一次项目失败就说明你整个人都不行呢?”", "“如果你一直保持这个想法,你觉得最后会出现的最坏结果是什么?”", "“你这个想法完全不对,一次失败不能说明你的能力不行”", "“你应该赶紧调整想法,不要一直陷在负面情绪里”", "“你要不要赶紧换一份新工作,重新开始呢?”"], "a": 1, "e": "产婆术式辩论是合理情绪疗法中常用的辩论技术,核心是引导求助者自主思考不合理信念带来的不良后果,从而主动意识到自身信念的不合理性,选项B符合该技术的提问逻辑,因此B正确。A属于普通的开放式提问,不属于辩论技术;C、D属于说教,不符合产婆术引导思考的原则,也违背了咨询的共情要求;E属于给求助者提建议,不属于产婆术辩论技术。", "type": "single"}, {"q": "求助者,男,24岁,硕士研究生,因毕业论文盲审不通过出现情绪崩溃,主动前来咨询,咨询师需要评估其自杀风险,下列表现属于高自杀风险的是", "o": ["求助者反复说“活着太辛苦了,不如死了算了”,但是没有具体的计划", "求助者突然还清所有欠款,给所有亲友写了告别信,网购了大量安眠药物", "求助者情绪低落,但仍然可以正常吃饭,和导师沟通修改论文的事情", "求助者主动找同学倾诉自己的负面情绪,请求同学陪伴", "求助者不愿意和咨询师讨论毕业之后的规划"], "a": 1, "e": "高自杀风险需同时具备明确自杀意图、自杀计划与自杀工具,B符合上述全部条件,属于高自杀风险。A仅存在自杀意念但无具体计划,风险等级较低;C、D中求助者仍保持正常社会功能,主动寻求社会支持,自杀风险较低;E仅表现为对未来规划的回避,未体现明确自杀意图与计划,不属于高自杀风险。", "type": "single"}, {"q": "结合背景信息初步评估,该求助者最可能的诊断是:", "o": ["偏执型人格障碍", "惊恐发作", "疑病障碍", "社交焦虑障碍", "强迫障碍", "恶劣心境"], "a": 2, "e": "该求助者存在持续的疑病观念,反复就医检查仍无法打消疑虑,社会功能受损,符合疑病障碍的评估标准。A选项无长期一贯的偏执人格特征;B选项无突发的强烈濒死感等惊恐核心表现;D选项无针对社交场景的焦虑回避;E选项无反复的强迫思维或强迫行为;F选项无持续两年以上的情绪低落,因此排除其余选项。", "type": "single"}, {"q": "针对该求助者的情况,最适合选用的心理测验是:", "o": ["SCL-90症状自评量表", "罗夏墨迹测验", "图画日记测验", "EPQ艾森克人格问卷", "比奈-西蒙智力量表", "韦氏儿童智力量表"], "a": 0, "e": "SCL-90可全面评估求助者的躯体症状、焦虑、疑病等整体心理状态,适配本次评估需求。B、C选项为投射性测试,不适用于当前心理健康症状的评估;D选项用于人格特征测查,不适用于评估当前病理水平的心理症状;E、F选项用于智力评估,均不符合本次场景,排除。", "type": "single"}, {"q": "结合背景信息初步评估,该求助者最可能的诊断是:", "o": ["一般心理问题", "严重心理问题", "创伤后应激障碍", "广泛性焦虑障碍", "抑郁发作", "偏执性精神病"], "a": 2, "e": "该求助者由明确的重大创伤事件引发,病程超过1个月,存在闯入性回忆、回避行为、警觉性增高、睡眠障碍等典型PTSD症状,符合创伤后应激障碍的评估标准。A选项病程不符合且无创伤相关闯入症状;B选项无泛化的创伤关联情绪反应;D选项无漂浮性焦虑,存在明确的创伤相关触发点;E选项无持续情绪低落的核心抑郁症状,抑郁仅为伴随症状;F选项无精神病性症状,因此排除其余选项。", "type": "single"}, {"q": "当该求助者向咨询师说“我现在根本不敢出门,我这辈子都没法正常工作了”,咨询师最恰当的回应是:", "o": ["“你必须勇敢一点,克服恐惧出门试试”", "“我理解你的恐惧,我们可以一步步慢慢调整”", "“你这个情况很严重,得赶紧住院吃药治疗”", "“我帮你联系交管部门协商事故赔偿的事情”", "“这种车祸不会再发生在你身上了,放心吧”", "“你的朋友都会陪着你,不用害怕”"], "a": 1, "e": "咨询师应共情接纳求助者的恐惧感受,建立安全稳定的咨询关系,逐步引导调整,B选项符合咨询回应的要求。A选项强制要求违背求助者的自主意愿,易引发阻抗;C选项未完成全面评估就直接建议住院,不符合咨询流程;D选项超出心理咨询的职责范围;E、F选项属于过度承诺,无法解决核心的焦虑问题,因此排除其余选项。", "type": "single"}, {"q": "结合背景信息初步评估,该求助者最可能的诊断是:", "o": ["一般心理问题", "严重心理问题", "神经性贪食症", "神经性厌食症", "惊恐发作", "进食障碍不属于心理问题不用处理"], "a": 2, "e": "该求助者存在反复暴食、催吐导泻的行为,过度担心发胖,体重处于正常范围,符合神经性贪食症的评估标准。A选项病程超过6个月,存在明显异常的进食行为,不符合一般心理问题;B选项无泛化的负性情绪反应;D选项神经性厌食症体重明显低于正常标准,不符合;E选项无突发惊恐的核心症状;F选项表述错误,因此排除其余选项。", "type": "single"}, {"q": "当该求助者向咨询师说“我现在胖得很难看,根本没有人会喜欢我”,咨询师最恰当的回应是:", "o": ["“你太想多了,你一点都不胖啊”", "“我理解你的感受,我们可以一起调整你这个想法”", "“你应该立刻停止减肥了”", "“你的爸爸妈妈肯定不会嫌弃你的”", "“你这个想法太极端了,不对”", "“我帮你联系营养师帮你继续减肥”"], "a": 1, "e": "咨询师应共情接纳求助者的感受,引导其修正不合理信念,B选项符合咨询回应的要求。A选项直接否定求助者的感受,容易引发咨询阻抗;C选项强制要求违背求助者的自主意愿;D选项不能解决求助者的核心认知偏差,属于无效回应;E选项直接否定贬低求助者的想法,不利于建立咨询关系;F选项超出咨询职责,也不符合干预方向,因此排除其余选项。", "type": "single"}, {"q": "结合案例背景,对该求助者的初步识别最可能是以下哪项?", "o": ["一般心理问题", "严重心理问题", "老年抑郁发作", "广泛性焦虑障碍", "适应障碍", "精神病性障碍"], "a": 2, "e": "该求助者在丧亲应激后出现了情绪低落、兴趣减退、自我评价降低、睡眠食欲紊乱、自杀意念等典型老年抑郁发作核心症状,病程超过2周,社会功能受损,符合老年抑郁发作的评估标准。A选项:一般心理问题病程较短,情绪反应未泛化,本例病程超10个月且存在核心抑郁症状群,不符合;B选项:严重心理问题无明确的抑郁核心症状群,本例症状符合疾病诊断标准,排除;D选项:广泛性焦虑障碍核心是无明确对象的持续性焦虑不安,本例核心为抑郁症状,不符合;E选项:适应障碍不会出现典型的抑郁核心症状群,且病程和症状程度不符合;F选项:本例无幻觉妄想等精神病性症状,排除。", "type": "single"}, {"q": "当该求助者在咨询中主动向咨询师说起“我已经不想活了”,咨询师最恰当的回应是以下哪项?", "o": ["“年纪大了不要胡思乱想,别往坏处想”", "“我能感受到你现在特别痛苦,我们可以一起说说你现在的感受”", "“你这么说太对不起你的子女了,他们白养你了”", "“我现在立刻给你的子女打电话让他们马上回来”", "“你这个情况必须马上住院,赶紧去精神科”", "“你以前还参加那么多志愿活动,应该想开一点开心起来”"], "a": 1, "e": "当求助者表露自杀意念时,咨询师首先需要共情接纳求助者的情绪,建立安全的咨询关系,之后再开展风险评估与干预,B选项符合共情与尊重的要求。A选项是否定求助者的感受,容易引发求助者的抵触,关闭沟通;C选项是指责贬低求助者,违背尊重的咨询原则;D选项:联系子女需要征得求助者同意,不能擅自行动;E选项:直接转介需要先完成评估和建立关系,不能直接否定咨询的作用直接转介;F选项是回避求助者的情绪问题,错失干预时机,因此ACDEF错误。", "type": "single"}, {"q": "对该求助者的初步评估最可能是以下哪项?", "o": ["一般心理问题", "严重心理问题", "注意缺陷与多动障碍", "品行障碍", "特定学习障碍", "抑郁发作"], "a": 2, "e": "该求助者存在持续的注意力不集中、多动冲动核心症状,病程超过6个月,已经影响到课堂学习和同伴交往功能,已经排除器质性病变,符合注意缺陷与多动障碍的评估标准。A选项:一般心理问题没有明确的注意力缺陷与多动的核心症状群,本例症状符合疾病诊断标准,排除;B选项:严重心理问题无该类核心症状群,排除;D选项:品行障碍核心是反复的攻击性、破坏规则的反社会行为,本例核心症状是注意力缺陷,不符合;E选项:特定学习障碍核心是特定学习技能发育障碍,本例无明确的学习技能缺陷,排除;F选项:本例无抑郁发作核心症状,排除。", "type": "single"}, {"q": "当求助者的父亲在咨询中向咨询师说到“我现在真的不知道该怎么管教他了,完全没办法”,咨询师最恰当的回应是以下哪项?", "o": ["“你必须严格按照我给你说的方法做,肯定能好”", "“我特别理解你现在的无助和着急,我们可以一起探讨适合孩子的管教方式”", "“都是因为你管的太严了,才把孩子逼成这样的”", "“我直接联系你们孩子的班主任,让老师在学校管他就行”", "“孩子出问题都是家长的责任,你平时陪伴太少了”", "“孩子就是太调皮了,长大自然就好了,不用管”"], "a": 1, "e": "咨询师需要共情接纳家长的情绪,和家长共同商定干预方案,B选项符合咨询的共情和共同商定原则,因此正确。A选项:强制要求家长遵循咨询师的方法,违背了咨询中双方共同商定方案的原则,错误;C选项:否定家长的管教方式,容易引发家长的抵触情绪,破坏咨询关系,错误;D选项:直接联系老师超出了咨询的职责范围,也需要征得家长同意,错误;E选项:指责家长,违背尊重的咨询原则,破坏关系,错误;F选项:否定干预的必要性,是不负责任的回应,错误。", "type": "single"}, {"q": "结合背景信息对该求助者做初步评估,最可能的诊断是:", "o": ["一般心理问题", "严重心理问题", "人格障碍", "惊恐发作", "恶劣心境", "精神病性障碍"], "a": 1, "e": "该求助者由明确现实刺激(工作失误被批评)引发问题,病程超过2个月,情绪出现泛化(回避教研组活动、担心被辞退),社会功能受损(工作出错、回避社交),符合严重心理问题的诊断标准。A选项一般心理问题病程≤2个月且无泛化,不符合;C选项无一贯人格偏离表现,排除;D选项惊恐发作无固定应激源,以突发濒死感为核心表现,不符合;E选项恶劣心境是慢性持续性心境低落,病程超过2年,不符合;F选项无精神病性症状,排除。", "type": "single"}, {"q": "针对该求助者目前存在的焦虑情绪困扰,想要评估其焦虑程度,最适合选用的心理测验是:", "o": ["MMPI明尼苏达多相人格测验", "SAS焦虑自评量表", "韦氏成人智力量表", "16PF卡特尔16种人格因素测验", "瑞文标准推理测验", "主题统觉测验"], "a": 1, "e": "SAS焦虑自评量表的作用就是评估个体焦虑情绪的严重程度,符合本次评估需求,因此B正确。A选项MMPI主要用于精神疾病的临床筛查;C选项韦氏智力量表用于智力水平评估;D选项16PF用于人格特质的测查;E选项瑞文推理测验用于非文字智力的评估;F选项主题统觉测验属于投射测验,用于测查人格动机,均不符合本次需求,因此排除ACDEF。", "type": "single"}, {"q": "结合背景信息做初步评估,该求助者最可能的诊断是:", "o": ["一般心理问题", "严重心理问题", "特定恐怖症(社交恐怖)", "广泛性焦虑障碍", "强迫障碍", "抑郁发作"], "a": 2, "e": "该求助者的恐惧对象明确为公开社交、当众展示/发言的场景,已经出现了明显的回避行为,符合特定恐怖症(社交恐怖)的诊断标准,因此C正确。A选项一般心理问题不会出现明显的严重回避行为,不符合;B选项严重心理问题没有固定特定的恐惧对象,不符合;D选项广泛性焦虑障碍没有固定的恐惧场景,是持续性的自由浮动性焦虑,不符合;E选项强迫障碍以反复出现的强迫思维或强迫动作为核心表现,不符合;F选项没有持续情绪低落等抑郁核心症状,排除。", "type": "single"}, {"q": "当该求助者提到因为社交恐惧错过了秋招所有招聘机会,不知道接下来该怎么办时,咨询师正确的做法是:", "o": ["直接帮求助者联系自己认识的企业HR推荐工作", "直接打电话把求助者的情况告诉其父母", "和求助者一起讨论适合他的应对策略", "直接转介到精神科开抗焦虑药物", "转移话题不谈这个问题,继续原定咨询内容", "承诺不管发生什么都为求助者绝对保密"], "a": 2, "e": "当求助者面临现实困境时,咨询师的正确做法是和求助者共同探讨解决应对策略,尊重求助者的自主决定权,因此C正确。A选项越权替求助者做决策,超出了咨询师的工作范围;B选项无关情况随意告知家属违背保密原则;D选项没有评估需求就直接转介,不符合咨询要求;E选项忽略求助者的现实困扰,会错失干预时机,影响咨询关系;F选项绝对保密的承诺不符合保密例外的伦理要求,因此ABDEF均排除。", "type": "single"}, {"q": "结合背景信息做初步评估,该求助者最可能的诊断是:", "o": ["一般心理问题", "严重心理问题", "产后抑郁发作", "广泛性焦虑障碍", "适应障碍", "精神分裂症"], "a": 2, "e": "该求助者在产后应激背景下发病,存在持续情绪低落、自我评价降低、睡眠食欲下降、自杀意念等抑郁发作的典型症状,病程超过2周,符合产后抑郁发作的评估标准,因此C正确。A选项一般心理问题不会出现严重躯体症状和自杀意念,程度不符合;B选项严重心理问题不符合抑郁发作的诊断框架;D选项广泛性焦虑障碍没有固定的焦虑对象,核心不是持续情绪低落;E选项适应障碍没有明确的符合抑郁发作的核心症状;F选项没有精神病性症状,排除。", "type": "single"}, {"q": "当该求助者向咨询师提及自己有自杀意念时,咨询师正确的伦理做法是:", "o": ["不征求求助者同意直接报警并通知家属", "严格保密,不告诉任何人", "和求助者讨论自杀风险,同时在保密原则允许下联系家属告知情况", "直接转介到精神科,不需要做任何干预", "忽略这个话题,继续原来的咨询", "承诺为求助者绝对保密"], "a": 2, "e": "当求助者存在自杀意念时,属于保密例外的情况,咨询师需要和求助者讨论自杀风险,同时在保护求助者安全的前提下联系家属告知情况,因此C正确。A选项直接不告知求助者就通知报警家属,不符合伦理;B选项严格保密会延误干预时机,置求助者于危险中,错误;D选项直接转介不做处理不符合咨询师的伦理要求;E选项忽略话题会错失干预时机;F选项承诺绝对保密违背了保密例外的伦理要求,因此ABDEF均排除。", "type": "single"}, {"q": "结合背景信息进行初步评估,该求助者最可能识别为:", "o": ["一般心理问题", "严重心理问题", "考试焦虑", "广泛性焦虑障碍", "抑郁发作", "强迫障碍"], "a": 2, "e": "该求助者症状由明确的考试应激事件引发,核心症状为考前紧张、认知功能下降、回避模考训练,符合考试焦虑的评估标准。A选项一般心理问题病程通常≤2个月,且无明显回避行为,不符合;B选项严重心理问题无固定指向的特定焦虑对象;D选项广泛性焦虑无明确固定应激源,为泛化的持续焦虑;E选项无持续情绪低落、兴趣减退等抑郁核心症状;F选项无强迫观念或强迫行为,因此排除ABDEF。", "type": "single"}, {"q": "针对该求助者的考试焦虑,最适合选用的心理测验是:", "o": ["SAS焦虑自评量表", "SDS抑郁自评量表", "比奈-西蒙智力量表", "EPQ艾森克人格问卷", "瑞文推理测验", "MMPI-2明尼苏达多项人格测验第二版"], "a": 0, "e": "SAS焦虑自评量表可有效评估求助者当前焦虑情绪的严重程度,适配本次评估需求。B选项SDS用于抑郁情绪评估,不符合需求;C、E选项用于智力水平评估,和本次症状无关;D选项EPQ用于人格特质测评,不适用于评估当前焦虑程度;F选项MMPI-2多用于精神疾病筛查,不符合本次评估场景,因此排除BCDEF。", "type": "single"}, {"q": "结合背景信息进行初步评估,该求助者最可能识别为:", "o": ["一般心理问题", "严重心理问题", "强迫障碍", "广泛性焦虑障碍", "社交恐怖症", "抑郁发作"], "a": 2, "e": "该求助者存在反复检查的典型强迫行为,明知不必要但无法控制,伴随焦虑情绪,已经出现社会功能受损,符合强迫障碍的评估标准。A选项一般心理问题不会出现典型强迫症状,程度病程也不符合;B选项严重心理问题无固定强迫症状表现;D选项广泛性焦虑无固定强迫行为;E选项社交恐怖症是对社交场景存在特定恐惧,和本例表现不符;F选项本例无抑郁核心症状,因此排除ABDEF。", "type": "single"}, {"q": "当该求助者向咨询师提及“我控制不住自己反复检查,真的太没用了”时,咨询师最恰当的回应是:", "o": ["“这种问题很容易纠正,很快就能好了”", "“我理解你现在的痛苦,我们可以一起慢慢调整”", "“你必须立刻停止这种行为”", "“这是你的问题,只能靠你自己解决”", "“我帮你直接联系精神科医生开药”", "“你怎么连这种小事都控制不住”"], "a": 1, "e": "该题考查咨询关系建立中共情技术的应用,咨询师需要共情接纳求助者的痛苦,和求助者共同面对问题,B选项符合要求。A选项属于过度承诺,后续容易引发求助者失望;C选项强制要求改变,违背求助者自主意愿;D选项推卸咨询师责任,不利于建立安全的咨询关系;E选项未评估就直接转介开药,不符合咨询设置;F选项贬低否定求助者,违背尊重求助者的原则,因此排除ACDEF。", "type": "single"}, {"q": "咨询师在初诊接待该求助者时,正确的做法包括:", "o": ["不轻易否定求助者感受到的躯体不适", "避免与求助者争论医学检查结果的准确性", "严格要求求助者立刻停止每日摸腹部的行为", "明确告知求助者目前所有检查结果都未见异常", "认真倾听求助者对于患癌担忧的主诉", "不需要建立咨询关系直接转介到精神科"], "a": [0, 1, 3, 4], "e": "初诊接待需尊重求助者的感受,不轻易否定,不争论检查结果,认真倾听主诉,明确告知检查结果,因此ABDE正确。C选项强制停止行为违背求助者自主意愿;F选项直接转介也需先完成初诊评估建立咨询关系,排除。", "type": "multi"}, {"q": "针对该求助者的疑病观念与焦虑情绪,可选用的咨询技术包括:", "o": ["合理情绪疗法", "认知行为疗法", "满灌疗法", "放松训练", "矛盾意向法", "厌恶疗法"], "a": [0, 1, 3], "e": "合理情绪疗法可修正“我肯定得了胃癌没查出来”的不合理信念;认知行为疗法可纠正反复检查的行为模式;放松训练可缓解焦虑引发的躯体不适症状。C选项满灌疗法多用于特定恐怖症或创伤后应激障碍;E、F选项不符合疑病障碍的干预逻辑,排除。", "type": "multi"}, {"q": "咨询师需重点补充收集的资料包括:", "o": ["创伤事件后情绪和行为反应的发展过程", "求助者对本次创伤事件的认知评价", "当前社会支持系统的具体状况", "睡眠障碍的具体表现和变化过程", "既往是否出现过类似的情绪心理问题", "求助者日常的出行路线安排"], "a": [0, 1, 2, 3, 4], "e": "A选项可明确症状发展轨迹;B选项可了解认知偏差的来源;C选项可明确社会支持对康复的影响;D选项可评估躯体症状的严重程度;E选项可辅助判断症状的稳定性。F选项日常出行路线安排和求助者的症状没有直接关联,因此排除。", "type": "multi"}, {"q": "针对该求助者的回避行为,可选用的咨询技术包括:", "o": ["暴露疗法", "认知行为疗法", "放松训练", "系统脱敏疗法", "自由联想", "厌恶疗法"], "a": [0, 1, 2, 3], "e": "暴露疗法可帮助求助者直面创伤相关场景,降低恐惧反应;认知行为疗法可修正“所有非机动车出行都不安全”的不合理信念;放松训练可缓解焦虑引发的躯体症状;系统脱敏疗法可建立恐惧等级逐步适应。E选项精神分析的自由联想不适用于当前创伤回避行为的干预;F选项厌恶疗法不符合创伤后应激障碍干预的伦理要求,因此排除。", "type": "multi"}, {"q": "咨询师需要重点补充收集的资料包括:", "o": ["暴食催吐行为的具体触发因素", "求助者对自身体重和外形的认知评价", "家庭对其减肥行为的态度", "月经异常的具体情况和就医经过", "既往是否存在情绪心理问题史", "学校的社团活动安排"], "a": [0, 1, 2, 3, 4], "e": "A选项可明确行为的触发机制,帮助制定干预方案;B选项可了解认知偏差的来源;C选项可明确家庭环境和支持因素对症状的影响;D选项可评估躯体并发症的严重程度;E选项可辅助判断症状的稳定性。F选项学校社团活动安排和求助者的症状没有直接关联,因此排除。", "type": "multi"}, {"q": "针对该求助者的暴食催吐行为,可选用的咨询技术包括:", "o": ["认知行为疗法", "合理情绪疗法", "电抽搐治疗", "阳性强化法", "精神分析", "自由联想"], "a": [0, 1, 3], "e": "认知行为疗法可修正“只有瘦才是美的,瘦才会被人喜欢”的不合理信念;合理情绪疗法可调整认知偏差,缓解焦虑情绪;阳性强化法可强化求助者的正常进食行为,减少暴食催吐发作。C选项电抽搐疗法多用于严重抑郁有自杀倾向的情况,不适用于进食障碍;E精神分析、F自由联想不针对暴食催吐的具体行为进行干预,因此排除。", "type": "multi"}, {"q": "咨询师在初诊接待该老年求助者时,需要注意的事项包括以下哪些?", "o": ["适当放慢讲话语速,尽量使用求助者容易理解的口语化表达", "直接联系求助者子女告知目前的抑郁风险", "耐心倾听求助者的表达,不随意打断其叙述", "尽量避免直接使用生硬的专业诊断词汇,如直接说“你这是抑郁发作”", "初诊时就明确向求助者说明保密原则以及保密例外的情况", "初诊接待后立刻直接转介到精神科门诊,无需继续咨询"], "a": [0, 2, 3, 4], "e": "针对老年求助者开展初诊接待,需要调整沟通方式,尊重求助者,同时遵守咨询设置,因此ACDE正确。B选项:联系家属需要事先征得求助者本人同意,不能未经同意直接联系,违反保密原则;F选项:直接转介需要先完成评估,明确风险后再按流程处理,不能初诊就直接转介,因此BF错误。", "type": "multi"}, {"q": "针对该求助者存在的自杀意念,咨询师需要优先完成的评估内容包括以下哪些?", "o": ["自杀意念出现的频率以及强度", "求助者是否已经形成具体的自杀实施计划", "求助者目前可获得的社会支持系统情况", "求助者既往是否曾经出现过自杀未遂的行为", "求助者配偶去世时的具体细节", "求助者子女的具体收入与职业情况"], "a": [0, 1, 2, 3], "e": "自杀风险的优先级评估,核心内容包括自杀意念的强度频率、是否有具体自杀计划、既往自杀未遂史、当前社会支持情况,这些都是直接影响自杀风险等级判断的核心要素,因此ABCD正确。E选项:丧偶的具体细节和当前自杀风险无直接关联,不属于优先评估内容;F选项:子女的工作收入情况和自杀风险评估没有直接关联,因此EF错误,排除。", "type": "multi"}, {"q": "咨询师在初诊接待该求助者时,需要重点收集的资料包括以下哪些?", "o": ["课堂上注意力不集中的具体表现和每周出现的频率", "家人管教方式分歧的具体细节", "既往医院所有检查结果的具体内容", "求助者和同班同学相处的具体情况", "父母日常陪伴孩子的时间和各自的管教模式", "求助者的身高体重等基础躯体指标"], "a": [0, 1, 2, 3, 4], "e": "A选项可以帮助明确症状的严重程度;B选项可以帮助了解家庭环境对症状的影响;C选项可以进一步辅助排除器质性病变;D选项可以明确求助者社交功能受损的情况;E选项可以了解家庭中的影响因素,这些都和本次评估与咨询相关,因此ABCDE正确。F选项:身高体重基础指标和本次的多动、注意力缺陷症状没有直接关联,不需要重点收集,因此排除。", "type": "multi"}, {"q": "针对该求助者的多动和注意力缺陷症状,心理咨询中可以选用的技术包括以下哪些?", "o": ["行为矫正疗法", "阳性强化法", "认知行为疗法", "自由联想", "厌恶疗法", "暴露疗法"], "a": [0, 1, 2], "e": "行为矫正疗法可以通过行为契约等方式调整多动冲动行为;阳性强化法可以强化求助者集中注意力、遵守规则等积极行为,减少问题行为;认知行为疗法可以帮助修正求助者的冲动行为模式,调整认知,因此ABC正确。D选项:自由联想是精神分析疗法的技术,不适用于儿童注意缺陷多动障碍的干预,排除;E选项:厌恶疗法通过惩罚减少行为,不符合儿童心理咨询的伦理要求,排除;F选项:暴露疗法主要用于创伤后应激障碍、恐怖症等,不适用于该案例的症状,排除。", "type": "multi"}, {"q": "咨询师在初诊接待该求助者时,正确的做法包括:", "o": ["避免使用晦涩的专业术语,用求助者能理解的语言沟通", "主动询问夫妻私生活细节等隐私内容", "明确向求助者说明保密原则以及保密例外的情况", "初诊阶段不随意给求助者下最终诊断结论", "全神贯注倾听,不随便打断求助者的表达", "不与求助者沟通,提前制定好咨询方案"], "a": [0, 2, 3, 4], "e": "初诊接待的注意事项要求:需避免使用过于专业的术语,明确告知保密原则及保密例外,咨询过程中认真倾听不打断,初诊阶段不直接给出最终评估结论,因此ACDE正确。B选项询问隐私内容必须先征得求助者同意,主动询问不符合要求;F选项咨询方案需要和求助者共同商定,提前预设违背咨询原则,因此BF错误排除。", "type": "multi"}, {"q": "咨询师和该求助者制定咨询方案时,咨询方案应当包含的内容有:", "o": ["明确咨询目标,比如改善睡眠质量、缓解焦虑情绪", "确定本次咨询使用的具体方法,比如系统脱敏疗法", "约定咨询的次数以及每次咨询的时间安排", "明确咨询的收费标准和付费方式", "说明求助者和咨询师双方的权利与义务", "公开咨询师的私人婚恋、收入等隐私信息"], "a": [0, 1, 2, 3, 4], "e": "根据个体心理咨询方案的要求,完整的咨询方案包含:咨询目标、咨询的具体方法、咨询次数与时间安排、咨询费用、双方的权利义务等内容,因此ABCDE正确。F选项咨询师的个人隐私不属于咨询方案需要包含的内容,因此排除。", "type": "multi"}, {"q": "咨询师和该求助者建立良好咨询关系的核心要素包括:", "o": ["尊重求助者的社交恐惧感受,不强迫求助者立刻当众发言", "热情接待求助者,营造安全放松的咨询氛围", "直接向求助者表达自己对社交恐惧的个人看法", "共情理解求助者面对社交场景时的痛苦感受", "积极关注求助者哪怕微小的改变尝试", "直接指导求助者每天必须去人多的场合锻炼社交"], "a": [0, 1, 3, 4], "e": "建立良好咨询关系的核心要素包括尊重、热情、真诚、共情、积极关注,其中真诚要求咨询师真诚可信,而非随意表达个人主观看法,因此C错误;F选项直接指导求助者强行社交属于咨询技术,不属于建立咨询关系的核心要素,且不符合尊重的要求,因此排除,ABDE符合核心要素要求,所以正确。", "type": "multi"}, {"q": "针对该求助者的社交回避行为,可选用的咨询技术包括:", "o": ["系统脱敏疗法", "合理情绪疗法", "冲击暴露疗法", "阳性强化法", "放松训练", "矛盾意向法"], "a": [0, 1, 2, 3, 4], "e": "系统脱敏疗法可以建立恐惧等级,逐步缓解求助者的回避行为;合理情绪疗法可以修正求助者“当众出错就全完了”的不合理信念;暴露疗法可以让求助者直接面对恐惧场景,降低恐惧反应;阳性强化法可以强化求助者的正向社交行为;放松训练可以缓解社交前的焦虑躯体症状,以上方法均适合该求助者的情况,因此ABCDE正确。F选项矛盾意向法多用于改善失眠等问题,不符合本案例场景,因此排除。", "type": "multi"}, {"q": "咨询师初诊接待时,需要重点补充收集的资料包括:", "o": ["产后情绪变化的具体发展过程", "求助者对母亲这个角色的认知和看法", "目前能够获得的社会支持的具体情况", "睡眠和食欲变化的详细情况", "既往是否出现过类似的情绪问题", "孩子的星座和出生具体日期"], "a": [0, 1, 2, 3, 4], "e": "明确情绪变化的时间线可以帮助了解症状发展轨迹,A正确;了解求助者对母亲角色的认知可以找到认知偏差的来源,B正确;明确社会支持系统的具体情况可以判断社会支持对情绪的影响,C正确;详细了解睡眠食欲变化可以评估躯体症状的严重程度,D正确;了解既往是否有类似情绪问题可以辅助判断症状性质,E正确。F选项孩子的星座和出生日期和求助者的情绪问题没有直接关联,不需要重点收集,因此排除。", "type": "multi"}, {"q": "针对该求助者的情况,可以选用的心理测验包括:", "o": ["SDS抑郁自评量表", "SAS焦虑自评量表", "SCL-90症状自评量表", "16PF卡特尔人格因素测验", "MMPI明尼苏达多相人格测验", "韦氏成人智力量表"], "a": [0, 1, 2], "e": "SDS抑郁自评量表可以评估求助者抑郁情绪的严重程度,SAS可以评估抑郁伴随的焦虑情绪,SCL-90可以全面评估求助者整体的心理症状水平,均适合本案例,因此ABC正确。D选项16PF是人格测验,不属于本次评估需要优先选用的测验;E选项MMPI主要用于重性精神疾病的筛查,不符合本案例的评估需求;F选项韦氏智力量表用于智力评估,和本次症状无关,因此排除DEF。", "type": "multi"}, {"q": "咨询师在初诊接待该求助者时,需重点收集的资料包括:", "o": ["求助者对考研上岸的认知评价", "模考过程中的具体情绪体验", "既往应对压力的方式", "家庭对其考研的期望态度", "求助者的睡眠具体情况", "辅导员的日常工作风格"], "a": [0, 1, 2, 3, 4], "e": "A选项可帮助了解求助者是否存在不合理信念,明确问题来源;B选项可明确症状具体表现与严重程度;C选项可评估求助者既往应对压力的能力,为制定咨询方案提供参考;D选项可明确家庭层面的影响因素,梳理社会支持相关信息;E选项可评估躯体症状的严重程度。F选项辅导员的工作风格与求助者自身症状无直接关联,无需重点收集,因此排除F。", "type": "multi"}, {"q": "制定该求助者的咨询方案时,可设定的符合要求的具体咨询目标包括:", "o": ["缓解考前紧张情绪,将入睡潜伏期缩短至30分钟内", "立刻停止长时间熬夜复习", "恢复模考参与意愿,每周可正常参加1次模考训练", "修正“考不上就是彻底失败”的不合理信念", "完全消除所有焦虑情绪", "将模考总分提高50分"], "a": [0, 2, 3], "e": "有效的咨询目标需要符合具体、可行、积极、属于心理学范畴的要求。A选项缓解情绪改善睡眠,符合要求;C选项帮助恢复正常学习功能,具体可行;D选项修正不合理认知属于心理学范畴的咨询目标,因此ACD正确。B选项停止熬夜复习和核心症状解决无直接关联,不属于合适的咨询目标;E选项完全消除焦虑不现实,不符合可行原则;F选项提高考试分数不属于心理学范畴的咨询目标,因此排除BEF。", "type": "multi"}, {"q": "针对该求助者的强迫行为,可选用的有效咨询技术包括:", "o": ["暴露与反应阻止法", "合理情绪疗法", "自由联想", "认知行为疗法", "厌恶疗法", "阳性强化法"], "a": [0, 1, 3], "e": "暴露与反应阻止法是目前干预强迫障碍强迫行为的首选咨询技术;合理情绪疗法可修正求助者“必须完美”的不合理信念,改善认知偏差;认知行为疗法可从认知行为层面整体干预强迫症状,三者均有效。C选项自由联想属于精神分析疗法,不直接适用于当前强迫症状的干预;E选项厌恶疗法多用于成瘾、异常性偏好等行为矫正,不适合本案例;F选项阳性强化法多用于强化新的积极行为,对已经形成的强迫行为干预效果有限,因此排除CEF。", "type": "multi"}, {"q": "咨询师和该求助者讨论强迫行为的成因时,属于合理的认知归因方向的有:", "o": ["长期高强度的工作压力", "追求完美的人格特质", "曾经因为设计出错给公司造成损失被严厉处罚的经历", "当前的月薪水平", "早期偶然的检查行为被负性强化逐渐形成习惯", "长期作息不规律导致内分泌失调"], "a": [0, 1, 2, 4], "e": "强迫障碍的相关成因包括长期应激压力、人格特质、负性创伤经历、行为学习过程中的强化等,ABCE均属于合理的归因方向。D选项月薪高低与强迫行为的发生没有直接因果关联;F选项内分泌失调与强迫行为的发生没有直接必然关联,因此排除DF。", "type": "multi"}, {"q": "求助者,女,28岁,新入职中学教师,因担心讲课出错不敢主动承担公开课任务,咨询师计划联合使用阳性强化法与合理情绪疗法开展干预,下列做法符合操作规范的有哪些?", "o": ["首先引导求助者识别“我每一节课都必须上得完美无缺”的不合理信念", "当求助者主动报名参加小型公开课后,及时给予正向肯定和鼓励", "当面指出求助者逃避行为的错误,批评其胆小懦弱促使改变", "要求求助者压抑紧张不安的情绪,只管上课不要想太多", "和求助者一起调整认知,建立“讲课出错是正常的,可以逐步调整改进”的新信念"], "a": [0, 1, 4], "e": "C选项属于惩罚性干预,违背阳性强化法正性强化的核心原则;D选项忽略求助者的情绪感受,不符合心理咨询的基本要求,错误。A、B、E分别符合合理情绪疗法的识别不合理信念、调整认知,以及阳性强化法及时强化正性行为的操作规范,因此正确。", "type": "multi"}, {"q": "初诊接待是心理咨询师和求助者的第一次正式接触,下列做法中属于初诊接待中不当行为的有哪些?", "o": ["为了拉近和求助者的距离,主动告诉求助者自己最近的感情困扰等私人生活细节", "为了让求助者安心,直接承诺“你的问题我肯定能帮你解决”", "正式开始咨询前,向求助者说明保密原则以及保密例外的情况", "机构要求积累教学案例,未经求助者同意就将其咨询记录用于课堂教学", "咨询过程中不评判求助者的行为和选择,保持中立态度"], "a": [0, 1, 3], "e": "初诊接待需保持专业边界,不得随意透露咨询师私人信息、做出绝对化解决承诺、未经同意泄露求助者的咨询内容。C、E为初诊接待的正确操作,因此不当行为为ABD。", "type": "multi"}, {"q": "关于90项症状清单(SCL-90),下列说法正确的有哪些?", "o": ["量表共包含90个项目,可划分为10个不同的症状因子", "阳性项目数指的是得分≥2分的项目的总数量", "根据中国常模标准,总分≥160分时提示受测者可能存在阳性心理症状", "可以直接根据SCL-90得分结果确诊受测者患有精神类疾病", "该量表适用于16岁及以上成年人,可进行团体施测也可个别施测"], "a": [0, 1, 2, 4], "e": "D选项错误,SCL-90仅用于心理症状的筛查,不能直接确诊精神类疾病。A、B、C、E均符合SCL-90的结构、常模标准与适用范围规范,因此正确。", "type": "multi"}, {"q": "咨询师在对求助者进行摄入性会谈收集资料时,下列提问方式符合操作规范的有哪些?", "o": ["“你近一个月的饮食状态怎么样?”", "“你是不是经常因为和父母吵架而心情低落对不对?”", "“你能具体说一说你和领导这次矛盾产生的过程吗?”", "“你为什么会对同事的玩笑这么敏感呢?”", "“你觉得你目前的困扰主要和哪些因素有关呢?”"], "a": [0, 2, 4], "e": "B选项属于带有暗示性的封闭式提问,容易引导求助者按照咨询师预设方向回答,不符合提问要求;D选项使用“为什么”提问,容易引发求助者的防御心理,不合适。A、C、E均为开放式的中性提问,符合摄入性会谈的提问规范,因此正确。", "type": "multi"}, {"q": "咨询师和求助者共同确定心理咨询目标时,下列选项符合合理咨询目标特征与咨询规范的有哪些?", "o": ["咨询目标具体可行,能够通过一定指标进行评估", "咨询目标是积极的,解决的问题属于心理学范畴", "咨询目标由咨询师根据专业经验单独制定,不需要求助者同意", "咨询目标需要经过双方共同认可,是可以实现的", "如果求助者的问题超出咨询师自身的胜任力范围,应当及时转介给合适的咨询师"], "a": [0, 1, 3, 4], "e": "C选项错误,合理咨询目标需要由咨询师和求助者共同协商制定,不能由咨询师单独确定。A、B、D、E均符合合理咨询目标的特征与转介规范,因此正确。", "type": "multi"}, {"q": "咨询师计划使用系统脱敏疗法帮助一名对乘坐电梯感到恐惧的求助者,下列操作符合系统脱敏疗法规范的有哪些?", "o": ["首先和求助者一起建立恐惧/焦虑等级,等级按照从低到高的顺序排列", "让求助者处于放松状态下,按照等级顺序依次想象对应场景", "为了快速见效,直接让求助者进入电梯面对最恐惧的场景进行训练", "开始脱敏训练之前,需要先教会求助者掌握渐进式肌肉放松方法", "当求助者在某一等级训练时出现明显焦虑,应当跳过该等级直接进入下一等级训练"], "a": [0, 1, 3], "e": "C选项错误,系统脱敏需要从最低焦虑等级开始逐步训练,不能直接进入最高等级场景;E选项错误,求助者在某一等级出现明显焦虑时,需要让求助者重新回到放松状态,反复练习该等级直到焦虑消除,不能直接跳过。A、B、D均符合系统脱敏疗法的操作规范,因此正确。", "type": "multi"}, {"q": "咨询师接待一名因长期失眠前来咨询的求助者,下列做法符合心理咨询职业伦理与操作规范的有哪些?", "o": ["根据求助者的睡眠问题,选择对应的症状评定量表,不盲目施测所有人格测验", "为了保证测验结果准确,提前告知求助者每个题目的具体计分规则", "如果评估发现求助者有高度自杀风险,应当严格保密不能联系其家属", "如果咨询师自身不擅长睡眠障碍的心理干预,应当及时评估并转介给擅长该领域的咨询师", "求助者的父母要求知道测验结果,咨询师可以直接同意告知"], "a": [0, 3], "e": "B选项错误,心理测验操作中无需告知求助者具体计分方式;C选项错误,当求助者存在自杀风险时,属于保密例外,应当及时联系家属保障安全;E选项错误,测验结果属于求助者隐私,需要征得求助者本人同意后才能告知其家属,不能直接同意。A、D符合职业伦理与操作规范,因此正确。", "type": "multi"}, {"q": "咨询师使用合理情绪疗法为求助者进行干预,下列做法符合修通阶段操作要点的有哪些?", "o": ["使用产婆术式辩论,引导求助者自己意识到自身存在的不合理信念", "帮助求助者建立新的合理信念,替代原有的不合理信念", "直接指出求助者的不合理信念,不需要求助者自行领悟", "布置认知家庭作业,让求助者自己记录日常情绪和引发情绪的信念之间的关联", "整个咨询过程中只倾听求助者表达,不做任何干预性引导"], "a": [0, 1, 3], "e": "C选项错误,合理情绪疗法修通阶段的核心是引导求助者自主领悟不合理信念,不能直接告知代替求助者思考;E选项错误,仅倾听不引导是初诊接待收集资料阶段的要求,修通阶段需要进行主动干预,因此错误。A、B、D均符合修通阶段的操作要求,因此正确。", "type": "multi"}, {"q": "求助者,男,35岁,因和妻子长期冷战导致焦虑易怒、食欲不振2个月,主动前来求助,首次接待时下列做法符合职业伦理与操作规范的有哪些?", "o": ["为了快速找到冲突原因,直接询问求助者是否存在出轨行为", "咨询开始前向求助者明确说明保密原则,以及“存在自杀或伤人风险时可以打破保密”的例外情况", "为了全面评估,直接让求助者完成所有常用的人格和症状心理测验", "耐心倾听求助者的表达,不随意打断,也不使用评判性语言评价求助者的行为", "为了节省求助者时间,听完表述后直接给出“你的问题就是婚姻冲突引发的一般心理问题”的诊断"], "a": [1, 3], "e": "A选项错误,直接询问求助者隐私问题容易引发防御心理,不符合初诊接待规范;C选项错误,应当选择和求助者问题相关的测验,不能盲目施测所有测验;E选项错误,初诊接待阶段以收集资料为主,不能在未完成全面评估的情况下直接给出诊断。B、D符合操作规范与保密原则要求,因此正确。", "type": "multi"}, {"q": "合理情绪疗法理论中,常见的不合理信念的特征包括下列哪些选项?", "o": ["绝对化要求", "过分概括化", "糟糕至极", "客观看待事件的结果", "以偏概全"], "a": [0, 1, 2, 4], "e": "不合理信念的三大核心特征为绝对化要求、过分概括化(也即以偏概全)、糟糕至极,D选项客观看待结果属于合理认知,不属于不合理信念的特征,因此正确答案为ABCE。", "type": "multi"}, {"q": "心理测验的标准化过程主要包括下列哪些环节?", "o": ["测验内容的标准化", "施测过程的标准化", "评分记分的标准化", "结果解释的标准化", "允许受测者自主选择测试场地"], "a": [0, 1, 2, 3], "e": "心理测验的标准化包含四个核心环节:测验内容标准化、施测过程标准化、评分记分标准化、结果解释标准化。E选项错误,标准化测验要求所有受测者在统一一致的测试环境下施测,不能由受测者自主选择测试场地,因此正确答案为ABCD。", "type": "multi"}, {"q": "求助者中心疗法认为,咨询过程中咨询师需要具备的核心咨询条件包括下列哪些?", "o": ["对求助者的共情理解", "对求助者无条件积极关注", "咨询师自身的真诚一致", "直接指导求助者一步步解决问题", "保持专业中立,对求助者不做价值评判"], "a": [0, 1, 2, 4], "e": "求助者中心疗法遵循非指导性原则,不主张咨询师直接指导求助者解决问题,因此D选项错误。求助者中心疗法的核心条件包括共情理解、无条件积极关注、真诚一致、非评判性态度,因此正确答案为ABCE。", "type": "multi"}, {"q": "心理咨询过程中,求助者表现出的阻抗形式通常包括下列哪些?", "o": ["全程沉默寡言,很少主动表达", "有意回避咨询师问到的敏感话题", "多次迟到,或是无故取消预约咨询", "主动向咨询师分享自己内心的真实感受"], "a": [0, 1, 2, 4], "e": "阻抗是求助者在咨询过程中对自我暴露与自我改变的抵抗,表现形式包括讲话程度上的沉默寡言、讲话内容上的回避敏感话题、咨询关系上的迟到/取消咨询、言语表达上的答非所问等。D选项主动分享感受属于正常的咨询互动,不属于阻抗,因此正确答案为ABCE。", "type": "multi"}, {"q": "咨询师在和求助者会谈过程中做出了下列表述,其中属于参与性技术的有哪些?", "o": ["“你刚才说你和室友相处得很不愉快,能具体说一说上次发生矛盾的具体情况吗?”", "“我觉得你应该主动找室友谈一谈,把问题说开”", "“你现在说起这件事的时候,感觉还是很委屈对吗?”", "“我之前上学的时候也和室友发生过类似的矛盾,特别能理解你的感受”", "“你说的‘心里不舒服’,具体是委屈还是愤怒呢?”"], "a": [0, 2, 4], "e": "B选项属于指导技术,是影响性技术的一种;D选项属于自我开放技术,也属于影响性技术;A选项属于具体化技术,是参与性技术;C选项属于情感反应技术,是参与性技术;E选项属于具体化技术,是参与性技术,因此正确答案为ACE。", "type": "multi"}, {"q": "求助者说“我这次竞聘科长没选上,我的事业就全完了,单位同事肯定都看不起我”,根据合理情绪疗法的ABC理论,下列说法正确的有哪些?", "o": ["该求助者的不合理信念属于糟糕至极的特征", "诱发事件A是“竞聘科长落选”", "情绪结果C是“感到绝望、自卑,没面子”", "不合理信念B是“竞聘落选就等于事业全完,同事都会看不起我”", "该求助者的心理冲突属于变形冲突,属于神经症性心理问题"], "a": [0, 1, 2, 3], "e": "E选项错误,该求助者的心理冲突和竞聘落选这一现实事件直接相关,属于常形冲突,不属于神经症性心理问题。A、B、C、D均符合ABC理论的内容与不合理信念的分类,因此正确答案为ABCD。", "type": "multi"}, {"q": "关于艾森克人格问卷(EPQ),下列说法正确的有哪些?", "o": ["EPQ包含E(内外向)、N(神经质)、P(精神质)、L(掩饰性)四个维度", "E维度得分越高,说明个体越外向,更喜欢社交活动", "N维度得分越高,说明个体情绪越稳定,不容易出现焦虑情绪", "P维度得分越高,说明个体越孤僻,不近人情,缺乏共情能力", "L维度得分越高,说明个体作答的掩饰性越强,结果真实性越低"], "a": [0, 1, 3, 4], "e": "C选项错误,N维度(神经质)得分越高,个体情绪越不稳定,越容易出现焦虑、抑郁等情绪反应,表述相反因此错误。A、B、D、E均符合艾森克人格问卷的维度含义与结果解释规范,因此正确答案为ABDE。", "type": "multi"}, {"q": "心理咨询师使用卡特尔16项人格因素问卷(16PF)为受测者施测后解释结果,下列关于各维度高分特征的描述正确的有:", "o": ["因素A(乐群性)得分高提示受测者外向开朗、乐于交际", "因素C(稳定性)得分高提示受测者情绪稳定、应对从容", "因素E(恃强性)得分高提示受测者谦和温顺、容易服从", "因素N(世故性)得分高提示受测者处世圆滑、精明老练", "因素Q4(紧张性)得分高提示受测者心平气和、闲散宁静"], "a": [0, 1, 3], "e": "选项C中恃强性的高分特征为好强固执、独立积极,低分才对应顺从温和,C错误;选项E中紧张性的高分特征为紧张困扰、激动挣扎,低分才对应放松平静,E错误。其余选项描述均符合16PF的维度解释。", "type": "multi"}, {"q": "下列心理咨询常用干预技术中,属于放松训练范畴的有:", "o": ["鼻腔呼吸放松法", "渐进式肌肉放松训练", "指导性想象放松训练", "冲击疗法", "身体扫描正念放松训练"], "a": [0, 1, 2, 4], "e": "冲击疗法属于暴露疗法的范畴,主要用于恐惧症等问题的干预,不属于放松训练技术,D错误;其余选项均为临床常用的规范放松训练技术。", "type": "multi"}, {"q": "使用卡特尔16项人格因素问卷(16PF)施测时,符合施测规范要求的有:", "o": ["每一测题只能选择一个答案", "要求受测者完成所有测题,不可漏答", "指导语提示受测者尽量不选择中性答案", "要求受测者必须在30分钟内完成全部题目", "若受测者对题目难以判断,可以放弃作答"], "a": [0, 1, 2], "e": "16PF施测没有严格的时间限制,D错误;施测规范要求所有题目必须作答,不允许空题,E错误;其余选项均为16PF正确的作答与记分要求。", "type": "multi"}, {"q": "关于1982年修订完成的中国比内测验,下列描述正确的有:", "o": ["该版本由我国心理学家吴天敏教授主持修订", "适用的年龄范围为2~18岁的受测者", "全套测验共包含51个试题,按照由易到难排序", "该版本仅适合城市受测者使用,不适用农村受测者", "该测验只能个别施测,不支持团体施测"], "a": [0, 1, 2], "e": "中国比内测验适用于2~18岁的城乡受测者,既可以个别施测也可以团体施测,因此D、E错误,其余选项描述均正确。", "type": "multi"}, {"q": "咨询过程中求助者可能对咨询师产生移情或依赖,下列关于二者的描述正确的有:", "o": ["移情是求助者将过往对重要他人的情感转移到咨询师身上", "依赖是求助者遇到困难时,希望从咨询师处获得实际帮助与支持", "产生移情的求助者往往会十分关注咨询师的情绪和反应", "依赖的求助者核心需求是获得情感寄托", "移情和依赖没有本质区别,均属于咨询中的正常反应"], "a": [0, 1, 2], "e": "依赖的核心是寻求实际帮助支持,移情才是寻求情感寄托,二者有明确的本质区别,因此D、E错误,其余选项描述均正确。", "type": "multi"}, {"q": "咨询师使用系统脱敏疗法对社交焦虑求助者进行干预,下列操作符合规范要求的有:", "o": ["开始脱敏训练前,先教授求助者掌握放松技巧", "和求助者共同建构焦虑等级,焦虑程度从低到高排列", "相邻等级之间的焦虑差异应可以很大", "脱敏训练从焦虑程度最高的情境开始,逐步向下适应", "若求助者在某一等级情境中出现明显焦虑,暂停训练重新放松后再继续"], "a": [0, 1, 4], "e": "系统脱敏要求焦虑等级的级差均匀适中,差异不能过大,C错误;脱敏训练需要从焦虑程度最低的情境开始,逐步升级到高焦虑情境,D错误;其余选项均为系统脱敏的正确操作要点。", "type": "multi"}, {"q": "艾森克人格问卷(EPQ)是常用的人格测量工具,下列属于该问卷包含的维度分量表的有:", "o": ["内外向维度(E)", "神经质维度(N)", "精神质维度(P)", "说谎效度量表(L)", "偏执量表(Pa)"], "a": [0, 1, 2, 3], "e": "EPQ包含E、N、P、L四个分量表,L为效度量表用于检测作答掩饰程度;Pa(偏执)是明尼苏达多相人格测验(MMPI)的临床分量表,不属于EPQ的维度,因此E错误,其余选项均正确。", "type": "multi"}, {"q": "合理情绪疗法是认知行为流派的代表性咨询方法,下列适合使用该方法干预的人群有:", "o": ["存在广泛性焦虑情绪的求助者", "存在中度抑郁情绪的求助者", "急性期发作的精神分裂症患者", "存在强迫行为的求助者", "重度边缘型人格障碍患者"], "a": [0, 1, 3], "e": "合理情绪疗法适用于存在情绪困扰、认知偏差的一般心理问题、神经症性问题求助者;急性期精神分裂症、重度人格障碍患者超出合理情绪疗法适用范围,需优先进行精神科药物治疗,因此C、E错误,其余选项均符合适用范围。", "type": "multi"}, {"q": "抑郁自评量表(SDS)与焦虑自评量表(SAS)是常用的心理健康筛查工具,下列关于二者的描述正确的有:", "o": ["SDS用于评估抑郁症状严重程度,SAS用于评估焦虑症状严重程度", "按照中国常模标准,SDS的临界值为50分,SAS的临界值也为50分", "两个量表都包含20个自评项目", "SDS采用4级评分,SAS采用5级评分", "SDS可用于抑郁症的初步筛查,SAS可用于焦虑症的初步筛查"], "a": [0, 1, 2, 4], "e": "SDS和SAS均采用4级评分法,因此D错误,其余选项描述均符合两个量表的特征,表述正确。", "type": "multi"}, {"q": "咨询师在摄入性会谈中收集求助者资料,下列提问属于不当提问,需要避免的有:", "o": ["你为什么会对同事这句话产生这么大的情绪反应?", "你不觉得你处理这件事的方式太冲动了吗?", "你最近一周平均每天的睡眠时间大概是多久?", "你这次来咨询,是因为工作压力还是情感问题呢?", "你可以说说你最近和家人相处的具体情况吗?"], "a": [0, 1, 3], "e": "A属于“为什么”类提问,容易引发求助者防御心理,属于不当提问;B属于评判性提问,会让求助者产生被指责的感受,属于不当提问;D属于多重选择性提问,会限制求助者回答范围,属于不当提问;C是恰当的封闭式提问,E是恰当的开放式引导提问,均不属于不当提问。", "type": "multi"}, {"q": "咨询师和求助者共同商定的正式心理咨询方案,应当包含下列哪些核心内容:", "o": ["咨询的具体目标和长期最终目标", "咨询采用的技术方法和理论基础", "咨询次数、每次时长和收费标准", "咨询师私人联系方式方便私下沟通", "咨询过程中双方的权利与义务"], "a": [0, 1, 2, 4], "e": "完整心理咨询方案需包含咨询目标、方法技术、时间收费、双方权责等核心内容;咨询师私人联系方式不属于方案必备内容,还会破坏咨询专业边界,因此D错误,其余选项均为正确内容。", "type": "multi"}, {"q": "咨询师使用阳性强化法帮助儿童纠正上课走神的不良行为,下列做法符合操作规范的有:", "o": ["首先明确目标行为为“上课专心听讲10分钟”,定义清晰可测量", "儿童出现符合标准的目标行为后,立即给予强化刺激", "根据儿童的喜好选择强化物,提升强化效果", "儿童出现走神行为时及时批评惩罚,加快纠正速度", "目标行为稳定后,逐步减少强化频率,维持行为改变"], "a": [0, 1, 2, 4], "e": "阳性强化法核心原理是通过正强化强化目标行为,让不良行为自然消退,不需要惩罚不良行为,因此D错误,其余选项均为正确操作要点。", "type": "multi"}, {"q": "初步诊断心理问题时需要区分心理冲突的常形与变形,下列关于心理冲突常形的描述正确的有:", "o": ["常形心理冲突与现实生活事件直接相关", "常形心理冲突带有明显的道德判断色彩", "常形心理冲突可出现在正常人的心理活动中", "常形心理冲突是神经症性心理问题的核心特征", "常形心理冲突的求助者通常没有明显痛苦体验"], "a": [0, 1, 2], "e": "心理冲突变形才是神经症性心理问题的核心特征,常形可见于正常人;常形心理冲突的求助者通常也有明显痛苦体验,因此D、E错误,其余选项描述均正确。", "type": "multi"}, {"q": "建立良好信任的咨询关系是咨询起效的基础,咨询师需要做到下列哪些要求:", "o": ["尊重求助者的人格、价值观和生活选择", "初次咨询时热情接待,营造安全温暖的咨询氛围", "合适情境下真诚表达自身真实感受,不虚伪伪装", "站在求助者角度共情理解其情绪体验", "发现求助者明显错误行为时直接批评,帮助其改正"], "a": [0, 1, 2, 3], "e": "建立良好咨询关系的核心要素包括尊重、热情、真诚、共情、积极关注,直接批评会伤害求助者自尊,破坏咨询关系,因此E错误,其余选项均为正确要求。", "type": "multi"}, {"q": "症状自评量表(SCL-90)是常用的心理健康筛查量表,下列属于该量表包含的因子的有:", "o": ["躯体化", "强迫症状", "人际关系敏感", "精神分裂症", "抑郁"], "a": [0, 1, 2, 4], "e": "SCL-90共包含10个因子,精神分裂症是疾病诊断名称,不属于该量表的因子,因此D错误,其余选项均为SCL-90的因子。", "type": "multi"}, {"q": "下列摄入性会谈中的提问方式,属于不当提问,咨询师需要避免的有:", "o": ["你为什么会对领导的安排感到这么焦虑?", "你这次来咨询,是因为工作问题还是家庭问题呢?", "你最近一周的睡眠质量和食欲怎么样?", "你能说说你和合作伙伴发生冲突的具体经过吗?", "你难道不觉得你的这种想法本身就很荒谬吗?"], "a": [0, 1, 4], "e": "A属于“为什么”类提问,容易引发求助者防御,属于不当提问;B属于多重选择性提问,限制求助者回答范围,属于不当提问;E属于评判性指责提问,会给求助者造成压力,属于不当提问;C是恰当的封闭式提问,D是恰当的开放式引导提问,不属于不当提问。", "type": "multi"}, {"q": "根据心理咨询伦理规范,下列情况属于保密例外,咨询师可以突破保密原则的有:", "o": ["求助者明确告知咨询师自己一周后计划自杀,已经准备好工具", "求助者告知咨询师自己五年前曾经盗窃过邻居财物", "求助者明确告知咨询师自己准备次日伤害出轨对象", "求助者向咨询师隐瞒了自己的高血压慢性病史", "求助者涉及重大刑事案件,法院依法调取咨询记录"], "a": [0, 2, 4], "e": "保密例外包括求助者存在伤害自身/他人的明确危险、司法机关依法要求提供咨询记录等情况;选项B的过往盗窃行为、选项D的隐瞒慢性病史均属于求助者隐私,需要严格保密,不属于保密例外,因此B、D错误,其余选项均正确。", "type": "multi"}, {"q": "关于卡特尔16项人格因素问卷(16PF)的适用范围,下列说法正确的有?", "o": ["适用于16周岁及以上的成年受测者", "可用于企业招聘中的人才选拔与职业适配指导", "可辅助临床工作中心理问题的初步诊断", "适用于10-15岁的儿童青少年群体", "仅可用于确诊精神障碍患者的人格评估"], "a": [0, 1, 2], "e": "卡特尔16项人格因素问卷(16PF)的适用人群为16岁以上的个体,可应用于人才选拔、职业指导、临床心理诊断等多个场景,16岁以下人群、仅适用于精神障碍患者均不符合该测验的适用范围,因此D、E选项错误。", "type": "multi"}, {"q": "咨询师使用阳性强化法帮助求助者调整不良行为时,下列操作符合规范要求的有?", "o": ["首先需要明确需要强化的具体目标行为", "当目标行为出现时第一时间给予强化刺激", "根据求助者的个人偏好选择合适的强化物", "对不良行为需要同时给予惩罚以快速消退", "在目标行为稳定后逐步降低强化的频率维持效果"], "a": [0, 1, 2, 4], "e": "阳性强化法的核心原理是通过正强化增强目标行为,自然消退不良行为,不需要对不良行为额外施加惩罚,因此D选项错误,其余选项均为阳性强化法的正确操作要点。", "type": "multi"}, {"q": "下列符合心理咨询保密原则具体要求的做法有?", "o": ["初诊接待阶段提前向求助者说明保密范围以及保密例外的情形", "未经求助者同意,任何情况下都不得泄露咨询相关内容", "对求助者的咨询记录、个案档案进行严格保密管理", "当求助者明确表示有伤害自身的计划时,可打破保密原则", "可直接将完整咨询内容用于公开教学案例分享"], "a": [0, 2, 3], "e": "心理咨询保密原则要求,需提前向求助者说明保密范围与例外,对咨询相关资料严格保密;当求助者存在自伤、伤人风险等保密例外情形时,可以打破保密原则。选项B中“任何情况下都不得泄露”错误,忽略了保密例外;选项E中直接将咨询内容用于教学需隐去所有可识别求助者身份的隐私信息,不可直接使用,因此B、E错误。", "type": "multi"}, {"q": "咨询师为求助者选择心理测验工具时,下列符合选择原则的有?", "o": ["选择的测验需要匹配本次评估的具体目的", "优先选择标准化程度较高的测验工具", "优先选用信效度指标符合要求的测验", "选择符合受测者年龄阶段与文化背景的测验", "尽量选用收费最高的测验保证结果准确性"], "a": [0, 1, 2, 3], "e": "选择心理测验的核心原则包括:符合评估目的、标准化程度高、信效度良好、适配受测者的年龄与文化背景。测验的收费高低和测验质量没有必然关联,因此E选项错误。", "type": "multi"}, {"q": "当咨询师因个人能力或职业规范要求需要为求助者转介时,下列做法正确的有?", "o": ["提前向求助者说明转介的原因和转介的必要性", "不需要提前告知求助者,直接安排转介即可", "和新咨询师沟通求助者情况时,保护求助者核心隐私", "提前将新咨询师的基本信息告知求助者供其选择", "转介完成后不再跟进求助者的后续咨询情况"], "a": [0, 2, 3], "e": "规范转介要求:提前向求助者说明转介原因与必要性,为求助者提供新咨询师的相关信息,与新咨询师沟通求助者情况时注意保护隐私;直接不告知求助者转介不符合伦理,转介后也需要做好交接相关的跟进,因此B、E选项错误。", "type": "multi"}, {"q": "下列心理咨询技术中,属于参与性技术范畴的有?", "o": ["全神贯注的倾听技术", "对求助者表达的内容进行内容反应", "对求助者的情绪感受进行情感反应", "直接指导求助者做出行为改变", "为求助者的问题提供专业解释"], "a": [0, 1, 2], "e": "参与性技术的核心是引导求助者自我探索,包括倾听、内容反应、情感反应、开放式提问、具体化等;指导和解释属于影响性技术,是咨询师主动影响求助者的技术,因此D、E选项错误。", "type": "multi"}, {"q": "下列心理咨询技术中,属于影响性技术范畴的有?", "o": ["针对求助者的认知误区给出专业解释", "明确指导求助者开展特定的行为练习", "咨询师将自己的观点传递给求助者进行内容表达", "对求助者的情绪感受做出情感反应", "帮助求助者澄清模糊不清的问题使用具体化技术"], "a": [0, 1, 2], "e": "影响性技术是咨询师主动影响求助者咨询过程的技术,包括解释、指导、内容表达、面质、自我开放等;情感反应、具体化属于参与性技术,因此D、E选项错误。", "type": "multi"}, {"q": "下列人群中,属于冲击疗法禁忌对象的有?", "o": ["存在严重冠心病等心血管疾病的患者", "处于急性精神分裂症发作期的患者", "患有严重哮喘等呼吸道疾病的患者", "存在轻度焦虑情绪的健康成年人", "处于妊娠期的孕妇"], "a": [0, 1, 2, 4], "e": "冲击疗法会让求助者承受强烈的情绪和生理刺激,因此存在严重躯体疾病(心血管、呼吸道疾病等)、急性精神障碍发作、孕妇等均属于禁忌人群;健康的存在轻度心理问题的人群不属于禁忌对象,因此D选项错误。", "type": "multi"}, {"q": "认知行为疗法是心理咨询中常用的流派取向,下列属于认知行为疗法共同特点的有?", "o": ["咨询过程中咨询师和求助者是合作关系", "该流派认为个体的心理痛苦大多源于认知机能的障碍", "咨询核心是通过调整个体的认知,改善情绪和行为问题", "仅关注个体外显行为的改变,不涉及认知层面的调整", "属于针对具体目标的短期、教育性治疗"], "a": [0, 1, 2, 4], "e": "认知行为疗法兼顾认知调整和行为改变,核心假设认为心理痛苦源于认知障碍,通过改变认知改善情绪行为,咨访双方为合作关系,属于短期教育性治疗;仅关注行为改变不符合认知行为疗法的特点,因此D选项错误。", "type": "multi"}, {"q": "心理咨询结束阶段需要对咨询效果进行评估,下列属于常用评估维度的有?", "o": ["求助者对咨询效果的自我报告", "咨询师对求助者改变情况的观察评定", "求助者社会功能恢复的情况", "求助者原有心理症状的改善程度", "求助者咨询前后经济收入的变化幅度"], "a": [0, 1, 2, 3], "e": "心理咨询效果的常用评估维度包括:求助者自评、咨询师观察评定、社会功能恢复情况、症状改善程度、他人评价等;经济收入的变化和咨询效果没有直接关联,属于无关维度,因此E选项错误。", "type": "multi"}, {"q": "临床诊断中,鉴别神经症和正常心理的核心标准包括?", "o": ["求助者心理冲突的类型", "症状持续的病程时间", "求助者内心的痛苦程度", "求助者社会功能的受损程度", "求助者的年龄和性别"], "a": [0, 1, 2, 3], "e": "根据神经症临床评定方法,鉴别神经症与正常心理的核心维度包括:心理冲突的类型、病程长短、痛苦程度、社会功能受损程度,年龄和性别不属于鉴别标准,因此E选项错误。", "type": "multi"}, {"q": "下列不良行为或心理障碍中,适合使用厌恶疗法进行调整的有?", "o": ["露阴癖、窥阴癖等性心理偏好障碍", "酗酒、尼古丁依赖等成瘾行为", "强迫症中反复出现的强迫行为", "重度抑郁发作的患者", "处于幻觉妄想阶段的精神分裂症患者"], "a": [0, 1, 2], "e": "厌恶疗法通过将不良行为与厌恶刺激建立联结,达到消退不良行为的目的,适用于成瘾行为、性心理障碍、强迫行为等;重度精神障碍、重度抑郁症不属于厌恶疗法的适用范围,因此D、E选项错误。", "type": "multi"}, {"q": "下列人群中,适合采用求助者中心疗法开展心理咨询的有?", "o": ["存在人际关系冲突困扰的求助者", "存在短期情绪困扰的正常成人求助者", "急性期发作的精神分裂症患者", "存在焦虑情绪的青少年来访者", "重度人格障碍来访者"], "a": [0, 1, 3], "e": "求助者中心疗法适用于存在一般人际关系问题、情绪困扰的正常人群以及存在轻度心理问题的来访者;急性期精神分裂症发作期、重度人格障碍不属于该疗法的适用范围,因此C、E选项错误。", "type": "multi"}, {"q": "心理咨询师开展初诊接待前,下列属于需要提前完成的准备工作有?", "o": ["布置整洁舒适、安静私密的咨询室环境", "提前了解求助者的基本背景信息", "准备好咨询记录所需的工具材料", "直接开始咨询无需遵循规范接待流程", "提前熟悉初步的咨询方案框架"], "a": [0, 1, 2, 4], "e": "初诊接待前需要完成环境、资料、工具、咨询框架等多方面的准备工作,必须按照规范流程开展初诊接待,不能直接跳过接待流程开始咨询,因此D选项错误,其余选项均为正确的准备工作。", "type": "multi"}, {"q": "心理咨询师使用面质技术时,下列符合操作注意事项的有?", "o": ["面质必须以充分的事实依据作为前提", "避免将面质变成咨询师的个人情绪发泄", "对于存在争议的内容可以使用尝试性面质", "面质时需要直接批评求助者的错误想法", "需要结合咨询关系的进展程度选择合适的时机面质"], "a": [0, 1, 2, 4], "e": "面质技术的核心目的是促进求助者意识到自身存在的矛盾,促进自我探索,操作时需以事实为基础,避免个人发泄,可采用温和的尝试性面质,需要在建立良好咨询关系的基础上选择合适时机使用;直接批评求助者会破坏咨询关系,不符合面质技术的使用要求,因此D选项错误,其余选项均正确。", "type": "multi"}, {"q": "临床诊断中,属于严重心理问题与神经症的鉴别要点有?", "o": ["求助者心理冲突的类型", "症状持续的病程时间", "求助者社会功能的受损程度", "求助者的痛苦体验程度", "求助者的职业背景类型"], "a": [0, 1, 2, 3], "e": "严重心理问题与神经症的鉴别核心要点包括心理冲突类型、病程、痛苦程度、社会功能受损程度四个维度,求助者的职业背景不属于鉴别要点,因此E选项错误。", "type": "multi"}, {"q": "贝克认知疗法总结的常见认知歪曲类型包括下列哪些选项?", "o": ["缺乏充分依据就草率得出结论的任意推断", "仅选取部分细节信息就得出整体结论的选择性概括", "从一件偶然事件引申出极端结论的过度引申", "对事件结果做出符合实际的合理归因", "将与自身无关的事件都归因到自己身上的个人化"], "a": [0, 1, 2, 4], "e": "贝克认知疗法中提出的常见认知歪曲包括:任意推断、选择性概括、过度引申、夸大缩小、个人化、极端思维等;合理归因是正确的认知方式,不属于认知歪曲,因此D选项错误,其余选项均属于认知歪曲类型。", "type": "multi"}, {"q": "瑞文推理测验属于团体智力测验,其常见的类型包括?", "o": ["适用于普通成人的标准型", "适用于低年级儿童和智力落后受测者的彩色型", "适用于高智力水平人群的高级型", "适用于不同年龄段中国人群的联合型", "适用于各年龄段的韦氏型"], "a": [0, 1, 2, 3], "e": "瑞文推理测验常见类型包括标准型、彩色型、高级型、联合型四种,韦氏型是韦氏智力量表的分类,不属于瑞文测验的类型,因此E选项错误。", "type": "multi"}, {"q": "我国学者郭念锋提出的区分心理正常与异常的核心原则包含以下哪些选项?", "o": ["主观世界与客观世界的统一性原则", "心理活动的内在协调性原则", "人格的相对稳定性原则", "社会功能的完整性原则", "情绪反应的适度性原则"], "a": [0, 1, 2], "e": "郭念锋提出的区分心理正常与异常的三项核心原则为:主客观世界统一性、心理活动内在协调性、人格相对稳定性。社会功能完整性、情绪适度性不属于该理论提出的核心鉴别原则,因此D、E错误。", "type": "multi"}, {"q": "下列选项中,属于影响心理咨询中咨询关系建立与长期维持的核心因素有哪些?", "o": ["咨询师的专业胜任能力与个人人格特点", "来访者自身的求助动机与咨询配合度", "来访者对咨询师的初始印象与信任程度", "咨询机构所在的位置与内部装修档次", "咨询的收费定价与预约调整流程"], "a": [0, 1, 2], "e": "咨询关系的核心影响因素来自咨询师的专业与人格、来访者的动机与配合、双方初始互动形成的印象;机构硬件条件、收费流程不属于影响咨询关系建立维持的核心维度,因此D、E错误。", "type": "multi"}, {"q": "咨询师整理摄入性会谈收集到的临床资料时,下列哪些内容属于需要纳入整理的客观资料范畴?", "o": ["来访者的年龄、职业、婚姻状况等人口学信息", "来访者的个人成长经历与当前家庭居住环境", "来访者目前精神状态、躯体健康与社会功能情况", "咨询师对来访者问题成因的初步推断与主观评估", "来访者既往的身体疾病史与过往心理咨询记录"], "a": [0, 1, 2, 4], "e": "临床资料整理中的客观资料指可查证、非咨询师主观判断的内容,包含人口学信息、成长史、当前状态、既往史等,咨询师的主观推测与评判不属于客观整理的内容,因此D错误。", "type": "multi"}, {"q": "关于症状自评量表(SCL-90)结果解读,若某一因子得分≥2分,下列说法正确的有哪些?", "o": ["提示来访者在该因子对应的症状领域存在轻度及以上的痛苦感受", "可直接判定来访者确诊为对应类别的精神心理疾病", "需要结合会谈、其他评估工具进一步明确症状的实际严重程度", "说明该因子对应的症状已经对来访者社会功能造成明确损害", "该结果仅作为症状筛查参考,不能单独作为确诊依据"], "a": [0, 2, 4], "e": "SCL-90属于症状筛查量表,因子分≥2分仅提示筛查阳性,提示存在轻度及以上相关痛苦,仅作为参考不能直接确诊心理疾病,必须结合其他评估手段进一步确认;因子分本身不直接对应社会功能损害程度,因此B、D错误。", "type": "multi"}, {"q": "下列哪些情况属于心理咨询可以合理终止咨询的情形?", "o": ["咨询双方预先设定的咨询目标已经全部实现", "来访者对咨询效果感到满意,主动提出结束咨询", "咨询师因为工作调动无法继续为来访者提供咨询服务", "来访者无理由单方面提出终止且拒绝任何沟通", "咨询总时长达到双方提前约定好的咨询次数上限"], "a": [0, 1, 2, 4], "e": "合理终止咨询的情形包括目标达成、来访者主动提出终止、咨询师因客观原因无法继续、达到约定时长;来访者无理由单方面终止时咨询师需要先尝试沟通确认原因,不能直接终止咨询,因此D错误。", "type": "multi"}, {"q": "下列选项中,属于影响心理咨询最终效果的核心变量有哪些?", "o": ["咨询关系的质量与双方的信任程度", "咨询师的专业受训背景与临床工作经验", "来访者的求助动机与自我探索的意愿程度", "咨询的频率设置与单次咨询的时长安排", "来访者家庭对咨询费用的经济承受能力"], "a": [0, 1, 2, 3], "e": "影响咨询效果的核心变量包括咨询关系质量、咨询师专业能力、来访者求助动机、咨询设置;来访者的经济承受能力不属于影响咨询效果的核心变量,因此E错误。", "type": "multi"}, {"q": "心理咨询实践中,需要纳入知情同意告知范围的内容包含下列哪些选项?", "o": ["心理咨询的性质与本次咨询预期要达成的目标", "咨询过程中可预期达到的大致咨询效果", "心理咨询保密原则的范围与例外情况", "咨询师个人的私生活细节与兴趣爱好", "心理咨询服务的收费标准与扣费规则"], "a": [0, 1, 2, 4], "e": "知情同意需要告知来访者咨询性质、目标、预期效果、保密规则、收费标准等与咨询相关的专业内容,咨询师的私人生活细节不属于知情同意需要告知的范围,因此D错误。", "type": "multi"}, {"q": "咨询师使用内容反应技术时,下列做法正确的有哪些?", "o": ["准确提炼出来访者表述的核心思想与内容", "咨询师用自己的语言整理内容后反馈给来访者", "反馈过程中避免加入咨询师个人的主观判断", "直接表达咨询师对来访者问题的个人看法与观点", "通过内容反应帮助来访者梳理清楚自己的思路"], "a": [0, 1, 2, 4], "e": "内容反应技术是指咨询师提炼来访者表述的核心内容,用中立语言整理后反馈给来访者,目的是帮助来访者梳理思路,不加入咨询师的主观判断;直接表达咨询师对来访者的看法属于内容表达技术,不属于内容反应,因此D错误。", "type": "multi"}, {"q": "当来访者对问题的表述模糊、笼统,逻辑混乱时,咨询师使用具体化技术的正确做法包括下列哪些选项?", "o": ["协助来访者清晰表达出自己真实的想法和情绪感受", "直接替来访者总结表述内容并直接给出问题结论", "引导来访者具体说明事件发生的时间、地点、具体经过和细节", "跳过模糊表述直接讨论来访者提出的核心问题"], "a": [0, 2, 4], "e": "具体化技术的核心目的是澄清来访者模糊、混乱的表述,协助来访者梳理清楚事件与感受,通过具体提问引导细化描述;直接替来访者下结论、跳过模糊表述都违背具体化技术的使用原则,因此B、D错误。", "type": "multi"}, {"q": "当来访者对问题的表述模糊、笼统,逻辑混乱时,咨询师使用具体化技术的正确做法包括下列哪些选项?", "o": ["协助来访者清晰表达出自己真实的想法和情绪感受", "直接替来访者总结表述内容并直接给出问题结论", "引导来访者具体说明事件发生的时间、地点、具体经过和细节", "跳过模糊表述直接讨论来访者提出的核心问题"], "a": [0, 2, 4], "e": "具体化技术的核心目的是澄清来访者模糊、混乱的表述,协助来访者梳理清楚事件与感受,通过具体提问引导细化描述;直接替来访者下结论、跳过模糊表述都违背具体化技术的使用原则,因此B、D错误。", "type": "multi"}, {"q": "咨询师带领来访者进行渐进式肌肉放松训练时,需要遵循的注意事项包括下列哪些选项?", "o": ["开始训练前,需要向来访者清晰说明放松训练的原理和操作步骤", "训练过程中可以播放轻柔的背景音乐帮助来访者进入放松状态", "如果来访者出现局部肌肉持续紧张无法放松,应当暂停训练调整状态", "必须在完全安静无任何干扰的封闭空间内开展放松训练", "放松训练的频率可以根据来访者的适应情况灵活调整"], "a": [0, 1, 2, 4], "e": "渐进式肌肉放松训练需要提前告知流程原理,可配合背景音乐辅助放松,出现无法放松的情况时需要暂停调整,训练频率可灵活调整;并非必须在完全封闭无干扰的空间开展训练,因此D错误。", "type": "multi"}, {"q": "在合理情绪疗法的修通阶段,常用的核心技术包括下列哪些选项?", "o": ["与来访者的不合理信念进行辩论", "使用合理情绪想象技术调整认知", "布置认知家庭作业强化认知改变", "使用阳性强化法矫正偏差行为", "使用系统脱敏法缓解焦虑情绪"], "a": [0, 1, 2], "e": "修通阶段是合理情绪疗法改变来访者不合理信念的核心阶段,常用技术包括与不合理信念辩论、合理情绪想象技术、家庭作业;阳性强化法、系统脱敏疗法属于行为疗法技术,不属于合理情绪疗法修通阶段的专属核心技术,因此D、E错误。", "type": "multi"}, {"q": "在心理咨询会谈过程中,来访者表现出沉默时,常见的沉默类型包括下列哪些选项?", "o": ["怀疑型沉默", "茫然型沉默", "情绪型沉默", "反抗型沉默", "宣泄型沉默"], "a": [0, 1, 2, 3], "e": "心理咨询中常见的沉默类型包括怀疑型、茫然型、情绪型、思考型、内向型、反抗型;宣泄型属于多话的常见类型,不属于沉默类型,因此E错误。", "type": "multi"}, {"q": "在心理咨询会谈过程中,常见的多话类型包括下列哪些选项?", "o": ["宣泄型多话", "倾吐型多话", "表现型多话", "思考型多话", "掩饰型多话"], "a": [0, 1, 2, 4], "e": "心理咨询中常见的多话类型包括宣泄型、倾吐型、癔症型、表现型、表白型、掩饰型、外向型;思考型属于沉默的常见类型,不属于多话类型,因此D错误。", "type": "multi"}, {"q": "临床上鉴别一般心理问题、严重心理问题与神经症性心理问题的核心维度包括下列哪些选项?", "o": ["心理冲突的性质类型", "症状持续的病程时长", "情绪反应的泛化程度", "社会功能的受损程度", "求助者的家庭经济状况"], "a": [0, 1, 2, 3], "e": "三类心理问题鉴别诊断的核心维度为心理冲突类型、病程时长、情绪泛化程度、社会功能受损程度,求助者的经济状况不属于鉴别维度,因此E错误。", "type": "multi"}, {"q": "关于焦虑自评量表(SAS),下列描述正确的有哪些选项?", "o": ["主要用于评估来访者焦虑症状的严重程度", "量表标准分≥50分提示存在焦虑症状", "量表得分越高,说明来访者的焦虑程度越严重", "量表总共包含20个评估项目", "量表的分界临界值和抑郁自评量表(SDS)相同"], "a": [0, 1, 2, 3], "e": "焦虑自评量表(SAS)用于评估焦虑严重程度,共包含20个项目,标准分临界值为50分,得分越高焦虑程度越重;抑郁自评量表(SDS)临界值为53分,和SAS临界值不同,因此E错误。", "type": "multi"}, {"q": "社会支持评定量表(SSRS)包含的正式维度包括下列哪些选项?", "o": ["客观支持维度", "主观支持维度", "对支持的利用度维度", "情绪支持维度", "行为支持维度"], "a": [0, 1, 2], "e": "社会支持评定量表(SSRS)包含三个正式维度:客观支持、主观支持、个体对社会支持的利用度;情绪支持、行为支持不属于该量表官方划分的正式维度,因此D、E错误。", "type": "multi"}, {"q": "应对方式问卷(CSQ)包含的常用正式因子包括下列哪些选项?", "o": ["解决问题", "自责", "求助", "退避", "逃避"], "a": [0, 1, 2, 3], "e": "应对方式问卷(CSQ)包含六个正式因子:解决问题、自责、求助、幻想、退避、合理化;“逃避”不属于该量表官方命名的正式因子,对应因子名称为“退避”,因此E错误。", "type": "multi"}, {"q": "根据心理咨询师职业伦理要求,下列属于应当禁止的双重关系情形有哪些?", "o": ["咨询师和来访者存在商业合作关系", "咨询师和来访者存在直系亲属关系", "咨询师和来访者是私下交往的朋友关系", "咨询师仅为来访者提供约定范围内的正常专业咨询服务", "咨询师同时为来访者所在单位的多名同事提供咨询服务"], "a": [0, 1, 2, 4], "e": "双重关系指咨询师与来访者除专业咨询关系外,还存在其他社会关系,可能影响咨询师的专业判断,损害来访者利益,商业合作、亲属、朋友关系都属于禁止的双重关系;仅提供正常咨询服务不属于双重关系,因此D错误。", "type": "multi"}, {"q": "90项症状清单(SCL-90)是临床常用的心理健康筛查量表,下列属于该量表包含的因子维度的是?", "o": ["躯体化", "强迫症状", "人际关系敏感", "精神病性", "应对方式"], "a": [0, 1, 2, 3], "e": "SCL-90共包含9个核心因子,分别为躯体化、强迫症状、人际关系敏感、抑郁、焦虑、敌对、恐怖、偏执、精神病性,应对方式不属于SCL-90的因子范畴,因此E选项错误。", "type": "multi"}, {"q": "咨询过程中因求助者核心问题发生变化,需要调整原有咨询方案时,下列符合专业规范的处理方式是?", "o": ["与求助者共同协商方案变更的原因与具体调整内容", "为提升咨询效率直接修改方案无需告知求助者", "重新确认变更后的方案符合双方共同的咨询需求", "完整记录方案变更内容并由双方签字确认", "无需遵循流程即可根据咨询师经验随意变更方案"], "a": [0, 2, 3], "e": "根据心理咨询专业规范,变更咨询方案必须与求助者共同协商,确认变更内容符合双方需求,完整记录变更内容并签字确认;直接修改、随意变更均违反专业咨询要求,因此B、E选项错误。", "type": "multi"}, {"q": "咨询过程中求助者产生的阻抗会阻碍咨询推进,下列属于常见阻抗类型的是?", "o": ["内容阻抗", "情绪阻抗", "关系阻抗", "讲话方式阻抗", "主动情绪宣泄"], "a": [0, 1, 2, 3], "e": "心理咨询中常见的阻抗类型包括内容阻抗、情绪阻抗、关系阻抗、讲话方式阻抗四类;主动进行情绪宣泄是求助者正常的咨询表达,不属于阻抗,因此E选项错误。", "type": "multi"}, {"q": "下列关于求助者中心疗法各治疗阶段的特征,描述正确的是?", "o": ["初始阶段:求助者对自我感受僵化封闭,拒绝表达内心真实想法", "成长过渡阶段:求助者开始自由谈论外在事件,但仍回避内在感受", "中期防御阶段:求助者开始表达当下真实感受,但仍存在防御顾虑", "成熟结束阶段:求助者能够完全接纳真实自我,咨询目标基本达成", "全程咨询阶段:咨询师需要主动直接指导求助者调整行为模式"], "a": [0, 1, 2, 3], "e": "求助者中心疗法遵循非指导性咨询原则,咨询师不会直接指导求助者的行为改变,因此E选项错误,其余选项均符合该疗法的阶段特征描述。", "type": "multi"}, {"q": "初诊接待阶段,咨询师需要向求助者明确告知的保密原则相关内容包括?", "o": ["所有咨询内容均需绝对保密,不存在任何保密例外", "保密范围覆盖咨询过程中的口头沟通内容与书面记录材料", "需明确告知求助者保密原则的例外情形与触发条件", "只有司法机关依法调阅时才能披露求助者的咨询信息", "未经求助者书面同意,不会向任何第三方泄露咨询内容"], "a": [1, 2, 4], "e": "初诊接待阶段咨询师必须向求助者明确保密原则的相关内容:保密范围涵盖所有咨询相关的口头和书面内容,需要明确说明保密例外的情形与触发条件,承诺未经同意不泄露内容。A选项错误,咨询存在法定保密例外;D选项错误,保密例外除司法依法调阅外,还包括求助者有自伤、伤人风险等法定情形,表述不全面,因此AD错误。", "type": "multi"}, {"q": "即时化技术是心理咨询常用的参与性技术,下列属于即时化技术正确应用方式的是?", "o": ["咨询师主动关注当下咨询过程中的互动状态", "引导求助者聚焦于当前的情绪感受与体验", "直接讨论当前咨询互动中出现的矛盾与问题", "引导求助者回顾成长过程中的早期创伤经历", "帮助求助者预测未来生活中可能出现的行为变化"], "a": [0, 1, 2], "e": "即时化技术的核心是聚焦当下咨询互动与感受,核心内容包括关注当下的咨询互动、引导求助者觉察当下感受、讨论当前互动中的问题;回顾过往经历、预测未来变化均不属于即时化技术的应用范畴,因此DE错误。", "type": "multi"}, {"q": "系统脱敏疗法是治疗特定恐惧症的常用行为疗法,实施过程中需要遵循的操作规范包括?", "o": ["焦虑等级划分需要保持均匀梯度,相邻等级之间的差异不宜过大", "如果求助者在某一焦虑等级出现强烈焦虑反应,需要退回上一等级重新适应", "脱敏前的放松训练需要帮助求助者达到肌肉完全松弛的状态", "可以配合使用阳性强化物,帮助求助者更快适应放松状态", "为保证脱敏效果,可无需征得求助者同意直接开展训练"], "a": [0, 1, 2, 3], "e": "系统脱敏疗法的操作规范要求:均匀划分焦虑等级,若求助者在某一等级出现强烈焦虑需退回上一级重新适应,训练前需达到充分放松,可结合阳性强化加速进程;所有咨询操作都必须提前征得求助者知情同意,因此E选项错误。", "type": "multi"}, {"q": "按照心理咨询职业伦理规范,咨询过程中求助者依法享有的权利包括?", "o": ["有权了解咨询师的受训背景与执业资质信息", "有权选择或更换符合自身需求的执业咨询师", "有权拒绝咨询方案中不符合自身需求的内容", "有权要求咨询师对所有咨询内容绝对保密", "有权随时终止咨询且无需说明任何理由"], "a": [0, 1, 2], "e": "求助者享有了解咨询师资质、更换咨询师、拒绝不合理方案的权利;但咨询存在法定保密例外,并非所有内容都需要绝对保密,因此D错误;求助者终止咨询需要提前与咨询师沟通,并非无需任何理由即可随时终止,因此E错误。", "type": "multi"}, {"q": "摄入性会谈是搜集求助者临床资料的核心方式,实施过程中咨询师需要注意的事项包括?", "o": ["避免使用带有评判性的语言对求助者的问题进行评价", "会谈过程中可随意打断求助者的表述以控制时间", "会谈结束后需要及时整理并完整记录会谈内容", "可根据自身经验提前对求助者的问题做出主观推断", "会谈开始前需要明确本次会谈的核心目标与范围"], "a": [0, 2, 4], "e": "摄入性会谈的注意事项包括:提前明确会谈目标、避免使用评判性语言、不随意打断求助者表达、不进行主观推断、会谈后及时记录整理。随意打断求助者会影响其表达意愿,主观推断会影响资料的客观性与真实性,因此BD错误。", "type": "multi"}, {"q": "自我暴露是心理咨询中常用的影响性技术,咨询师使用自我暴露技术时需要遵循的原则包括?", "o": ["暴露的内容需要与当前咨询的主题紧密相关", "暴露的深度和程度需要匹配当前咨询关系的进展程度", "自我暴露需要以满足求助者的咨询需求为核心", "需要详细暴露咨询师自身的私人生活细节以获得信任", "可以随意进行自我暴露以拉近和求助者的心理距离"], "a": [0, 1, 2], "e": "自我暴露技术的应用原则为:暴露内容紧扣当前咨询主题、暴露程度匹配咨询关系进展、始终以求助者的需求为核心;过度暴露私人生活细节或随意暴露会破坏专业咨询边界,对咨询进程产生不利影响,因此DE错误。", "type": "multi"}, {"q": "放松训练是心理咨询中常用的行为训练技术,下列属于临床常见放松训练类型的有?", "o": ["渐进式肌肉放松训练", "腹式深呼吸放松训练", "场景想象放松训练", "正念冥想放松训练", "冲击暴露放松训练"], "a": [0, 1, 2, 3], "e": "常见的放松训练类型包括渐进式肌肉放松、深呼吸放松、想象放松、正念冥想放松等;冲击疗法是一种专门的行为治疗方法,不属于放松训练的类型,因此E选项错误。", "type": "multi"}, {"q": "合理情绪疗法的核心理论基础是ABC理论,下列属于ABC理论核心要素的有?", "o": ["引发求助者情绪困扰的诱发事件A", "求助者对诱发事件所持有的信念B", "求助者产生的情绪和行为反应结果C", "咨询师针对问题采取的干预技术D", "咨询最终达成的咨询效果E"], "a": [0, 1, 2], "e": "合理情绪疗法ABC理论中,A代表诱发事件,B代表求助者对事件的信念,C代表由信念引发的情绪和行为结果;咨询师的干预措施和咨询效果不属于ABC理论的核心要素,因此DE错误。", "type": "multi"}, {"q": "咨询过程中咨询师识别到求助者出现阻抗行为时,符合专业规范的处理方式包括?", "o": ["坦诚地和求助者讨论咨询师观察到的阻抗现象", "直接指责求助者故意对抗咨询进程", "适当调整咨询的节奏与策略,缓解求助者的防御反应", "尊重求助者的防御反应,给予接纳和理解", "立即终止咨询避免双方矛盾冲突升级"], "a": [0, 2, 3], "e": "处理阻抗的正确方式为:坦诚和求助者讨论阻抗现象、尊重求助者的防御反应、适当调整咨询节奏与策略;直接指责会加剧求助者的阻抗,立即终止咨询是不专业的极端处理方式,因此BE错误。", "type": "multi"}, {"q": "咨询过程中求助者对咨询师产生移情现象时,咨询师恰当的处理方式包括?", "o": ["始终保持中立客观的专业咨询态度", "适时引导求助者回归咨询的核心主题", "和求助者共同探讨移情产生的根源与意义", "直接生硬拒绝求助者的情感投射", "私下和求助者建立咨询外的朋友关系"], "a": [0, 2, 3], "e": "处理移情的正确方式为保持中立客观、引导回归咨询主题、探讨移情产生的根源;直接生硬拒绝会破坏咨询关系,私下建立咨询外关系违反职业伦理,存在双重关系风险,因此BE错误。", "type": "multi"}, {"q": "求助者中心疗法的治疗阶段特征包括?", "o": ["初始阶段:求助者僵化刻板,拒绝表达真实自我感受", "中期阶段:求助者开始自由谈论外在事件但回避内在感受", "成熟阶段:求助者完全接纳自我,治疗目标基本达成", "过渡阶段:求助者开始表达当下感受但仍有防御顾虑", "全程阶段:咨询师直接指导求助者改变自身行为模式"], "a": [0, 1, 2, 3], "e": "求助者中心疗法分为多个递进阶段,核心特征为求助者从僵化封闭逐渐转变为接纳自我,该疗法始终遵循非指导性原则,咨询师不会直接指导求助者的行为改变,因此E错误。", "type": "multi"}, {"q": "求助者中心疗法认为,有效的心理咨询需要建立核心治疗条件,下列选项属于该疗法提出的核心治疗条件的是?", "o": ["咨询师对求助者保持无条件积极关注", "咨询师能够准确把握并反馈求助者的内心体验", "咨询师在咨询中保持真诚一致的态度", "咨询师为求助者提供专业的问题解决指导", "咨询师严格遵循固定框架设置咨询流程"], "a": [0, 1, 2], "e": "求助者中心疗法的核心治疗条件包括三个核心要素:无条件积极关注、准确的共情、真诚一致。该疗法秉持非指导性咨询原则,不会主动为求助者提供专业指导,因此D错误;严格的固定设置不属于该疗法提出的核心治疗条件,因此E错误。", "type": "multi"}, {"q": "关于抑郁自评量表(SDS)的临床应用与结果解读,下列说法正确的有?", "o": ["SDS筛查抑郁症状的划界临界值为50分", "SDS标准分≥53分提示受测者可能存在抑郁症状", "一般情况下,SDS得分越高代表受测者抑郁程度越严重", "SDS结果可直接作为临床确诊抑郁症的依据", "SDS仅作为初筛工具,最终诊断需要结合临床访谈综合判断"], "a": [1, 2, 4], "e": "SDS筛查抑郁的划界临界值为53分,因此A错误;SDS属于抑郁症状筛查量表,仅能初步提示受测者的抑郁状态,无法直接用于确诊抑郁症,必须结合临床访谈等信息综合判断,因此D错误;其余选项描述均符合SDS的解读规则,因此正确。", "type": "multi"}, {"q": "心理咨询正式结束后,咨询师开展的后续随访工作,下列符合专业要求的做法是?", "o": ["了解求助者咨询结束后社会功能的恢复情况", "评估本次咨询效果的长期持续性", "主动打探求助者未主动提及的私人生活细节", "为有需要的求助者提供后续支持与转介资源", "强制要求求助者定期复诊接受额外咨询"], "a": [0, 1, 3], "e": "心理咨询随访的核心目的是确认咨询效果、提供必要后续支持,合理做法包括了解求助者社会功能恢复情况、评估咨询效果持续性、为有需要的求助者提供后续支持与转介。主动询问求助者私人细节属于越界行为,侵犯求助者隐私,不符合咨询伦理,因此C错误;强制要求求助者再次咨询违反了求助者自愿原则,因此E错误。", "type": "multi"}, {"q": "标准化心理测验需要满足一系列基本要求,下列属于心理测验标准化要求的选项有?", "o": ["统一的测验内容与标准化施测流程", "统一的评分标准与固定计分规则", "基于标准化常模样本建立的结果解释体系", "可根据受测者情况灵活调整施测环境与时间", "测验工具本身经过规范的信度与效度检验"], "a": [0, 1, 2, 4], "e": "心理测验标准化要求包括:统一测验内容与施测流程、统一评分与计分规则、建立标准化常模与解释体系,且测验工具需要经过信效度检验保证准确性。灵活调整施测环境会引入额外测量误差,不符合标准化要求,因此D错误,其余选项均正确。", "type": "multi"}, {"q": "心理咨询中,咨询师表达共情时,下列做法符合专业要求的有?", "o": ["深入体验并理解求助者的内心真实感受", "准确向求助者传达自己对其感受的理解", "表达共情时避免加入咨询师自己的主观评判", "共情要求咨询师直接帮求助者解决实际问题", "共情的反应强度需要与求助者的情绪强度相匹配"], "a": [0, 1, 2, 4], "e": "共情的核心是站在求助者角度理解其感受,正确表达要点包括:深入理解求助者感受、准确传达理解、不加入主观评判、反应强度匹配求助者情绪强度。共情仅要求理解求助者感受,不需要也不应该直接替求助者解决问题,因此D错误,其余选项均正确。", "type": "multi"}, {"q": "咨询会谈中,求助者出现多话现象偏离核心主题时,咨询师下列处理方式正确的有?", "o": ["先分析多话的类型,探究多话背后的心理动因", "为节省时间直接打断求助者的无关表述", "引导求助者重新聚焦到咨询的核心主题上", "对求助者的多话行为提出批评,避免再次出现", "根据咨询进度适当控制会谈的节奏与方向"], "a": [0, 2, 4], "e": "处理咨询中的多话现象,正确做法是先分析多话的类型与心理动因,再通过引导聚焦核心主题、适当控制会谈节奏来处理。直接打断或者批评多话会破坏已经建立的咨询关系,引发求助者的抵触情绪,因此B、D错误,其余选项均正确。", "type": "multi"}], "伦理题": {"基础知识": [{"q": "根据中国心理卫生协会心理服务伦理守则(试行),心理咨询师在以下哪种情况下可以不经求助者同意披露其保密信息?", "o": ["求助者的班主任询问求助者咨询的具体内容", "咨询师想要把个案放进自己即将出版的科普书里", "求助者明确表达了伤害同事的意图且已准备好作案工具", "求助者所在单位HR要求了解求助者的情绪状态", "咨询师的导师想要在组会上讨论求助者的相关情况"], "a": 2, "e": "保密原则的合法例外包括:求助者存在明确的自伤、伤人风险,法定司法机关依法要求披露,经求助者书面同意披露。A、B、D、E均不属于合法的保密例外情形,因此正确答案为C。", "type": "single"}, {"q": "心理咨询师在与求助者建立正式咨询关系前,按照伦理要求必须向求助者告知的内容不包括以下哪一项?", "o": ["咨询会用到的核心技术与大致工作流程", "咨询师的从业年限与专业受训背景", "不同服务内容对应的收费标准与付费方式", "咨询师的私人情感经历与非工作相关隐私信息", "咨询过程需要遵守的保密原则及其例外情况"], "a": 3, "e": "知情同意要求咨询师告知与咨询服务相关的所有必要信息,包括咨询目标流程、咨询师专业资质、收费标准、保密规则等,咨询师的非工作隐私信息无需主动告知求助者,因此D为正确答案。", "type": "single"}, {"q": "一位心理咨询师为高中求助者提供咨询半年后,发现求助者母亲是自己多年未联系的高中同学,之后两人经常相约逛街、结伴出游,建立了私人友谊。该咨询师的行为违反了哪项伦理原则?", "o": ["保密原则", "双重关系(多重关系)原则", "专业胜任力原则", "知情同意原则", "终止咨询原则"], "a": 1, "e": "双重关系指咨询师与求助者存在除专业咨询关系外的其他社会关联,可能损害咨询客观性与专业性,该咨询师与求助者家属建立私人朋友关系,属于违规双重关系,因此B正确。", "type": "single"}, {"q": "某心理咨询师在咨询结束后,私自向求助者收取未提前告知的“个案记录整理费”,该行为违反了以下哪项伦理规范?", "o": ["收费与财务管理伦理", "保密原则", "专业胜任力原则", "知情同意原则", "终止咨询原则"], "a": 0, "e": "心理咨询师需提前明确告知求助者所有收费标准与项目,不得私自收取未提前告知的额外费用,该行为违反了收费与财务管理的伦理要求,因此A正确。", "type": "single"}, {"q": "求助者因突发失业导致经济困难,主动向咨询师提出提前终止咨询,心理咨询师以下哪种做法符合伦理要求?", "o": ["要求求助者付清剩余疗程费用才同意终止", "协商终止相关安排并提供合适的转介信息", "扣留求助者寄放的个人物品作为费用抵押", "向求助者家人索要未结清的咨询费用", "向求助者单位领导披露咨询情况施压付费"], "a": 1, "e": "咨询师应尊重求助者主动终止咨询的意愿,协商后续安排并提供转介,不得通过扣留物品、索要不合理费用、泄露隐私等方式胁迫求助者,因此B正确。", "type": "single"}, {"q": "关于心理咨询师的保密原则,下列表述正确的是?", "o": ["咨询师可和家人讨论求助者的个案细节", "保密仅适用于咨询过程中", "即使求助者去世,咨询师仍需遵守保密原则", "为教学研究可随意使用求助者的个案信息", "保密无任何例外情况"], "a": 2, "e": "保密原则适用于咨询全程及结束后,即使求助者去世仍需遵守;A、D违反保密要求,E忽略法定例外,因此C正确(法律优先)。", "type": "single"}, {"q": "仅接受过成人心理咨询系统培训的咨询师承接8岁儿童的咨询个案并出现错误干预,该行为违反了哪项伦理原则?", "o": ["专业胜任力原则", "保密原则", "双重关系原则", "知情同意原则", "终止咨询原则"], "a": 0, "e": "专业胜任力要求咨询师在受训范围内提供服务,超出胜任范围承接个案违反该原则,因此A正确。", "type": "single"}, {"q": "根据伦理守则,执业心理咨询师的督导要求正确的是?", "o": ["仅新手咨询师需要接受督导", "所有执业咨询师需持续接受专业督导", "仅处理困难案例时需要督导", "督导仅需一次完成无需持续", "无需督导即可独立执业"], "a": 1, "e": "伦理守则要求所有执业咨询师持续接受专业督导以保障咨询质量,因此B正确。", "type": "single"}, {"q": "咨询师忽视藏族求助者的传统文化与宗教信仰,直接照搬汉族来访者的常规咨询方案干预,该行为违反了哪项伦理原则?", "o": ["文化胜任力原则", "保密原则", "双重关系原则", "知情同意原则", "终止咨询原则"], "a": 0, "e": "文化胜任力要求咨询师尊重求助者的文化、宗教背景,调整咨询方法适配其需求,该行为违反了该原则,因此A正确。", "type": "single"}, {"q": "接到行业伦理委员会投诉调查通知时,咨询师符合伦理的做法是?", "o": ["拒绝配合调查", "私下联系投诉者威胁其撤销投诉", "如实提供资料配合调查", "销毁涉及投诉的咨询记录", "在同行圈散布投诉者的负面消息"], "a": 2, "e": "咨询师应如实提供资料配合伦理调查,不得拒绝、销毁记录或私下施压报复,因此C正确。", "type": "single"}, {"q": "心理咨询师初次接待求助者,正式建立咨询关系前,依据职业伦理要求,需要提前告知求助者的信息包括以下哪些选项?", "o": ["本次咨询的大致目标、拟采用的咨询方法以及整体咨询流程", "该咨询师的专业从业资质、接受专业训练的背景情况", "本次咨询以及后续咨询的收费标准、具体的付费方式", "心理咨询工作中保密原则的要求,以及保密原则的例外情况", "求助者在咨询过程中享有的法定权利,以及需要履行的义务"], "a": [0, 1, 2, 3, 4], "e": "依据职业伦理的知情同意要求,所有与咨询工作相关、会影响求助者咨询决策的必要信息都需要提前告知,上述五个选项的内容均属于应当告知的范畴,因此全部正确。", "type": "multi"}, {"q": "依据心理咨询职业伦理要求,下列哪些情况属于保密原则的合法例外情形,可以披露求助者的相关信息?", "o": ["求助者已经准备好了具体的自杀计划,明确告知咨询师自己准备近日实施自杀", "求助者明确说出要伤害某特定人员,且具备实施伤害行为的能力和条件", "公安司法机关依照法定程序,要求咨询师提供求助者的相关咨询记录", "求助者的父母出于关心,要求咨询师告知孩子本次咨询的具体内容", "咨询师为了撰写专业学术论文,想要使用求助者的咨询案例作为素材"], "a": [0, 1, 2], "e": "保密例外的合法情形仅包括:求助者存在自伤自杀或伤害他人的即刻风险、法定机关依法要求披露、经求助者正式书面同意披露。选项D中亲属无权未经求助者同意获取咨询信息,选项E中医学术使用也需要获得求助者同意,不属于保密例外,因此正确答案为ABC。", "type": "multi"}, {"q": "下列关于心理咨询中咨询师与求助者的关系,哪些属于职业伦理所禁止的双重(多重)关系?", "o": ["咨询师接待的求助者是自己的表姐", "咨询师和求助者合伙开了一家线下咖啡店", "咨询结束后咨询师和求助者成为了闺蜜", "咨询师因为当前能力无法处理该案例,为求助者推荐了合适的其他咨询师", "咨询师是某高校心理学老师,求助者是该咨询师本校的在读学生"], "a": [0, 1, 2, 4], "e": "双重关系指咨询师除了和求助者保持专业咨询关系之外,还存在其他性质的社会关系,上述选项A亲属、B商业合作、C朋友关系、E师生关系都属于专业咨询之外的其他关系,构成双重关系;D选项的转介是正常的专业咨询服务,不属于双重关系,因此正确答案为ABCE。", "type": "multi"}, {"q": "下列心理咨询师的行为中,属于违反知情同意伦理要求的行为有哪些?", "o": ["开展咨询前,未向求助者说明保密原则在哪些情况下存在例外", "咨询开始前,没有向求助者说明拟采用的咨询方法和大致流程", "没有提前征得求助者的同意,就将求助者的案例用于自己的课题研究", "有意隐瞒了自身的受训背景,未告知求助者自己未取得对应执业资质", "在咨询开始前就提前将收费标准告知了求助者"], "a": [0, 1, 2, 3], "e": "知情同意要求咨询师将所有影响求助者决策的信息如实提前告知,选项A、B、D都未履行告知义务,选项C未经同意使用案例也违反知情同意,选项E提前告知收费标准是符合伦理要求的正确做法,因此正确答案为ABCD。", "type": "multi"}, {"q": "心理咨询师在接受专业督导提升专业能力的过程中,需要遵循哪些伦理要求?", "o": ["向督导师如实提供案例相关信息的同时,注意保护求助者的隐私", "虚心接受督导师提出的咨询指导意见,改进自身的咨询方法", "在和督导师讨论案例的时候,隐去求助者的可识别个人信息", "坚持自己原有的咨询方式,不接受督导师提出的任何改进建议", "按照行业要求定期接受督导,维持自身的专业胜任力"], "a": [0, 1, 2, 4], "e": "接受专业督导是咨询师保持专业胜任力的必要要求,咨询师需要做到如实提供案例信息、保护求助者隐私、接受督导指导、定期参加督导。选项D拒绝接受督导建议不利于专业成长,不符合督导伦理要求,因此错误,正确答案为ABCE。", "type": "multi"}, {"q": "为了提升对不同文化背景求助者的咨询胜任力,心理咨询师可以采取下列哪些正确做法?", "o": ["主动学习不同文化背景下群体的心理与行为特点", "尊重求助者特有的宗教信仰、文化习俗与行为习惯", "无论求助者文化背景如何,都采用统一标准化的咨询方案", "咨询开始时主动询问、了解求助者的文化背景相关信息", "遇到不熟悉的文化相关问题时,寻求相关文化顾问的专业支持"], "a": [0, 1, 3, 4], "e": "提升文化胜任力要求咨询师主动学习不同文化知识、尊重文化差异、主动了解求助者文化背景,必要时寻求专业支持,忽视文化差异采用统一咨询模式会影响咨询效果,违反文化胜任力要求,因此选项C错误,正确答案为ABDE。", "type": "multi"}, {"q": "当心理咨询师在工作中遇到难以判断的职业伦理困境时,需要遵循哪些正确的处理原则?", "o": ["遇到冲突时,优先保护求助者的切身利益和生命安全", "处理困境过程中严格遵守现有伦理守则与相关法律法规", "当个人利益和求助者利益冲突时,优先考虑咨询师的个人利益", "自身无法判断时,主动寻求督导或专业伦理委员会的帮助", "处理过程中保持专业客观性,避免受到个人主观偏见的影响"], "a": [0, 1, 3, 4], "e": "处理伦理困境的核心原则包括优先保护求助者利益、遵守伦理法规、主动寻求专业支持、保持客观中立,优先考虑个人利益违反职业伦理要求,因此选项C错误,正确答案为ABDE。", "type": "multi"}, {"q": "依据心理咨询职业伦理要求,下列属于心理咨询师应当履行的专业伦理责任有哪些?", "o": ["严格遵守保密原则,保护求助者的个人隐私与咨询信息", "保持自身的专业胜任力,只在自己受训和执业范围内提供服务", "尊重求助者的文化背景差异与个体独特性,接纳求助者", "为了增进咨询关系,主动和求助者建立朋友关系增强信任", "按照规定收取合理咨询费用,提前明确告知收费项目"], "a": [0, 1, 2, 4], "e": "心理咨询师的专业伦理责任包括保密、保持专业胜任力、尊重文化个体差异、合理收费等,和求助者建立双重关系会损害咨询的客观性,损害求助者利益,属于违反伦理的行为,因此选项D错误,正确答案为ABCE。", "type": "multi"}, {"q": "当咨询达到预期目标,或者因为特殊原因需要终止咨询关系时,咨询师需要遵循哪些伦理要求?", "o": ["提前一段时间告知求助者咨询即将终止,说明终止的具体原因", "如果求助者后续还需要帮助,为求助者提供合适的转介信息", "终止咨询前和求助者共同回顾整个咨询过程,总结咨询收获", "如果咨询结束,直接拒绝为有后续转介需求的求助者提供任何帮助", "终止咨询后,按照规定妥善保管求助者的咨询记录,保护隐私"], "a": [0, 1, 2, 4], "e": "终止咨询时,咨询师需要遵循提前告知、提供转介、回顾总结、妥善保管记录的伦理要求,对于有转介需求的求助者应当提供相应帮助,不能直接拒绝,因此选项D错误,正确答案为ABCE。", "type": "multi"}, {"q": "依据心理咨询职业伦理中关于收费的规范要求,下列说法正确的有哪些?", "o": ["在咨询开始之前,就明确向求助者告知收费标准以及付费方式", "按照所在行业的通行标准,收取合理的咨询费用", "求助者要求增加额外的咨询服务,咨询师私自收取额外费用不告知所属机构", "对于经济条件困难的求助者,依据规定适当给予费用减免", "以保护隐私为由,拒绝向求助者提供咨询收费的明细单据"], "a": [0, 1, 3], "e": "心理咨询收费伦理要求明确提前告知收费标准、收取合理费用、为经济困难求助者提供适当减免,私自收取额外费用、拒绝提供收费明细都属于违反收费伦理的行为,因此选项C、E错误,正确答案为ABD。", "type": "multi"}], "操作技能": [{"q": "求助者男性,32岁,因焦虑抑郁情绪前来咨询,第三次咨询中求助者透露已经攒够了大量镇静药物,计划本周实施自杀,此时咨询师符合伦理要求的做法是?", "o": ["严格遵守保密原则,不向任何第三方披露该信息", "直接报警,无需与求助者沟通就通知警方", "首先尝试劝说求助者放弃自杀计划,若劝说无效,联系求助者家属或危机干预人员,并完整记录干预过程", "立即终止咨询,避免自身承担相关责任", "直接通知求助者的单位领导,无需征得求助者同意"], "a": 2, "e": "本题考查心理咨询伦理中保密例外与自杀危机干预的要求。根据伦理守则,当求助者存在明确的自伤自杀风险时,保密原则存在例外,咨询师首先应尝试劝说求助者放弃极端行为,若劝说无效,需联系相关人员保护求助者生命安全,同时完整记录干预过程。选项A违背保密例外原则,选项B、D、E的处理方式均不符合伦理要求,因此正确答案为C。", "type": "single"}, {"q": "咨询师刘某是求助者张某同事的表姐,咨询过程中张某提出想要添加刘某的私人微信,成为平时可以一起聚会的私下朋友,刘某符合伦理要求的做法是?", "o": ["欣然同意,认为这样能够加深咨访之间的信任关系", "明确婉拒,告知求助者需要保持专业的咨访关系边界", "同意添加好友,但约定非咨询时间不讨论咨询问题", "收取额外服务费用后同意成为私下朋友", "不回复该请求,继续正常咨询"], "a": 1, "e": "本题考查心理咨询伦理中双重关系与专业边界的要求。双重关系指咨询师与求助者存在专业咨询关系之外的其他关系,会影响咨询的客观性与专业性,咨询师应当明确拒绝非专业关系的请求。选项A、C、D、E的做法都会破坏专业边界,因此正确答案为B。", "type": "single"}, {"q": "某咨询师首次接待新求助者时,仅简单介绍了自己的从业经历,未向求助者告知咨询收费标准、保密例外情形以及咨询可能存在的效果风险,该咨询师的做法违反了以下哪项伦理原则?", "o": ["保密原则", "知情同意原则", "专业胜任力原则", "专业边界原则", "文化胜任力原则"], "a": 1, "e": "知情同意原则要求咨询师在咨询开始前,必须向求助者清晰告知咨询收费、保密规则、咨询流程、潜在风险等核心信息,保障求助者的知情权,该咨询师未履行告知义务,因此违反知情同意原则。保密原则核心是保护求助者隐私,专业胜任力原则指向咨询师能力与个案匹配,专业边界核心是避免双重关系,文化胜任力指向对不同文化背景求助者的尊重,均不符合题干场景,因此正确答案为B。", "type": "single"}, {"q": "求助者赵某是一名社区矫正人员,因人际适应困难前来寻求咨询,咨询师陈某得知赵某身份后,以“我没有接触过这类人群,无法帮到你” 为由直接拒绝为赵某提供咨询,陈某的做法违反了哪项伦理原则?", "o": ["公平对待原则", "保密原则", "专业边界原则", "文化胜任力原则", "知情同意原则"], "a": 0, "e": "公平对待原则要求咨询师不得因求助者的身份、背景等因素歧视求助者,陈某因求助者的特殊身份直接拒绝提供服务,违反公平对待原则。其余选项均不符合题干场景,因此正确答案为A。", "type": "single"}, {"q": "全部咨询结束后,咨询师收到求助者寄来的价值6000元的名牌围巾,作为感谢咨询师帮助的礼物,该咨询师符合伦理要求的做法是?", "o": ["收下礼物,因为是求助者主动赠送的心意", "婉拒礼物,并告知求助者咨询是专业服务,不需要额外酬谢", "收下礼物后,在下次来访时给求助者赠送等价回礼", "收下礼物后上交机构,由机构统一处理", "婉拒礼物后还要上报督导说明该情况"], "a": 1, "e": "根据伦理守则,咨询师不得接受求助者的贵重礼物,避免破坏专业边界,对于小额象征性礼物可酌情接受,但价值较高的礼物应明确拒绝,并告知求助者咨询是专业服务,无需额外报酬。选项A收下贵重礼物违反边界,选项C加倍返还不符合伦理要求,选项D、E均不属于该场景下的必要处理,因此正确答案为B。", "type": "single"}, {"q": "咨询师钱某接待了一名确诊为重度强迫症的求助者,钱某此前仅处理过轻度一般心理问题,该求助者的问题已经超出了钱某的专业能力范围,此时钱某符合伦理要求的做法是?", "o": ["继续为求助者提供咨询,同时边咨询边学习相关诊疗知识", "直接转介给擅长强迫症治疗的咨询师,无需告知求助者转介原因", "告知求助者自己的专业能力局限,征得求助者同意后转介给合适的专业人员", "收取全部咨询费用后,终止咨询不再提供任何服务", "隐瞒自己的能力不足,继续咨询直到求助者提出结束"], "a": 2, "e": "专业胜任力原则要求咨询师仅在自身专业能力范围内提供服务,若个案超出自身能力范围,应当明确告知求助者自身局限,征得求助者同意后转介给合适的专业人员。选项A无法保障咨询效果,选项B违反知情同意原则,选项D、E的做法均违反伦理要求,因此正确答案为C。", "type": "single"}, {"q": "新手咨询师李某还未完成规定的督导学习,就私自接诊了一名有明确自杀计划的高危求助者,李某的做法违反了以下哪项伦理原则?", "o": ["保密原则", "专业胜任力原则", "知情同意原则", "专业边界原则", "文化胜任力原则"], "a": 1, "e": "专业胜任力原则要求咨询师处理高风险个案时,必须接受必要的督导与培训,保障自身具备对应个案的处理能力,李某未接受督导就独自处理高危自杀个案,违反专业胜任力原则。其余选项均不符合题干场景,因此正确答案为B。", "type": "single"}, {"q": "求助者李女士在咨询中透露,自己因为情绪失控经常打骂自己7岁的儿子,近期情绪失控频率升高,仍然存在再次体罚孩子的高风险,咨询师此时符合伦理要求的做法是?", "o": ["严格遵守保密原则,不向任何第三方披露信息", "立即联系当地儿童保护机构披露信息,无需告知求助者", "尝试说服李女士停止体罚行为,若李女士坚持,联系当地儿童保护机构,并完整记录干预过程", "终止咨询,不再为李女士提供任何服务", "告知李女士的邻居,提醒邻居注意孩子的安全"], "a": 2, "e": "根据伦理守则,当求助者存在虐待未成年人的明确风险时,保密原则存在例外,咨询师应当首先尝试说服求助者停止伤害行为,若劝说无效,需联系儿童保护机构保护儿童安全,同时完整记录干预过程。选项A违背保密例外原则,选项B不需要先尝试说服,处理方式不当,选项D、E的做法均不符合伦理要求,因此正确答案为C。", "type": "single"}, {"q": "求助者李某因不满咨询效果,向咨询师王某所在的咨询机构投诉王某,机构要求王某配合开展伦理调查,王某此时符合伦理要求的做法是?", "o": ["拒绝配合调查,认为投诉是李某的恶意报复", "在调查中隐瞒部分咨询记录,避免被追责", "配合机构调查,如实提供咨询记录与相关信息,保持专业态度", "威胁李某撤回投诉,否则终止咨询服务", "将投诉责任推给求助者,指责李某的要求不合理"], "a": 2, "e": "根据心理咨询伦理守则,当机构针对投诉开展伦理调查时,咨询师应当配合调查,如实提供相关信息,保持专业态度。选项A、B、D、E的做法均违反伦理要求,因此正确答案为C。", "type": "single"}, {"q": "咨询师张某在咨询过程中,和求助者发展出了亲密的恋爱关系,该做法违反了以下哪项伦理原则?", "o": ["保密原则", "专业边界原则", "知情同意原则", "专业胜任力原则", "文化胜任力原则"], "a": 1, "e": "专业边界原则要求咨询师与求助者仅保持专业咨询关系,不得建立恋爱、商业等其他非专业关系,该做法严重违反了专业边界原则。其余选项均不符合题干场景,因此正确答案为B。", "type": "single"}, {"q": "心理咨询师发现接待的个案超出自身专业能力范围需要转介,以下哪些做法符合咨询伦理要求?", "o": ["提前向求助者说明自身专业能力的局限,获得求助者的知情同意", "优先选择具备对应问题处理资质与经验的机构或咨询师完成转介", "为了方便转介咨询师工作,直接把求助者全部咨询记录发给对方", "向转介咨询师收取一定比例的介绍费作为转介服务报酬", "转介后持续每周跟进求助者咨询进展,指导新咨询师开展工作"], "a": [0, 1], "e": "本题考查转介的伦理规范,正确要求包括提前告知求助者自身能力局限并征得同意,选择具备对应资质的转介对象。C选项未经求助者同意披露全部咨询记录,违反心理咨询保密原则;D选项收取转介介绍费违反伦理要求;E选项转介后持续介入咨询,容易形成多重关系,干扰新咨询开展,不符合伦理。", "type": "multi"}, {"q": "根据心理咨询伦理要求,以下哪些属于心理咨询师应当具备的专业胜任力要求?", "o": ["仅承接自己专业受训范围内能够处理的个案", "长期接受专业督导,持续参与相关专业培训更新知识", "遇到超出自身能力的个案时,征得求助者同意后转介给合适的咨询师", "从业满5年后就可以无需再培训处理所有类型的个案", "为了增加客源,对外夸大自身的专业能力范围"], "a": [0, 1, 2], "e": "专业胜任力要求咨询师仅在自身能力范围内开展工作,需要持续接受培训与督导,遇到超出能力的个案需要及时转介。D选项无需培训就能处理所有个案、E选项隐瞒并夸大自身专业局限都违反专业胜任力要求。", "type": "multi"}, {"q": "当求助者就咨询服务向所在机构投诉心理咨询师时,以下哪些做法符合专业伦理要求?", "o": ["配合机构的伦理调查工作,如实提供所有相关咨询资料", "保持专业理性态度,避免与求助者发生正面冲突", "警告求助者如果不撤回投诉就终止后续咨询服务", "为了避免责任,隐藏部分对自己不利的咨询记录", "在机构安排下和求助者沟通,了解投诉原因尝试协商解决"], "a": [0, 1, 4], "e": "本题考查投诉处理的伦理要求,正确做法为配合机构调查、保持专业态度、主动沟通了解原因解决问题。C选项威胁求助者撤回投诉、D选项隐瞒咨询记录都违反了专业伦理要求。", "type": "multi"}, {"q": "依据我国心理咨询伦理守则,以下哪些情况属于保密原则       h+='<div class=cc data-l='+level+' data-s='+s+'><div class=n>'+(sc>mc?'单':'混')+'</div><div class=i><div class=t>'+lbl+'</div><div class=m>'+(sc+mc)+'道题 (单选'+sc+', 多选'+mc+')</div></div><div class=a>&#8250;</div></div>';
    } else {
      var tot=0;for(var ss in d)tot+=d[ss].length;
      h+='<div class=cc data-l='+level+' data-s='+s+'><div class=n>伦</div><div class=i><div class=t>伦理题</div><div class=m>'+tot+'道题</div></div><div class=a>&#8250;</div></div>';
    }
  }
  ls.innerHTML=h;var cs=ls.querySelectorAll('.cc');for(var i=0;i<cs.length;i++)cs[i].onclick=function(){var s=this.getAttribute('data-s');if(Array.isArray(D[curLevel][s])){startQuiz(curLevel,s,null)}else{showSubSections(curLevel,s)}};_s('ls');
}

function showSubSections(level,section){
  pathStack.push({t:'ss',l:level});document.getElementById('b1').style.display='block';document.getElementById('ht').textContent='伦理题';
  var sd=D[level][section],ls=document.getElementById('ls'),h='<div class=sec-title>选择题型</div>';
  for(var s in sd){
    var qs=sd[s],sc=0,mc=0;for(var k=0;k<qs.length;k++){if(qs[k].type=='single')sc++;else mc++;}
    h+='<div class=cc data-l='+level+' data-s='+section+' data-ss='+s+'><div class=n>'+(sc>mc?'单':'混')+'</div><div class=i><div class=t>'+s+'</div><div class=m>'+(sc+mc)+'道题 (单选'+sc+', 多选'+mc+')</div></div><div class=a>&#8250;</div></div>';
  }
  ls.innerHTML=h;var cs=ls.querySelectorAll('.cc');for(var i=0;i<cs.length;i++)cs[i].onclick=function(){startQuiz(this.getAttribute('data-l'),this.getAttribute('data-s'),this.getAttribute('data-ss'))};_s('ls');
}

function startQuiz(level,section,subSection){
  curLevel=level;clr();curSection=section;curSubSection=subSection;
  var src=D[level][section];if(subSection)src=src[subSection];allQ=src;x=0;as=[];
  var nm=section.replace('基础知识-助理级','基础知识').replace('操作技能-助理级','操作技能').replace('基础知识-初级','基础知识').replace('操作技能-初级','操作技能');
  if(subSection)nm+='-'+subSection;document.getElementById('ht').textContent=nm;document.getElementById('b1').style.display='block';_rq();
}

function _rq(){
  if(x>=allQ.length){_sr();return;}var q=allQ[x],z=document.getElementById('qz');
  z.innerHTML='<div style=display:flex;justify-content:space-between;margin-bottom:.2rem><button onclick=goBackFromQuiz() style=background:none;border:none;color:rgba(255,255,255,.5);font-size:.82rem;cursor:pointer;padding:.1rem>&#8592; 返回</button><span style=font-size:.8rem;color:rgba(255,255,255,.4)>'+(x+1)+'/'+allQ.length+'</span></div><div class=q><div class=qn>第'+(x+1)+'/'+allQ.length+'题</div><div class=qt>'+q.q+'</div><div class=qh>'+(q.type=='multi'?'（可多选，请选出所有正确答案）':'（单选题）')+'</div><div id=ops></div><div class=ex id=ex></div></div><button class=bn id=bn>'+(q.type=='multi'?'提交答案':'下一题')+'</button>';
  var oh='';for(var j=0;j<q.o.length;j++)oh+='<div class=op data-n='+j+'><span class=l>'+L[j]+'</span><span>'+q.o[j]+'</span></div>';document.getElementById('ops').innerHTML=oh;
  sl=[];dn=false;var ops=document.getElementById('ops').children;
  for(var j=0;j<ops.length;j++)ops[j].onclick=q.type=='multi'?function(){_tk(parseInt(this.getAttribute('data-n')))}:function(){_sk(parseInt(this.getAttribute('data-n')))};
  document.getElementById('bn').onclick=function(){if(dn)_nq();else if(q.type=='multi')_sm()};
  if(q.type=='single')document.getElementById('bn').disabled=false;else document.getElementById('bn').disabled=true;_s('qz');
}

function goBackFromQuiz(){showSections(curLevel);}

function _tk(idx){if(dn)return;var i=sl.indexOf(idx),el=document.querySelectorAll('#ops .op')[idx];if(i>-1){sl.splice(i,1);el.className='op'}else{sl.push(idx);el.className='op sl'}document.getElementById('bn').disabled=sl.length===0}

function _sk(idx){if(dn)return;dn=true;var q=allQ[x],els=document.querySelectorAll('#ops .op'),ic=idx===q.a;as[x]={s:[idx],c:ic};fo;sv()r(var j=0;j<els.length;j++){els[j].className='op di';if(j===q.a)els[j].className='op cr di';else if(j===idx&&!ic)els[j].className='op wr di'}document.getElementById('ex').textContent=q.e;document.getElementById('ex').style.display='block'}

function _sm(){if(dn||sl.length===0)return;dn=true;var q=allQ[x],els=document.querySelectorAll('#ops .op'),ca=q.a;if(!Array.isArray(ca))ca=[ca];var ic=sl.length===ca.length&&sl.every(function(v){return ca.indexOf(v)>-1});as[x]={s:sl.slice(),c:ic};fo;sv()r(var j=0;j<els.length;j++){els[j].className='op di';if(ca.indexOf(j)>-1)els[j].className='op cr di';else if(sl.indexOf(j)>-1&&ca.indexOf(j)===-1)els[j].className='op wr di'}document.getElementById('ex').textContent=q.e;document.getElementById('ex').style.display='block';document.getElementById('bn').textContent='下一题';document.getElementById('bn').disabled=false}

function _nq(){if(x<allQ.length-1){x++;_rq()}else{_sr()}}

function _sr(){
  var co=0;for(var i=0;i<as.length;i++)if(as[i]&&as[i].c)co++;var t=allQ.length,p=Math.round(co/t*100),pa=p>=60,rh='';
  if(as.length>0){
    rh+='<div style=text-align:left;margin-bottom:1.2rem><div style=font-size:.88rem;color:rgba(255,255,255,.55);margin-bottom:.65rem;font-weight:500>答题回顾</div>';
    for(var i=0;i<allQ.length;i++){
      var a=as[i];if(!a)continue;var sa=a.s.map(function(j){return L[j]}).join('');
      var ca=Array.isArray(allQ[i].a)?allQ[i].a.map(function(j){return L[j]}).join(''):L[allQ[i].a];
      rh+='<div style=padding:.65rem 0;border-bottom:1px solid rgba(255,255,255,.04)><div style=font-size:.82rem;line-height:1.5;margin-bottom:.25rem>'+(i+1)+'. '+allQ[i].q+'</div><div style=font-size:.78rem;color:rgba(255,255,255,.5)>'+(a.c?'<span style=color:#50c878;font-weight:500>&#10003; '+sa+'</span>':'<span style=color:#ff5a5a;text-decoration:line-through>&#10007; '+sa+'</span> &#8594; <span style=color:#50c878;font-weight:500>'+ca+'</span>')+'</div></div>';
    }
    rh+='</div>';
  }
  var e=document.getElementById('rs');
  e.innerHTML='<div style=width:110px;height:110px;border-radius:50%;margin:0 auto 1.2rem;display:flex;align-items:center;justify-content:center;border:3px solid '+(pa?'#50c878':'#ff5a5a')+';font-size:2.2rem;font-weight:700;color:'+(pa?'#50c878':'#ff5a5a')+'>'+p+'%</div><h2 style=font-size:1.15rem>'+(pa?'通过！':'继续加油')+'</h2><p style=font-size:.85rem;color:rgba(255,255,255,.5);margin-bottom:1.2rem>'+co+'/'+t+'题正确</p>'+rh+'<div style=display:flex;gap:.55rem;flex-wrap:wrap><button style="flex:1;min-width:120px;padding:.75rem;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#e8e6e3" onclick=startQuiz(curLevel,curSection,curSubSection)>重新答题</button><button style="flex:1;min-width:120px;padding:.75rem;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#e8e6e3" onclick=showSections(curLevel)>返回板块</button><button style="flex:1;min-width:120px;padding:.75rem;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:linear-gradient(135deg,#2d8a4e,#50c878);color:#fff" onclick=showLevels()>返回首页</button></div>';
  _s('rs');
}


// resume feature
var SK=Q.psych_prog;
function sv(){if(!curLevel)return;localStorage.setItem(SK,JSON.stringify({l:curLevel,sec:curSection,sub:curSubSection||'+x:x,as:as,t:Date.now()}))}
function clr(){localStorage.removeItem(SK)}
function ck_resume(){try{var r=localStorage.getItem(SK);if(!r)return;var s=JSON.parse(r);if(!s.l)return;var d=document.getElementById('.ls');var h=document.createElement('.div');h.style.cssText='.background:rgba(80,200,120,.08);border:1px solid rgba(80,200,120,.3);border-radius:12px;padding:.75rem 1rem;margin-bottom:.85rem;cursor:pointer';h.onclick=function(){try{var d2=JSON.parse(localStorage.getItem(SK));if(!d2||!d2.l)return;curLevel=d2.l;curSection=d2.sec;curSubSection=d2.sub||'+';var src=D[curLevel][curSection];if(curSubSection)src=src[curSubSection];all'=src;x=d2.x||0;as=d2.as||[];document.getElementById('.ht').textContent=curSection;document.getElementById('.b1').style.display='.block';_rq()}catch(e){}};h.innerHTML='.<div style=font-size:.88rem;color:#50c878;font-weight:600;margin-bottom:.2rem>&#9654; 继续上次答题</div><div style=font-size:.75rem;color:rgba(255,255,255,.45)>('+s.l+'+ > '+nm+'+ · 第'+(s.x+1)+'+题'+'+</div>';d.insertBefore(h,d.firstChild)}catch(e){}}showLevels();
</script>
</body>
</html>
